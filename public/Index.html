function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; } }

// Récupère les tokens depuis l'URL après OAuth
(function checkOAuthCallback() {
  const params = new URLSearchParams(window.location.search);
  if (params.get("access_token")) {
    stravaToken = params.get("access_token");
    stravaRefresh = params.get("refresh_token");
    stravaExpires = parseInt(params.get("expires_at") || "0");
    save("lk_strava_token", stravaToken);
    save("lk_strava_refresh", stravaRefresh);
    save("lk_strava_expires", stravaExpires);
    window.history.replaceState({}, "", "/");
  }
})();

function today() { return new Date().toISOString().slice(0,10); }
function countdown() { return Math.ceil((new Date("2026-09-06") - new Date()) / 86400000); }
function currentWeek() {
  const t = today();
  for (const w of PLAN) {
    if (t >= w.sessions[0].date && t <= w.sessions[6].date) return w.week;
  }
  return t < PLAN[0].sessions[0].date ? 1 : 11;
}
function fmtDate(d) { return new Date(d+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}); }
function fmtPace(speedMs) {
  if (!speedMs || speedMs <= 0) return "--:--";
  const secPerKm = 1000 / speedMs;
  const min = Math.floor(secPerKm / 60);
  const sec = Math.round(secPerKm % 60).toString().padStart(2,"0");
  return `${min}:${sec}`;
}
function fmtTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.round(seconds % 60).toString().padStart(2,"0");
  return `${m}'${s}"`;
}
function weekPct(week) {
  const sess = week.sessions.filter(s=>s.type!=="REPOS"&&s.type!=="RACE");
  const done = sess.filter(s=>statuses[`${week.week}-${week.sessions.indexOf(s)}`]==="✅").length;
  return sess.length ? Math.round(done/sess.length*100) : 0;
}
function globalPct() {
  const total = ALL_SESSIONS.filter(s=>s.type!=="REPOS"&&s.type!=="RACE").length;
  const done = ALL_SESSIONS.filter(s=>statuses[s.uid]==="✅").length;
  return Math.round(done/total*100);
}
function phaseOf(weekNum) { return PHASES.find(p=>p.weeks.includes(weekNum))||{color:"#475569",label:""}; }

// PRÉDICTION 10K
// ══════════════════════════════════════════════════════════════════════════════
function predict10K() {
  const BASE_TIME = 3021;
  const BASE_DATE = new Date("2026-06-07");
  const RACE_DATE = new Date("2026-09-06");
  const TOTAL_DAYS = (RACE_DATE - BASE_DATE) / 86400000;

  const runs = stravaActivities.filter(a => a.type === "Run" && a.distance >= 3000);

  let estimate = BASE_TIME;
  let confidence = 30;
  let method = "Base Lavandou 50'21\"";
  let details = [];

  if (runs.length > 0) {
    const longRuns = runs.filter(r => r.distance >= 5000).sort((a,b) => new Date(b.start_date)-new Date(a.start_date));

    if (longRuns.length > 0) {
      const best = longRuns.reduce((best, r) => {
        const pace = r.moving_time / r.distance;
        const bestPace = best.moving_time / best.distance;
        return pace < bestPace ? r : best;
      }, longRuns[0]);

      const riegelTime = best.moving_time * Math.pow(10000 / best.distance, 1.06);
      details.push({ label: "Riegel (" + (best.distance/1000).toFixed(1) + "km)", value: fmtTime(riegelTime) });

      const recentLong = runs.filter(r=>r.distance>=8000).slice(0,3);
      let avgPaceTime = null;
      if (recentLong.length > 0) {
        const avgSpeed = recentLong.reduce((s,r)=>s+r.average_speed,0)/recentLong.length;
        avgPaceTime = 10000 / avgSpeed;
        details.push({ label: "Allure moy. longues", value: fmtTime(avgPaceTime) });
      }

      estimate = avgPaceTime ? (riegelTime * 0.6 + avgPaceTime * 0.4) : riegelTime;

      const today_ = new Date();
      const daysIn = (today_ - BASE_DATE) / 86400000;
      const progressFactor = Math.min(daysIn / TOTAL_DAYS, 1);
      const improvement = (BASE_TIME - estimate) * progressFactor;
      estimate = BASE_TIME - improvement;

      confidence = Math.min(30 + runs.length * 5 + longRuns.length * 10, 90);
      method = `${runs.length} activité${runs.length>1?"s":""} Strava analysée${runs.length>1?"s":""}`;
    }
  }

  const specDone = ALL_SESSIONS.filter(s=>s.type==="SPEC"&&statuses[s.uid]==="✅").length;
  estimate -= specDone * 15;
  if (specDone > 0) details.push({ label: `${specDone} séance${specDone>1?"s":""} SPEC`, value: `-${specDone*15}''` });

  const vmaDone = ALL_SESSIONS.filter(s=>s.type==="VMA"&&statuses[s.uid]==="✅").length;
  estimate -= vmaDone * 8;
  if (vmaDone > 0) details.push({ label: `${vmaDone} séance${vmaDone>1?"s":""} VMA`, value: `-${vmaDone*8}''` });

  const target = 48.5 * 60;
  const gap = estimate - target;

  return {
    time: Math.round(estimate),
    timeStr: fmtTime(Math.round(estimate)),
    target: fmtTime(target),
    gap: Math.round(gap),
    gapStr: (gap > 0 ? "+" : "") + fmtTime(Math.abs(Math.round(gap))),
    onTrack: gap <= 30,
    confidence,
    method,
    details,
  };
}

// STRAVA SYNC
// ══════════════════════════════════════════════════════════════════════════════
async function ensureFreshToken() {
  if (!stravaToken) return false;
  if (Date.now() / 1000 < stravaExpires - 60) return true;
  try {
    const resp = await fetch("/api/strava/refresh", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ refresh_token: stravaRefresh }),
    });
    const data = await resp.json();
    stravaToken = data.access_token;
    stravaRefresh = data.refresh_token;
    stravaExpires = data.expires_at;
    save("lk_strava_token", stravaToken);
    save("lk_strava_refresh", stravaRefresh);
    save("lk_strava_expires", stravaExpires);
    return true;
  } catch { return false; }
}

async function syncStrava() {
  syncing = true;
  syncMsg = "Connexion à Strava...";
  render();

  const ok = await ensureFreshToken();
  if (!ok) {
    syncing = false;
    syncMsg = "Erreur de token";
    render();
    return;
  }

  try {
    syncMsg = "Récupération des activités...";
    render();
    const resp = await fetch(`/api/strava/activities?token=${stravaToken}`);
    const activities = await resp.json();

    if (Array.isArray(activities)) {
      stravaActivities = activities;
      save("lk_strava_activities", activities);
      matchActivitiesToPlan(activities);
      syncMsg = `✅ ${activities.length} activité${activities.length>1?"s":""} synchronisée${activities.length>1?"s":""}`;
    } else {
      syncMsg = "❌ Erreur Strava";
    }
  } catch(e) {
    syncMsg = "❌ Erreur réseau";
  }

  syncing = false;
  render();
  setTimeout(()=>{ syncMsg=""; render(); }, 3000);
}

function matchActivitiesToPlan(activities) {
  const runs = activities.filter(a => a.type === "Run");
  ALL_SESSIONS.forEach(s => {
    if (s.type === "REPOS" || s.type === "RACE") return;
    const match = runs.find(r => r.start_date?.slice(0,10) === s.date);
    if (match && !statuses[s.uid]) {
      statuses[s.uid] = "✅";
    }
  });
  save("lk_statuses", statuses);
}

// DOM HELPERS

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k==="style" && typeof v==="object") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k==="class") e.className=v;
    else e.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c => {
    if (c==null||c===false) return;
    e.appendChild(typeof c==="string" ? document.createTextNode(c) : c);
  });
  return e;
}

function svgCircle(pct, size, stroke, color, inner) {
  const r2 = (size-stroke)/2, circ = 2*Math.PI*r2;
  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width",size); svg.setAttribute("height",size);
  svg.style.transform="rotate(-90deg)";
  const mk = (clr,dash,off) => {
    const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx",size/2);c.setAttribute("cy",size/2);c.setAttribute("r",r2);
    c.setAttribute("fill","none");c.setAttribute("stroke",clr);c.setAttribute("stroke-width",stroke);
    if(dash){c.setAttribute("stroke-dasharray",circ);c.setAttribute("stroke-dashoffset",off);c.setAttribute("stroke-linecap","round");}
    return c;
  };
  svg.appendChild(mk("#232738",false));
  svg.appendChild(mk(color,true,circ-(pct/100)*circ));
  const wrap = el("div",{style:{position:"relative",width:size+"px",height:size+"px",flexShrink:"0"}});
  wrap.appendChild(svg);
  const center = el("div",{style:{position:"absolute",inset:"0",display:"flex",alignItems:"center",justifyContent:"center"}},inner);
  wrap.appendChild(center);
  return wrap;
}

function badge(type) {
  const st = STYPES[type]||{color:"#475569",short:type};
  return el("span",{class:"pill",style:{background:st.color+"22",color:st.color,border:`1px solid ${st.color}44`}},st.short);
}

        el("div",{class:"muted",style:{fontSize:"12px"}},fmtDate(week.sessions[0].date)+" – "+fmtDate(week.sessions[6].date))
      ),
      weekRuns.length>0?el("div",{style:{background:"#fc4c0211",border:"1px solid #fc4c0233",borderRadius:"8px",padding:"6px 10px",textAlign:"center"}},
        el("div",{style:{color:"#fc4c02",fontSize:"14px",fontWeight:"700"}},weekRuns.length+""),
        el("div",{class:"muted",style:{fontSize:"10px"}},"Strava")
      ):null
    ),
    ...cards
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// NOTES
// ══════════════════════════════════════════════════════════════════════════════
function renderNotes() {
  const input = el("input",{type:"text",placeholder:"Ressentis, douleurs, météo..."});
  const addBtn = el("button",{style:{background:"#f97316",border:"none",borderRadius:"10px",color:"#fff",padding:"0 18px",fontSize:"20px",cursor:"pointer",fontWeight:"700",height:"44px",flexShrink:"0"}},"＋");
  addBtn.addEventListener("click",()=>{
    const txt=input.value.trim(); if(!txt) return;
    notesList.unshift({text:txt,date:today(),id:Date.now()});
    save("lk_notes",notesList); input.value=""; render();
  });
  input.addEventListener("keydown",e=>{ if(e.key==="Enter") addBtn.click(); });

  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{marginTop:"8px",marginBottom:"16px"}},
      el("div",{class:"label"},"Carnet de bord"),
      el("div",{style:{display:"flex",gap:"8px"}},input,addBtn)
    ),
    notesList.length===0
      ? el("div",{class:"muted",style:{textAlign:"center",padding:"40px 0",fontSize:"14px"}},"Aucune note pour l'instant.",el("span",{style:{fontSize:"28px",display:"block",marginTop:"8px"}},"📝"))
      : el("div",{},...notesList.map(note=>{
          const del=el("button",{style:{background:"none",border:"none",color:"#475569",fontSize:"18px",cursor:"pointer",padding:"0 4px",alignSelf:"flex-start"}},"×");
          del.addEventListener("click",()=>{ notesList=notesList.filter(n=>n.id!==note.id); save("lk_notes",notesList); render(); });
          return el("div",{class:"card",style:{display:"flex",gap:"10px"}},
            el("div",{style:{flex:"1"}},el("div",{class:"muted",style:{fontSize:"11px",marginBottom:"4px"}},note.date),el("div",{style:{color:"#f1f5f9",fontSize:"14px"}},note.text)),
            del
          );
        }))
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════════
function setView(v) { view=v; render(); window.scrollTo(0,0); }

function render() {
  const app = document.getElementById("app");
  app.innerHTML="";

  const backBtn = view==="weekDetail"
    ? el("button",{style:{background:"none",border:"none",color:"#f97316",fontSize:"22px",cursor:"pointer",padding:"0",lineHeight:"1",marginRight:"4px"},onClick:()=>setView("weeks")},"‹")
    : null;

  const titles = {dashboard:"Plan 10K",weeks:"Semaines",weekDetail:"Semaine "+selectedWeek,notes:"Carnet de bord"};
  const hdr = el("div",{style:{position:"sticky",top:"0",zIndex:"10",background:"rgba(15,17,23,0.95)",backdropFilter:"blur(12px)",borderBottom:"1px solid #2e3347",padding:"12px 16px 10px",display:"flex",alignItems:"center",gap:"6px"}},
    backBtn||"",
    el("div",{style:{flex:"1"}},
      el("div",{style:{color:"#f1f5f9",fontSize:"17px",fontWeight:"700",lineHeight:"1"}},titles[view]||""),
      view==="weekDetail"?el("div",{class:"muted",style:{fontSize:"11px",marginTop:"1px"}},phaseOf(selectedWeek).label):null
    ),
    el("div",{style:{background:"#232738",borderRadius:"8px",padding:"4px 10px",color:"#f97316",fontSize:"13px",fontWeight:"700"}},"J–"+countdown())
  );

  let content;
  if(view==="dashboard") content=renderDashboard();
  else if(view==="weeks") content=renderWeeks();
  else if(view==="weekDetail") content=renderWeekDetail(selectedWeek);
  else content=renderNotes();

  const NAV=[{id:"dashboard",icon:"⚡",label:"Dashboard"},{id:"weeks",icon:"📅",label:"Semaines"},{id:"notes",icon:"📝",label:"Notes"}];
  const activeNav=["dashboard","notes"].includes(view)?view:"weeks";
  const nav=el("div",{style:{position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",background:"rgba(26,29,39,0.97)",backdropFilter:"blur(16px)",borderTop:"1px solid #2e3347",display:"flex",zIndex:"20"}},
    ...NAV.map(n=>{
      const b=el("button",{style:{flex:"1",background:"none",border:"none",cursor:"pointer",padding:"10px 0 14px",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",opacity:activeNav===n.id?"1":"0.45"}},
        el("span",{style:{fontSize:"22px"}},n.icon),
        el("span",{style:{fontSize:"10px",fontWeight:"700",letterSpacing:"0.3px",color:activeNav===n.id?"#f97316":"#475569"}},n.label)
      );
      b.addEventListener("click",()=>{ if(n.id==="weeks") selectedWeek=currentWeek(); setView(n.id); });
      return b;
    })
  );

  app.appendChild(hdr);
  app.appendChild(content);
  app.appendChild(nav);
}

render();

</script>
</body>
</html>
