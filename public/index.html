          isDone && stravaRun2 ? el("div",{style:{background:"rgba(var(--warn-rgb),0.07)",border:"1px solid rgba(var(--warn-rgb),0.2)",borderRadius:"8px",padding:"8px 10px",marginBottom:"8px"}},
            el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}},
              el("span",{class:"muted",style:{fontSize:"13px"}},(stravaRun2.start_date_local||"").slice(11,16)+" · départ"),
              el("a",{href:"https://www.strava.com/activities/"+stravaRun2.id_str,target:"_blank",style:{color:"var(--warn)",fontSize:"13px",fontWeight:"700",textDecoration:"none"}},"Voir sur Strava 🔗")
            ),
            el("div",{style:{display:"flex",gap:"14px",flexWrap:"wrap",marginBottom:effortLaps2.length>0?"8px":"0"}},
              el("div",{},el("div",{style:{color:"var(--warn)",fontSize:"15px",fontWeight:"700"}},(stravaRun2.distance/1000).toFixed(2)+"km"),el("div",{class:"muted",style:{fontSize:"13px"}},"distance")),
              el("div",{},el("div",{style:{color:"var(--warn)",fontSize:"15px",fontWeight:"700"}},fmtTime(stravaRun2.moving_time)),el("div",{class:"muted",style:{fontSize:"13px"}},"durée")),
              (()=>{
                const isIntensive2 = effortLaps2.length > 0;
                const dispPace2 = isIntensive2 ? effortLaps2.reduce((s,l)=>s+l.average_speed,0)/effortLaps2.length : stravaRun2.average_speed;
                const paceLabel2 = isIntensive2 ? "allure intervalles" : "allure moy.";
                return el("div",{},el("div",{style:{color:"var(--warn)",fontSize:"15px",fontWeight:"700"}},fmtPace(dispPace2)+"/km"),el("div",{class:"muted",style:{fontSize:"13px"}},paceLabel2));
              })(),
              (()=>{
                const isIntensive2 = effortLaps2.length > 0;
                const hrVals2 = isIntensive2 ? effortLaps2.filter(l=>l.average_heartrate) : null;
                const dispHr2 = isIntensive2 ? (hrVals2.length ? hrVals2.reduce((s,l)=>s+l.average_heartrate,0)/hrVals2.length : null) : stravaRun2.average_heartrate;
                const hrLabel2 = isIntensive2 ? "FC intervalles" : "FC moy.";
                return dispHr2 ? el("div",{},el("div",{style:{color:"var(--warn)",fontSize:"15px",fontWeight:"700"}},Math.round(dispHr2)+" bpm"),el("div",{class:"muted",style:{fontSize:"13px"}},hrLabel2)) : null;
              })(),
              stravaRun2.max_heartrate?el("div",{},el("div",{style:{color:"var(--warn)",fontSize:"15px",fontWeight:"700"}},Math.round(stravaRun2.max_heartrate)+" bpm"),el("div",{class:"muted",style:{fontSize:"13px"}},"FC max")):null
            ),
            effortLaps2.length>0?el("div",{style:{borderTop:"1px solid rgba(var(--warn-rgb),0.13)",paddingTop:"8px"}},
              el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}},
                el("div",{class:"muted",style:{fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.5px"}},
                  "Répétitions ("+effortLaps2.length+(s.structureIntervalles ? "/"+aplatirRepetitionsAttendues(s.structureIntervalles).length : "")+") · cible "+(SESSION_TARGETS[s.type]?.effort||"—")),
                (()=>{
                  const tgt=SESSION_TARGETS[s.type];
                  if(!tgt) return null;
                  const nb=effortLaps2.filter(l=>(1000/l.average_speed)<=tgt.okPace).length;
                  return el("span",{style:{color:nb===effortLaps2.length?"var(--accent2)":nb>0?"var(--warn)":"var(--warn)",fontSize:"13px",fontWeight:"700"}},nb+"/"+effortLaps2.length+" dans la cible");
                })()
              ),
              ...(() => {
                const { driftEl } = computeFcDrift(effortLaps2);
                const rows = effortLaps2.map((lap,i)=>renderLapRow(lap,i,s.type));
                return driftEl ? [...rows, driftEl] : rows;
              })()
            ):null
          ):null,
          // Prochaine séance
          nextSess?el("div",{style:{borderTop:"1px solid var(--border)",paddingTop:"10px",marginTop:"8px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"},
            onClick:()=>{ selectedWeek=nextSess.week; setView("weekDetail"); }
          },
            el("div",{},
              el("div",{class:"muted",style:{fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"3px"}},"Prochaine séance · "+new Date(nextSess.date+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"})),
              el("div",{style:{color:"var(--text2)",fontSize:"14px"}},(STYPES[nextSess.type]?.short||nextSess.type)+" · "+nextSess.session)
            ),
            el("span",{style:{color:"var(--text2)",fontSize:"18px"}},"›")
          ):null,
            );
            // Bouton toggle "voir détails"
            const toggleBtn = el("button",{style:{
              width:"100%",marginTop:"6px",background:"none",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",
              borderRadius:"8px",padding:"6px",color:"var(--text-muted)",fontSize:"12px",cursor:"pointer"
            }},"▼ Voir les détails");
            let detailOpen2 = false;
            toggleBtn.addEventListener("click",(e)=>{
              e.stopPropagation();
              detailOpen2 = !detailOpen2;
              detailBlock.style.display = detailOpen2 ? "block" : "none";
              toggleBtn.textContent = detailOpen2 ? "▲ Masquer les détails" : "▼ Voir les détails";
            });
            const wrapper2 = document.createElement("div");
            wrapper2.appendChild(toggleBtn);
            wrapper2.appendChild(detailBlock);
            return wrapper2;
          })(),
          !isRest && !isDone ? el("button",{style:{width:"100%",marginTop:"8px",background:"rgba(var(--accent-rgb),0.07)",border:"1px solid rgba(var(--accent-rgb),0.2)",borderRadius:"8px",padding:"8px",color:"var(--accent)",fontSize:"14px",fontWeight:"700",cursor:"pointer"},
            onClick:()=>{ selectedWeek=s.week; setView("weekDetail"); }
          },"Voir la semaine →") : null
        );
        return card;
      })
    );
    } // fin else isFullRepos
  }

  const cw2 = currentWeek();
  const report = weeklyReport(cw2);
  let bilanEl = null;
  if (report && (report.done+report.adapted+report.missed) > 0) {
    const pct = Math.round((report.done+report.adapted)/report.total*100);
    const pctColor = pct>=80?"var(--accent2)":pct>=50?"var(--warn)":"var(--warn)";
    bilanEl = el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"Bilan semaine "+cw2),
      el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"12px",padding:"14px"}},
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},
          el("div",{style:{display:"flex",gap:"16px"}},
            el("div",{},el("div",{style:{color:"var(--accent2)",fontSize:"20px",fontWeight:"800"}},report.done+""),el("div",{class:"muted",style:{fontSize:"13px"}},"✅ faites")),
            el("div",{},el("div",{style:{color:"var(--warn)",fontSize:"20px",fontWeight:"800"}},report.adapted+""),el("div",{class:"muted",style:{fontSize:"13px"}},"⚠️ partielles")),
            el("div",{},el("div",{style:{color:"var(--warn)",fontSize:"20px",fontWeight:"800"}},report.missed+""),el("div",{class:"muted",style:{fontSize:"13px"}},"❌ manquées"))
          ),
          el("div",{style:{textAlign:"right"}},
            el("div",{style:{color:pctColor,fontSize:"22px",fontWeight:"800"}},pct+"%"),
            el("div",{class:"muted",style:{fontSize:"13px"}},"complétées")
          )
        ),
        el("div",{style:{display:"flex",gap:"16px",flexWrap:"wrap",paddingTop:"10px",borderTop:"1px solid var(--border)"}},
          report.plannedMin>0?el("div",{},
            el("div",{style:{color:"var(--text)",fontSize:"15px",fontWeight:"700"}},
              (report.realMin>0?report.realMin+"'":"-")+" / "+report.plannedMin+"'"
            ),
            el("div",{class:"muted",style:{fontSize:"13px"}},"min réelles / prévues")
          ):null,
          (()=>{
            const ws = weekStats(cw2);
            if (!ws || !ws.hasReal) return null;
            return el("div",{},
              el("div",{style:{color:"var(--warn)",fontSize:"15px",fontWeight:"700"}},ws.realKm+" / ~"+ws.plannedKm+" km"),
              el("div",{class:"muted",style:{fontSize:"13px"}},"km réels / prévus")
            );
          })(),
          report.avgEfPace?el("div",{},
            el("div",{style:{display:"flex",alignItems:"center",gap:"4px"}},
              el("div",{style:{color:"var(--accent)",fontSize:"15px",fontWeight:"700"}},fmtPace(1000/report.avgEfPace)+"/km"),
              report.prevEfPace ? el("span",{style:{
                fontSize:"13px",
                color: report.avgEfPace < report.prevEfPace ? "var(--accent2)" : report.avgEfPace > report.prevEfPace+10 ? "var(--warn)" : "var(--text2)"
              }}, report.avgEfPace < report.prevEfPace ? "📈" : report.avgEfPace > report.prevEfPace+10 ? "📉" : "➡️") : null
            ),
            el("div",{class:"muted",style:{fontSize:"13px"}},"allure moy. EF"+(report.prevEfPace?(" · "+(report.avgEfPace<report.prevEfPace?"-":"+")+(Math.abs(Math.round(report.avgEfPace-report.prevEfPace)))+"\" vs S"+(cw2-1)):""))
          ):null,
          report.avgEfHr?el("div",{},
            el("div",{style:{display:"flex",alignItems:"center",gap:"4px"}},
              el("div",{style:{color:"var(--accent)",fontSize:"15px",fontWeight:"700"}},report.avgEfHr+" bpm"),
              report.prevEfHr ? el("span",{style:{
                fontSize:"13px",
                color: report.avgEfHr < report.prevEfHr ? "var(--accent2)" : report.avgEfHr > report.prevEfHr+3 ? "var(--warn)" : "var(--text2)"
              }}, report.avgEfHr < report.prevEfHr ? "📈" : report.avgEfHr > report.prevEfHr+3 ? "📉" : "➡️") : null
            ),
            el("div",{class:"muted",style:{fontSize:"13px"}},"FC moy. EF"+(report.prevEfHr?(" · "+(report.avgEfHr<report.prevEfHr?"-":"+")+(Math.abs(report.avgEfHr-report.prevEfHr))+" bpm vs S"+(cw2-1)):""))
          ):null,
          (()=>{
            const efSessions = ALL_SESSIONS.filter(s=>(s.type==="EF"||s.type==="LONGUE")&&s.week===cw2&&historicalWeatherCache[s.date]!=null);
            if (!efSessions.length) return null;
            const avgTemp = Math.round(efSessions.reduce((s,e)=>s+historicalWeatherCache[e.date],0)/efSessions.length);
            return el("div",{},
              el("div",{style:{color:avgTemp>28?"var(--accent)":"var(--text2)",fontSize:"15px",fontWeight:"700"}},avgTemp+"°C"),
              el("div",{class:"muted",style:{fontSize:"13px"}},"temp. moy. séances")
            );
          })()
        )
      )
    );
  }

    // ── Barres de progression km + temps ─────────────────────────────────────
  const totalKm = Math.round(activitesDuPlan().reduce((s,a)=>s+a.distance,0)/100)/10;
  const totalMin = Math.round(activitesDuPlan().reduce((s,a)=>s+a.moving_time,0)/60);
  const totalH = Math.floor(totalMin/60);
  const totalMmin = totalMin%60;

  // Calculer km et temps prévus total du plan
  let plannedKmTotal = 0, plannedMinTotal = 0;
  ALL_SESSIONS.filter(s=>s.type!=="REPOS"&&s.type!=="RACE").forEach(s=>{
    const m1=s.session.match(/(\d+)(?:[–-](\d+))?\s*min/);
    if(m1) plannedMinTotal += m1[2]?(parseInt(m1[1])+parseInt(m1[2]))/2:parseInt(m1[1]);
    const m2=s.warmup.match(/(\d+)'/); if(m2) plannedMinTotal+=parseInt(m2[1]);
    const m3=s.cooldown.match(/(\d+)'/); if(m3) plannedMinTotal+=parseInt(m3[1]);
  });
  plannedKmTotal = Math.round(plannedMinTotal/6.33*10)/10; // 6:20/km
  const plannedH = Math.floor(plannedMinTotal/60);
  const pctKm = Math.min(100,Math.round(totalKm/plannedKmTotal*100));
  const pctMin = Math.min(100,Math.round(totalMin/plannedMinTotal*100));

  const progressEl = stravaActivities.length>0 ? el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px"}},
    el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}},
      el("div",{style:{display:"flex",alignItems:"center",gap:"6px"}},
        el("span",{style:{fontSize:"15px"}},"🏃"),
        el("span",{class:"muted",style:{fontSize:"14px"}},totalKm+" km / ~"+Math.round(plannedKmTotal)+" km")
      ),
      el("span",{style:{color:"var(--accent2)",fontSize:"14px",fontWeight:"700"}},pctKm+"%")
    ),
    el("div",{style:{height:"4px",background:"var(--border-soft)",borderRadius:"2px",marginBottom:"8px"}},
      el("div",{style:{width:pctKm+"%",height:"100%",background:"var(--accent2)",borderRadius:"2px"}})
    ),
    el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}},
      el("div",{style:{display:"flex",alignItems:"center",gap:"6px"}},
        el("span",{style:{fontSize:"15px"}},"⏱️"),
        el("span",{class:"muted",style:{fontSize:"14px"}},totalH+"h"+(totalMmin).toString().padStart(2,"0")+"' / ~"+plannedH+"h prévues")
      ),
      el("span",{style:{color:"var(--accent2)",fontSize:"14px",fontWeight:"700"}},pctMin+"%")
    ),
    el("div",{style:{height:"4px",background:"var(--border-soft)",borderRadius:"2px"}},
      el("div",{style:{width:pctMin+"%",height:"100%",background:"var(--accent2)",borderRadius:"2px"}})
    )
  ) : null;

  // ── Bilan de phase (tap pour révéler) ────────────────────────────────────
  const phase = phaseOf(cw);
  const phaseWeeks = phase.weeks || [];
  const phaseStart = phaseWeeks[0], phaseEnd = phaseWeeks[phaseWeeks.length-1];
  const phasePos = phaseWeeks.indexOf(cw) + 1;
  const phasePct = Math.round((phasePos / phaseWeeks.length) * 100);

  // Stats de la phase
  // Séances passées uniquement (jusqu'à aujourd\'hui)
  const phaseSessions = ALL_SESSIONS.filter(s => phaseWeeks.includes(s.week) && s.type !== "REPOS" && s.date <= today());
  const phaseValidated = phaseSessions.filter(s => statuses[s.uid]==="✅"||statuses[s.uid]==="⚠️");
  // Total prévu sur toute la phase (pour les barres par type)
  const phaseSessionsTotal = ALL_SESSIONS.filter(s => phaseWeeks.includes(s.week) && s.type !== "REPOS");
  const phaseKm = Math.round(phaseWeeks.reduce((acc, w) => acc + weekKm(w), 0) * 10) / 10;

  // Stats par type de séance dans la phase
  const phaseTypes = ["VMA","SPEC","SEUIL","EF","LONGUE"];
  const phaseTypeStats = phaseTypes.map(type => {
    const total = phaseSessionsTotal.filter(s => s.type===type).length;
    const done = phaseValidated.filter(s => s.type===type).length;
    return { type, total, done };
  }).filter(t => t.total > 0);

  // Allure EF moyenne
  const efRuns = stravaActivities.filter(a => {
    const d = a.start_date_local?.slice(0,10);
    const s = ALL_SESSIONS.find(ss => ss.date===d && ss.type==="EF");
    return s && phaseWeeks.includes(s.week);
  });
  const efAvgPace = efRuns.length > 0
    ? fmtPace(efRuns.reduce((s,a)=>s+a.average_speed,0)/efRuns.length)
    : null;

  // Allure intensive moyenne (VMA/SPEC)
  const intensiveRunsAvecSeance = stravaActivities.map(a => {
    const d = a.start_date_local?.slice(0,10);
    const s = ALL_SESSIONS.find(ss => ss.date===d && (ss.type==="VMA"||ss.type==="SPEC"));
    return { a, s };
  }).filter(({s}) => s && phaseWeeks.includes(s.week));
  const intensiveLaps = intensiveRunsAvecSeance.flatMap(({a,s}) => getLapsAffichage(a, s.structureIntervalles));
  const intensiveAvgPace = intensiveLaps.length > 0
    ? fmtPace(intensiveLaps.reduce((s,l)=>s+l.average_speed,0)/intensiveLaps.length)
    : null;

  // Verdict
  const validationRate = phaseSessions.length > 0 ? phaseValidated.length / phaseSessions.length : 0;
  const verdictColor = validationRate >= 0.8 ? "var(--accent2)" : validationRate >= 0.6 ? "var(--warn)" : "var(--warn)";
  const verdictIcon = validationRate >= 0.8 ? "🟢" : validationRate >= 0.6 ? "🟡" : "🔴";
  const verdictText = validationRate >= 0.8 ? "Bonne progression" : validationRate >= 0.6 ? "Progression correcte" : "Attention à la régularité";

  // Contenu détaillé (caché par défaut)
  const phaseDetailEl = el("div",{style:{display:"none",marginTop:"12px",borderTop:"1px solid var(--border)",paddingTop:"12px"}},
    // Stats clés
    el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"12px"}},
      el("div",{style:{background:"var(--border-soft)",borderRadius:"8px",padding:"10px",textAlign:"center"}},
        el("div",{style:{color:"var(--text)",fontSize:"16px",fontWeight:"700"}},phaseKm+" km"),
        el("div",{class:"muted",style:{fontSize:"12px"}},"courus")
      ),
      efAvgPace ? el("div",{style:{background:"var(--border-soft)",borderRadius:"8px",padding:"10px",textAlign:"center"}},
        el("div",{style:{color:"var(--accent)",fontSize:"16px",fontWeight:"700"}},efAvgPace),
        el("div",{class:"muted",style:{fontSize:"12px"}},"allure EF")
      ) : null,
      intensiveAvgPace ? el("div",{style:{background:"var(--border-soft)",borderRadius:"8px",padding:"10px",textAlign:"center"}},
        el("div",{style:{color:"var(--accent)",fontSize:"16px",fontWeight:"700"}},intensiveAvgPace),
        el("div",{class:"muted",style:{fontSize:"12px"}},"allure int.")
      ) : null
    ),
    // Séances par type
    el("div",{style:{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"12px"}},
      ...phaseTypeStats.map(t => {
        const st = STYPES[t.type]||STYPES.EF;
        const pct = t.total > 0 ? Math.round(t.done/t.total*100) : 0;
        return el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
          el("span",{style:{background:st.color,color:"var(--bg)",borderRadius:"4px",padding:"2px 7px",fontSize:"12px",fontWeight:"700",minWidth:"50px",textAlign:"center"}},t.type),
          el("div",{style:{flex:"1",height:"4px",background:"var(--border-soft)",borderRadius:"2px"}},
            el("div",{style:{width:pct+"%",height:"100%",background:st.color,borderRadius:"2px"}})
          ),
          el("span",{style:{color:"var(--text)",fontSize:"13px"}},t.done+" / "+t.total)
        );
      })
    ),
    // Verdict
    el("div",{style:{background:verdictColor+"11",border:"1px solid "+verdictColor+"33",borderRadius:"8px",padding:"10px",display:"flex",alignItems:"center",gap:"8px"}},
      el("span",{style:{fontSize:"16px"}},verdictIcon),
      el("div",{},
        el("div",{style:{color:verdictColor,fontSize:"14px",fontWeight:"700"}},verdictText),
        el("div",{class:"muted",style:{fontSize:"12px"}},phaseValidated.length+" / "+phaseSessions.length+" séances validées")
      )
    )
  );

  // Header cliquable
  let phaseOpen = false;
  const phaseEl = el("div",{style:{background:"var(--bg)",border:"1px solid "+colorAvecOpacite(phase.color,0.2),borderTop:"3px solid "+phase.color,borderRadius:"12px",padding:"12px 14px",marginBottom:"12px",cursor:"pointer"}},
    el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}},
      el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
        el("span",{style:{color:phase.color,fontSize:"15px",fontWeight:"700"}},phase.label),
        el("span",{class:"muted",style:{fontSize:"13px"}},"S"+phaseStart+"–S"+phaseEnd)
      ),
      el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
        el("span",{style:{color:phase.color,fontSize:"14px",fontWeight:"700"}},"S"+cw+" · "+phasePct+"%"),
        el("span",{class:"muted",style:{fontSize:"14px"}},"›")
      )
    ),
    el("div",{style:{height:"4px",background:"var(--border-soft)",borderRadius:"2px"}},
      el("div",{style:{width:phasePct+"%",height:"100%",background:phase.color,borderRadius:"2px"}})
    ),
    phaseDetailEl
  );
  phaseEl.addEventListener("click", ()=>{
    phaseOpen = !phaseOpen;
    phaseDetailEl.style.display = phaseOpen ? "block" : "none";
    phaseEl.querySelector("span:last-child").textContent = phaseOpen ? "›" : "›";
    phaseEl.querySelector("span:last-child").style.transform = phaseOpen ? "rotate(90deg)" : "rotate(0deg)";
  });

  const helpBtn = el("button",{style:{
    background:"var(--border-soft)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"50%",
    width:"26px",height:"26px",display:"flex",alignItems:"center",justifyContent:"center",
    color:"var(--text-muted)",fontSize:"15px",fontWeight:"700",cursor:"pointer",flexShrink:"0"
  }}, "?");
  helpBtn.addEventListener("click",()=>{ setView("help"); });

  const dashHeaderEl = el("div",{style:{
    display:"flex",alignItems:"center",gap:"8px",
    padding:"12px 0 10px",marginBottom:"4px",
    borderBottom:"1px solid var(--border)"
  }},
    runByLeaIcon(24, 6),
    el("div",{style:{color:"var(--text)",fontSize:"16px",fontWeight:"800"}},"Yoria"),
    el("div",{style:{flex:"1"}}),
    ESTMODEFORME ? null : el("div",{style:{background:"var(--border-soft)",borderRadius:"8px",padding:"4px 10px",color:"var(--accent)",fontSize:"14px",fontWeight:"700"}},"J–"+countdown()),
    helpBtn
  );

  // Sélecteur de plan (docs/v2-methodologie/convergence-v1-v2.md, section 7)
  // — toujours visible en haut du dashboard, juste après l'en-tête
  // principal (décision d'emplacement tranchée le 6 juillet 2026).
  const selecteurPlanEl = renderSelecteurPlan();

  return el("div",{style:{padding:"0 16px 100px"}},dashHeaderEl,selecteurPlanEl,progressionMarcheCourseEl,adaptationEl,moteurDecisionEl,prochainPalierEl,ESTMODEFORME?null:heroPred,todayEl||"",bilanEl,phaseEl,stravaSection);
}

// ══════════════════════════════════════════════════════════════════════════════
// SEMAINES
// ══════════════════════════════════════════════════════════════════════════════
function renderWeeks() {
  const cw=currentWeek();
  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{marginTop:"8px",marginBottom:"12px",color:"var(--text2)",fontSize:"14px"}},"Semaine actuelle : ",el("span",{style:{color:"var(--accent)",fontWeight:"700"}},"S"+cw)),
    ...PLAN.map(week=>{
      const pct=weekPct(week), isActive=week.week===cw, color=phaseOf(week.week).color, decharge=estSemaineDecharge(week.week);

                )
              )

              "~"+ws.plannedKm+" km · ~"+Math.floor(ws.plannedMin/60)+"h"+(ws.plannedMin%60).toString().padStart(2,"0")+"' prévus"
            );
          })()
        ),
        el("div",{class:"muted",style:{fontSize:"14px"}},pct+"%")
      );
      b.addEventListener("click",()=>{ selectedWeek=week.week; setView("weekDetail"); });

    })
  );

// Formatage lisible de la structure à programmer sur la montre (section
// 2.8 du doc de convergence, demandé par Laurent le 8 juillet 2026) —
// structureIntervalles est capturée au moment de la génération du plan
// (kmEstime/blocs réels, pas reparsés depuis le texte), même principe déjà
// appliqué à kmEstime.
function fmtDureeCourte(sec) {
  if (sec == null) return null;
  const m = Math.floor(sec / 60), s = sec % 60;
  if (m === 0) return s + "s";
  if (s === 0) return m + "min";
  return m + "min" + s + "s";
}
// Aplatit structureIntervalles en une liste plate de répétitions
// individuelles attendues (une entrée par répétition, même pour les blocs
// à répétitions multiples groupées, ex. "8 répétitions × 2 séries") — sert
// à connaître le VRAI nombre de répétitions attendues pour une séance,
// utilisé par le résumé de répétitions déjà existant (cf. commentaire à
// son appel) plutôt que la simple longueur des laps détectés par Strava
// (qui ne dit rien sur le nombre réellement prévu).
function aplatirRepetitionsAttendues(structure) {
  if (!structure?.blocs) return [];
  const reps = [];
  structure.blocs.forEach(b => {
    const nbFoisTotal = (structure.nbSeries || 1) * (b.repetitions || 1);
    for (let i = 0; i < nbFoisTotal; i++) {
      reps.push({
        dureeEffortSec: b.dureeEffortSec,
        distanceEffortM: b.distanceEffortM,
        allure: b.allure // ex. "4:18/km"
      });
    }
  });
  return reps;
}

function renderStructureAProgrammer(structure) {
  if (!structure || !structure.blocs) return null;
  const lignes = [];
  lignes.push("Échauffement : " + fmtDureeCourte(structure.echauffementSec) + " à " + structure.allureEchauffement);
  if (structure.blocs.length === 1 && structure.blocs[0].repetitions > 1 && (!structure.nbSeries || structure.nbSeries <= 1)) {
    const b = structure.blocs[0];
    const effort = b.dureeEffortSec ? fmtDureeCourte(b.dureeEffortSec) : b.distanceEffortM + "m";
    const recup = b.dureeRecupSec != null ? fmtDureeCourte(b.dureeRecupSec) : (b.recupLabel || "—");
    lignes.push(b.repetitions + " × (" + effort + " à " + b.allure + " / récup " + recup + ")");
  } else if (structure.nbSeries > 1) {
    const b = structure.blocs[0];
    lignes.push(structure.nbSeries + " séries de " + b.repetitions + " × (" + fmtDureeCourte(b.dureeEffortSec) + " à " + b.allure + " / récup " + fmtDureeCourte(b.dureeRecupSec) + ")");
    lignes.push("Récup entre séries : " + fmtDureeCourte(structure.recupEntreSeriesSec));
  } else {
    structure.blocs.forEach((b, i) => {
      const effort = b.dureeEffortSec ? fmtDureeCourte(b.dureeEffortSec) : b.distanceEffortM + "m";
      lignes.push("Bloc " + (i+1) + " : " + effort + " à " + b.allure + (b.dureeRecupSec ? " puis récup " + fmtDureeCourte(b.dureeRecupSec) : ""));
    });
  }
  lignes.push("Retour au calme : " + fmtDureeCourte(structure.retourCalmeSec) + " à " + structure.allureEchauffement);
  return lignes;
}

// Bouton "à programmer" réutilisable (dashboard : séance du jour/prochaine,

// Change le palier marche-course d'un plan grand-débutant depuis le
// dashboard (bannière "Prêt·e pour la suite ?" ou section palier permanente,
// 17.4/17.5, 15/07/2026). Corrige un bug latent : l'ancien code lisait
// window.__PLAN_BRUT__.profilOrigine/paramsOrigine, qui n'existent PAS pour
// un plan grand-débutant (généré par generatePlanFormeMarcheCourse dans
// plan-forme.js, lequel ne stocke ni profil ni params d'origine sur le plan
// résultant — cf. §17.1/§17.9 de l'inventaire) — le bouton "Palier suivant"
// plantait donc systématiquement en pratique. Reconstruit profil/params à
// partir des données réellement disponibles : jours d'entraînement déduits
// des séances déjà placées dans le plan courant (assignment), reste du
// profil lu depuis lk_profil_coureur.
async function changerPalierGrandDebutant(nouveauPalierId) {
  const planCourant = window.__PLAN_BRUT__;
  if (!planCourant || planCourant.sousMode !== 'marche-course') return;

  const premiereSemaine = planCourant.semaines?.[0];
  const joursDisponibles = premiereSemaine
    ? Object.keys(premiereSemaine.assignment).map(Number)
    : [1, 3, 5]; // repli raisonnable si jamais aucune semaine n'existe (ne devrait pas arriver)

  let profilStocke;
  try { profilStocke = JSON.parse(localStorage.getItem('lk_profil_coureur')); } catch { profilStocke = null; }

  const profil = {
    niveau: 'grand-debutant',
    anneeNaissance: profilStocke?.anneeNaissance || undefined,
    fcMaxConnue: profilStocke?.fcMax || undefined,
    joursDisponiblesHabituels: joursDisponibles,
    renforcementMusculaire: false,
    palierMarcheCourse: nouveauPalierId
  };
  const params = {
    dateDebut: planCourant.dateDebut,
    dateCloture: planCourant.dateCloture,
    nbSemainesBloc: planCourant.tailleBlocSemaines
  };

  let nouveauPlan;
  try {
    nouveauPlan = generatePlanForme(profil, params);
  } catch (e) {
    alert("Erreur lors du changement de palier : " + e.message);
    console.error(e);
    return;
  }
  nouveauPlan.id = planCourant.id;
  nouveauPlan.nom = planCourant.nom;
  nouveauPlan.statuses = planCourant.statuses;

  // ── Garde-fou : préserver les séances déjà passées (17/07/2026) ──────────
  // Demande explicite de Laurent : une régénération de plan (changement de
  // palier, ou toute future régénération complète) ne doit JAMAIS modifier
  // le contenu des séances dont la date est déjà passée — même si le nouveau
  // plan généré (nouveauPlan) les définit différemment. Trouvé en pratique
  // le 17/07/2026 : une séance "2×8×30-30" observée dans l'app était devenue
  // "4×30-30" après une régénération antérieure, changeant rétroactivement
  // ce que Laurent avait réellement couru par rapport à ce que l'app affiche
  // désormais avoir été prévu — trompeur pour l'analyse a posteriori (dont
  // le Module 2 du moteur de décision, qui compare la séance réalisée à ce
  // que le plan dit avoir été prévu ce jour-là).
  //
  // Principe : pour chaque semaine du plan, si TOUTES ses séances ont une
  // date strictement antérieure à aujourd'hui, on reprend cette semaine
  // telle qu'elle existait dans planCourant (l'ancien plan), pas celle du
  // nouveauPlan fraîchement généré. Une semaine partiellement passée (ex.
  // semaine en cours) suit le nouveauPlan en entier — un mélange jour par
  // jour au sein d'une même semaine serait plus risqué à maintenir cohérent
  // (numérotation, structure) pour un gain marginal (seuls les jours déjà
  // passés de cette semaine seraient concernés, généralement 0-6 jours).
  // Même calcul de date que déjà utilisé ailleurs pour convertir
  // semaine.semaineNum + jourIndex en date réelle (cf. ~ligne 837,
  // vérifierMeteoPourSeance).
  (function preserverSemainesPassees() {
    const debutCourant = new Date(planCourant.dateDebut + 'T00:00:00Z');
    const aujourdhui = new Date();
    const aujourdhuiStr = new Date(Date.UTC(aujourdhui.getFullYear(), aujourdhui.getMonth(), aujourdhui.getDate())).toISOString().slice(0, 10);

    const semainesCourantesParNum = {};
    (planCourant.semaines || []).forEach(s => { semainesCourantesParNum[s.semaineNum] = s; });

    (nouveauPlan.semaines || []).forEach((semaine, index) => {
      const semaineCourante = semainesCourantesParNum[semaine.semaineNum];
      if (!semaineCourante) return; // semaine nouvelle (au-delà de l'ancien plan) : rien à préserver

      const datesJours = Object.keys(semaineCourante.assignment || {}).map(jourIndex => {
        const d = new Date(debutCourant);
        d.setUTCDate(debutCourant.getUTCDate() + (semaineCourante.semaineNum - 1) * 7 + Number(jourIndex));
        return d.toISOString().slice(0, 10);
      });
      if (datesJours.length === 0) return; // semaine sans séance assignée, rien à comparer

      const toutesPassees = datesJours.every(d => d < aujourdhuiStr);
      if (toutesPassees) {
        // Remplace la semaine du nouveauPlan par celle de l'ancien plan,
        // en gardant semaineNum du nouveauPlan pour la cohérence de
        // numérotation (devrait être identique de toute façon).
        nouveauPlan.semaines[index] = { ...semaineCourante, semaineNum: semaine.semaineNum };
      }
    });
  })();

  window.__PLAN_BRUT__ = nouveauPlan;
  window.__PLAN_GENERE__ = traduirePlanVersFormatV1(window.__PLAN_BRUT__);
  PLAN = window.__PLAN_GENERE__;
  ALL_SESSIONS = recalculerAllSessions();

  // Même pattern de sauvegarde que la clôture de plan (Réglages) : Supabase
  // en priorité (mécanisme principal depuis §17.11), Gist en best-effort.
  try {
    if (window.__UTILISATEUR__?.id && window.LkSync?.mettreAJourPlanSupabase && window.__PLAN_BRUT__.id) {
      await window.LkSync.mettreAJourPlanSupabase(window.__PLAN_BRUT__.id, window.__PLAN_BRUT__);
    }
    if (getGithubToken && getGithubToken()) {
      try { await sauvegarderPlan(window.__PLAN_BRUT__); }
      catch (eGist) { console.warn('Sauvegarde Gist échouée (Supabase OK, non bloquant) :', eGist.message); }
    }
  } catch (e) {
    console.warn('Palier changé localement, sauvegarde Supabase échouée :', e.message);
  }
  render();
}

// Rangée de boutons de statut (✅/❌/⚠️/😴), réutilisable — extraite le
// 8 juillet 2026 pour aussi l'utiliser sur la carte "Aujourd'hui" du
// dashboard (Laurent signale qu'il fallait aller dans le détail de semaine
// juste pour valider la séance du jour, pourtant déjà affichée).
function renderStatusRow(uid, dateSeance) {
  const wrapper = el("div",{style:{display:"flex",flexDirection:"column",gap:"8px",marginTop:"4px",width:"100%"}});
  const statusRow=el("div",{style:{display:"flex",gap:"6px",flexWrap:"nowrap",width:"100%"}});
  // Blocage séances futures (17.4, 15/07/2026) — un statut (fait/raté/adapté)
  // n'a de sens que pour une séance déjà passée ou en cours (aujourd'hui).
  // "—" (annuler) reste toujours cliquable : si une séance a été validée par
  // erreur puis que sa date est déplacée dans le futur (déplacement de
  // séance), il faut pouvoir revenir à "non renseigné" sans être bloqué.
  const estFuture = dateSeance && dateSeance > today();
  const boutons = [];
  const majApparenceBoutons = () => {
    const cur = statuses[uid]||"—";
    boutons.forEach(({b, opt}) => {
      const actif = cur===opt;
      b.style.background = actif ? SCOLORS[opt]+"33" : "var(--border-soft)";
      b.style.border = `1px solid ${actif ? SCOLORS[opt] : "var(--border)"}`;
      b.style.color = actif ? SCOLORS[opt] : "var(--text-muted)";
      b.style.fontWeight = actif ? "700" : "400";
    });
  };
  SOPTS.forEach(opt=>{
    const cur=statuses[uid]||"—";
    const desactive = estFuture && opt!=="—";
    const b=el("button",{style:{flex:"1",background:cur===opt?SCOLORS[opt]+"33":"var(--border-soft)",border:`1px solid ${cur===opt?SCOLORS[opt]:"var(--border)"}`,borderRadius:"8px",padding:"10px 0",cursor:desactive?"not-allowed":"pointer",color:cur===opt?SCOLORS[opt]:"var(--text-muted)",fontSize:"18px",fontWeight:cur===opt?"700":"400",opacity:desactive?"0.35":"1"}},opt==="—"?"–":opt);
    if (desactive) b.disabled = true;
    boutons.push({ b, opt });
    b.addEventListener("click",avecRetourTactile(()=>{
      if (estFuture && opt!=="—") return;
      statuses[uid]=opt; save(clePourPlan("lk_statuses"),statuses);
      // Bug corrigé le 8 juillet 2026 : setTimeout(render, 2500) gelait
      // TOUT l'affichage de l'app pendant 2.5s, pas seulement le repli de
      // cette carte (render() reconstruit toute la vue). Corrigé : met à
      // jour immédiatement l'apparence des boutons de CETTE rangée
      // uniquement (sans render() global), puis planifie le vrai render()
      // complet (qui déclenchera le repli de la carte via isDoneSession)
      // après le délai — seul le repli est retardé, pas le reste de l'app.
      majApparenceBoutons();
      // Bug corrigé le 17/07/2026 (signalé par Laurent) : le message coach
      // restait figé sur la description de la séance générée au premier
      // chargement du jour (coachDate===today() empêche tout refetch, cf.
      // fetchCoachMsg), même après avoir marqué la séance du jour comme
      // faite plus tard dans la journée — le coach continuait de parler
      // d'une séance déjà validée, ou de la séance clé du lendemain calculée
      // avant validation. Ne concerne QUE la séance d'AUJOURD'HUI (dateSeance
      // === today()) — corriger le statut d'une séance passée ne doit pas
      // redéclencher un appel coach inutile.
      if (dateSeance === today()) {
        coachMsg = null; coachDate = "";
        save(clePourPlan("lk_coach_msg"), null);
        save(clePourPlan("lk_coach_date"), "");
      }
      if (opt==="✅"||opt==="⚠️") { setTimeout(()=>{ render(); fetchCoachMsg(); }, 2500); }
      else { render(); if (dateSeance === today()) fetchCoachMsg(); }
    }));
    statusRow.appendChild(b);
  });
  wrapper.appendChild(statusRow);
  if (estFuture) {
    wrapper.appendChild(el("div",{style:{fontSize:"12px",color:"var(--text-muted)"}},"📅 Séance à venir — disponible le jour J"));
  }
  // Sélecteur RPE unifié — 17/07/2026, cf. déclaration de sessionRpe et
  // RPE_OPTIONS plus haut. Visible uniquement si un statut "la séance a eu
  // lieu" est déjà posé (✅/⚠️/❌) — noter un ressenti n'a pas de sens sur
  // "—" (non renseigné) ni "😴" (repos/sauté, aucun effort à ressentir).
  const statutActuel = statuses[uid] || "—";
  let rpeWrapperStatut = null;
  if (["✅", "⚠️", "❌"].indexOf(statutActuel) !== -1) {
    let rpeValStatut = sessionRpe[uid] || null;
    const rpeRowStatut = el("div",{style:{display:"flex",gap:"6px",width:"100%",flexWrap:"nowrap"}});
    // Libellé + référence CR-10 de l'option sélectionnée, affiché sous le
    // rang de boutons — remplace le tooltip natif (attribut title), qui ne
    // se déclenche jamais sur mobile faute de survol souris (signalé par
    // Laurent le 19/07/2026). Vide tant qu'aucune option n'est choisie.
    const rpeLabelStatut = el("div",{style:{fontSize:"12px",color:"var(--text-muted)",marginTop:"4px",minHeight:"16px"}});
    const rebuildRpeStatut = () => {
      rpeRowStatut.innerHTML = "";
      const optionActuelle = RPE_OPTIONS.find(o=>o.v===rpeValStatut);
      rpeLabelStatut.textContent = optionActuelle ? optionActuelle.label : "";
      RPE_OPTIONS.forEach(o=>{
        const rb = el("button",{title:o.label,style:{
          flex:"1",padding:"10px 0",fontSize:"18px",cursor:"pointer",
          background:rpeValStatut===o.v?"rgba(var(--warn-rgb),0.13)":"var(--border-soft)",
          border:`1px solid ${rpeValStatut===o.v?"var(--warn)":"var(--border)"}`,borderRadius:"8px"
        }}, o.e);
        rb.addEventListener("click", avecRetourTactile((e)=>{
          e.stopPropagation();
          rpeValStatut = rpeValStatut===o.v ? null : o.v;
          sessionRpe[uid] = rpeValStatut;
          save(clePourPlan("lk_session_rpe"), sessionRpe);
          rebuildRpeStatut();
        }));
        rpeRowStatut.appendChild(rb);
      });
    };
    rebuildRpeStatut();
    rpeWrapperStatut = el("div",{style:{width:"100%"}},
      el("div",{style:{fontSize:"11px",color:"var(--text-muted)",marginBottom:"4px"}},"Ressenti"),
      rpeRowStatut,
      rpeLabelStatut
    );
    wrapper.appendChild(rpeWrapperStatut);
  }
  return wrapper;
}

// Saisie/correction manuelle de performance pour une séance SPEC/VMA
// (docs/source-donnees-seances.md). Toujours affichée (pas conditionnée à
// dataSource) — l'utilisateur choisit d'ouvrir le détail s'il veut
// saisir/corriger. Dès qu'une entrée manualPerf existe pour ce uid, elle
// prime automatiquement sur Strava pour le prédicteur (section 2 du doc),
// sans confirmation : c'est un acte volontaire du coureur.
function renderManualPerfRow(uid, s, stravaRun) {
  let expanded = false;
  const hasManualNow = () => !!manualPerf[uid];

  const summaryLine = el("div",{style:{
    display:"flex",alignItems:"center",justifyContent:"space-between",
    marginTop:"8px",padding:"9px 12px",
    borderRadius:"8px",cursor:"pointer"
  }});
  const rebuildSummary = () => {
    const manual = hasManualNow();
    summaryLine.style.background = manual ? "rgba(var(--accent-rgb),0.13)" : "rgba(var(--accent-rgb),0.08)";
    summaryLine.style.border = `1px solid ${manual ? "var(--accent)" : "rgba(var(--accent-rgb),0.33)"}`;
    summaryLine.innerHTML = "";
    summaryLine.appendChild(el("span",{style:{display:"flex",alignItems:"center",gap:"6px",fontSize:"14px",fontWeight:"700",color:"var(--accent)"}},
      el("span",{style:{fontSize:"15px"}},"✏️"),
      manual
        ? "Saisie manuelle · "+fmtPace(manualPerf[uid].average_speed)+"/km"+(stravaRun?" (prime sur Strava)":"")
        : "Saisir ou corriger manuellement"
    ));
    summaryLine.appendChild(el("span",{style:{fontSize:"13px",color:"var(--accent)"}}, expanded?"▲":"▼"));
  };
  rebuildSummary();

  const formWrap = el("div",{style:{display:"none",marginTop:"8px",background:"var(--border-soft)",borderRadius:"8px",padding:"10px 12px"}});

  const rebuildForm = () => {
    formWrap.innerHTML = "";
    const cur = manualPerf[uid] || {};
    // Pré-remplissage à l'allure cible du plan pour ce type de séance
    // (SESSION_TARGETS, déjà en sec/km) plutôt qu'un champ vide — l'idée
    // n'est pas de forcer cette valeur mais de donner un point de départ
    // réaliste à ajuster, pour réduire le risque d'une saisie de mémoire
    // trop imprécise (impact non négligeable sur le prédicteur, voir test
    // de sensibilité mené avant ce choix). Repli à 6:00/km si le type n'a
    // pas de cible définie (EF, LONGUE...).
    const target = SESSION_TARGETS[s.type];
    const paceInitSec = cur.average_speed ? Math.round(1000/cur.average_speed)
      : target ? Math.round((target.targetMin+target.targetMax)/2) : 360;
    let paceSec = paceInitSec;

    const paceValueEl = el("span",{style:{fontSize:"18px",fontWeight:"700",color:"var(--text)",minWidth:"64px",textAlign:"center"}}, fmtPace(1000/paceSec)+"/km");
    const stepBtn = (delta, label) => {
      const b = el("button",{type:"button",style:{
        width:"38px",height:"38px",fontSize:"18px",fontWeight:"700",
        background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"8px",
        color:"var(--text-muted)",cursor:"pointer"
      }}, label);
      b.addEventListener("click", avecRetourTactile(()=>{
        paceSec = Math.max(120, paceSec + delta); // plancher 2:00/km, garde-fou anti-saisie absurde
        paceValueEl.textContent = fmtPace(1000/paceSec)+"/km";
      }));
      return b;
    };
    const paceStepper = el("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:"10px"}},
      stepBtn(+5,"−"), // -5s/km = plus rapide, affiché à gauche comme "diminuer l'allure affichée"
      paceValueEl,
      stepBtn(-5,"+") // +5s/km = plus lent
    );
    if (target) {
      formWrap.appendChild(el("div",{style:{fontSize:"11px",color:"var(--text-muted)",textAlign:"center",marginTop:"2px"}},
        "cible plan : "+fmtPace(1000/target.targetMin)+"–"+fmtPace(1000/target.targetMax)+"/km"));
    }

    const hrInput = el("input",{type:"number",placeholder:"165",value:cur.average_heartrate||"",
      style:{width:"100%",background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"6px",padding:"6px 8px",color:"var(--text)",fontSize:"14px",textAlign:"center"}});

    // Durée totale RÉELLE de la séance (17/07/2026) — distincte de la durée
    // prévue au plan (échauffement+effort+récup+RAC). Sert à dériver la
    // distance totale (échauffement/RAC/récup à l'allure EF du coureur,
    // cf. distanceTotaleAvecRecup) plutôt que de se limiter aux seuls blocs
    // d'effort structurés comme le faisait distanceEffortStructure() seule.
    // Pré-remplissage avec la durée prévue au plan comme point de départ
    // ajustable, cohérent avec le même principe déjà appliqué à l'allure.
    const dureePrevueSec = (structureIntervalles=>{
      if (!structureIntervalles) return null;
      const nbSeries = structureIntervalles.nbSeries || 1;
      let total = (structureIntervalles.echauffementSec||0) + (structureIntervalles.retourCalmeSec||0);
      structureIntervalles.blocs.forEach(b=>{ total += ((b.dureeEffortSec||0)+(b.dureeRecupSec||0))*(b.repetitions||1)*nbSeries; });
      return total;
    })(s.structureIntervalles);
    const dureeInput = el("input",{type:"number",placeholder:"31",
      value: cur.dureeSaisieMin || (dureePrevueSec ? Math.round(dureePrevueSec/60) : ""),
      style:{width:"100%",background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"6px",padding:"6px 8px",color:"var(--text)",fontSize:"14px",textAlign:"center"}});

    formWrap.appendChild(el("div",{style:{fontSize:"12px",color:"var(--text-muted)",marginBottom:"10px"}},
      stravaRun ? "Strava a une activité ce jour-là — ta saisie primera dessus si tu valides." :
        "Pas de donnée Strava ce jour-là. Ajuste l'allure ci-dessous si besoin."));

    formWrap.appendChild(el("div",{style:{fontSize:"11px",color:"var(--text-muted)",textAlign:"center",marginBottom:"4px"}},"Allure effort"));
    formWrap.appendChild(paceStepper);
    if (s.structureIntervalles) {
      formWrap.appendChild(el("div",{style:{marginTop:"12px"}},
        el("div",{style:{fontSize:"11px",color:"var(--text-muted)",marginBottom:"4px"}},"Durée totale de la séance (min)"),dureeInput
      ));
    }
    formWrap.appendChild(el("div",{style:{marginTop:"12px"}},
      el("div",{style:{fontSize:"11px",color:"var(--text-muted)",marginBottom:"4px"}},"FC moyenne (optionnel)"),hrInput
    ));
    // Sélecteur RPE retiré d'ici le 17/07/2026 (chantier RPE unifié,
    // remarque de Laurent : doublon avec le sélecteur déjà présent dans
    // renderStatusRow, visible dès qu'un statut ✅/⚠️/❌ est posé — le
    // ressenti se saisit désormais à un seul endroit, jamais deux).

    const btnRow = el("div",{style:{display:"flex",gap:"8px",marginTop:"10px"}});
    const saveBtn = el("button",{type:"button",style:{flex:"1",background:"rgba(var(--accent-rgb),0.13)",border:"1px solid rgba(var(--accent-rgb),0.33)",borderRadius:"8px",padding:"8px",color:"var(--accent)",fontWeight:"700",fontSize:"14px",cursor:"pointer"}},"✓ Enregistrer");
    saveBtn.addEventListener("click", avecRetourTactile(()=>{
      const speed = 1000/paceSec;
      const hr = hrInput.value ? parseFloat(hrInput.value) : null;
      const dureeSaisieMin = s.structureIntervalles && dureeInput.value ? parseFloat(dureeInput.value) : null;
      // Distance dérivée de la durée totale RÉELLE saisie (échauffement +
      // effort + récup à l'allure EF + RAC) quand elle est renseignée —
      // repli sur l'ancien calcul (blocs d'effort seuls, sans échauffement
      // ni récup ni RAC) si le coureur laisse le champ durée vide.
      const distance = dureeSaisieMin
        ? distanceTotaleAvecRecup(s.structureIntervalles, dureeSaisieMin*60, window.__PLAN_BRUT__?.allures?.E)
        : (s.structureIntervalles ? distanceEffortStructure(s.structureIntervalles) : null);
      manualPerf[uid] = { average_speed: speed, distance: distance||null, average_heartrate: hr, dureeSaisieMin: dureeSaisieMin||null };
      save(clePourPlan("lk_manual_perf"), manualPerf);
      rebuildPredHistory();
      expanded = false;
      formWrap.style.display = "none";
      rebuildSummary();
    }));
    btnRow.appendChild(saveBtn);
    // Annuler (17/07/2026, remarque de Laurent) : supprime toute saisie
    // manuelle existante pour cette séance ET décoche le statut posé
    // (✅/⚠️/❌ → —), pour que le coureur reparte d'une page blanche et
    // relance lui-même une synchro Strava plutôt que de garder un statut
    // qui referait référence à une donnée qui vient d'être effacée.
    // Toujours affiché (pas seulement si hasManualNow()) : utile aussi pour
    // fermer le formulaire sans rien enregistrer.
    const cancelBtn = el("button",{type:"button",style:{flex:"1",background:"none",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"8px",padding:"8px",color:"var(--text-muted)",fontWeight:"700",fontSize:"14px",cursor:"pointer"}},"✕ Annuler");
    cancelBtn.addEventListener("click", avecRetourTactile(()=>{
      const avaitAllure = !!manualPerf[uid]?.average_speed;
      delete manualPerf[uid];
      save(clePourPlan("lk_manual_perf"), manualPerf);
      delete statuses[uid];
      save(clePourPlan("lk_statuses"), statuses);
      if (avaitAllure) rebuildPredHistory(); // ré-agréger sans cette saisie (Strava reprend la main s'il existe)
      expanded = false;
      formWrap.style.display = "none";
      rebuildSummary();
      render(); // reflète immédiatement le statut décoché (—) dans la carte du jour / détail semaine
      syncStrava(); // relance une synchro pour retrouver l'activité Strava du jour si elle existe — no-op si dataSource !== "strava" (cf. garde-fou dans syncStrava())
    }));
    btnRow.appendChild(cancelBtn);
    formWrap.appendChild(btnRow);
  };

  summaryLine.addEventListener("click", avecRetourTactile(()=>{
    expanded = !expanded;
    if (expanded) rebuildForm();
    formWrap.style.display = expanded ? "block" : "none";
    rebuildSummary();
  }));

  return el("div",{}, summaryLine, formWrap);
}

// Distance totale d'effort (hors récups/échauffement) déduite d'une
// structureIntervalles, utilisée quand l'utilisateur ne précise que
// l'allure en saisie manuelle (docs/source-donnees-seances.md, section 4).
// CORRECTIF (17/07/2026, trouvé en testant le Module 2 avec Laurent) : cette
// fonction ne lisait QUE bloc.distanceM, ignorant silencieusement tout bloc
// défini en DURÉE (bloc.dureeEffortSec + bloc.allure, ex. "5×30s-30s @
// 4:18/km" — protocole courant en VMA, type 30-30). Résultat : total restait
// à 0 pour toute séance en durée, la fonction retournait null, et
// analyserSeanceQualite() (Module 2) affichait systématiquement "Volume non
// disponible" pour ces séances. Ajout du calcul distance = (durée/allure)
// quand distanceM est absent mais dureeEffortSec + allure sont présents.
// Distance totale d'une séance de qualité à partir d'une durée totale RÉELLE
// saisie par le coureur (pas les durées prévues au plan), en répartissant le
// temps entre : blocs d'effort (allure du bloc, connue), récup entre
// répétitions (allure EF du coureur, __PLAN_BRUT__.allures.E — décision
// actée le 17/07/2026, test de validation sur une vraie séance VMA du
// coureur : écart de 5m sur 5202m réels), et tout le reste du temps saisi
// (échauffement + retour au calme) également à l'allure EF. Volontairement
// distinct de distanceEffortStructure() (qui ne calcule QUE les blocs
// d'effort, jamais utilisée seule pour une distance totale de séance).
function distanceTotaleAvecRecup(structureIntervalles, dureeTotaleSec, allureEFStr) {
  if (!structureIntervalles?.blocs?.length || !dureeTotaleSec) return null;
  const nettoye = (allureEFStr||"6:10/km").replace('/km','').trim();
  const parts = nettoye.split(':').map(Number);
  const allureEFSec = (parts.length===2 && !parts.some(isNaN)) ? parts[0]*60+parts[1] : 370;

  const nbSeries = structureIntervalles.nbSeries || 1;
  let distanceEffort = 0, dureeEffortSeuleSec = 0, dureeRecupSeuleSec = 0;
  for (let serie=0; serie<nbSeries; serie++) {
    structureIntervalles.blocs.forEach(bloc=>{
      const reps = bloc.repetitions || 1;
      if (bloc.dureeEffortSec && bloc.allure) {
        const n2 = bloc.allure.replace('/km','').trim();
        const p2 = n2.split(':').map(Number);
        if (p2.length===2 && !p2.some(isNaN)) {
          const allureBlocSec = p2[0]*60+p2[1];
          if (allureBlocSec>0) distanceEffort += (bloc.dureeEffortSec/allureBlocSec)*1000*reps;
        }
        dureeEffortSeuleSec += bloc.dureeEffortSec*reps;
      } else if (bloc.distanceM) {
        distanceEffort += bloc.distanceM*reps;
        // Distance connue mais pas de durée associée pour ce bloc — la récup
        // liée reste comptée dans le "reste" ci-dessous (approximation
        // acceptée, cas rare : la plupart des blocs qualité sont en durée,
        // pas en distance fixe, cf. §5.2 doc archi et bug corrigé §27 inventaire).
      }
      if (bloc.dureeRecupSec) dureeRecupSeuleSec += bloc.dureeRecupSec*reps;
    });
  }
  // Récup entre répétitions à l'allure EF (demande explicite du 17/07/2026,
  // plutôt que de l'ignorer comme le faisait l'ancien distanceEffortStructure).
  const distanceRecup = (dureeRecupSeuleSec/allureEFSec)*1000;

  const dureeResteSec = Math.max(0, dureeTotaleSec - dureeEffortSeuleSec - dureeRecupSeuleSec);
  const distanceReste = (dureeResteSec/allureEFSec)*1000; // échauffement + retour au calme

  return Math.round(distanceEffort + distanceRecup + distanceReste) || null;
}

// Retourne l'activité Strava du jour correspondant à une séance, SAUF si
// une saisie manuelle existe déjà pour cette séance (manualPerf[uid]) — dans
// ce cas Strava est totalement ignoré, quelle que soit l'utilisation en aval
// (prédicteur, moteur de décision, affichage détail séance). Décision du
// 17/07/2026 : une saisie manuelle signale souvent une donnée Strava
// corrompue ou absente ce jour-là, elle ne doit jamais coexister avec
// Strava — remplace le principe précédent ("la saisie manuelle prime
// dessus") par une vraie exclusion. Point d'entrée UNIQUE à utiliser partout
// où on cherche l'activité Strava d'une séance par date — ne jamais
// réintroduire un stravaActivities.find(...) direct par date de séance.
function getStravaRunSiPasManuel(date, uid, activites) {
  if (uid && manualPerf[uid]) return null;
  const source = activites || stravaActivities;
  return source.find(a => a.start_date_local?.slice(0,10) === date) || null;
}

function distanceEffortStructure(structureIntervalles) {
  if (!structureIntervalles?.blocs?.length) return null;
  const nbSeries = structureIntervalles.nbSeries || 1;
  let total = 0;
  for (let serie=0; serie<nbSeries; serie++) {
    structureIntervalles.blocs.forEach(bloc=>{
      const reps = bloc.repetitions || 1;
      if (bloc.distanceM) {
        total += bloc.distanceM * reps;
      } else if (bloc.dureeEffortSec && bloc.allure) {
        // Bloc défini en durée (ex. 30-30) : distance déduite de l'allure
        // cible du bloc. allure au format "M:SS/km" ou "M:SS", même parsing
        // que paceStringVersSecondes (DecisionEngineSessionAnalysis) — dupliqué
        // ici car cette fonction vit côté index.html, pas dans le module.
        const nettoye = bloc.allure.replace('/km', '').trim();
        const parts = nettoye.split(':').map(Number);
        if (parts.length === 2 && !parts.some(isNaN)) {
          const allureSec = parts[0] * 60 + parts[1];
          if (allureSec > 0) {
            const distanceBlocM = (bloc.dureeEffortSec / allureSec) * 1000;
            total += distanceBlocM * reps;
          }
        }
      }
    });
  }
  return total || null;
}
