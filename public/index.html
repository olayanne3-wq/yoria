              if (!target) return null;
              const inTarget = effortLaps.filter(l=>(1000/l.average_speed)<=target.okPace).length;
              const color = inTarget===effortLaps.length?"var(--accent2)":inTarget>0?"var(--warn)":"var(--warn)";
              return el("span",{style:{color,fontSize:"13px",fontWeight:"700"}},inTarget+"/"+effortLaps.length+" dans la cible");
            })()
          ),
          el("div",{class:"muted",style:{fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"6px"}},
            SESSION_TARGETS[effSess.type] ? "cible "+SESSION_TARGETS[effSess.type].effort+" "+SESSION_TARGETS[effSess.type].tolerance : ""
          ),
          ...(() => {
            const { driftEl } = computeFcDrift(effortLaps);
            const rows = effortLaps.map((lap,i)=>renderLapRow(lap,i,effSess.type));
            return driftEl ? [...rows, driftEl] : rows;
          })()
        ):null
      ):null
    );

    // effSess.type==="RACE" : aucun bloc dédié ici — effSess.session
    // (déjà affiché plus haut dans la carte, titre principal de la
    // séance) contient déjà le texte complet généré par
    // genererContenuRace() (segments/allures), cohérent avec l'onglet
    // Course depuis le fix du 19/07/2026. Un bloc "Jour J" avait été
    // ajouté ici puis retiré le même jour : il dupliquait mot pour mot
    // ce texte déjà visible, sans valeur ajoutée (signalé par Laurent).
    if (effSess.type!=="RACE" && effSess.type!=="REPOS") {
      // Raison du statut ❌ ou ⚠️
      const reason = stravaRun ? validateReason({...s, uid}, stravaRun) : null;
      if (reason) {
        card.appendChild(el("div",{style:{
          background: statuses[uid]==="❌" ? "rgba(var(--warn-rgb),0.07)" : "rgba(var(--warn-rgb),0.07)",
          border: `1px solid ${statuses[uid]==="❌" ? "rgba(var(--warn-rgb),0.2)" : "rgba(var(--warn-rgb),0.2)"}`,
          borderRadius:"6px", padding:"6px 10px", marginTop:"4px", marginBottom:"4px",
          color: statuses[uid]==="❌" ? "var(--warn)" : "var(--warn)",
          fontSize:"13px"
        }}, (statuses[uid]==="❌"?"❌ ":"⚠️ ")+reason));
      }
      const statusRow=renderStatusRow(uid, s.date);
      card.appendChild(statusRow);
      // Saisie/correction manuelle (docs/source-donnees-seances.md) — même
      // bloc que sur la carte du jour, pour pouvoir corriger une séance
      // passée depuis le détail de semaine.
      card.appendChild(renderManualPerfRow(uid, s, stravaRun));
      const noteInput=el("input",{type:"text",placeholder:"💬 Note sur cette séance...",style:{marginTop:"8px",background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"8px",padding:"7px 10px",color:"var(--text)",fontSize:"14px",outline:"none",width:"100%"}});
      noteInput.value=sessionNotes[uid]||"";
      noteInput.addEventListener("change",()=>{
        if(noteInput.value.trim()){sessionNotes[uid]=noteInput.value.trim();}
        else{delete sessionNotes[uid];}
        save(clePourPlan("lk_session_notes"),sessionNotes);
      });
      if(sessionNotes[uid]){card.appendChild(el("div",{style:{color:"var(--text2)",fontSize:"14px",fontStyle:"italic",marginTop:"4px"}},"💬 "+sessionNotes[uid]));}
      card.appendChild(noteInput);
    }

    // Si séance terminée : afficher un résumé compact + détail repliable au clic
    if (isDoneSession) {
      // children[0] = header, children[1] = titre séance, le reste = détails
      const childrenToHide = Array.from(card.children).slice(2);
      childrenToHide.forEach(c => { c.style.display = "none"; });

      // Mini résumé Strava (distance globale, allure/FC de l\'effort si intensive)
      if (stravaRun) {
        const isIntensiveSummary = effortLaps.length > 0;
        const summaryPace = isIntensiveSummary ? effortLaps.reduce((s,l)=>s+l.average_speed,0)/effortLaps.length : stravaRun.average_speed;
        const summaryHrVals = isIntensiveSummary ? effortLaps.filter(l=>l.average_heartrate) : null;
        const summaryHr = isIntensiveSummary
          ? (summaryHrVals.length ? summaryHrVals.reduce((s,l)=>s+l.average_heartrate,0)/summaryHrVals.length : null)
          : stravaRun.average_heartrate;
        const summaryRow = el("div",{style:{display:"flex",alignItems:"center",gap:"14px",paddingTop:"6px",borderTop:"1px solid rgba(var(--text-rgb),0.4)"}},
          el("span",{style:{color:"var(--accent)",fontSize:"14px",fontWeight:"700"}},(stravaRun.distance/1000).toFixed(1)+" km"),
          el("span",{style:{color:"var(--accent)",fontSize:"14px",fontWeight:"700"}},fmtPace(summaryPace)+"/km"),
          summaryHr?el("span",{style:{color:"var(--accent)",fontSize:"14px",fontWeight:"700"}},Math.round(summaryHr)+" bpm"):null,
          el("div",{style:{flex:"1"}}),
          el("span",{class:"muted",style:{fontSize:"13px"}},"détails ›")
        );
        summaryRow.dataset.summaryRow = "1";
        card.appendChild(summaryRow);
        // Réordonner : le résumé doit être juste après le titre, avant les détails cachés
        card.insertBefore(summaryRow, childrenToHide[0] || null);
      }

      card.addEventListener("click", (e)=>{
        if (e.target.tagName === "BUTTON" || e.target.tagName === "INPUT") return;
        cardExpanded = !cardExpanded;
        card.style.opacity = cardExpanded ? "1" : "0.7";
        childrenToHide.forEach(c => { c.style.display = cardExpanded ? "" : "none"; });
        const summaryEl = card.querySelector('[data-summary-row]');
        if (summaryEl) summaryEl.style.display = cardExpanded ? "none" : "flex";
      });
    }

    // Appui long : menu gestion seance
    if (effSess.type !== "REPOS" && effSess.type !== "RACE") {
      let lpCard=null;
      card.addEventListener("touchstart",()=>{lpCard=setTimeout(()=>{lpCard=null;showSessionMenu(week,i);},600);},{passive:true});
      card.addEventListener("touchend",()=>{if(lpCard){clearTimeout(lpCard);lpCard=null;}});
      card.addEventListener("touchmove",()=>{if(lpCard){clearTimeout(lpCard);lpCard=null;}});
      card.addEventListener("contextmenu",e=>{e.preventDefault();showSessionMenu(week,i);});
    }
    return card;
  });

  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{display:"flex",alignItems:"center",gap:"12px",marginTop:"8px",marginBottom:"16px"}},
      el("div",{style:{flex:"1"}},
        el("div",{class:"muted",style:{fontSize:"13px",textTransform:"uppercase",letterSpacing:"1px"}},phaseOf(weekNum).label),
        el("div",{style:{color:"var(--text)",fontSize:"20px",fontWeight:"800"}},"Semaine "+weekNum),
        el("div",{class:"muted",style:{fontSize:"14px"}},fmtDate(week.sessions[0].date)+" – "+fmtDate(week.sessions[6].date))
      ),
      weekRuns.length>0?el("div",{style:{background:"rgba(var(--warn-rgb),0.07)",border:"1px solid rgba(var(--warn-rgb),0.2)",borderRadius:"8px",padding:"6px 10px",textAlign:"center"}},
        el("div",{style:{color:"var(--warn)",fontSize:"15px",fontWeight:"700"}},weekRuns.length+""),
        el("div",{class:"muted",style:{fontSize:"14px"}},"Strava")
      ):null
    ),
    ...cards
  );
}


// ══════════════════════════════════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════════════════════════════════
function renderStats() {
  const pred = currentPred||predict10K();

  // ── Graphique évolution ───────────────────────────────────────────────
  let graphEl = null;
  if (isRebuilding) {
    graphEl = el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"12px",padding:"16px",marginBottom:"16px",textAlign:"center"}},
      el("div",{class:"muted",style:{fontSize:"14px",fontStyle:"italic"}},"⏳ Recalcul de l\'historique...")
    );
  } else if (predHistory.length >= 2) {
    const TARGET = OBJECTIF_REFERENCE, BASE = BASE_TIME_REFERENCE;
    const W = 340, H = 120, PAD = {t:16,r:40,b:28,l:44};
    const iW = W-PAD.l-PAD.r, iH = H-PAD.t-PAD.b;
    const times = predHistory.map(p=>p.time);
    const minT = Math.min(...times,TARGET)-30;
    const maxT = Math.max(...times,BASE)+30;
    const xScale = i => PAD.l+(i/(predHistory.length-1))*iW;
    const yScale = t => PAD.t+iH-((t-minT)/(maxT-minT))*iH;
    const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
    svg.setAttribute("width","100%");
    svg.style.display="block";
    const mk=(tag,attrs)=>{const e=document.createElementNS("http://www.w3.org/2000/svg",tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;};
    svg.appendChild(mk("rect",{x:0,y:0,width:W,height:H,fill:"var(--bg)"}));
    const yTarget=yScale(TARGET);
    svg.appendChild(mk("line",{x1:PAD.l,y1:yTarget,x2:W-PAD.r,y2:yTarget,stroke:"rgba(var(--accent-rgb),0.27)",strokeWidth:"1","stroke-dasharray":"4,3"}));
    const tl=document.createElementNS("http://www.w3.org/2000/svg","text");
    tl.setAttribute("x",W-PAD.r+4);tl.setAttribute("y",yTarget+4);tl.setAttribute("fill","var(--accent)");tl.setAttribute("font-size","9");tl.textContent=fmtTime(TARGET);svg.appendChild(tl);
    const points=predHistory.map((p,i)=>`${xScale(i)},${yScale(p.time)}`).join(" ");
    const firstX=xScale(0),lastX=xScale(predHistory.length-1);
    svg.appendChild(mk("polygon",{points:`${firstX},${PAD.t+iH} ${points} ${lastX},${PAD.t+iH}`,fill:"rgba(var(--accent-rgb),0.07)"}));
    svg.appendChild(mk("polyline",{points,fill:"none",stroke:"var(--accent)",strokeWidth:"2","stroke-linejoin":"round","stroke-linecap":"round"}));
    predHistory.forEach((p,i)=>{
      const color=p.time<=TARGET?"var(--accent2)":p.time<=TARGET+60?"var(--warn)":"var(--accent)";
      svg.appendChild(mk("circle",{cx:xScale(i),cy:yScale(p.time),r:"3",fill:color}));
    });
    [BASE,TARGET].forEach(t=>{
      const lbl=document.createElementNS("http://www.w3.org/2000/svg","text");
      lbl.setAttribute("x",PAD.l-4);lbl.setAttribute("y",yScale(t)+4);
      lbl.setAttribute("fill","var(--text2)");lbl.setAttribute("font-size","9");lbl.setAttribute("text-anchor","end");
      lbl.textContent=fmtTime(t);svg.appendChild(lbl);
    });
    const lastVal=predHistory[predHistory.length-1];
    const lvl=document.createElementNS("http://www.w3.org/2000/svg","text");
    lvl.setAttribute("x",xScale(predHistory.length-1));lvl.setAttribute("y",yScale(lastVal.time)-6);
    lvl.setAttribute("fill","var(--text)");lvl.setAttribute("font-size","10");lvl.setAttribute("text-anchor","middle");lvl.setAttribute("font-weight","700");
    lvl.textContent=fmtTime(lastVal.time);svg.appendChild(lvl);
    // Labels semaines sur l'axe X
    // Positionner selon la date dans predHistory
    PLAN.forEach((week, wi) => {
      const weekDateStr = week.sessions[0].date;
      // Trouver l'index de cette date dans predHistory
      const idx = predHistory.findIndex(p => p.date >= weekDateStr);
      if (idx < 0) return;
      const xPos = xScale(idx);
      // Petite marque verticale pour toutes les semaines
      const tick = mk("line",{x1:xPos,y1:PAD.t+iH,x2:xPos,y2:PAD.t+iH+4,stroke:"var(--border)",strokeWidth:"1"});
      svg.appendChild(tick);
      // Label uniquement pour les semaines impaires
      if ((wi+1) % 2 === 1) {
        const lbl = document.createElementNS("http://www.w3.org/2000/svg","text");
        lbl.setAttribute("x", xPos);
        lbl.setAttribute("y", PAD.t+iH+14);
        lbl.setAttribute("fill","var(--text2)");
        lbl.setAttribute("font-size","9");
        lbl.setAttribute("text-anchor","middle");
        lbl.textContent = "S"+(wi+1);
        svg.appendChild(lbl);
      }
    });

    // Tooltip au tap
    const tooltip = document.createElementNS("http://www.w3.org/2000/svg","g");
    tooltip.style.display = "none";
    const tooltipBg = mk("rect",{x:0,y:0,width:80,height:32,rx:"4",fill:"var(--border-soft)",stroke:"var(--border)",strokeWidth:"1"});
    const tooltipDate = document.createElementNS("http://www.w3.org/2000/svg","text");
    tooltipDate.setAttribute("font-size","9"); tooltipDate.setAttribute("fill","var(--text2)");
    const tooltipVal = document.createElementNS("http://www.w3.org/2000/svg","text");
    tooltipVal.setAttribute("font-size","11"); tooltipVal.setAttribute("fill","var(--text)"); tooltipVal.setAttribute("font-weight","700");
    tooltip.appendChild(tooltipBg); tooltip.appendChild(tooltipDate); tooltip.appendChild(tooltipVal);
    svg.appendChild(tooltip);

    // Zone de tap sur chaque point
    predHistory.forEach((p,i) => {
      const cx = xScale(i), cy = yScale(p.time);
      const hitArea = mk("circle",{cx,cy,r:"12",fill:"transparent",cursor:"pointer"});
      hitArea.addEventListener("click", () => {
        const d = new Date(p.date);
        const dateStr = d.toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
        const tx = Math.min(cx, W-PAD.r-84);
        const ty = cy > PAD.t+30 ? cy-40 : cy+10;
        tooltipBg.setAttribute("x", tx); tooltipBg.setAttribute("y", ty);
        tooltipDate.setAttribute("x", tx+6); tooltipDate.setAttribute("y", ty+12);
        tooltipDate.textContent = dateStr;
        tooltipVal.setAttribute("x", tx+6); tooltipVal.setAttribute("y", ty+26);
        tooltipVal.textContent = fmtTime(p.time);
        tooltip.style.display = "block";
      });
      svg.appendChild(hitArea);
    });

    svg.addEventListener("click", e => {
      if (e.target.tagName !== "circle" || e.target.getAttribute("r") !== "12") {
        tooltip.style.display = "none";
      }
    });

    const wrap=el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"Évolution de l\'estimation"),
      el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"12px",padding:"12px",overflow:"hidden"}})
    );
    wrap.lastChild.appendChild(svg);
    graphEl=wrap;
  }

  // ── Projections Riegel ────────────────────────────────────────────────
  const projEl=el("div",{style:{marginBottom:"16px"}},
    el("div",{class:"label"},"Projections Riegel"),
    el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"12px",padding:"14px"}},
      el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}},
        ...riegelProjections(pred.time).map(p=>
          el("div",{style:{background:p.target?"rgba(var(--accent-rgb),0.13)":"var(--border-soft)",border:p.target?"1px solid rgba(var(--accent-rgb),0.27)":"none",borderRadius:"8px",padding:"10px 12px"}},
            el("div",{style:{color:p.target?"var(--accent)":"var(--text2)",fontSize:"13px",marginBottom:"4px"}},p.label+(p.target?" 🎯":"")),
            el("div",{style:{color:"var(--text)",fontSize:"15px",fontWeight:"700"}},p.timeStr),
            el("div",{class:"muted",style:{fontSize:"13px"}},p.paceStr)
          )
        )
      ),
      el("div",{class:"muted",style:{fontSize:"12px",marginTop:"10px",fontStyle:"italic"}},"📊 "+pred.method)
    )
  );

  // ── Référentiel allures ───────────────────────────────────────────────
  // EF/LONGUE : allure lue depuis plan.allures.E (déjà calculée par le
  // moteur selon le profil, formatPace() appliqué) — pas une valeur fixe
  // "6:20" codée en dur (bug trouvé le 7 juillet 2026, même famille que
  // les autres résidus de cette session). Repli "6:20" si absente
  // (compatibilité avec un plan sans cette donnée).
  // .replace("/km","") : allures.E est stocké au format "6:10/km" — sans ce
  // nettoyage, le "/km" ajouté à l'affichage (paceEl, bloc Informations) se
  // retrouvait dupliqué ("6:10/km/km"), bug remonté par Laurent le 12
  // juillet 2026 sur l'onglet Stats.
  const alluresEF = (window.__PLAN_BRUT__?.allures?.E || "6:20").replace("/km","");
  const chaleurEF = (() => {
    const allureStr = window.__PLAN_BRUT__?.allures?.E; // ex. "6:10/km"
    if (!allureStr) return "6:40"; // repli historique
    const [minStr, secStr] = allureStr.replace("/km","").split(":");
    const efSec = parseInt(minStr)*60 + parseInt(secStr);
    return formatPace(efSec + 20); // +20s/km si chaleur, même règle que le reste de l'app
  })();
  const labelSpecifique = "Spécifique " + (window.__PLAN_BRUT__?.distance || "10K");
  const paceRows = [
    {type:"EF",      label:"Endurance fondamentale", pace:alluresEF, heat:chaleurEF, fc:FC_ZONES.EF.min+"–"+FC_ZONES.EF.max, pct:FC_ZONES.EF.label, color:"var(--accent)"},
    {type:"LONGUE",  label:"Sortie longue",           pace:alluresEF, heat:chaleurEF, fc:FC_ZONES.LONGUE.min+"–"+FC_ZONES.LONGUE.max, pct:FC_ZONES.LONGUE.label, color:"var(--accent2)"},
    {type:"SEUIL",   label:"Seuil",                   pace:SESSION_TARGETS.SEUIL.effort, heat:null, fc:FC_ZONES.SEUIL.min+"–"+FC_ZONES.SEUIL.max, pct:FC_ZONES.SEUIL.label, color:"var(--accent2)"},
    {type:"SPEC",    label:labelSpecifique,           pace:SESSION_TARGETS.SPEC.effort,  heat:null, fc:FC_ZONES.SPEC.min+"–"+FC_ZONES.SPEC.max, pct:FC_ZONES.SPEC.label, color:"var(--accent)"},
    {type:"VMA",     label:"VMA",                     pace:SESSION_TARGETS.VMA.effort,   heat:null, fc:FC_ZONES.VMA.min+"–"+FC_ZONES.VMA.max, pct:FC_ZONES.VMA.label, color:"var(--accent)"},
  ];
  // ── Courbes IE + Cadence ─────────────────────────────────────────────────
  const intensiveTypes = ["VMA","SPEC","SEUIL"];
  const ieData = {}, cadData = {};
  intensiveTypes.forEach(type => {
    const sessions = ALL_SESSIONS.filter(s=>s.type===type&&s.date<=today());
    const points = sessions.map(s => {
      const run = getStravaRunSiPasManuel(s.date, s.uid);
      if (!run) return null;
      const laps = getLapsAffichage(run, s.structureIntervalles);
      if (!laps.length) return null;
      const ieVals = laps.map(l=>economyScore(l,type)).filter(v=>v!==null);
      const cadVals = laps.map(l=>l.average_cadence?Math.round(l.average_cadence*2):null).filter(v=>v!==null);
      const hrVals = laps.filter(l=>l.average_heartrate).map(l=>l.average_heartrate);
      return {
        week: s.week,
        date: s.date,
        ie: ieVals.length ? Math.round(ieVals.reduce((a,b)=>a+b,0)/ieVals.length) : null,
        cad: cadVals.length ? Math.round(cadVals.reduce((a,b)=>a+b,0)/cadVals.length) : null,
        fc: hrVals.length ? Math.round(hrVals.reduce((a,b)=>a+b,0)/hrVals.length) : null
      };
    }).filter(Boolean);
    if (points.length) { ieData[type]=points; cadData[type]=points; }
  });

  const typeColors2 = { VMA:"var(--accent)", SPEC:"var(--accent)", SEUIL:"var(--accent2)" };

  function drawCurve(data, label, yKey, yLabel, refLine) {
    if (!Object.keys(data).length) return null;
    const allVals = Object.values(data).flatMap(pts=>pts.map(p=>p[yKey]).filter(Boolean));
    if (!allVals.length) return null;
    const W=320, H=90, PL=30, PT=12, PB=22;
    const minY=Math.min(...allVals)-5, maxY=Math.max(...allVals)+5;
    const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("viewBox",`0 0 ${W} ${H+PT+PB+14}`);
    svg.style.width="100%";

    if (refLine) {
      const ry = PT+(1-(refLine-minY)/(maxY-minY))*H;
      const l = document.createElementNS("http://www.w3.org/2000/svg","line");
      l.setAttribute("x1",PL); l.setAttribute("x2",W); l.setAttribute("y1",ry); l.setAttribute("y2",ry);
      l.setAttribute("stroke","var(--text-muted)"); l.setAttribute("stroke-width","1"); l.setAttribute("stroke-dasharray","4,3");
      svg.appendChild(l);
      const t = document.createElementNS("http://www.w3.org/2000/svg","text");
      t.setAttribute("x",PL-2); t.setAttribute("y",ry+3); t.setAttribute("fill","var(--text-muted)"); t.setAttribute("font-size","8"); t.setAttribute("text-anchor","end");
      t.textContent=refLine; svg.appendChild(t);
    }

    // Labels semaines sur l'axe X (S1, S3, S5, S7, S9, S11)
    [1,3,5,7,9,11].forEach(w => {
      const x = PL+(w-1)/10*(W-PL);
      const tick = document.createElementNS("http://www.w3.org/2000/svg","line");
      tick.setAttribute("x1",x); tick.setAttribute("x2",x);
      tick.setAttribute("y1",PT+H); tick.setAttribute("y2",PT+H+4);
      tick.setAttribute("stroke","var(--border)"); tick.setAttribute("stroke-width","1");
      svg.appendChild(tick);
      const lbl = document.createElementNS("http://www.w3.org/2000/svg","text");
      lbl.setAttribute("x",x); lbl.setAttribute("y",PT+H+12);
      lbl.setAttribute("fill","var(--text-muted)"); lbl.setAttribute("font-size","8"); lbl.setAttribute("text-anchor","middle");
      lbl.textContent="S"+w; svg.appendChild(lbl);
    });

    let legendX = PL;
    Object.entries(data).forEach(([type,pts]) => {
      const color=typeColors2[type]||"var(--text2)";
      const vp=pts.filter(p=>p[yKey]!==null);
      if (!vp.length) return;
      if (vp.length>=2) {
        const poly=document.createElementNS("http://www.w3.org/2000/svg","polyline");
        poly.setAttribute("points",vp.map(p=>{
          const x=PL+(p.week-1)/10*(W-PL);
          const y=PT+(1-(p[yKey]-minY)/(maxY-minY))*H;
          return x+","+y;
        }).join(" "));
        poly.setAttribute("stroke",color); poly.setAttribute("stroke-width","2"); poly.setAttribute("fill","none"); poly.setAttribute("stroke-linecap","round");
        svg.appendChild(poly);
      }
      vp.forEach(p=>{
        const x=PL+(p.week-1)/10*(W-PL);
        const y=PT+(1-(p[yKey]-minY)/(maxY-minY))*H;
        // Zone cliquable invisible plus grande
        const hitArea=document.createElementNS("http://www.w3.org/2000/svg","circle");
        hitArea.setAttribute("cx",x); hitArea.setAttribute("cy",y); hitArea.setAttribute("r","12");
        hitArea.setAttribute("fill","transparent"); hitArea.style.cursor="pointer";
        hitArea.addEventListener("click",()=>{
          const existing = svg.parentNode.querySelector(".ie-tooltip");
          if (existing) existing.remove();
          const tip = document.createElement("div");
          tip.className = "ie-tooltip";
          tip.style.cssText = "position:absolute;background:var(--border-soft);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:11px;color:var(--text);pointer-events:none;z-index:10;white-space:nowrap;";
          tip.innerHTML = `<span style="color:${color};font-weight:700">${type} · S${p.week}</span><br>${yKey==="ie"?"IE":"Cadence"} : <b>${p[yKey]}</b>${yKey==="cad"?" spm":""}`;
          const svgRect = svg.getBoundingClientRect();
          const parentRect = svg.parentNode.getBoundingClientRect();
          tip.style.left = (svgRect.left - parentRect.left + x * svgRect.width/W - 50)+"px";
          tip.style.top = (svgRect.top - parentRect.top + y * svgRect.height/(H+PT+PB+14) - 60)+"px";
          svg.parentNode.style.position="relative";
          svg.parentNode.appendChild(tip);
          setTimeout(()=>tip.remove(), 3000);
        });
        svg.appendChild(hitArea);
        const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
        c.setAttribute("cx",x); c.setAttribute("cy",y); c.setAttribute("r","4"); c.setAttribute("fill",color);
        svg.appendChild(c);
        const t=document.createElementNS("http://www.w3.org/2000/svg","text");
        t.setAttribute("x",x); t.setAttribute("y",y-6); t.setAttribute("fill",color); t.setAttribute("font-size","9"); t.setAttribute("text-anchor","middle");
        t.textContent=p[yKey]; svg.appendChild(t);
      });
      const dot=document.createElementNS("http://www.w3.org/2000/svg","circle");
      dot.setAttribute("cx",legendX); dot.setAttribute("cy",H+PT+26); dot.setAttribute("r","4"); dot.setAttribute("fill",color);
      svg.appendChild(dot);
      const lt=document.createElementNS("http://www.w3.org/2000/svg","text");
      lt.setAttribute("x",legendX+7); lt.setAttribute("y",H+PT+29); lt.setAttribute("fill",color); lt.setAttribute("font-size","9");
      lt.textContent=type; svg.appendChild(lt);
      legendX+=55;
    });
    return el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},label),
      el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"12px",padding:"12px"}},svg)
    );
  }

  const ieCurveEl = drawCurve(ieData,"📊 Indice d\'Économie (IE) par séance","ie","IE",100);
  const cadCurveEl = drawCurve(cadData,"🦶 Cadence par séance","cad","spm",null);

  // ── Courbes FC par type de séance ──────────────────────────────────────────
  const fcCurveEl = (()=>{
    const types = ["VMA","SPEC","SEUIL"].filter(t => ieData[t] && ieData[t].some(p=>p.fc));
    if (!types.length) return null;

    const FC_ZONES_CURVE = { VMA:{min:163,max:181}, SPEC:{min:154,max:163}, SEUIL:{min:145,max:163} };

    const cards = types.map(type => {
      const pts = ieData[type].filter(p=>p.fc);
      const color = typeColors2[type];
      const zone = FC_ZONES_CURVE[type];

      // Tendance
      let trendEl = null;
      if (pts.length >= 2) {
        const diff = pts[pts.length-1].fc - pts[0].fc;
        const trendColor = diff <= 0 ? "var(--accent2)" : diff <= 5 ? "var(--warn)" : "var(--warn)";
        const trendText = (diff > 0 ? "↑ +" : "↓ ") + Math.abs(diff) + " bpm";
        trendEl = el("span",{style:{color:trendColor,fontSize:"14px",fontWeight:"700"}},trendText);
      } else {
        trendEl = el("span",{class:"muted",style:{fontSize:"13px"}},"1 séance");
      }

      // SVG courbe
      const W=320, H=70, PL=28, PT=10, PB=22, PR=30;
      // Bug corrigé le 18/07/2026 (trouvé par Laurent : affichage "Sundefined"
      // au lieu du numéro de semaine) : s.week n'existe pas sur un objet
      // séance individuelle (week.sessions[i] n'a que day/date/type/...),
      // seul l'objet SEMAINE (w, avant le flatMap) a un champ week — d'où
      // w.week répété pour chaque séance de cette semaine, pas s.week.
      const allWeeks = PLAN.flatMap(w=>w.sessions.map(s=>({s,weekNum:w.week}))).filter(({s})=>s.type===type).map(({weekNum})=>weekNum);
      const uniqueWeeks = [...new Set(allWeeks)].sort((a,b)=>a-b);
      const nW = uniqueWeeks.length;
      const xOf = w => PL + ((uniqueWeeks.indexOf(w)) / Math.max(nW-1,1)) * (W-PL-PR);

      const fcVals = pts.map(p=>p.fc);
      const allFc = zone ? [zone.min-5, zone.max+5, ...fcVals] : fcVals;
      const minV = Math.min(...allFc), maxV = Math.max(...allFc);
      const yOf = v => PT + (1-(v-minV)/(maxV-minV||1)) * (H-PT-PB);

      const zonePts = zone
        ? `0,${yOf(zone.max)} ${W},${yOf(zone.max)} ${W},${yOf(zone.min)} 0,${yOf(zone.min)}`
        : null;

      const linePts = pts.map(p => `${xOf(p.week)},${yOf(p.fc)}`).join(" ");

      const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
      svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
      svg.style.width = "100%";
      svg.style.display = "block";

      // Zone cible
      if (zonePts) {
        const poly = document.createElementNS("http://www.w3.org/2000/svg","polygon");
        poly.setAttribute("points", zonePts);
        poly.setAttribute("fill","var(--accent2)");
        poly.setAttribute("opacity","0.07");
        svg.appendChild(poly);
        // Labels zone
        const t1 = document.createElementNS("http://www.w3.org/2000/svg","text");
        t1.setAttribute("x", W-2); t1.setAttribute("y", yOf(zone.max)+3);
        t1.setAttribute("text-anchor","end"); t1.setAttribute("fill","var(--accent2)");
        t1.setAttribute("font-size","8"); t1.setAttribute("opacity","0.7");
        t1.textContent = zone.max;
        svg.appendChild(t1);
        const t2 = document.createElementNS("http://www.w3.org/2000/svg","text");
        t2.setAttribute("x", W-2); t2.setAttribute("y", yOf(zone.min)+3);
        t2.setAttribute("text-anchor","end"); t2.setAttribute("fill","var(--accent2)");
        t2.setAttribute("font-size","8"); t2.setAttribute("opacity","0.7");
        t2.textContent = zone.min;
        svg.appendChild(t2);
      }

      // Points futurs
      uniqueWeeks.forEach(w => {
        if (!pts.find(p=>p.week===w)) {
          const cx = xOf(w);
          const cy = H/2;
          const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
          c.setAttribute("cx",cx); c.setAttribute("cy",cy);
          c.setAttribute("r","4"); c.setAttribute("fill","none");
          c.setAttribute("stroke","var(--border)"); c.setAttribute("stroke-width","1.5");
          c.setAttribute("stroke-dasharray","2,2");
          svg.appendChild(c);
          const t = document.createElementNS("http://www.w3.org/2000/svg","text");
          t.setAttribute("x",cx); t.setAttribute("y",H-4);
          t.setAttribute("text-anchor","middle"); t.setAttribute("fill","var(--text-muted)");
          t.setAttribute("font-size","9"); t.textContent = "S"+w;
          svg.appendChild(t);
        }
      });

      // Ligne + points réels
      if (pts.length >= 2) {
        const poly2 = document.createElementNS("http://www.w3.org/2000/svg","polyline");
        poly2.setAttribute("points", linePts);
        poly2.setAttribute("fill","none");
        poly2.setAttribute("stroke",color);
        poly2.setAttribute("stroke-width","2.5");
        poly2.setAttribute("stroke-linecap","round");
        svg.appendChild(poly2);
      }
      pts.forEach(p => {
        const cx = xOf(p.week), cy = yOf(p.fc);
        const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
        c.setAttribute("cx",cx); c.setAttribute("cy",cy);
        c.setAttribute("r","5"); c.setAttribute("fill",color);
        svg.appendChild(c);
        const t = document.createElementNS("http://www.w3.org/2000/svg","text");
        t.setAttribute("x",cx); t.setAttribute("y",cy-8);
        t.setAttribute("text-anchor","middle"); t.setAttribute("fill","var(--text)");
        t.setAttribute("font-size","9"); t.textContent = p.fc;
        svg.appendChild(t);
        const tw = document.createElementNS("http://www.w3.org/2000/svg","text");
        tw.setAttribute("x",cx); tw.setAttribute("y",H-4);
        tw.setAttribute("text-anchor","middle"); tw.setAttribute("fill","var(--text-muted)");
        tw.setAttribute("font-size","9"); tw.textContent = "S"+p.week;
        svg.appendChild(tw);
      });

      const card = el("div",{style:{background:"var(--bg)",border:`1px solid ${color}33`,borderTop:`3px solid ${color}`,borderRadius:"12px",padding:"14px",marginBottom:"10px"}},
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},
          el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
            el("span",{style:{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:"4px",padding:"2px 8px",fontSize:"12px",fontWeight:"700"}},type),
            el("span",{class:"muted",style:{fontSize:"13px"}},"FC intervalles")
          ),
          trendEl
        )
      );
      card.appendChild(svg);
      if (pts.length < 2) {
        const msg = el("div",{class:"muted",style:{fontSize:"12px",marginTop:"6px",fontStyle:"italic"}},
          "Courbe disponible à partir de 2 séances"
        );
        card.appendChild(msg);
      }
      return card;
    });

    return el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"❤️ FC intervalles par type de séance"),
      ...cards
    );
  })();

  const paceEl=el("div",{style:{marginBottom:"16px"}},
    el("div",{class:"label"},"Référentiel allures & FC"),
    el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"12px",overflow:"hidden"}},
      ...paceRows.map((r,i)=>el("div",{style:{padding:"10px 14px",borderBottom:i<paceRows.length-1?"1px solid var(--border)":"none",display:"flex",alignItems:"center",gap:"12px"}},
        el("div",{style:{width:"4px",height:"32px",borderRadius:"2px",background:r.color,flexShrink:"0"}}),
        el("div",{style:{flex:"1"}},
          el("div",{style:{color:"var(--text)",fontSize:"14px",fontWeight:"600",marginBottom:"2px"}},r.label),
          el("div",{class:"muted",style:{fontSize:"13px"}},r.heat?"Chaud : "+r.heat:SESSION_TARGETS[r.type]?"Tolérance "+SESSION_TARGETS[r.type].tolerance:"—")
        ),
        el("div",{style:{textAlign:"right"}},
          el("div",{style:{color:r.color,fontSize:"15px",fontWeight:"700"}},r.pace.replace(/\/km/g,"")+"/km"),
          el("div",{class:"muted",style:{fontSize:"13px"}},r.fc+" bpm")
        )
      ))
    )
  );

  // ── Prédiction de progression ────────────────────────────────────────────
  let progressionEl = null;
  // Prédiction de progression — modèle logarithmique avec fourchette
  const projOldest = predHistory[0]?.date;
  const projNewest = predHistory[predHistory.length-1]?.date;
  const projDaySpan = projOldest && projNewest
    ? Math.round((new Date(projNewest) - new Date(projOldest)) / 86400000) : 0;

  if (predHistory.length >= 3 && projDaySpan >= 21) {
    const currentTime = pred.time;
    const BASE_TIME_START = BASE_TIME_REFERENCE; // référence lue depuis le plan chargé
    const gainMax = BASE_TIME_START - raceGoalTime; // gain théorique max
    const gainRealist = Math.round(gainMax * 0.85); // 85% du gain max
    const gainSoFar = BASE_TIME_START - currentTime;

    // Coefficient k calibré sur le gain réalisé à ce stade
    const weeksElapsed = Math.max(1, (predHistory.length - 1) / 7);
    const k = gainSoFar > 0 ? -Math.log(1 - Math.min(gainSoFar / gainRealist, 0.99)) / weeksElapsed : 0.1;
    const weeksTotal = 11;
    const projectedGain = Math.round(gainRealist * (1 - Math.exp(-k * weeksTotal)));
    const projectedTime = BASE_TIME_START - projectedGain;

    // Fourchette selon la quantité de données
    const oldestEntry = predHistory[0]?.date;
    const newestEntry = predHistory[predHistory.length-1]?.date;
    const daySpan = oldestEntry && newestEntry
      ? Math.round((new Date(newestEntry) - new Date(oldestEntry)) / 86400000)
      : 0;
    const toleranceSec = daySpan >= 21 ? 30 : daySpan >= 14 ? 60 : 120;
    const projLow = fmtTime(projectedTime - toleranceSec);
    const projHigh = fmtTime(projectedTime + toleranceSec);
    const hasVerdict = daySpan >= 21;

    progressionEl = el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"🎯 Trajectoire au "+fmtDate(DATE_COURSE_REFERENCE)),
      el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"12px",padding:"14px"}},
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},
          el("div",{},
            el("div",{class:"muted",style:{fontSize:"13px",marginBottom:"2px"}},"Projection"),
            el("div",{style:{color:"var(--text)",fontSize:"22px",fontWeight:"800",letterSpacing:"-0.5px"}},projLow+" – "+projHigh)
          ),
          el("div",{style:{textAlign:"right"}},
            el("div",{class:"muted",style:{fontSize:"12px",marginBottom:"4px"}},"Fiabilité"),
            el("div",{style:{
              color:daySpan>=21?"var(--accent2)":daySpan>=14?"var(--warn)":"var(--text2)",
              fontSize:"14px",fontWeight:"700"
            }},daySpan>=21?"Bonne":"Faible — peu de données")
          )
        ),
        hasVerdict ? el("div",{style:{display:"flex",justifyContent:"space-between",paddingTop:"8px",borderTop:"1px solid var(--border)"}},
          el("span",{class:"muted",style:{fontSize:"13px"}},"vs objectif "+fmtTime(raceGoalTime)),
          el("span",{style:{
            color:projectedTime<=raceGoalTime?"var(--accent2)":projectedTime<=raceGoalTime+30?"var(--warn)":"var(--warn)",
            fontSize:"14px",fontWeight:"700"
          }},projectedTime<=raceGoalTime?"✅ Atteignable !":projectedTime<=raceGoalTime+30?"⚠️ Serré":"❌ À risque")
        ) : el("div",{style:{paddingTop:"8px",borderTop:"1px solid var(--border)"}},
          el("span",{class:"muted",style:{fontSize:"13px",fontStyle:"italic"}},"Verdict disponible à partir de 3 semaines de données")
        )
      )
    );
  } else if (predHistory.length >= 3) {
    // Moins de 21 jours de données — afficher la date de disponibilité
    const availDate = new Date(new Date(projOldest).getTime() + 21*86400000);
    const availStr = availDate.toLocaleDateString("fr-FR",{day:"numeric",month:"long"});
    progressionEl = el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"🎯 Trajectoire au "+fmtDate(DATE_COURSE_REFERENCE)),
      el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"12px",padding:"14px",textAlign:"center"}},
        el("div",{style:{fontSize:"24px",marginBottom:"8px"}},"📊"),
        el("div",{style:{color:"var(--text)",fontSize:"14px",fontWeight:"600",marginBottom:"4px"}},"Données insuffisantes"),
        el("div",{class:"muted",style:{fontSize:"13px"}},"Projection disponible à partir du "+availStr)
      )
    );
  }

  // ── ACWR (Acute:Chronic Workload Ratio) ─────────────────────────────────
  // Chantier lancé le 13 juillet 2026, validé historiquement sur les données
  // réelles de Laurent avant codage (doc convergence-v1-v2.md / mémoires).
  // Source de vérité unifiée avec le moteur de décision (§9.3 doc intégration,
  // 17/07/2026) : RunnerStateCalculator (TRIMP/sRPE pondéré), plus le simple
  // volume brut en km de l'ancien calculerACWR() (retirée). Sur stravaActivities
  // réelles (jamais le plan théorique).
  const acwrEl = (() => {
    const acwr = obtenirHistoriqueACWR();
    if (!acwr) {
      return el("div",{style:{marginBottom:"16px"}},
        el("div",{class:"label"},"⚖️ Charge d'entraînement (ACWR)"),
        el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"12px",padding:"14px",textAlign:"center"}},
          el("div",{class:"muted",style:{fontSize:"13px",fontStyle:"italic"}},"Disponible après 4 semaines d'activités Strava enregistrées")
        )
      );
    }

    // Ne garde que les 8 dernières semaines d'historique pour la lisibilité
    // du graphique (cohérent avec la période de validation du 13/07/2026)
    const hist = acwr.historique.slice(-56);
    const W = 340, H = 100, PAD = { t: 12, r: 12, b: 20, l: 34 };
    const iW = W - PAD.l - PAD.r, iH = H - PAD.t - PAD.b;
    const mk = (tag, attrs) => { const e = document.createElementNS("http://www.w3.org/2000/svg", tag); Object.entries(attrs).forEach(([k, v]) => e.setAttribute(k, v)); return e; };
    const xScale = i => PAD.l + (i / Math.max(hist.length - 1, 1)) * iW;

    // ── Graphique 1 : charge aiguë vs chronique ────────────────────────────
    const svg1 = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg1.setAttribute("viewBox", `0 0 ${W} ${H}`);
    svg1.style.width = "100%"; svg1.style.display = "block";
    const maxCharge = Math.max(...hist.map(h => Math.max(h.chargeAigue, h.chargeChronique))) * 1.1;
    const yScale1 = v => PAD.t + iH - (v / maxCharge) * iH;
    svg1.appendChild(mk("rect", { x: 0, y: 0, width: W, height: H, fill: "var(--bg)" }));
    [0, Math.round(maxCharge / 2), Math.round(maxCharge)].forEach(v => {
      const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t.setAttribute("x", PAD.l - 4); t.setAttribute("y", yScale1(v) + 3);
      t.setAttribute("fill", "var(--text-muted)"); t.setAttribute("font-size", "8"); t.setAttribute("text-anchor", "end");
      t.textContent = v; svg1.appendChild(t);
    });
    const ptsAigue = hist.map((h, i) => `${xScale(i)},${yScale1(h.chargeAigue)}`).join(" ");
    const ptsChronique = hist.map((h, i) => `${xScale(i)},${yScale1(h.chargeChronique)}`).join(" ");
    svg1.appendChild(mk("polyline", { points: ptsChronique, fill: "none", stroke: "var(--text-muted)", "stroke-width": "2", "stroke-dasharray": "4,3", "stroke-linejoin": "round" }));
    svg1.appendChild(mk("polyline", { points: ptsAigue, fill: "none", stroke: "var(--accent)", "stroke-width": "2.5", "stroke-linejoin": "round", "stroke-linecap": "round" }));

    // ── Graphique 2 : ratio ACWR avec zones ────────────────────────────────
    const svg2 = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg2.setAttribute("viewBox", `0 0 ${W} ${H}`);
    svg2.style.width = "100%"; svg2.style.display = "block";
    const ratios = hist.map(h => h.ratio).filter(r => r !== null);
    const maxRatio = Math.max(1.6, ...ratios) * 1.05;
    const yScale2 = v => PAD.t + iH - (v / maxRatio) * iH;
    svg2.appendChild(mk("rect", { x: 0, y: 0, width: W, height: H, fill: "var(--bg)" }));
    // Zone de risque (>1.5)
    const yRisque = yScale2(ACWR_SEUIL_RISQUE);
    svg2.appendChild(mk("rect", { x: PAD.l, y: PAD.t, width: iW, height: yRisque - PAD.t, fill: "var(--warn)", opacity: "0.08" }));
    svg2.appendChild(mk("line", { x1: PAD.l, y1: yRisque, x2: W - PAD.r, y2: yRisque, stroke: "rgba(var(--warn-rgb),0.53)", "stroke-width": "1", "stroke-dasharray": "4,3" }));
    // Zone sous-charge (<0.8)
    const ySous = yScale2(ACWR_SEUIL_SOUS_CHARGE);
    svg2.appendChild(mk("line", { x1: PAD.l, y1: ySous, x2: W - PAD.r, y2: ySous, stroke: "rgba(var(--warn-rgb),0.53)", "stroke-width": "1", "stroke-dasharray": "4,3" }));
    [ACWR_SEUIL_RISQUE, 1, ACWR_SEUIL_SOUS_CHARGE].forEach(v => {
      const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t.setAttribute("x", PAD.l - 4); t.setAttribute("y", yScale2(v) + 3);
      t.setAttribute("fill", "var(--text-muted)"); t.setAttribute("font-size", "8"); t.setAttribute("text-anchor", "end");
      t.textContent = v; svg2.appendChild(t);
    });
    const ptsRatio = hist.filter(h => h.ratio !== null).map((h) => {
      const i = hist.indexOf(h);
      return `${xScale(i)},${yScale2(h.ratio)}`;
    }).join(" ");
    svg2.appendChild(mk("polyline", { points: ptsRatio, fill: "none", stroke: "var(--accent)", "stroke-width": "2.5", "stroke-linejoin": "round", "stroke-linecap": "round" }));
    hist.forEach((h, i) => {
      if (h.ratio === null) return;
      const color = h.ratio > ACWR_SEUIL_RISQUE ? "var(--warn)" : h.ratio < ACWR_SEUIL_SOUS_CHARGE ? "var(--warn)" : "var(--accent)";
      svg2.appendChild(mk("circle", { cx: xScale(i), cy: yScale2(h.ratio), r: i === hist.length - 1 ? "4" : "2", fill: color }));
    });
    const dernierRatioVal = acwr.dernierRatio;
    const dernierLbl = document.createElementNS("http://www.w3.org/2000/svg", "text");
    dernierLbl.setAttribute("x", xScale(hist.length - 1)); dernierLbl.setAttribute("y", yScale2(dernierRatioVal) - 8);
    dernierLbl.setAttribute("fill", "var(--text)"); dernierLbl.setAttribute("font-size", "10"); dernierLbl.setAttribute("text-anchor", "end"); dernierLbl.setAttribute("font-weight", "700");
    dernierLbl.textContent = dernierRatioVal.toFixed(2); svg2.appendChild(dernierLbl);

    const statutColor = dernierRatioVal > ACWR_SEUIL_RISQUE ? "var(--warn)" : dernierRatioVal > ACWR_SEUIL_VIGILANCE ? "var(--warn)" : dernierRatioVal < ACWR_SEUIL_SOUS_CHARGE ? "var(--accent)" : "var(--accent2)";
    const statutTexte = dernierRatioVal > ACWR_SEUIL_RISQUE ? "Risque élevé — charge en forte hausse"
      : dernierRatioVal > ACWR_SEUIL_VIGILANCE ? "Vigilance — charge en hausse"
      : dernierRatioVal < ACWR_SEUIL_SOUS_CHARGE ? "Sous-charge — récupération ou moins de volume"
      : "Zone stable";

    return el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"⚖️ Charge d'entraînement (ACWR)"),
      el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"12px",padding:"12px",marginBottom:"8px"}},
        el("div",{class:"muted",style:{fontSize:"11px",marginBottom:"6px",display:"flex",gap:"12px"}},
          el("span",{},el("span",{style:{color:"var(--accent)"}},"⎯"),"  Aiguë (7j)"),
          el("span",{},el("span",{style:{color:"var(--text-muted)"}},"⎯⎯"),"  Chronique (moy./sem sur 28j)")
        ),
        svg1
      ),
      el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"12px",padding:"12px",marginBottom:"8px"}},
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}},
          el("span",{class:"muted",style:{fontSize:"11px"}},"Ratio charge aiguë / chronique"),
          el("span",{style:{color:statutColor,fontSize:"12px",fontWeight:"700"}},statutTexte)
        ),
        svg2
      ),
      el("div",{class:"muted",style:{fontSize:"12px",lineHeight:"1.5",padding:"0 4px"}},
        "L'ACWR compare ta charge des 7 derniers jours à ta moyenne des 4 dernières semaines. Un ratio autour de 1 signale une charge stable. Au-delà de "+ACWR_SEUIL_RISQUE+", le risque de blessure augmente selon la littérature — c'est le signal à surveiller après une montée en volume rapide."
      )
    );
  })();

  // ── Monotonie de charge (Foster) ─────────────────────────────────────────
  // Ajoutée le 18/07/2026, cf. decision-engine-week-analysis.classic.js pour
  // la justification complète : affichage SEUL, pas de règle d'alerte (pas
  // de seuil consensuel trouvé pour un coureur récréatif dans la
  // littérature vérifiée — la fourchette Foster >2.0 vient du sport co/
  // élite, une seule étude trouvée sur des traileurs donne 0.6-0.9 mais
  // dans un sens différent, limitation de performance et non blessure).
  // Repères de lecture donnés dans le texte d'accompagnement ci-dessous,
  // jamais présentés comme un seuil d'alerte actif dans Yoria.
  const monotonieEl = (() => {
    const hist = obtenirHistoriqueMonotonie(8).filter(h => h.monotonieRealisee !== null);
    if (hist.length < 2) {
      return el("div",{style:{marginBottom:"16px"}},
        el("div",{class:"label"},"📊 Monotonie de charge"),
        el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"12px",padding:"14px",textAlign:"center"}},
          el("div",{class:"muted",style:{fontSize:"13px",fontStyle:"italic"}},"Disponible après quelques semaines de suivi complet (séances + repos identifiables)")
        )
      );
    }

    const W = 340, H = 90, PAD = { t: 12, r: 12, b: 20, l: 28 };
    const iW = W - PAD.l - PAD.r, iH = H - PAD.t - PAD.b;
    const mk = (tag, attrs) => { const e = document.createElementNS("http://www.w3.org/2000/svg", tag); Object.entries(attrs).forEach(([k, v]) => e.setAttribute(k, v)); return e; };
    const xScale = i => PAD.l + (i / Math.max(hist.length - 1, 1)) * iW;
    const maxVal = Math.max(3, ...hist.map(h => h.monotonieRealisee)) * 1.1;
    const yScale = v => PAD.t + iH - (v / maxVal) * iH;

    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    svg.style.width = "100%"; svg.style.display = "block";
    svg.appendChild(mk("rect", { x: 0, y: 0, width: W, height: H, fill: "var(--bg)" }));
    [0, Math.round(maxVal/2*10)/10, Math.round(maxVal*10)/10].forEach(v => {
      const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t.setAttribute("x", PAD.l - 4); t.setAttribute("y", yScale(v) + 3);
      t.setAttribute("fill", "var(--text-muted)"); t.setAttribute("font-size", "8"); t.setAttribute("text-anchor", "end");
      t.textContent = v; svg.appendChild(t);
    });
    const pts = hist.map((h, i) => `${xScale(i)},${yScale(h.monotonieRealisee)}`).join(" ");
    svg.appendChild(mk("polyline", { points: pts, fill: "none", stroke: "var(--accent)", "stroke-width": "2.5", "stroke-linejoin": "round", "stroke-linecap": "round" }));
    hist.forEach((h, i) => {
      svg.appendChild(mk("circle", { cx: xScale(i), cy: yScale(h.monotonieRealisee), r: i === hist.length - 1 ? "4" : "2", fill: "var(--accent)" }));
    });
    const dernierVal = hist[hist.length - 1].monotonieRealisee;
    const dernierLbl = document.createElementNS("http://www.w3.org/2000/svg", "text");
    dernierLbl.setAttribute("x", xScale(hist.length - 1)); dernierLbl.setAttribute("y", yScale(dernierVal) - 8);
    dernierLbl.setAttribute("fill", "var(--text)"); dernierLbl.setAttribute("font-size", "10"); dernierLbl.setAttribute("text-anchor", "end"); dernierLbl.setAttribute("font-weight", "700");
    dernierLbl.textContent = dernierVal.toFixed(2); svg.appendChild(dernierLbl);

    return el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"📊 Monotonie de charge"),
      el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"12px",padding:"12px",marginBottom:"8px"}},
        el("div",{class:"muted",style:{fontSize:"11px",marginBottom:"6px"}},"Régularité de charge jour après jour, sur "+hist.length+" semaines"),
        svg
      ),
      el("div",{class:"muted",style:{fontSize:"12px",lineHeight:"1.5",padding:"0 4px"}},
        "Mesure si tes charges d'entraînement varient assez d'un jour à l'autre (vrais jours durs, vrais jours de repos) plutôt que d'être toutes similaires. Repères indicatifs de la littérature sportive (pas un seuil d'alerte dans Yoria) : au-delà de 2.0, souvent considéré comme trop peu varié ; en dessous de 1.5, généralement préférable."
      )
    );
  })();

  // ── Infos du plan ─────────────────────────────────────────────────────
  const infoEl=el("div",{},
    el("div",{class:"label"},"Informations"),
    el("div",{class:"card"},
      ...[
        ["Course",RACE_NAME,"var(--accent)"],
        ["Date",new Date(DATE_COURSE_REFERENCE+"T00:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})+" · "+RACE_LOCATION,"var(--text)"],
        ["Objectif",fmtTime(raceGoalTime)+" · "+fmtPace(DISTANCE_M_REFERENCE/raceGoalTime)+"/km","var(--accent)"],
        ["Référence",fmtTime(BASE_TIME_REFERENCE),"var(--text)"],
        ["Allure EF",alluresEF+"/km · "+chaleurEF+"/km si chaud","var(--accent)"],
        ["FC max",runnerFcMax+" bpm","var(--text)"],
        // Km courus DEPUIS LE DÉBUT DU PLAN ACTUEL, pas toutes les activités
        // Strava jamais bornées — bug trouvé le 7 juillet 2026 : Laurent, sur
        // un plan Semi démarrant le 14 septembre, voyait les km d'une séance
        // de la veille du démarrage du plan comptés dans ce total. Même
        // famille de correctif déjà appliqué à predict10K()/
        // matchActivitiesToPlan() (section 7bis/7quater du doc de
        // convergence), oublié ici.
        ["Km courus",Math.round(activitesDuPlan().reduce((s,a)=>s+a.distance,0)/100)/10+" km","var(--accent2)"],
      ].map(([label,val,color])=>el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"6px"}},
        el("span",{class:"muted",style:{fontSize:"14px"}},label),
        el("span",{style:{color,fontSize:"14px",fontWeight:color==="var(--text)"?"400":"700"}},val)
      ))
    )
  );

  // ── Bloc de test Module 2 (SessionAnalyzer) — 17/07/2026 ──────────────────
  // Sélecteur parmi les séances qualité passées avec statut renseigné,
  // affiche le résultat de analyserSeanceQualite() pour la séance choisie.
  // Persiste le choix via une variable de module simple (moduleTestSeanceUid)
  // pour survivre au re-render sans re-render global de l'app (pattern déjà
  // utilisé ailleurs pour les toggles locaux, ex. detailOpen2 ligne ~2957).
  const seancesQualitePassees = ALL_SESSIONS
    .filter(s => DecisionEngineSessionAnalysis && DecisionEngineSessionAnalysis.TYPES_QUALITE.indexOf(s.type) !== -1)
    .filter(s => statuses[s.uid] && statuses[s.uid] !== "—")
    .sort((a,b) => b.date.localeCompare(a.date)); // plus récente d'abord

  let moduleTestEl = null;
  if (seancesQualitePassees.length) {
    if (typeof window.__moduleTestSeanceUid === 'undefined' || !seancesQualitePassees.find(s => s.uid === window.__moduleTestSeanceUid)) {
      window.__moduleTestSeanceUid = seancesQualitePassees[0].uid; // repli sur la plus récente
    }
    const seanceChoisie = seancesQualitePassees.find(s => s.uid === window.__moduleTestSeanceUid);
    const analyse = analyserSeanceQualite(seanceChoisie);

    const select = el("select",{style:{width:"100%",padding:"8px",borderRadius:"8px",border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:"14px",marginBottom:"10px"}},
      ...seancesQualitePassees.map(s => el("option",{value:s.uid},
        s.date+" · "+s.type+" · "+statuses[s.uid]
      ))
    );
    // Forcer select.value explicitement plutôt que compter sur l'attribut
    // selected des <option> — el() pose bien l'attribut HTML "selected" mais
    // ça ne suffit pas toujours à faire refléter la sélection par le <select>
    // parent une fois construit dynamiquement (bug trouvé le 17/07/2026,
    // premier test du bloc : le menu ne montrait jamais la séance choisie).
    select.value = window.__moduleTestSeanceUid;
    select.addEventListener("change",(e)=>{ window.__moduleTestSeanceUid = e.target.value; render(); });

    let resultatEl;
    if (!analyse) {
      resultatEl = el("div",{class:"muted",style:{fontSize:"13px",fontStyle:"italic"}},
        "Aucun résultat pour cette séance (pas d'activité Strava trouvée à cette date, ou laps d'effort non isolables).");
    } else {
      const couleurScore = analyse.scoreReussite >= 80 ? "var(--accent2)" : "var(--warn)";
      resultatEl = el("div",{},
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}},
          el("span",{class:"muted",style:{fontSize:"13px"}},"Score de réussite"),
          el("span",{style:{color:couleurScore,fontSize:"18px",fontWeight:"700"}},analyse.scoreReussite+"/100"+(analyse.reussite?" ✅":""))
        ),
        el("div",{style:{fontSize:"13px",color:"var(--text2)",marginBottom:"6px"}},"Allure : "+analyse.derive.allure.commentaire),
        el("div",{style:{fontSize:"13px",color:"var(--text2)",marginBottom:"6px"}},"FC : "+analyse.derive.frequenceCardiaque.commentaire),
        el("div",{style:{fontSize:"13px",color:"var(--text2)",marginBottom:"6px"}},"Répétitions : "+analyse.derive.repetitions.commentaire),
        el("div",{style:{fontSize:"13px",color:"var(--text2)",marginBottom:"6px"}},"Difficulté ressentie : "+analyse.difficulteRessentie),
        analyse.alertes.length
          ? el("div",{style:{fontSize:"13px",color:"var(--warn)"}},"⚠ Alertes : "+analyse.alertes.map(a=>a.code+" ("+a.gravite+")").join(", "))
          : el("div",{class:"muted",style:{fontSize:"13px"}},"Aucune alerte.")
      );
    }

    moduleTestEl = el("div",{},
      el("div",{class:"label"},"🧪 Test Module 2 · SessionAnalyzer"),
      el("div",{class:"card"}, select, resultatEl)
    );
  }

  // ── Bloc de test Module 3 (WeekAnalyzer) — 17/07/2026 ──────────────────
  // Analyse la semaine en cours (currentWeek()), avec la semaine précédente
  // fournie pour permettre progressionVsPrecedente. Pas de sélecteur (pas
  // vraiment de sens de tester une semaine future ou trop ancienne — les
  // données Strava/statuts n'existent que pour la semaine réelle en cours).
  const semaineActuelleNum = currentWeek();
  const analysePrecedente = semaineActuelleNum > 1 ? analyserSemaineActuelle(semaineActuelleNum - 1) : null;
  const analyseSemaine = analyserSemaineActuelle(semaineActuelleNum, analysePrecedente);

  let moduleTest3El = null;
  if (analyseSemaine) {
    const fleche = analyseSemaine.progressionVsPrecedente === 'hausse' ? '📈'
      : analyseSemaine.progressionVsPrecedente === 'baisse' ? '📉' : '➡️';
    moduleTest3El = el("div",{},
      el("div",{class:"label"},"🧪 Test Module 3 · WeekAnalyzer (semaine "+semaineActuelleNum+")"),
      el("div",{class:"card"},
        el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"6px"}},
          el("span",{class:"muted",style:{fontSize:"13px"}},"Volume"),
          el("span",{style:{fontSize:"14px",fontWeight:"700"}},analyseSemaine.volumeRealiseKm+" / "+analyseSemaine.volumePrevuKm+" km ("+(analyseSemaine.ecartVolumePourcent>0?"+":"")+analyseSemaine.ecartVolumePourcent+"%)")
        ),
        el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"6px"}},
          el("span",{class:"muted",style:{fontSize:"13px"}},"Séances"),
          el("span",{style:{fontSize:"14px"}},analyseSemaine.seancesReussies+" réussies / "+analyseSemaine.seancesManquees+" manquées / "+analyseSemaine.seancesTotal+" total")
        ),
        el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"6px"}},
          el("span",{class:"muted",style:{fontSize:"13px"}},"Charge totale semaine"),
          el("span",{style:{fontSize:"14px"}},analyseSemaine.chargeTotaleSemaine+"")
        ),
        el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"6px"}},
          el("span",{class:"muted",style:{fontSize:"13px"}},"Récupération estimée"),
          el("span",{style:{fontSize:"14px"}},analyseSemaine.recuperationEstimee+"/100")
        ),
        el("div",{style:{display:"flex",justifyContent:"space-between"}},
          el("span",{class:"muted",style:{fontSize:"13px"}},"Vs semaine précédente"),
          el("span",{style:{fontSize:"14px"}},fleche+" "+analyseSemaine.progressionVsPrecedente)
        )
      )
    );
  }

  // ── Bloc de test Module 4 (TrendAnalyzer) — 17/07/2026 ──────────────────
  // Fenêtre fixe à 6 semaines pour ce test (pas de sélecteur — cohérent avec
  // le test Module 3, pas de sens de faire varier ce paramètre avant d'avoir
  // une vraie règle du Module 5 qui en dépendrait).
  const analyseTendance = analyserTendance(6);
  let moduleTest4El = null;
  if (analyseTendance) {
    const emojiTendance = {
      progression: '📈', amelioration: '📈', stagnation: '➡️',
      fatigue_accumulee: '⚠️', baisse_de_forme: '📉',
    }[analyseTendance.tendanceGenerale] || '➡️';
    moduleTest4El = el("div",{},
      el("div",{class:"label"},"🧪 Test Module 4 · TrendAnalyzer ("+analyseTendance.fenetreSemaines+" semaines)"),
      el("div",{class:"card"},
        el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"10px"}},
          el("span",{class:"muted",style:{fontSize:"13px"}},"Tendance générale"),
          el("span",{style:{fontSize:"14px",fontWeight:"700"}},emojiTendance+" "+analyseTendance.tendanceGenerale)
        ),
        analyseTendance.signauxDetectes.length
          ? el("div",{style:{marginBottom:"10px"}},
              el("div",{class:"muted",style:{fontSize:"13px",marginBottom:"4px"}},"Signaux détectés"),
              ...analyseTendance.signauxDetectes.map(sig => el("div",{style:{fontSize:"13px",color:"var(--warn)",marginBottom:"2px"}},"• "+sig.description))
            )
          : el("div",{class:"muted",style:{fontSize:"13px",fontStyle:"italic",marginBottom:"10px"}},"Aucun signal particulier détecté."),
        el("div",{class:"muted",style:{fontSize:"13px",marginBottom:"4px"}},"Points de suivi"),
        ...analyseTendance.pointsDeSuivi.map(p => el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"2px"}},
          el("span",{},"S"+p.semaine),
          el("span",{},(p.fatigue!=null?"fatigue "+p.fatigue:"fatigue —")+" · "+p.volumeKm+"km · "+Math.round(p.tauxReussite*100)+"%")
        ))
      )
    );
  } else {
    moduleTest4El = el("div",{},
      el("div",{class:"label"},"🧪 Test Module 4 · TrendAnalyzer"),
      el("div",{class:"card"}, el("div",{class:"muted",style:{fontSize:"13px",fontStyle:"italic"}},"Pas assez de semaines exploitables pour une analyse de tendance (minimum 3)."))
    );
  }

  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{marginTop:"8px"}}),
    graphEl||el("div",{class:"muted",style:{textAlign:"center",padding:"24px 0",fontSize:"14px",fontStyle:"italic"}},"📊 Le graphique apparaîtra après quelques jours de données"),
    progressionEl,
    fcCurveEl,
    ieCurveEl,
    cadCurveEl,
    acwrEl,
    monotonieEl,
    projEl,
    paceEl,
    infoEl,
    moduleTestEl,
    moduleTest3El,
    moduleTest4El
  );
}

// STRATÉGIE DE COURSE (partagée)
// ══════════════════════════════════════════════════════════════════════════════
// Sortie de renderCourse() le 19/07/2026 pour être réutilisable aussi par la
// carte de séance RACE dans la vue Semaine (bug : les deux endroits
// affichaient des segments/allures différents, la vue Semaine ayant sa
// propre version simplifiée à 2 segments non calibrée).
//
// Calcule les segments à partir de définitions avec un ÉCART relatif
// (offsetSecKm) pour tous les segments SAUF le dernier — le dernier
// segment est calibré mathématiquement pour compenser exactement l'écart
// accumulé, garantissant que la somme des temps de tous les segments
// corresponde TOUJOURS exactement au temps objectif, quelle que soit la
// stratégie choisie pour les segments intermédiaires.
//
// Bug corrigé le 11 juillet 2026 : l'ancienne version fixait une allure
// PLUS LENTE que l'objectif sur le premier segment (marge de sécurité au
// départ), mais le second segment restait exactement à l'allure cible
// moyenne, sans jamais compenser la perte de temps du premier — le temps
// total dépassait systématiquement l'objectif (33s de trop mesurées sur
// un 10K à 48:30, repéré par Laurent). Cette fonction élimine
// structurellement ce risque : le dernier segment absorbe toujours
// exactement l'écart nécessaire.
function calculerSplitsCalibres(distanceKm, tempsObjectifSec, definitionsSegmentsIntermediaires, dernierNote) {
  const paceMoyen = tempsObjectifSec / distanceKm;
  let tempsUtilise = 0, distUtilisee = 0;
  const segments = definitionsSegmentsIntermediaires.map(d => {
    const pace = paceMoyen + d.offsetSecKm;
    const dist = d.to - d.from;
    tempsUtilise += dist * pace;
    distUtilisee += dist;
    return { from: d.from, to: d.to, note: d.note, pace };
  });
  const distRestante = distanceKm - distUtilisee;
  const tempsRestant = tempsObjectifSec - tempsUtilise;
  segments.push({ from: distUtilisee, to: distanceKm, note: dernierNote, pace: tempsRestant / distRestante });
  return segments;
}

// Choix des segments selon la distance de course. Bug trouvé le 7 juillet
// 2026 : la carte était entièrement câblée pour un 10K (5 segments de 0 à
// 10km, conseil coach mentionnant "le km 7 et 10") — un plan Semi/
// Marathon/5K affichait des allures et un conseil complètement hors sujet.
function calculerStrategieCourse(distanceKmCourse, tempsObjectifSec) {
  if (distanceKmCourse <= 5.5) {
    // 5K : quasi-plat, 4 segments avec progression continue
    const d = Math.round(distanceKmCourse);
    return calculerSplitsCalibres(distanceKmCourse, tempsObjectifSec, [
      { from:0, to:Math.min(1,d*0.2), note:"Départ prudent", offsetSecKm: 6 },
      { from:Math.min(1,d*0.2), to:d*0.45, note:"Allure cible", offsetSecKm: 1 },
      { from:d*0.45, to:d*0.8, note:"Accélération progressive", offsetSecKm: -2 },
    ], "Tout donner");
  } else if (distanceKmCourse <= 12) {
    // 10K : 4 segments — départ prudent, montée en régime, allure cible
    // soutenue, effort final (au lieu des 2 segments bruts de l'ancienne
    // version, qui ne compensaient jamais le départ prudent)
    const d = distanceKmCourse;
    return calculerSplitsCalibres(d, tempsObjectifSec, [
      { from:0, to:d*0.2, note:"Départ prudent", offsetSecKm: 8 },
      { from:d*0.2, to:d*0.5, note:"Montée en régime", offsetSecKm: 2 },
      { from:d*0.5, to:d*0.8, note:"Allure cible soutenue", offsetSecKm: -2 },
    ], "Dernier effort, tout donner");
  } else {
    // Semi / Marathon : marge de sécurité au départ, allure stable au
    // milieu, ajustement final au ressenti — 3 segments, pas de paliers
    // aussi marqués que sur un 10K (distance plus longue, gestion d'effort
    // différente)
    const d = distanceKmCourse;
    const kmDepart = d * 0.15;
    return calculerSplitsCalibres(d, tempsObjectifSec, [
      { from:0, to:kmDepart, note:"Marge de sécurité, ne pars pas trop vite", offsetSecKm: 5 },
      { from:kmDepart, to:d*0.85, note:"Allure cible, régularité", offsetSecKm: -0.5 },
    ], "Ajuste au ressenti en fin de course");
  }
}

// COURSE
// ══════════════════════════════════════════════════════════════════════════════
function renderCourse() {
  const cd = countdown();

  const infoCard = el("div",{style:{background:"linear-gradient(135deg,var(--bg) 0%,var(--border-soft) 100%)",border:"1px solid rgba(var(--accent-rgb),0.2)",borderRadius:"12px",padding:"16px",marginBottom:"16px"}},
    el("div",{style:{display:"flex",alignItems:"center",gap:"14px",marginBottom:"12px"}},
      runByLeaIcon(52, 12),
      el("div",{},
        el("div",{style:{color:"var(--accent)",fontSize:"17px",fontWeight:"800",marginBottom:"2px"}},"🏁 "+RACE_NAME),
        el("div",{class:"muted",style:{fontSize:"14px",marginBottom:"2px"}},new Date(DATE_COURSE_REFERENCE+"T00:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})+" · "+RACE_LOCATION),
        el("div",{style:{color:"var(--text-muted)",fontSize:"13px"}},"Yoria")
      )
    ),
    el("a",{href:RACE_URL,target:"_blank",style:{display:"block",background:"rgba(var(--accent-rgb),0.13)",border:"1px solid rgba(var(--accent-rgb),0.27)",borderRadius:"8px",padding:"10px 14px",color:"var(--accent)",fontSize:"15px",fontWeight:"700",textDecoration:"none",textAlign:"center",marginBottom:"12px"}},"🔗 Organisateur"),
    el("div",{style:{display:"flex",gap:"8px"}},
      el("div",{style:{flex:"1",background:"var(--border-soft)",borderRadius:"8px",padding:"8px 10px",textAlign:"center"}},
        el("div",{style:{color:"var(--accent)",fontSize:"15px",fontWeight:"700"}},fmtTime(raceGoalTime)),
        el("div",{class:"muted",style:{fontSize:"12px"}},"Objectif")
      ),
      el("div",{style:{flex:"1",background:"var(--border-soft)",borderRadius:"8px",padding:"8px 10px",textAlign:"center"}},
        el("div",{style:{color:"var(--accent)",fontSize:"15px",fontWeight:"700"}},"J–"+cd),
        el("div",{class:"muted",style:{fontSize:"12px"}},"Avant la course")
      ),
      el("div",{style:{flex:"1",background:"var(--border-soft)",borderRadius:"8px",padding:"8px 10px",textAlign:"center"}},
        el("div",{style:{color:"var(--accent)",fontSize:"15px",fontWeight:"700"}},fmtPace(DISTANCE_M_REFERENCE/raceGoalTime)+"/km"),
        el("div",{class:"muted",style:{fontSize:"12px"}},"Allure cible")
      )
    )

  const horairesCard = el("div",{style:{marginBottom:"16px"}},
    el("div",{class:"label"},"⏰ Horaires"),
    el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"10px",padding:"14px",display:"flex",flexDirection:"column",gap:"10px"}},
      el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
        el("span",{class:"muted",style:{fontSize:"15px"}},"Retrait dossards"),
        (()=>{
          const inp = document.createElement("input");
          inp.type = "time"; inp.id = "horaire-dossard-input";
          inp.style.cssText = "width:110px;background:var(--border-soft);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:13px;text-align:right;box-sizing:border-box;";
          inp.value = raceHoraires.dossard || "";
          inp.addEventListener("change", (e)=>{ raceHoraires.dossard=e.target.value; save(clePourPlan("lk_race_horaires"),raceHoraires); });
          return inp;
        })()
      ),
      el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
        el("span",{class:"muted",style:{fontSize:"15px"}},"Départ course"),
        (()=>{
          const inp = document.createElement("input");
          inp.type = "time"; inp.id = "horaire-depart-input";
          inp.style.cssText = "width:110px;background:var(--border-soft);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:13px;text-align:right;box-sizing:border-box;";
          inp.value = raceHoraires.depart || "";
          inp.addEventListener("change", (e)=>{ raceHoraires.depart=e.target.value; save(clePourPlan("lk_race_horaires"),raceHoraires); });
          return inp;
        })()
      )
    )
  );

  const CHECKLIST = [
    {key:"dossard",label:"Dossard"},
    {key:"pps",label:"PPS / Licence FFA"},
    {key:"chaussures",label:"Chaussures de course"},
    {key:"montre",label:"Montre GPS rechargée"},
    {key:"tenue",label:"Tenue de course"},
    {key:"ravitaillement",label:"Ravitaillement (eau, gel)"},

  const checklistCard = el("div",{style:{marginBottom:"16px"}},
    el("div",{class:"label"},"🎽 Checklist équipement"),
    el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"10px",padding:"14px",display:"flex",flexDirection:"column",gap:"10px"}},

          el("span",{style:{color:checked?"var(--text2)":"var(--text)",fontSize:"15px",textDecoration:checked?"line-through":"none"}},item.label)
        );
        row.addEventListener("click",()=>{
          checklistItems[item.key]=!checked;
          save(clePourPlan("lk_checklist"),checklistItems);
          render();
        });
        return row;
      })

  );

  // strategieCard (codée en dur, jamais mise à jour selon le vrai objectif
  // de Laurent) retirée le 11 juillet 2026 — n'était en fait plus utilisée
  // dans l'assemblage final depuis un moment (vrai code mort), remplacée
  // depuis par splitsCard ci-dessous, calculée dynamiquement.

  const parcoursCard = el("div",{style:{marginBottom:"16px"}},
    el("div",{class:"label"},"🗺️ Parcours"),
    card(
      (()=>{

  // ── Météo prévue le jour de la course ───────────────────────────────────
  let meteoRaceEl = null;
  // Fetch météo si on est à moins de 16 jours (Open-Meteo limite à 16 jours)
  const daysToRace = Math.max(0, parseInt(countdown())||0);
  if (daysToRace <= 16) {
    // La météo sera fetchée et affichée

      el("div",{class:"label"},"🌡️ Météo prévue le "+fmtDate(DATE_COURSE_REFERENCE)),
      el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"10px",padding:"14px",textAlign:"center"}},
        el("div",{class:"muted",style:{fontSize:"14px",fontStyle:"italic"}},"Disponible à partir du "+fmtDate(new Date(new Date(DATE_COURSE_REFERENCE+"T00:00:00").getTime()-16*86400000).toISOString().slice(0,10))+" · J–"+daysToRace+" actuellement")

  // ── Allures de passage aux km clés ───────────────────────────────────────
  // Segments par distance — même logique/mêmes décalages de pace que
  // genererContenuRace() dans plan-generator.js (section 2.7 du doc de
  // convergence). calculerStrategieCourse() est définie plus haut comme
  // fonction globale (cf. section "STRATÉGIE DE COURSE (partagée)") pour
  // être réutilisée à la fois ici et dans la carte de séance de la vue
  // Semaine — bug corrigé le 19/07/2026 : les deux endroits affichaient
  // des stratégies différentes (segments/allures) car la vue Semaine avait
  // sa propre version simplifiée à 2 segments, non calibrée, divergente de
  // celle-ci.
  const distanceKmCourse = DISTANCE_M_REFERENCE / 1000;
  const splits = calculerStrategieCourse(distanceKmCourse, raceGoalTime);

  // Calculer les temps de passage cumulés
  const passageTimes = [];
  let cumul = 0;
  splits.forEach(s => {
    const dist = s.to - s.from;
    cumul += dist * s.pace;
    passageTimes.push(Math.round(cumul));
  });

  const splitsCard = el("div",{style:{marginBottom:"16px"}},
    el("div",{class:"label"},"🏃 Allures de passage"),
    el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"10px",overflow:"hidden"}},

        el("span",{class:"muted",style:{fontSize:"12px",fontWeight:"700"}},"STRATÉGIE"),
        el("span",{class:"muted",style:{fontSize:"12px",fontWeight:"700",textAlign:"right"}},"ALLURE"),
        el("span",{class:"muted",style:{fontSize:"12px",fontWeight:"700",textAlign:"right"}},"PASSAGE")
      ),
      ...splits.map((s,i)=>{
        const paceStr = Math.floor(s.pace/60)+":"+(Math.round(s.pace%60)).toString().padStart(2,"0")+"/km";
        const passageStr = fmtTime(passageTimes[i]) || "--";
        const segLabel = s.from+"→"+s.to+" km";
        const posRelative = i / (splits.length - 1 || 1); // 0 = premier segment, 1 = dernier
        const color = posRelative < 0.4 ? "var(--accent)" : posRelative < 0.7 ? "var(--accent)" : "var(--accent2)";
        return el("div",{style:{display:"grid",gridTemplateColumns:"60px 1fr 70px 70px",gap:"0",padding:"10px 12px",borderBottom:i<splits.length-1?"1px solid var(--border)":"none",alignItems:"center"}},
          el("span",{style:{color,fontSize:"13px",fontWeight:"700"}},segLabel),
          el("span",{class:"muted",style:{fontSize:"13px"}},s.note),
          el("span",{style:{color:"var(--text)",fontSize:"14px",fontWeight:"600",textAlign:"right"}},paceStr),
          el("span",{style:{color,fontSize:"14px",fontWeight:"700",textAlign:"right"}},passageStr)
        );
      })
    )
  );

  // ── Résumé de préparation ─────────────────────────────────────────────────
  const pred = currentPred || predict10K();
  const pastSess = ALL_SESSIONS.filter(s=>s.type!=="REPOS"&&s.type!=="RACE"&&s.date<=today());
  const totalDone = pastSess.filter(s=>statuses[s.uid]==="✅").length;
  const totalAdapted = pastSess.filter(s=>statuses[s.uid]==="⚠️").length;
  const totalMissed = pastSess.filter(s=>statuses[s.uid]==="❌").length;
  const totalSess = pastSess.length;
  const totalKmRace = Math.round(activitesDuPlan().reduce((s,a)=>s+a.distance,0)/100)/10;
  const completionRate = totalSess > 0 ? Math.round((totalDone+totalAdapted)/totalSess*100) : 0;
  const verdictRaceColor = completionRate >= 80 ? "var(--accent2)" : completionRate >= 60 ? "var(--warn)" : "var(--warn)";

  const prepCard = el("div",{style:{marginBottom:"12px"}},
    el("div",{class:"label"},"📋 Résumé de préparation"),
    el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"10px",padding:"14px"}},
      el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"12px"}},
        el("div",{style:{background:"var(--border-soft)",borderRadius:"8px",padding:"10px",textAlign:"center"}},
          el("div",{style:{color:"var(--accent2)",fontSize:"20px",fontWeight:"800"}},totalDone+""),
          el("div",{class:"muted",style:{fontSize:"12px"}},"✅ validées")
        ),
        el("div",{style:{background:"var(--border-soft)",borderRadius:"8px",padding:"10px",textAlign:"center"}},
          el("div",{style:{color:"var(--text)",fontSize:"20px",fontWeight:"800"}},totalKmRace+" km"),
          el("div",{class:"muted",style:{fontSize:"12px"}},"courus")
        ),
        el("div",{style:{background:"var(--border-soft)",borderRadius:"8px",padding:"10px",textAlign:"center"}},
          el("div",{style:{color:pred.time?verdictRaceColor:"var(--text-muted)",fontSize:"20px",fontWeight:"800"}},pred.time?fmtTime(pred.time):"—"),
          el("div",{class:"muted",style:{fontSize:"12px"}},"estimation")
        )
      ),
      el("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"8px 10px",background:verdictRaceColor+"11",border:"1px solid "+verdictRaceColor+"33",borderRadius:"8px"}},
        el("span",{style:{fontSize:"16px"}},completionRate>=80?"🟢":completionRate>=60?"🟡":"🔴"),
        el("div",{},
          el("div",{style:{color:verdictRaceColor,fontSize:"14px",fontWeight:"700"}},completionRate+"% de complétion"),
          el("div",{class:"muted",style:{fontSize:"12px"}},(totalDone+totalAdapted)+" / "+totalSess+" séances réalisées · "+totalMissed+" ratée"+(totalMissed>1?"s":""))
        )
      )
    )
  );

  // ── Conseil Coach spécifique course ───────────────────────────────────────
  // Remplace le 11 juillet 2026 un texte codé en dur qui ne faisait que
  // reformuler mécaniquement les segments déjà affichés dans splitsCard
  // ci-dessus (aucune valeur ajoutée, signalé par Laurent) — vrai appel IA
  // maintenant, avec un contexte dédié (écart estimation/objectif, jours
  // restants) plutôt qu'une répétition des mêmes chiffres.
  // Déclenche le premier appel si aucun message n'a encore été chargé pour
  // ce plan (pas de vraie clé de date, contrairement à coachMsg — le
  // contexte course change peu d'un jour à l'autre), OU si la stratégie
  // sous-jacente a changé depuis la dernière génération (bug corrigé le
  // 19/07/2026, cf. commentaire sur coachRaceStratSig plus haut).
  const stratSigActuelle = splits.map(s=>s.from+"-"+s.to+":"+Math.round(s.pace)).join("|");
  if (!coachRaceMsg || coachRaceStratSig !== stratSigActuelle) {
    setTimeout(() => fetchCoachRaceMsg(splits.map(s=>s.note), stratSigActuelle), 2000);
  }

  const coachRaceEl = el("div",{style:{marginBottom:"12px"}},
    el("div",{class:"label"},"🤖 Conseil de Yoria pour la course"),
    el("div",{style:{background:"var(--border-soft)",borderRadius:"10px",padding:"14px",display:"flex",gap:"10px"}},
      el("span",{style:{fontSize:"20px",flexShrink:"0"}},"🤖"),
      el("div",{style:{color:"var(--text2)",fontSize:"14px",lineHeight:"1.6",flex:"1"}},
        coachRaceMsg || "Yoria réfléchit à un conseil pour ta course…"
      ),
      el("button",{style:{background:"none",border:"none",color:"var(--text-muted)",fontSize:"16px",cursor:"pointer",flexShrink:"0"},

      },"🔄")

  );

  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{marginTop:"8px"}}),
    infoCard, prepCard, meteoRaceEl, horairesCard, splitsCard, coachRaceEl, checklistCard, parcoursCard,
    (()=>{
      if (today() < DATE_COURSE_REFERENCE) return null;
      const existingResult = load(clePourPlan("lk_race_result"), null);
      const inp2 = document.createElement("input");
      inp2.type="time"; inp2.step="1";
      inp2.style.cssText="flex:1;background:var(--border-soft);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:16px;";
      if (existingResult) {
        const hh=Math.floor(existingResult/3600), mm=Math.floor((existingResult%3600)/60), ss3=existingResult%60;
        inp2.value=hh.toString().padStart(2,"0")+":"+mm.toString().padStart(2,"0")+":"+ss3.toString().padStart(2,"0");
      }
      const btn2=document.createElement("button");
      btn2.textContent=existingResult?"Modifier":"Enregistrer";
      btn2.style.cssText="background:var(--accent);border:none;border-radius:8px;padding:8px 16px;color:#F8FAFC;font-size:14px;font-weight:700;cursor:pointer;";
      btn2.addEventListener("click",()=>{
        const parts=inp2.value.split(":");
        if(parts.length>=2){const secs=parseInt(parts[0])*3600+parseInt(parts[1])*60+(parseInt(parts[2])||0);if(!isNaN(secs)&&secs>0){save(clePourPlan("lk_race_result"),secs);render();}}
      });
      const row2=document.createElement("div"); row2.style.cssText="display:flex;gap:8px;margin-top:8px;";
      row2.appendChild(inp2); row2.appendChild(btn2);
      const card2=el("div",{style:{marginBottom:"16px"}},
        el("div",{class:"label"},"Mon resultat officiel"),
        el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"10px",padding:"14px"}},
          el("div",{style:{color:"var(--text-muted)",fontSize:"13px"}},existingResult?"Resultat : "+fmtTime(existingResult):"Saisis ton temps apres la course")
        )
      );
      card2.querySelector("div:last-child").appendChild(row2);
      return card2;
    })()
  );
}

// PARAMÈTRES
