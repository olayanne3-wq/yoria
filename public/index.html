// ══════════════════════════════════════════════════════════════════════════════
// GESTION DES SEANCES (suppression + deplacement)
// ══════════════════════════════════════════════════════════════════════════════

// Obtenir la session effective sur un slot (apres swap)
function getEffectiveSession(week, slotIdx) {
  const uid = week.week+"-"+slotIdx;
  if (swappedSessions[uid]) {
    const swapUid = swappedSessions[uid];
    const swapParts = swapUid.split("-");
    const swapWeekNum = parseInt(swapParts[0]);
    const swapIdx = parseInt(swapParts[1]);
    const swapWeek = PLAN.find(w=>w.week===swapWeekNum);
    if (swapWeek && swapWeek.sessions[swapIdx]) return swapWeek.sessions[swapIdx];
  }
  return week.sessions[slotIdx] || null;
}

// Jours disponibles pour deplacement (REPOS non swappés, ou slots masqués)
function getAvailableSlots(week, excludeIdx) {
  const slots = week.sessions.map((s,i) => {
    const uid = week.week+"-"+i;
    if (i === excludeIdx) return null;
    const effective = getEffectiveSession(week, i);
    if (!effective) return null;
    if (effective.type === "REPOS") return {idx:i, uid, date:s.date, label:"Repos"};
    if (hiddenSessions[uid]) return {idx:i, uid, date:s.date, label:effective.type+" (masquee)"};
    return null;
  }).filter(Boolean);
return slots;
}

function showSessionMenu(week, slotIdx) {
  document.querySelectorAll(".sess-overlay").forEach(m=>m.remove());
  const uid = week.week+"-"+slotIdx;
  const isHidden = !!hiddenSessions[uid];
  const sess = getEffectiveSession(week, slotIdx);

  const overlay = document.createElement("div");
  overlay.className = "sess-overlay";
  overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:flex-end;justify-content:center;";

  const panel = document.createElement("div");
  panel.style.cssText = "background:var(--bg);border-radius:16px 16px 0 0;padding:20px 16px 36px;width:100%;max-width:430px;";

  const t1 = document.createElement("div");
  t1.style.cssText = "color:var(--text);font-size:15px;font-weight:700;margin-bottom:2px;";
  t1.textContent = sess.type+" - "+sess.session.slice(0,40);
  const t2 = document.createElement("div");
  t2.style.cssText = "color:var(--text-muted);font-size:13px;margin-bottom:16px;";
  t2.textContent = week.sessions[slotIdx].date;
  panel.appendChild(t1); panel.appendChild(t2);

  const btnStyle = "width:100%;padding:13px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;text-align:left;display:block;";

  if (!isHidden) {
    // Si ce slot est swappé, proposer d'annuler le swap
    const isSwapped = !!swappedSessions[uid];
    if (isSwapped) {
      const undoBtn = document.createElement("button");
      undoBtn.style.cssText = btnStyle+"background:rgba(var(--warn-rgb),0.13);color:var(--warn);";
      undoBtn.textContent = "Annuler le deplacement";
      undoBtn.addEventListener("click", () => {
        const swapUid = swappedSessions[uid];
        delete swappedSessions[uid];
        delete swappedSessions[swapUid];
        save(clePourPlan("lk_swapped_sessions"), swappedSessions);
        overlay.remove();
        render();
      });
      panel.appendChild(undoBtn);
    }

    const isDone = ["✅","⚠️","❌"].includes(statuses[uid]);
    if (!isDone) {
      const moveBtn = document.createElement("button");
      moveBtn.style.cssText = btnStyle+"background:rgba(var(--accent-rgb),0.13);color:var(--accent);";
      moveBtn.textContent = "Deplacer cette seance";
      moveBtn.addEventListener("click", () => { overlay.remove(); showMoveMenu(week, slotIdx); });
      panel.appendChild(moveBtn);
    }

    if (!isDone) {
      const hideBtn = document.createElement("button");
      hideBtn.style.cssText = btnStyle+"background:rgba(var(--warn-rgb),0.13);color:var(--warn);";
      hideBtn.textContent = "Supprimer cette seance";
      hideBtn.addEventListener("click", () => {
        hiddenSessions[uid] = true;
        save(clePourPlan("lk_hidden_sessions"), hiddenSessions);
        overlay.remove();
        render();
      });
      panel.appendChild(hideBtn);
    }
  } else {
    const restoreBtn = document.createElement("button");
    restoreBtn.style.cssText = btnStyle+"background:rgba(var(--accent2-rgb),0.13);color:var(--accent2);";
    restoreBtn.textContent = "Restaurer cette seance";
    restoreBtn.addEventListener("click", () => {
      overlay.remove();
      // Verifier si le jour original est libre
      const conflict = !hiddenSessions[uid] && getEffectiveSession(week, slotIdx).type !== "REPOS";
      if (!conflict) {
        delete hiddenSessions[uid];
        save(clePourPlan("lk_hidden_sessions"), hiddenSessions);
        render();
      } else {
        showRestoreMenu(week, slotIdx);
      }
    });
    panel.appendChild(restoreBtn);
  }

  const cancelBtn = document.createElement("button");
  cancelBtn.style.cssText = btnStyle+"background:var(--border-soft);color:var(--text-muted);";
  cancelBtn.textContent = "Annuler";
  cancelBtn.addEventListener("click", () => overlay.remove());
  panel.appendChild(cancelBtn);

  overlay.appendChild(panel);
  overlay.addEventListener("click", e => { if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function showMoveMenu(week, slotIdx) {
  const slots = getAvailableSlots(week, slotIdx);
  if (!slots.length) { alert("Aucun jour disponible cette semaine. Slots vides pour idx="+slotIdx); return; }

  document.querySelectorAll(".sess-overlay").forEach(m=>m.remove());
  const overlay = document.createElement("div");
  overlay.className = "sess-overlay";
  overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:flex-end;justify-content:center;";

  const panel = document.createElement("div");
  panel.style.cssText = "background:var(--bg);border-radius:16px 16px 0 0;padding:20px 16px 36px;width:100%;max-width:430px;";

  const t1 = document.createElement("div");
  t1.style.cssText = "color:var(--text);font-size:15px;font-weight:700;margin-bottom:16px;";
  t1.textContent = "Deplacer vers...";
  panel.appendChild(t1);

  const btnStyle = "width:100%;padding:13px;border-radius:10px;border:1px solid var(--border);background:var(--border-soft);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;text-align:left;display:block;";

  slots.forEach(slot => {
    const btn = document.createElement("button");
    btn.style.cssText = btnStyle;
    const dayLabel = new Date(slot.date+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
    btn.textContent = dayLabel+" ("+slot.label+")";
    btn.addEventListener("click", () => {
      const uidA = week.week+"-"+slotIdx;
      const uidB = slot.uid;
      // Si uidA etait deja swappé avec uidB → annuler (retour a l'original)
      const wasAlreadySwapped = swappedSessions[uidA] === uidB;
      // Annuler tous les swaps impliquant ces deux slots
      Object.keys(swappedSessions).forEach(k => {
        if (swappedSessions[k]===uidA || k===uidA ||
            swappedSessions[k]===uidB || k===uidB) {
          delete swappedSessions[k];
        }
      });
      // Si ce n'est pas un retour a l'original, créer le nouveau swap
      if (!wasAlreadySwapped) {
        swappedSessions[uidA] = uidB;
        swappedSessions[uidB] = uidA;
      }
      save(clePourPlan("lk_swapped_sessions"), swappedSessions);
      overlay.remove();
      render();
    });
    panel.appendChild(btn);
  });

  const cancelBtn = document.createElement("button");
  cancelBtn.style.cssText = "width:100%;padding:13px;border-radius:10px;border:none;background:rgba(var(--warn-rgb),0.13);color:var(--warn);font-size:14px;font-weight:700;cursor:pointer;display:block;";
  cancelBtn.textContent = "Annuler";
  cancelBtn.addEventListener("click", () => overlay.remove());
  panel.appendChild(cancelBtn);

  overlay.appendChild(panel);
  overlay.addEventListener("click", e => { if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function fmtTimeShort(secs) {
  // Même correction que fmtTime (cf. commentaire associé) — format
  // heures/minutes/secondes au-delà de 60 minutes.
  const totalMin = Math.floor(secs/60), s2 = secs%60;
  if (totalMin >= 60) {
    const h = Math.floor(totalMin / 60), m = totalMin % 60;
    return h+"h"+m.toString().padStart(2,"0")+"min"+s2.toString().padStart(2,"0")+"s";
  }
  return totalMin+"min"+s2.toString().padStart(2,"0")+"s";
}

  window.parserTempsRecordEnHMS = function(str) {
    // "50:21" -> {h:0,m:50,s:21} ; "3:45:00" -> {h:3,m:45,s:0}
    if (!str) return { h: null, m: null, s: null };
    const parts = str.split(':').map(Number);
    if (parts.length === 2) return { h: null, m: parts[0] || null, s: parts[1] ?? null };
    if (parts.length === 3) return { h: parts[0] || null, m: parts[1] ?? null, s: parts[2] ?? null };
    return { h: null, m: null, s: null };
  };
  window.formaterHMSEnTempsRecord = function(h, m, s) {
    // Repli sur 0 uniquement pour min/sec si l'un des deux est renseigné

    // retourne null plutôt qu'un "0:00" trompeur.
    const hNum = parseInt(h) || 0;

    if (!h && !m && !s) return null;
    const mm = String(mNum).padStart(2, '0');

function compressActivities(activities) {
  return activities.filter(a => a.type === "Run").map(a => {
    const effortLaps = (() => {
      if (!a.laps?.length) return undefined;
      const speeds = a.laps.map(l => l.average_speed).sort((x,y) => x-y);
      const p70 = speeds[Math.floor(speeds.length * 0.70)];
      return a.laps.filter(l => l.average_speed >= p70 && l.average_speed > 0 && (1000/l.average_speed) < 360)
        .map(l => ({ average_speed: l.average_speed, distance: l.distance, average_heartrate: l.average_heartrate }));
    })();
    return {
      id_str: a.id_str,
      type: a.type,
      start_date_local: a.start_date_local,
      distance: a.distance,
      moving_time: a.moving_time,
      average_speed: a.average_speed,
      average_heartrate: a.average_heartrate,
      max_heartrate: a.max_heartrate,
      start_latlng: a.start_latlng,
      laps: effortLaps,
    };
  });
}

async function ensureFreshToken() {
  if (!stravaToken) return false;
  if (Date.now()/1000 < stravaExpires-60) return true;
  try {
    const resp = await fetch("/api/strava/refresh",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({refresh_token:stravaRefresh})});
    const data = await resp.json();
    stravaToken=data.access_token; stravaRefresh=data.refresh_token; stravaExpires=data.expires_at;
    save("lk_strava_token",stravaToken); save("lk_strava_refresh",stravaRefresh); save("lk_strava_expires",stravaExpires);
    return true;
  } catch { return false; }
}

// Import FIT (v2.15, 18/07/2026) — première étape du chantier "sources de
// données supplémentaires" (Garmin/Coros/import FIT-GPX, cf. inventaire).
// Décision actée : viser .fit plutôt que .gpx pur, car .fit contient
// nativement des laps (Activity > Session > Lap > Record) — exactement ce
// dont dépend déjà getLapsAffichage()/getEffortLaps() pour décomposer une
// séance qualité (échauffement/effort/récup/retour au calme). Un GPX pur
// n'a aucune notion de lap ; sans elle, la décomposition de séance qualité
// serait perdue ou reposerait sur une heuristique fragile déjà écartée une
// fois pour Strava (cf. commentaire historique au-dessus de getLapsAffichage,
// tentative n°2 "filtrer par durée" abandonnée).
//
// Librairie : fit-file-parser (npm, maintenue, parse un .fit directement
// côté navigateur). PAS de build UMD/global (vérifié contre le package.json
// publié sur registry.npmjs.org : "type":"module", exports { import, require }
// uniquement, aucun champ browser/unpkg/jsdelivr) — contrairement à ce
// qu'affichent certains exemples GitHub d'anciennes versions/forks, qui
// supposaient un global window.FitParser inexistant sur les versions
// actuelles. Chargée via import() dynamique depuis jsDelivr (qui sait
// servir n'importe quel fichier ESM d'un package npm), au moment du
// premier import — pas de <script src> statique dans le <head>, pour ne
// pas payer ce coût réseau sur des pages qui n'utilisent jamais l'import
// FIT. Mise en cache dans _fitParserModule après le premier chargement.
let _fitParserModule = null;
async function chargerFitParser() {
  if (_fitParserModule) return _fitParserModule;
  const mod = await import("https://cdn.jsdelivr.net/npm/fit-file-parser@3.0.2/dist/fit-parser.js");
  _fitParserModule = mod.default || mod.FitParser || mod;
  return _fitParserModule;
}

// Principe central : NE PAS dupliquer la logique d'analyse. Cette fonction
// traduit uniquement le format de sortie de fit-file-parser vers le même
// schéma qu'un objet `activity` Strava (type, sport_type, start_date_local,
// average_speed, average_heartrate, distance, moving_time, laps[]) — une
// fois adapté, l'activité importée traverse EXACTEMENT le même chemin que
// Strava : getLapsAffichage(), detecterTypeEffort(), autoValidate(),
// matchActivitiesToPlan(), le Module 2 (SessionAnalyzer). Zéro nouvelle
// branche d'analyse à maintenir.
//
// Champs FIT natifs utilisés (noms du protocole FIT, différents des noms
// Strava) : avg_speed (m/s), avg_heart_rate (bpm), total_distance (m),
// total_elapsed_time (s), start_time. À VÉRIFIER au premier test réel avec
// un fichier .fit exporté d'une vraie montre — le nommage exact peut varier
// légèrement selon le firmware/fabricant (Garmin/Coros/Polar/Suunto). Le
// point d'ajustement, si besoin, est cette seule fonction — rien en aval à
// toucher.
// Recalcule une vitesse moyenne fiable à partir de distance/temps, plutôt
// que de faire confiance au champ avg_speed natif du fichier FIT — audit du
// 18/07/2026 sur un vrai export Amazfit/Zepp : avg_speed rapporté = 2.0 m/s
// (8'20/km) alors que total_distance/total_elapsed_time donnent 2.667 m/s
// (6'15/km, cohérent avec la somme des 8 laps réels de la séance). Écart
// significatif et trompeur — avg_speed semble inclure des phases d'arrêt/
// pause dans son calcul sur ce fabricant, contrairement à distance/temps qui
// restent cohérents entre eux. Appliqué à la fois au niveau activité et à
// chaque lap, par prudence (même fabricant, même défaut probable partout).
function vitesseFiable(distance, tempsSec, avgSpeedFit) {
  if (tempsSec > 0 && distance > 0) return distance / tempsSec;
  return avgSpeedFit ?? 0; // repli si distance/temps manquants (ne devrait pas arriver)
}

function adapterFitVersFormatActivite(fitParseResult) {
  const session = fitParseResult?.activity?.sessions?.[0] || fitParseResult?.sessions?.[0];
  if (!session) return null;

  const lapsFit = session.laps || [];
  const laps = lapsFit.map((lapFit, i) => {
    const distance = lapFit.total_distance ?? 0;
    const moving_time = lapFit.total_elapsed_time ?? lapFit.total_timer_time ?? 0;
    return {
      id: "fit-lap-" + i,
      lap_index: i,
      average_speed: vitesseFiable(distance, moving_time, lapFit.avg_speed),
      average_heartrate: lapFit.avg_heart_rate ?? null,
      distance,
      moving_time,
    };
  });

  const startTime = session.start_time instanceof Date
    ? session.start_time
    : new Date(session.start_time);

  const distanceTotale = session.total_distance ?? 0;
  const tempsTotal = session.total_elapsed_time ?? session.total_timer_time ?? 0;

  return {
    id: "fit-" + startTime.getTime(),
    type: "Run",
    sport_type: "Run",
    // toISOString() donne un suffixe "Z" (UTC) — start_date_local de Strava
    // n'en a pas (heure déjà locale, pas de conversion de fuseau à faire
    // nulle part dans le code existant, cf. usages de .slice(0,10)/(0,19)).
    // On retire le suffixe pour rester au même format exact que Strava.
    start_date_local: startTime.toISOString().replace('Z', ''),
    average_speed: vitesseFiable(distanceTotale, tempsTotal, session.avg_speed),
    average_heartrate: session.avg_heart_rate ?? null,
    distance: distanceTotale,
    moving_time: tempsTotal,
    laps,
    _source: "fit", // marqueur interne, pour distinguer d'une activité Strava si besoin plus tard (ex. badge d'origine dans l'UI)
  };
}

// Lit et parse un fichier .fit choisi par l'utilisateur (input file), puis
// l'adapte et l'ajoute à stravaActivities — même tableau que Strava,
// volontairement partagé plutôt que dupliqué (matchActivitiesToPlan(),
// predict10K(), le Module 2, etc. lisent tous ce même tableau ; le
// dupliquer forcerait à répéter cette lecture partout). Une activité déjà
// présente à la même date (import répété du même fichier, ou Strava a
// entretemps synchronisé la même séance) est remplacée, pas dupliquée.
async function importerFichierFit(file) {
  syncing = true; syncMsg = "Lecture du fichier .fit..."; render();
  try {
    const FitParser = await chargerFitParser();
    const buffer = await file.arrayBuffer();
    const fitParser = new FitParser({ force: true, speedUnit: "m/s", lengthUnit: "m", mode: "cascade" });
    const fitData = await new Promise((resolve, reject) => {
      fitParser.parse(buffer, (error, data) => error ? reject(error) : resolve(data));
    });
    const activite = adapterFitVersFormatActivite(fitData);
    if (!activite) {
      syncMsg = "❌ Fichier .fit illisible ou vide.";
      syncing = false; render();
      return;
    }
    const dateActivite = activite.start_date_local.slice(0, 10);
    stravaActivities = stravaActivities.filter(a => a.start_date_local?.slice(0,10) !== dateActivite || a._source !== "fit");
    stravaActivities.push(activite);
    window.stravaActivities = stravaActivities;
    save("lk_strava_activities", stravaActivities);
    matchActivitiesToPlan(stravaActivities);
    syncMsg = "✅ Séance du " + dateActivite + " importée.";
  } catch (e) {
    syncMsg = "❌ Erreur de lecture : " + e.message;
  } finally {
    syncing = false; render();
  }
}

async function syncStrava(force = false) {
  // Plan Forme clôturé (13 juillet 2026) : intégralement figé, y compris
  // plus aucune synchro Strava — cohérent avec sauvegarderPlan() côté
  // gist-sync.js, qui rejette toute écriture sur un plan Forme clôturé.
  // Bloqué ici en amont plutôt que de laisser l'appel réseau se faire pour
  // rien avant d'échouer à la sauvegarde.
  if (window.__PLAN_BRUT__?.mode === 'forme' && window.__PLAN_BRUT__?.dateCloture) {
    syncMsg = "Plan clôturé — synchronisation Strava désactivée.";
    render();
    return;
  }
  // Garde-fou source de données (18/07/2026, v2.15) : les synchros
  // automatiques (auto-synchro périodique, relance après annulation d'une
  // saisie manuelle) ne doivent se déclencher que si Strava est la source
  // choisie dans Réglages — prépare l'arrivée d'autres sources (Garmin/
  // Coros, import GPX) sans qu'elles se fassent silencieusement écraser par
  // une synchro Strava qui tournerait quand même en arrière-plan.
  // `force` (reconnexion OAuth juste effectuée, bouton "Synchroniser avec
  // Strava" cliqué explicitement en Réglages) contourne volontairement ce
  // garde-fou : un geste explicite de l'utilisateur doit toujours aboutir,
  // même si sa préférence par défaut est une autre source.
  if (!force && dataSource !== "strava") {
    return;
  }
  syncing=true; syncMsg="Connexion à Strava..."; stravaAuthInvalide=false; render();
  const ok = await ensureFreshToken();
  if (!ok) { syncing=false; syncMsg="Erreur de token"; render(); return; }
  try {
    syncMsg="Récupération des activités..."; render();
    const intervalDates = [...INTERVAL_SESSION_DATES].join(",");
    // L'ACWR (section Stats, 13 juillet 2026) a besoin d'au moins 28 jours
    // d'historique, idéalement 8 semaines pour le graphique — on ne peut pas
    // se limiter à la date de début du plan actuel (un plan qui vient de
    // démarrer aurait alors trop peu de recul pour calculer une charge
    // chronique complète). On demande donc le plus ancien entre le début du
    // plan et 8 semaines en arrière.
    const huitSemainesAvant = new Date();
    huitSemainesAvant.setDate(huitSemainesAvant.getDate() - 8 * 7);
    const huitSemainesStr = huitSemainesAvant.toISOString().slice(0, 10);
    const planStart = PLAN[0].sessions[0].date < huitSemainesStr ? PLAN[0].sessions[0].date : huitSemainesStr;
    const resp = await fetch(`/api/strava/activities?token=${stravaToken}&interval_dates=${intervalDates}&plan_start=${planStart}`);
    const activities = await resp.json();
    if (Array.isArray(activities)) {
      const runs = activities.filter(a => a.type === "Run" || a.sport_type === "Run");
      stravaActivities=runs; window.stravaActivities=runs; save("lk_strava_activities",runs);
      matchActivitiesToPlan(activities);
      lastSyncTime = Date.now();

      save("lk_last_sync", lastSyncTime);
      syncMsg=`✅ ${activities.length} activité${activities.length>1?"s":""} synchronisée${activities.length>1?"s":""}`;
      // Regénérer le coach après synchro si séance terminée aujourd'hui
      const todaySynced = ALL_SESSIONS.find(s=>s.date===today()&&s.type!=="REPOS");
      if (todaySynced && statuses[todaySynced.uid]) {
        coachMsg = null; coachDate = "";
        setTimeout(fetchCoachMsg, 1500);
      }
    } else {
      // 16 juillet 2026 : distinguer le cas "token invalide côté Strava"
      // (errors[].field === "access_token", cf. inventaire §18.2) du reste
      // — ensureFreshToken() ne vérifie que l'expiration locale, jamais la
      // validité réelle côté Strava, donc ce cas passe le contrôle plus
      // haut sans être détecté avant l'appel réseau.
      const invalidToken = activities?.errors?.some(e => e.field === "access_token" && e.code === "invalid");
      if (invalidToken) {
        stravaAuthInvalide = true;
        syncMsg = "❌ Connexion Strava expirée — reconnecte-toi pour continuer la synchro.";
      } else {
        syncMsg="❌ Erreur Strava";
      }
    }
  } catch(e) {
    syncMsg="❌ Erreur réseau — activités précédentes conservées";
    // On ne vide pas stravaActivities — on conserve le cache
  }
  syncing=false; render();
  // Le message reste affiché tant qu'une reconnexion est nécessaire — sinon
  // le bouton "Reconnecter Strava" disparaîtrait avant que l'utilisateur
  // ait pu cliquer dessus (comportement d'auto-effacement à 3s inchangé
  // pour tous les autres cas, succès comme erreurs ordinaires).
  if (!stravaAuthInvalide) {
    setTimeout(()=>{ syncMsg=""; render(); },3000);
  }
}

function parseTargetMinutes(session) {
  const m = session.match(/(\d+)(?:–|-)(\d+)\s*min|^(\d+)\s*min/);
  if (!m) return null;
  return m[3] ? parseInt(m[3]) : (parseInt(m[1]) + parseInt(m[2])) / 2;
}

function parseTargetReps(session) {
  const m = session.match(/^(\d+)×/);
  return m ? parseInt(m[1]) : null;
}

function autoValidate(session, stravaRun) {
  if (!stravaRun) return null;
  const type = session.type;
  const effortLaps = getLapsAffichage(stravaRun, session.structureIntervalles);
  const target = SESSION_TARGETS[type];

  if (type === "EF" || type === "LONGUE") {
    const targetMin = parseTargetMinutes(session.session);
    if (!targetMin) return "✅";
    const actualMin = stravaRun.moving_time / 60;
    const ratio = actualMin / targetMin;
    const actualPace = stravaRun.average_speed > 0 ? 1000 / stravaRun.average_speed : 999;
    const inPace = actualPace >= 340 && actualPace <= 420;
    if (ratio >= 0.90 && inPace) return "✅";
    if (ratio >= 0.70) return "⚠️";
    return "❌";
  }

  if (!target) return "✅";

  if (effortLaps.length === 0) {
    if (type === "SEUIL") {
      const pace = stravaRun.average_speed > 0 ? 1000/stravaRun.average_speed : 999;
      if (pace <= target.okPace) return "✅";
      if (pace <= target.warnPace) return "⚠️";
      return "❌";
    }
    return stravaRun.moving_time > 1200 ? "⚠️" : "❌";
  }

  const avgPace = effortLaps.reduce((s,l)=>s+1000/l.average_speed,0)/effortLaps.length;
  const targetReps = parseTargetReps(session.session);
  const repRatio = targetReps && target.repOk ? effortLaps.length / targetReps : 1;

  if (avgPace <= target.okPace && repRatio >= (target.repOk||0)) return "✅";
  if (avgPace <= target.warnPace && repRatio >= (target.repWarn||0)) return "⚠️";
  return "❌";
}

function validateReason(session, stravaRun) {
  if (!stravaRun) return null;
  const type = session.type;
  const status = statuses[session.uid];
  if (status !== "❌" && status !== "⚠️") return null;
  const effortLaps = getLapsAffichage(stravaRun, session.structureIntervalles);
  const target = SESSION_TARGETS[type];

  if (type === "EF" || type === "LONGUE") {
    const targetMin = parseTargetMinutes(session.session);
    if (!targetMin) return null;
    const actualMin = Math.round(stravaRun.moving_time / 60);
    const ratio = actualMin / targetMin;
    if (ratio < 0.90) return `Durée ${actualMin}' / ${Math.round(targetMin)}' prévues (${Math.round(ratio*100)}%)`;
    const actualPace = stravaRun.average_speed > 0 ? 1000 / stravaRun.average_speed : 999;
    if (actualPace > 420) return `Allure trop lente : ${fmtPace(stravaRun.average_speed)}/km`;
    if (actualPace < 340) return `Allure trop rapide : ${fmtPace(stravaRun.average_speed)}/km`;
    return null;
  }

  if (!target) return null;

  if (effortLaps.length === 0) return "Pas de laps d\'effort détectés";

  const avgPace = Math.round(effortLaps.reduce((s,l)=>s+1000/l.average_speed,0)/effortLaps.length);
  const targetReps = parseTargetReps(session.session);
  const repRatio = targetReps ? effortLaps.length / targetReps : 1;

  const reasons = [];
  if (avgPace > target.okPace) {
    const paceStr = `${Math.floor(avgPace/60)}:${(avgPace%60).toString().padStart(2,"0")}`;
    const targetStr = `${Math.floor(target.okPace/60)}:${(target.okPace%60).toString().padStart(2,"0")}`;
    reasons.push(`Allure ${paceStr}/km — cible ≤${targetStr}/km`);
  }
  if (targetReps && target.repOk && repRatio < target.repOk) {
    reasons.push(`${effortLaps.length}/${targetReps} répétitions détectées`);
  }
  return reasons.length ? reasons.join(" · ") : null;
}

function matchActivitiesToPlan(activities) {
  // Ne compare qu'aux activités depuis le début du plan actuellement affiché
  // — même principe que le filtre déjà appliqué à predict10K()/
  // predict10KAtDate (docs/v2-methodologie/convergence-v1-v2.md, section
  // 7bis/7quater) : le cache stravaActivities est partagé entre tous les
  // plans (volontairement, pour éviter de re-synchroniser Strava à chaque
  // nouveau plan), donc sans ce filtre une activité liée à un plan
  // précédent peut se retrouver comparée à tort à une séance du plan
  // actuel qui tombe sur la même date calendaire.
  const dateDebutPlan = window.__PLAN_BRUT__?.dateDebut;
  const runs = activities.filter(a =>
    a.type==="Run" && (!dateDebutPlan || a.start_date_local?.slice(0,10) >= dateDebutPlan)
  );
  // Garde-fou ajouté le 11 juillet 2026 : Laurent signale des séances de
  // septembre (un plan futur) marquées ✅/⚠️/❌ à tort. Cause de fond
  // probable : plusieurs onglets ouverts simultanément sur des plans
  // différents, chacun avec sa propre variable ALL_SESSIONS en mémoire mais
  // un même localStorage/Gist partagé — une vraie race condition entre
  // onglets a pu faire écrire les statuts d'un plan sous la clé préfixée
  // d'un AUTRE plan (confirmé : le Gist lui-même contenait bien
  // "statuses": {} pour le nouveau plan, la contamination est purement
  // locale au navigateur). Peu importe la cause exacte, ce garde-fou est
  // une protection universelle et peu coûteuse : jamais de statut
  // automatique sur une séance dont la date est dans le futur, quel que
  // soit le plan affiché.
  const aujourdhui = today();
  let statutDuJourChange = false; // 18/07/2026 (demande de Laurent) : le coach doit se rafraîchir aussi sur un changement de statut AUTOMATIQUE (pas seulement un clic manuel, cf. gestionnaire de renderStatusRow), pour ne jamais garder un message "pas encore fait" après une synchro Strava qui valide la séance du jour toute seule.
  ALL_SESSIONS.forEach(s => {
    if (s.type==="REPOS"||s.type==="RACE") return;
    if (s.date > aujourdhui) return; // jamais de validation automatique sur une séance future
    const match = runs.find(r=>r.start_date_local?.slice(0,10)===s.date);
    if (match) {
      if (!statuses[s.uid] || statuses[s.uid]==="—") {
        const auto = autoValidate(s, match);
        if (auto) {
          statuses[s.uid] = auto;
          if (s.date === aujourdhui) statutDuJourChange = true;
        }
      }
    }
  });
  save(clePourPlan("lk_statuses"),statuses);
  if (statutDuJourChange) {
    coachMsg = null; coachDate = "";
    save(clePourPlan("lk_coach_msg"), null);
    save(clePourPlan("lk_coach_date"), "");
    fetchCoachMsg();
  }
}

// Auto-synchro Strava si token valide et dernière synchro > 1h
(function autoSync() {
  const ONE_HOUR = 60 * 60 * 1000;
  if (stravaToken && (Date.now() - lastSyncTime) > ONE_HOUR) {
    setTimeout(() => syncStrava(), 1500);
  }
})();

function card(...children) {
  return el("div",{style:{background:"var(--bg)",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"10px",padding:"14px"}},...children);
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k==="style" && typeof v==="object") Object.assign(e.style, v);
    else if (k==="class") e.className = v;
    else if (k==="onClick") e.addEventListener("click", attrs.feedback ? avecRetourTactile(v) : v);
    else if (k==="onChange") e.addEventListener("change", v);
    else if (k==="type") e.type = v;
    else if (k==="placeholder") e.placeholder = v;
    else if (k==="value") e.value = v;
    else if (k==="href") e.href = v;
    else if (k==="target") e.target = v;
    else if (k==="feedback") return; // consommé plus haut, pas un vrai attribut DOM
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c==null || c===false) return;
    e.appendChild(typeof c==="string" ? document.createTextNode(c) : c);
  });
  return e;
}

// Retour tactile/visuel au clic (demandé par Laurent le 8 juillet 2026) —
// pour les boutons d'action importants (statuts, sauvegarde, boutons de
// rattrapage) : une brève vibration (navigator.vibrate, non supportée sur
// iOS Safari mais l'appel échoue silencieusement dans ce cas, pas de risque
// à l'essayer) + un effet visuel (échelle réduite brièvement) avant
// d'exécuter le vrai handler. Opt-in via l'attribut feedback: true de el(),
// pas systématique sur tous les boutons (décision explicite de Laurent :
// seulement les actions importantes, pas toute l'app).
function avecRetourTactile(handler) {
  return function(e) {
    if (navigator.vibrate) { try { navigator.vibrate(50); } catch {} }
    const cible = e.currentTarget;
    if (cible?.style) {
      cible.style.transform = "scale(0.96)";
      cible.style.transition = "transform 0.1s ease";
      setTimeout(() => { cible.style.transform = ""; }, 120);
    }
    return handler(e);
  };
}

function svgCircle(pct, size, strokeW, color, inner) {
  const r = (size-strokeW*2)/2;
  const circ = 2*Math.PI*r;
  const offset = circ - (pct/100)*circ;
  const wrap = el("div",{style:{position:"relative",width:size+"px",height:size+"px",flexShrink:"0"}});
  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width",size); svg.setAttribute("height",size);
  svg.style.transform="rotate(-90deg)";
  const bg = document.createElementNS("http://www.w3.org/2000/svg","circle");
  bg.setAttribute("cx",size/2); bg.setAttribute("cy",size/2); bg.setAttribute("r",r);
  bg.setAttribute("fill","none"); bg.setAttribute("stroke","var(--border-soft)"); bg.setAttribute("stroke-width",strokeW);
  const fg = document.createElementNS("http://www.w3.org/2000/svg","circle");
  fg.setAttribute("cx",size/2); fg.setAttribute("cy",size/2); fg.setAttribute("r",r);
  fg.setAttribute("fill","none"); fg.setAttribute("stroke",color); fg.setAttribute("stroke-width",strokeW);
  fg.setAttribute("stroke-dasharray",circ); fg.setAttribute("stroke-dashoffset",offset);
  fg.setAttribute("stroke-linecap","round");
  svg.appendChild(bg); svg.appendChild(fg);
  wrap.appendChild(svg);
  if (inner) {
    const innerDiv = el("div",{style:{position:"absolute",inset:"0",display:"flex",alignItems:"center",justifyContent:"center"}});
    innerDiv.appendChild(inner);
    wrap.appendChild(innerDiv);
  }
  return wrap;
}

}

function setView(v) {
  view=v; render(); window.scrollTo(0,0);
  // Fetcher les météos historiques manquantes pour les séances avec Strava
  if (v==="weekDetail") {
    const week = PLAN.find(w=>w.week===selectedWeek);
    if (!week) return;
    const weekDates = week.sessions.map(s=>s.date);
    const weekRuns = stravaActivities.filter(a=>a.type==="Run"&&weekDates.includes(a.start_date_local?.slice(0,10)));
    weekRuns.forEach(async r => {
      const date = r.start_date_local?.slice(0,10);
      if (date && historicalWeatherCache[date]===undefined && r.start_latlng?.length===2) {
        historicalWeatherCache[date] = null; // marqué comme en cours
        const temp = await fetchHistoricalWeather(date, r.start_latlng[0], r.start_latlng[1]);
        if (temp !== null) {
          historicalWeatherCache[date] = temp;
          save("lk_weather_cache", historicalWeatherCache);
          render();
        }
      }
    });
  }
}

function render() {

  // Garde-fou global — aucun plan réel pour ce compte (estPlanRepli) :
  // toute vue qui afficherait le contenu du plan factice (semaines, stats,
  // course...) retombe sur le dashboard, qui affiche le vrai état "Aucun
  // plan en cours" (cf. renderDashboard). Paramètres reste toujours
  // accessible (ex. pour se déconnecter) même sans plan. Ajouté le
  // 15/07/2026 avec le correctif du plan de repli factice. Calculé tôt
  // (avant header/titre/nav) pour que tout l'affichage reste cohérent avec
  // la vue réellement rendue, pas seulement le contenu principal.
  const vueEffective = (window.__PLAN_BRUT__?.estPlanRepli && view !== "settings") ? "dashboard" : view;

    backBtn||"",

  );

  // Calculer predict10K une seule fois — synchronise dashboard et graphique

  let content;

  else if (vueEffective==="weeks") content=renderWeeks();

  else if (vueEffective==="help") content=renderHelp();

  const NAV=[
    {id:"dashboard",icon:"⚡",label:"Dashboard"},
    {id:"weeks",    icon:"📅",label:"Semaines"},
    {id:"stats",    icon:"📊",label:"Stats"},
    ...(ESTMODEFORME ? [] : [{id:"course",   icon:"🏁",label:"Course"}]),
    {id:"settings", icon:"⚙️",label:"Paramètres"},
  ];

    ...NAV.map(n=>{

          .some(s=>!statuses[s.uid]||statuses[s.uid]==="—");

      );

// ── Vérification des fonctions critiques ────────────────────────────────────
// Depuis l'encapsulation en IIFE async (section 7, sélection de plan), ces
// fonctions ne sont plus sur window mais dans la portée locale de l'IIFE —
// le check se fait donc directement par nom (eval prudent, seulement sur une
// liste fixe de noms connus, jamais une entrée utilisateur).
const CRITICAL_FNS = ['syncStrava','predict10K','getEffortLaps','getLapsAffichage','rebuildPredHistory','renderDashboard','renderWeeks','renderWeekDetail','el','badge'];
const missingFns = CRITICAL_FNS.filter(fn => {
  try { return typeof eval(fn) === 'undefined'; } catch { return true; }
});
if (missingFns.length > 0) {
  console.warn('⚠️ Fonctions manquantes:', missingFns.join(', '));
}

// render() n'est appelée qu'une fois auth ET préchargement Supabase
// terminés — les deux await (__PLAN_PRET__, __AUTH_PRET__) ont déjà eu
// lieu en tout début de cette IIFE (lignes ~143-144), avant même la
// déclaration de STRAVA_CLIENT_ID et de toutes les variables `let x =
// load(...)` qui suivent. Pas besoin de réattendre ici — on appelle
// simplement render() directement, les données sont déjà en place dans
// localStorage à ce stade. Chantier v2.5 migration, 13 juillet 2026,
// cf. inventaire §8bis.
render();

// Bloque le bandeau natif de Chrome proposant "Installer l'application"
// (17/07/2026, cf. inventaire — chantier UX identifié après un bug de
// double-icône chez Laurent). Ce bandeau crée un raccourci PWA distinct de
// la TWA installée depuis le Play Store, visuellement proche mais qui
// s'ouvre en mode navigateur (barre Partager/⋮) au lieu du plein écran —
// confusion constatée y compris en cliquant simplement sur le lien du Play
// Store, donc probable pour tout futur testeur, pas seulement Laurent.
// La TWA Play Store reste la seule voie d'installation prévue pour cette
// app — jamais de PWA Chrome installée en parallèle.
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
});

if ('serviceWorker' in navigator) {
  // Mécanisme de mise à jour forcée (demandé par Laurent le 8 juillet 2026)
  // — un ancien service worker (installé avant une mise à jour) peut rester
  // actif indéfiniment sur un appareil sans jamais se mettre à jour de
  // lui-même, surtout en PWA installée où les navigateurs vérifient
  // rarement les mises à jour de façon proactive. Symptôme observé :
  // l'ancien plan v1 (codé en dur, avant la bascule du 7 juillet) réapparu
  // sur un smartphone alors que le PC affichait déjà la bonne version.
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(reg => {
      // Force une vérification de mise à jour dès le chargement, plutôt que
      // d'attendre que le navigateur le fasse spontanément (peut prendre
      // des heures/jours en PWA installée).
      reg.update();
      // Vérifie aussi périodiquement pendant que l'app reste ouverte (utile
      // pour une session longue, ex. pendant un entraînement).
      setInterval(() => reg.update(), 60 * 60 * 1000); // toutes les heures
    }).catch(() => {});

    // BUG CORRIGÉ (17/07/2026, signalé par Laurent — régression cf. inventaire
    // §22.2/§26.6) : location.reload() automatique sur controllerchange
    // faisait réapparaître la barre navigateur (Partager/⋮) sur la TWA
    // Android installée, parfois même sans aucune action de l'utilisateur
    // (juste le temps que reg.update() détecte un nouveau service worker
    // après un déploiement). Un rechargement JS programmatique peut faire
    // sortir Chrome du contexte "Trusted Web Activity" vérifié pour cette
    // navigation précise, contrairement à une vraie fermeture/réouverture
    // depuis l'icône. Corrigé : le reload automatique ne se déclenche plus
    // en mode standalone/TWA (détecté via matchMedia) — sur ce mode, le
    // nouveau service worker prend simplement le relai silencieusement, la
    // nouvelle version s'affichera à la prochaine vraie réouverture de
    // l'app. En navigateur classique (PC, onglet Chrome), le comportement
    // du 8/07/2026 reste inchangé — c'est là que le bug initial a été
    // observé, pas en TWA installée.
    const estStandalone = window.matchMedia('(display-mode: standalone)').matches
      || window.matchMedia('(display-mode: fullscreen)').matches
      || window.navigator.standalone === true; // repli iOS, cf. meta apple-mobile-web-app-capable
    let dejaRecharge = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (dejaRecharge || estStandalone) return;
      dejaRecharge = true;
      location.reload();
    });
  });
}

})(); // fin de l'IIFE async qui attendait window.__PLAN_PRET__
</script>
</body>
</html>
