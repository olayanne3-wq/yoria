  const cd = countdown();
  const predNow = currentPred || predict10K();
  const gapStr = predNow.gap <= 0 ? '-'+fmtTime(Math.abs(predNow.gap))+" de l'objectif" : '+'+fmtTime(predNow.gap)+" de l'objectif";
  // cf. fetchCoachMsg() plus haut pour le contexte de ce correctif (13
  // juillet 2026) — évite que l'IA confonde le prénom du coach (Yoria)
  // avec celui du coureur.
  const prenomCoureurRace = profilCoureur.prenom?.trim();

  const prompt = `Tu es Yoria, coach running qui prépare ${RACE_NAME} le ${new Date(DATE_COURSE_REFERENCE+"T00:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})} à ${RACE_LOCATION}.${prenomCoureurRace ? ` Le coureur à qui tu t'adresses s'appelle ${prenomCoureurRace} — utilise son prénom, jamais "Yoria" (qui est TON propre prénom).` : ' Ne t\'adresse jamais au coureur par "Yoria" — c\'est ton propre prénom, pas le sien.'}
Objectif : ${fmtTime(raceGoalTime)}. Estimation actuelle : ${predNow.timeStr} (${gapStr}).
J-${cd} avant la course.
Stratégie de course déjà affichée à l'utilisateur (ne la répète pas, ne redonne pas les allures/km déjà visibles) : ${notesSegments.join(' puis ')}.
Donne un vrai conseil complémentaire, PAS une reformulation de la stratégie ci-dessus — plutôt un conseil mental (gestion du stress, focus), logistique (sommeil, alimentation les jours précédents) ou sur l'écart actuel avec l'objectif (rassurant si en avance, réaliste si en retard). Tu ne connais jamais l'heure de départ de la course ni le moment de la journée d'aucune séance — reste sur des repères de jour uniquement, jamais d'horaire précis inventé. 2-3 phrases max. Réponds uniquement avec le message, sans guillemets.`;

  try {
    const resp = await fetch("/api/coach", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ prompt })
    });
    const data = await resp.json();
    const msg = data.text || null;
    if (msg) {
      coachRaceMsg = msg;
      coachRaceStratSig = stratSig;
      save(clePourPlan("lk_coach_race_msg"), coachRaceMsg);
      save(clePourPlan("lk_coach_race_strat_sig"), coachRaceStratSig);
      render();
    }
  } catch(e) {
    console.warn("Coach course indisponible:", e.message);
  }
}

// ── Source de vérité unique — allures & seuils de validation ────────────────
// Cibles dérivées des vraies allures du plan (plan.allures.T/I/C, calculées
// par le moteur selon le profil et l'objectif réels) plutôt que codées en
// dur pour l'objectif 10K de Laurent (bug trouvé le 7 juillet 2026, en
// testant un plan Semi — un mécanisme sensible car SESSION_TARGETS pilote
// aussi la détection VMA/SEUIL/SPEC pour la prédiction de performance,
// section 6 du doc de convergence). Marges (targetMin/targetMax) et offsets
// (okPace/warnPace) conservés identiques en valeur ABSOLUE à ceux du 10K
// historique — pas recalculés en ratio, pour ne rien changer sur un plan
// 10K existant et garder le même niveau de tolérance sportive peu importe
// la distance. Repli sur les valeurs fixes historiques si allures absentes.
function construireSessionTargets() {
  const allures = window.__PLAN_BRUT__?.allures;
  const parseAllure = (str, repliSec) => {
    if (!str) return repliSec;
    const [m, s] = str.replace("/km","").split(":").map(Number);
    return m*60 + s;
  };
  const vmaSec = parseAllure(allures?.I, 258); // 258 = milieu de 250-265, valeur historique
  const seuilSec = parseAllure(allures?.T, 300); // 300 = milieu de 295-305
  const specSec = parseAllure(allures?.C, 294); // 294 = milieu de 291-298 (arrondi)

  return {
    VMA:   { targetMin:Math.round(vmaSec-8),  targetMax:Math.round(vmaSec+7),  okPace:Math.round(vmaSec+12), warnPace:Math.round(vmaSec+32), repOk:0.80, repWarn:0.60, effort:formatPace(vmaSec-8)+"–"+formatPace(vmaSec+7), tolerance:"±10 sec", recup:"≥ 6:00/km" },
    SPEC:  { targetMin:Math.round(specSec-3), targetMax:Math.round(specSec+4), okPace:Math.round(specSec+4),  warnPace:Math.round(specSec+16), repOk:0.80, repWarn:0.60, effort:formatPace(specSec), tolerance:"±7 sec",  recup:"≥ 6:00/km" },
    SEUIL: { targetMin:Math.round(seuilSec-5),targetMax:Math.round(seuilSec+5),okPace:Math.round(seuilSec+5), warnPace:Math.round(seuilSec+20),repOk:null, repWarn:null,  effort:formatPace(seuilSec), tolerance:"±10 sec", recup:"≥ 6:00/km" },
    TEST:  { targetMin:Math.round(specSec-3), targetMax:Math.round(specSec+4), okPace:Math.round(specSec+4),  warnPace:Math.round(specSec+16), repOk:0.80, repWarn:0.60, effort:formatPace(specSec), tolerance:"±7 sec",  recup:"≥ 6:00/km" },
  };
}
const SESSION_TARGETS = construireSessionTargets();
// Alias pour compatibilité affichage
const PACE_REFS = Object.fromEntries(
  Object.entries(SESSION_TARGETS).map(([k,v]) => [k, { effort:v.effort, tolerance:v.tolerance, recup:v.recup }])
);
// FC max lue depuis le plan chargé (zoneFC.fcMax, cf. section 7bis du doc de
// convergence) plutôt que codée en dur — repli sur 181 (valeur historique
// de Laurent) si le plan n'a pas cette donnée (profil sans fcMaxConnue).
const FC_MAX = window.__PLAN_BRUT__?.zoneFC?.fcMax || 181;

// ── Zones FC cible ──────────────────────────────────────────────────────
// Reconstruites depuis FC_MAX (pourcentages fixes : 65-75% EF/LONGUE,
// 85-90% SPEC/TEST bas, 90-95% SEUIL/TEST haut, 90-100% VMA) plutôt que des
// bornes bpm codées en dur — sinon ces bornes resteraient figées sur
// l'ancien FC_MAX (181) même si un plan avec un profil différent est chargé.
const FC_ZONES = {
  EF:    { min: Math.round(FC_MAX*0.65), max: Math.round(FC_MAX*0.75), label:"65–75%", color:"var(--accent)" },
  LONGUE:{ min: Math.round(FC_MAX*0.65), max: Math.round(FC_MAX*0.75), label:"65–75%", color:"var(--accent2)" },
  SPEC:  { min: Math.round(FC_MAX*0.85), max: Math.round(FC_MAX*0.90), label:"85–90%", color:"var(--accent)" },
  SEUIL: { min: Math.round(FC_MAX*0.90), max: Math.round(FC_MAX*0.95), label:"90–95%", color:"var(--warn)" },
  VMA:   { min: Math.round(FC_MAX*0.90), max: FC_MAX,                  label:"90–100%",color:"var(--accent)" },
  TEST:  { min: Math.round(FC_MAX*0.85), max: Math.round(FC_MAX*0.95), label:"85–95%", color:"var(--accent)" },
};

function fcStatus(type, avgHr) {
  const zone = FC_ZONES[type];
  if (!zone || !avgHr) return null;
  if (avgHr >= zone.min && avgHr <= zone.max) return "✅";
  if (avgHr < zone.min - 5 || avgHr > zone.max + 5) return "🔴";
  return "🟡";
}

// ── Branchement Module 2 (SessionAnalyzer) — 17/07/2026, révisé le 17/07 ───
// Pour une séance qualité (VMA/SPEC/SEUIL/TEST) prévue à une date donnée,
// retrouve l'activité Strava du même jour et produit un SessionAnalysis via
// DecisionEngineSessionAnalysis. Périmètre restreint aux séances qualité,
// cf. en-tête de decision-engine-session-analysis.classic.js (décision
// Laurent 17/07/2026).
//
// RÉVISION (17/07/2026, discussion complète avec Laurent) : la dimension
// "volume" (distance totale des laps d'effort) a été retirée du module et
// remplacée par un vrai comptage de répétitions dans la zone d'allure
// (analyserRepetitions), pour la raison suivante : la montre continue
// d'enregistrer les créneaux prévus (30s effort/30s récup) même en cas
// d'abandon partiel — une répétition "marchée" reste un lap distinct, donc
// la distance totale peut rester proche de la cible même avec une
// répétition complètement ratée au milieu de la séance. Le signal fiable
// est donc le TAUX DE RÉPÉTITIONS DANS LA ZONE, pas la distance globale.
// Réutilise EXACTEMENT la même logique que autoValidate()/validateReason()
// (§6097-6178 index.html) : okPace/repOk/repWarn de SESSION_TARGETS — pour
// qu'il n'existe qu'UNE seule définition de "séance de qualité réussie"
// dans toute l'app (cf. discussion : "ça reste 2 sources" — corrigé ici).
//
// FC basse : ne pénalise plus (cf. analyserEcartFC révisée) — seule une FC
// trop haute reste un signal négatif.
//
// Allure : reste symétrique (trop rapide et trop lent pénalisent pareil) —
// asymétrie envisagée mais reportée faute de données réelles pour la
// calibrer (décision Laurent 17/07/2026 : "on verra l'asymétrique des
// allures si nécessaire plus tard").
//
// Utilise getLapsAffichage(activite, seance.structureIntervalles) (déjà
// validée ailleurs dans l'app) pour isoler précisément les laps d'EFFORT —
// jamais l'échauffement, la récupération courte/longue, ni le retour au
// calme.
//
// Retourne null si le module n'est pas chargé, si la séance n'est pas une
// séance qualité, si aucune activité Strava ne correspond à cette date, ou
// si aucun lap d'effort n'a pu être isolé.
function analyserSeanceQualite(seance) {
  if (typeof DecisionEngineSessionAnalysis === 'undefined') return null;
  if (!seance || !seance.date || !seance.type) return null;
  if (DecisionEngineSessionAnalysis.TYPES_QUALITE.indexOf(seance.type) === -1) return null;

  const activite = (stravaActivities || []).find(a => a.start_date_local?.slice(0, 10) === seance.date);
  if (!activite) return null;

  const lapsBruts = getLapsAffichage(activite, seance.structureIntervalles);
  if (!lapsBruts.length) return null; // pas de laps d'effort isolables, rien à analyser

  // lapsEffort au format attendu par analyserRepetitions : { allureSec }
  const lapsEffort = lapsBruts
    .filter(l => l.average_speed > 0)
    .map(l => ({ allureSec: Math.round(1000 / l.average_speed) }));

  // Moyennes pondérées par la distance de chaque lap — pour allure/FC
  // globales (toujours utiles pour analyserEcartAllure/analyserEcartFC),
  // même calcul que la version précédente.
  let distanceTotaleEffortM = 0;
  let sommeVitesseXDistance = 0;
  let sommeFcXDistance = 0;
  let distanceAvecFcM = 0;
  lapsBruts.forEach(l => {
    const d = l.distance || 0;
    if (l.average_speed > 0 && d > 0) {
      sommeVitesseXDistance += l.average_speed * d;
      distanceTotaleEffortM += d;
    }
    if (l.average_heartrate && d > 0) {
      sommeFcXDistance += l.average_heartrate * d;
      distanceAvecFcM += d;
    }
  });

  const vitesseMoyEffort = distanceTotaleEffortM > 0 ? sommeVitesseXDistance / distanceTotaleEffortM : null;
  const allureMoyenneSec = vitesseMoyEffort ? Math.round(1000 / vitesseMoyEffort) : null;
  const fcMoyenneEffort = distanceAvecFcM > 0 ? Math.round(sommeFcXDistance / distanceAvecFcM) : undefined;

  const targetReps = parseTargetReps(seance.session || '');

  const seanceRealisee = {
    seanceId: seance.uid,
    allureMoyenneSec,
    fcMoyenne: fcMoyenneEffort,
    // Corrigé le 17/07/2026 : sessionNotes[uid+'_rpe'] n'a jamais existé
    // (même bug que analyserSemaineActuelle, cf. commentaire équivalent
    // plus haut dans ce fichier) — sessionRpe[uid] est la vraie source
    // depuis le chantier "RPE unifié" du même jour, repli sur
    // manualPerf[uid].rpe pour compat ascendante.
    ressentiRPE: sessionRpe[seance.uid] || (manualPerf[seance.uid] && manualPerf[seance.uid].rpe) || undefined,
    lapsEffort,
    targetReps,
  };

  const ciblesSeance = {
    type: seance.type,
    allureCible: SESSION_TARGETS[seance.type], // contient targetMin/targetMax/okPace/warnPace/repOk/repWarn
    zoneFC: FC_ZONES[seance.type],
  };

  try {
    return DecisionEngineSessionAnalysis.analyser(seanceRealisee, ciblesSeance);
  } catch (err) {
    console.warn("SessionAnalyzer (Module 2) : erreur de calcul.", err.message);
    return null;
  }
}

// PRÉDICTION 10K — v3
// ══════════════════════════════════════════════════════════════════════════════
const EFFORT_PACE_THRESHOLD = 5.5 * 60;
const PREDICTOR_VERSION = 4; // Incrémenté après corrections SEUIL + pondération Lavandou


// ── Score d'Économie normalisé ──────────────────────────────────────────────
function economyScore(lap, sessionType) {
  if (!lap.average_heartrate || !lap.average_speed || !runnerFcMax) return null;
  const target = SESSION_TARGETS[sessionType];
  if (!target) return null;
  const fcPct = sessionType==="VMA" ? 0.95 : sessionType==="SPEC" ? 0.875 : sessionType==="SEUIL" ? 0.875 : null;
  if (!fcPct) return null;
  const fcTheo = runnerFcMax * fcPct;
  const vTheo = 1000 / target.targetMin;
  const iecTheo = fcTheo / vTheo;
  const iecReal = lap.average_heartrate / lap.average_speed;
  return Math.round(iecTheo / iecReal * 100);
}
function economyColor(score, n) {
  if (!score || n < 3) return "var(--text2)";
  if (score > 110) return "var(--accent2)";
  if (score >= 90) return "var(--warn)";
  return "var(--warn)";
}
function economyLabel(score, n) {
  if (!score || n < 3) return "";
  if (score > 110) return "💚";
  if (score >= 90) return "💛";
  return "❤️";
}

// ── Détection des intervalles via streams (seconde par seconde) ──────────────
function extractTargetSpeed(sessionStr) {
  if (!sessionStr) return null;
  const m = sessionStr.match(/(\d+):(\d+)\/km/);
  if (m) return 1000 / (parseInt(m[1])*60 + parseInt(m[2]));
  return null;
}

/**
 * Détecte, parmi les laps "milieu" d'une activité (hors échauffement/retour
 * au calme), quelle cible générique de SESSION_TARGETS correspond le mieux
 * — en choisissant celle dont la vitesse moyenne réelle est la PLUS PROCHE
 * de la cible, pas juste celle qui capture le plus de laps (bug trouvé le
 * 6 juillet 2026 : les plages ±15% de VMA/SEUIL/SPEC se chevauchent, une
 * allure "seulement" 4'49/km reste dans la tolérance ±15% de VMA qui vise
 * 4'10/km, la marge en valeur absolue étant large sur une cible rapide).
 * Retourne { type, laps } ou null si aucune cible ne correspond.
 */
function detecterTypeEffort(middle) {
  let meilleurType = null;
  let meilleurResultat = [];
  let meilleurEcart = Infinity;
  for (const [type, cible] of Object.entries(SESSION_TARGETS)) {
    const effSpeed = 1000 / cible.targetMin;
    const bySpeed = middle.filter(l => l.average_speed > 0 &&
      Math.abs(l.average_speed - effSpeed) <= effSpeed * 0.15);
    if (bySpeed.length === 0) continue;
    const vitesseMoyReelle = bySpeed.reduce((s,l) => s + l.average_speed, 0) / bySpeed.length;
    const ecart = Math.abs(vitesseMoyReelle - effSpeed);
    if (ecart < meilleurEcart) {
      meilleurEcart = ecart;
      meilleurResultat = bySpeed;
      meilleurType = type;
    }
  }
  return meilleurType ? { type: meilleurType, laps: meilleurResultat } : null;
}

function getEffortLaps(activity) {
  if (!activity.laps || activity.laps.length < 4) return [];

  // Supprimer 1er lap (echauffement) et 2 derniers (retour au calme)
  const middle = activity.laps.slice(1, -2);
  if (!middle.length) return [];

  // Vitesse cible : d'abord depuis le libellé de la séance si elle
  // correspond à une séance du plan à cette date (affinage, quand
  // disponible), sinon on essaie chaque cible générique de SESSION_TARGETS
  // (VMA/SEUIL/SPEC/TEST) indépendamment du plan — la reconnaissance du
  // type d'effort réel ne doit plus dépendre d'une correspondance stricte
  // de date avec ce qui était prévu (cf. docs/v2-methodologie/
  // convergence-v1-v2.md : la prédiction de performance doit rester fiable
  // même si le plan affiché à cette date-là ne correspond pas exactement à
  // l'effort réellement fourni, ce qui peut arriver dès qu'un plan diffère
  // du déroulé réel — pas seulement dans le contexte du chantier v2).
  //
  // NOTE IMPORTANTE : ceci ne concerne QUE la détection du type d'effort
  // pour la prédiction de performance. Le suivi de respect du plan
  // (statuts ✅/⚠️/❌ par séance prévue) reste entièrement basé sur la
  // correspondance stricte par date avec ALL_SESSIONS, inchangé.
  const date = activity.start_date_local ? activity.start_date_local.slice(0,10) : null;
  const planSess = date ? ALL_SESSIONS.find(s => s.date === date) : null;
  const targetSpeedDuPlan = planSess ? extractTargetSpeed(planSess.session) : null;

  // 1. Affinage par le plan prévu à cette date, si disponible
  if (targetSpeedDuPlan) {
    const bySpeed = middle.filter(l => l.average_speed > 0 &&
      Math.abs(l.average_speed - targetSpeedDuPlan) <= targetSpeedDuPlan * 0.15);
    if (bySpeed.length > 0) return bySpeed;
  }

  // 2. Sinon, détection générique par cible la plus proche
  const detection = detecterTypeEffort(middle);
  if (detection) return detection.laps;

  // Fallback : moitie la plus rapide
  const withSpeed = middle.filter(l => l.average_speed > 0);
  const sorted = [...withSpeed].sort((a,b) => b.average_speed - a.average_speed);
  const half = Math.ceil(sorted.length / 2);
  const effortSet = new Set(sorted.slice(0, half).map(l => l.lap_index || l.id));
  return withSpeed.filter(l => effortSet.has(l.lap_index || l.id));
}

// Laps à utiliser pour L'AFFICHAGE de suivi (pas la prédiction de
// performance) — distinct de getEffortLaps() ci-dessus. Bug trouvé le
// 8 juillet 2026 : Laurent programme fidèlement ses séances sur sa montre,
// qui crée un lap DISTINCT pour chaque phase (effort, récup courte
// intra-répétition, récup longue inter-séries) — les laps alternent
// simplement effort/récup/effort/récup, avec une récup longue en PLUS de
// la récup normale à la fin de chaque série (sauf la dernière du plan).
//
// Historique des tentatives rejetées avant cette version, pour ne pas
// retomber dans les mêmes pièges si ce code est retouché plus tard :
// 1) garder tous les laps du milieu sans distinction (mélangeait effort et
//    récup) ; 2) filtrer par durée (ne fonctionne pas quand effort et
//    récup ont la même durée, ex. un 30-30 où les deux durent 30s) ;
// 3) traiter uniquement le cas à un seul bloc + boucle nbSeries, avec un
//    second cas "tous les blocs sont des efforts continus" pour les
//    structures multi-blocs — correct pour pyramidale/seuil-négatif (les
//    seuls types existants avec plusieurs blocs), mais fragile : un futur
//    type de séance avec plusieurs blocs à répétitions multiples (pas
//    encore implémenté) casserait silencieusement ce deuxième cas,
//    revenant au défaut n°1. Signalé explicitement par Laurent comme un
//    vrai risque à couvrir avant d'ajouter de nouveaux types de séries.
//
// Version généralisée : parcourt TOUS les blocs de la structure, un par
// un, chacun avec ses PROPRES répétitions et sa propre récupération — pas
// de cas particulier selon le nombre de blocs. Chaque bloc peut avoir
// repetitions=1 (effort continu, ex. pyramidale/seuil-négatif) ou
// repetitions>1 (vraies répétitions avec récup entre chacune, ex.
// seuil-court/i-3min). nbSeries s'applique en répétant l'ENSEMBLE des
// blocs (pas un seul), avec recupEntreSeriesSec ajoutée après le dernier
// bloc de chaque série (sauf la toute dernière série du plan).
function getLapsAffichage(activity, structureIntervalles) {
  if (!activity.laps || activity.laps.length < 4) return [];
  if (!structureIntervalles?.blocs?.length) return getEffortLaps(activity);

  const middle = activity.laps.slice(1, -2);
  const nbSeries = structureIntervalles.nbSeries || 1;
  const efforts = [];
  let curseur = 0;

  for (let serie = 0; serie < nbSeries; serie++) {
    const derniereSerie = serie === nbSeries - 1;
    structureIntervalles.blocs.forEach((bloc, indexBloc) => {
      const repsDuBloc = bloc.repetitions || 1;
      const dernierBlocDeLaSerie = indexBloc === structureIntervalles.blocs.length - 1;
      for (let rep = 0; rep < repsDuBloc; rep++) {
        if (curseur >= middle.length) return;
        efforts.push(middle[curseur]); // lap d'effort
        curseur++;
        const derniereRepDuBloc = rep === repsDuBloc - 1;
        const dernierEffortDuPlan = derniereRepDuBloc && dernierBlocDeLaSerie && derniereSerie;
        if (dernierEffortDuPlan) continue; // aucune récup à sauter après le tout dernier effort du plan (le prochain lap est déjà le retour au calme, exclu par slice(1,-2))
        // Une récup courte suit systématiquement chaque répétition (y
        // compris entre deux blocs différents, et y compris la dernière
        // répétition d'un bloc) — sauf si le bloc entier n'a qu'une seule
        // répétition SANS récup définie (dureeRecupSec absent/0, ex. un
        // bloc "effort continu" isolé sans vraie pause programmée).
        if (bloc.dureeRecupSec) curseur++;
        // Fin de série (dernier bloc de la série, dernière répétition de
        // ce bloc, mais pas la toute dernière série du plan) : un lap de
        // récup LONGUE s'ajoute EN PLUS de la récup courte normale, pas à
        // sa place — vérifié explicitement par Laurent sur sa vraie
        // séance (2 laps de récup successifs, pas un seul plus long).
        if (derniereRepDuBloc && dernierBlocDeLaSerie && !derniereSerie && structureIntervalles.recupEntreSeriesSec) {
          curseur++;
        }
      }
    });
  }
  return efforts;
}


// ── Calcul dérive FC sur les répétitions ─────────────────────────────────
function computeFcDrift(laps) {
  const hrLaps = laps.filter(l => l.average_heartrate);
  if (hrLaps.length < 2) return { driftBpm: null, driftEl: null };
  const firstHr = hrLaps[0].average_heartrate;
  const lastHr = hrLaps[hrLaps.length-1].average_heartrate;
  const drift = Math.round(lastHr - firstHr);
  const avgHr = hrLaps.reduce((s,l)=>s+l.average_heartrate,0)/hrLaps.length;
  const firstHrVal = hrLaps[0].average_heartrate;
  laps.forEach(l => {
    l._fcAlert = l.average_heartrate && l.average_heartrate > avgHr + 8;
    l._fcBase = firstHrVal;
  });
  const driftColor = drift <= 5 ? "var(--accent2)" : drift <= 12 ? "var(--warn)" : "var(--warn)";
  const driftIcon = drift <= 5 ? "✅" : drift <= 12 ? "⚠️" : "🔴";
  const driftEl = el("div",{style:{background:"var(--border-soft)",borderRadius:"8px",padding:"8px 12px",marginTop:"6px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
    el("span",{class:"muted",style:{fontSize:"13px"}},"Dérive FC"),
    el("span",{style:{color:driftColor,fontSize:"14px",fontWeight:"700"}},(drift>0?"+":"")+drift+" bpm "+driftIcon)
  );
  return { driftBpm: drift, driftEl };
}

// ── Affichage commun d\'une répétition (dashboard + weekDetail) ────────────
function renderLapRow(lap, i, sessionType) {
  const tgt = SESSION_TARGETS[sessionType];
  const pace = 1000/lap.average_speed;
  let bc = "var(--text2)", em = "";
  if (tgt) {
    if (pace <= tgt.okPace) { bc="var(--accent2)"; em="🟢"; }
    else if (pace <= tgt.warnPace) { bc="var(--warn)"; em="🟡"; }
    else { bc="var(--warn)"; em="🔴"; }
  }
  const maxP = tgt ? tgt.warnPace+30 : 400, minP = tgt ? tgt.targetMin-20 : 240;
  const bw = Math.max(0, Math.min(100, (1-(pace-minP)/(maxP-minP))*100));
  const nSameType = stravaActivities.filter(a=>{
    const d = a.start_date_local?.slice(0,10);
    return ALL_SESSIONS.find(ss=>ss.date===d&&ss.type===sessionType);
  }).length;
  const se = economyScore(lap, sessionType);
  const seColor = economyColor(se, nSameType);
  const seLabel = economyLabel(se, nSameType);
  const cadence = lap.average_cadence ? Math.round(lap.average_cadence*2)+" spm" : "";

  // ── Raison du verdict ────────────────────────────────────────────────────
  let reasonParts = [];
  if (tgt) {
    if (pace <= tgt.okPace) reasonParts.push("Dans la cible");
    else if (pace <= tgt.warnPace) reasonParts.push("Un peu lente");
    else reasonParts.push("Trop lente");
  }
  if (lap.average_heartrate && lap._fcAlert) {
    const fcDiff = Math.round(lap.average_heartrate - (lap._fcBase||lap.average_heartrate));
    reasonParts.push("FC élevée"+(fcDiff>0?" (+"+fcDiff+" bpm)":""));
  } else if (lap.average_heartrate && i > 0) {
    const fcDiff = Math.round(lap.average_heartrate - (lap._fcBase||0));
    if (fcDiff > 3) reasonParts.push("FC +"+fcDiff+" bpm");
  }
  const reasonText = reasonParts.join(" · ");
  const reasonColor = bc === "var(--accent2)" ? "var(--accent2)" : bc === "var(--warn)" ? "var(--warn)" : "var(--warn)";
  return el("div",{style:{marginBottom:"6px"}},
    el("div",{style:{display:"grid",gridTemplateColumns:"28px 1fr 64px 56px 20px",gap:"4px",alignItems:"center",marginBottom:"2px"}},
      el("span",{style:{color:"var(--text2)",fontSize:"13px"}},"R"+(i+1)),
      el("div",{style:{height:"4px",background:"var(--border-soft)",borderRadius:"2px"}},el("div",{style:{width:bw+"%",height:"100%",background:bc,borderRadius:"2px"}})),
      el("span",{style:{color:"var(--text)",fontSize:"14px",fontWeight:"500",textAlign:"right"}},fmtPace(lap.average_speed)+"/km"),
      lap.average_heartrate?el("span",{style:{fontSize:"13px",textAlign:"right",color:lap._fcAlert?"var(--warn)":"var(--text-muted)",fontWeight:lap._fcAlert?"700":"400"}},Math.round(lap.average_heartrate)+" bpm"+(lap._fcAlert?" ↑":"")):el("span",{},""),
      el("span",{style:{fontSize:"14px",textAlign:"center"}},em)
    ),
    reasonText?el("div",{style:{paddingLeft:"32px",marginBottom:"2px"}},
      el("span",{style:{color:reasonColor,fontSize:"12px"}},reasonText)
    ):null,
    (cadence||se)?el("div",{style:{display:"flex",gap:"8px",paddingLeft:"32px"}},
      cadence?el("span",{class:"muted",style:{fontSize:"12px"}},cadence):null,
      se?el("span",{style:{color:seColor,fontSize:"12px",fontWeight:"600"}},"IE "+se+(seLabel?" "+seLabel:"")):null
    ):null
  );
}


function predict10KAtDate(dateStr) {
  // Calcule l\'estimation 10K en ne prenant que les activités du plan actuel
  // (depuis dateDebutPlan) et antérieures à dateStr — même correctif que
  // predict10K() (docs/v2-methodologie/convergence-v1-v2.md, section 7bis/
  // 7quater), sinon cette fonction (utilisée par rebuildPredHistory pour
  // reconstruire l'historique jour par jour) remonterait aussi des séances
  // d'un plan antérieur.
  const BASE_TIME = BASE_TIME_REFERENCE;
  const dateDebutPlan = window.__PLAN_BRUT__?.dateDebut;
  const runs = stravaActivities.filter(a =>
    a.type === "Run" &&
    a.start_date_local?.slice(0,10) <= dateStr &&
    (!dateDebutPlan || a.start_date_local?.slice(0,10) >= dateDebutPlan)
  );
  const estimates = [];

  // Laps virtuels manuels (docs/source-donnees-seances.md, section 2) : une
  // saisie manuelle prime automatiquement sur Strava pour sa date — on
  // l'exclut donc de specRunsAvecSeance/vmaRunsAvecSeance ci-dessous via
  // datesManuellesParType, et on l'injecte séparément à poids égal.
  function manualLapsPourType(sessionType) {
    return ALL_SESSIONS.filter(sess =>
      sess.type===sessionType && manualPerf[sess.uid]?.average_speed &&
      sess.date <= dateStr && (!dateDebutPlan || sess.date >= dateDebutPlan) &&
      statuses[sess.uid]!=="❌"
    ).map(sess => ({ average_speed: manualPerf[sess.uid].average_speed }));
  }
  const manualSpecLaps = manualLapsPourType("SPEC");
  const manualVmaLaps = manualLapsPourType("VMA");
  const datesManuellesSpec = new Set(manualSpecLaps.length ? ALL_SESSIONS.filter(sess=>sess.type==="SPEC"&&manualPerf[sess.uid]?.average_speed).map(sess=>sess.date) : []);
  const datesManuellesVma = new Set(manualVmaLaps.length ? ALL_SESSIONS.filter(sess=>sess.type==="VMA"&&manualPerf[sess.uid]?.average_speed).map(sess=>sess.date) : []);

  // SPEC → allure directe
  const specRunsAvecSeance = runs.filter(r=>!datesManuellesSpec.has(r.start_date_local?.slice(0,10))).map(r => ({ r, s: ALL_SESSIONS.find(s => s.date===r.start_date_local?.slice(0,10) && s.type==="SPEC") })).filter(({s}) => s && statuses[s.uid]!=="❌");
  const specLaps = specRunsAvecSeance.flatMap(({r,s}) => getLapsAffichage(r, s.structureIntervalles)).concat(manualSpecLaps);
  if (specLaps.length > 0) {
    const avgSpeed = specLaps.reduce((s,l)=>s+l.average_speed,0)/specLaps.length;
    estimates.push({ value: 10000/avgSpeed, weight: 0.45 });
  }

  // VMA → vitesse × 0.87
  const vmaRunsAvecSeance = runs.filter(r=>!datesManuellesVma.has(r.start_date_local?.slice(0,10))).map(r => ({ r, s: ALL_SESSIONS.find(s => s.date===r.start_date_local?.slice(0,10) && s.type==="VMA") })).filter(({s}) => s && statuses[s.uid]!=="❌");
  const vmaLaps = vmaRunsAvecSeance.flatMap(({r,s}) => getLapsAffichage(r, s.structureIntervalles)).concat(manualVmaLaps);
  if (vmaLaps.length > 0) {
    const avgSpeed = vmaLaps.reduce((s,l)=>s+l.average_speed,0)/vmaLaps.length;
    estimates.push({ value: 10000/(avgSpeed*0.87), weight: 0.35 });
  }

  if (estimates.length === 0) return BASE_TIME;

  const totalWeight = estimates.reduce((s,e)=>s+e.weight,0);
  const weighted = estimates.reduce((s,e)=>s+e.value*e.weight,0)/totalWeight;
  const hasVma = vmaLaps.length > 0;
  const hasSpec = specLaps.length > 0;
  const lavWeight = (hasVma && hasSpec) ? 0.10 : (hasVma || hasSpec) ? 0.30 : 1.00;
  return Math.round(BASE_TIME * lavWeight + weighted * (1 - lavWeight));
}

// nettoyerNotesMeteoDupliquees() retirée le 13 juillet 2026 — bouton UI
// correspondant retiré de Réglages, plus aucun appelant. Le vrai correctif
// (enrichirSeanceAvecMeteo idempotente) vit toujours dans weather.js.

// regenererStructuresIntervallesUI() retirée le 13 juillet 2026 — bouton
// UI retiré de Réglages, outil de rattrapage ponctuel pour plans créés
// avant le 8 juillet 2026 (structureIntervalles), plus nécessaire.
// regenererStructuresIntervalles() reste disponible dans le moteur si
// besoin de la rappeler manuellement plus tard.


// Nombre de séances avec saisie manuelle exploitable — utilisé pour
// déclencher rebuildPredHistory au même titre que stravaActivities
// (docs/source-donnees-seances.md), sinon un utilisateur 100% manuel ne
// verrait jamais son historique de prédiction se construire.
function nbSaisiesManuelles() {
  return Object.values(manualPerf).filter(m => m?.average_speed).length;
}

function rebuildPredHistory() {
  if ((!stravaActivities.length && !nbSaisiesManuelles()) || isRebuilding) return;
  isRebuilding = true; render();
  // Générer une entrée par jour depuis le début du plan jusqu\'à aujourd\'hui
  const startDate = PLAN[0].sessions[0].date;
  const endDate = today();
  const newHistory = [];
  let d = new Date(startDate + "T00:00:00");
  const end = new Date(endDate + "T00:00:00");
  while (d <= end) {
    const dateStr = d.toISOString().slice(0,10);
    const time = predict10KAtDate(dateStr);
    const aDesDonnees = stravaActivities.some(a=>a.start_date_local?.slice(0,10)<=dateStr) ||
      Object.entries(manualPerf).some(([uid,m])=>m?.average_speed && ALL_SESSIONS.find(s=>s.uid===uid && s.date<=dateStr));
    const confidence = aDesDonnees ? 45 : 30;
    newHistory.push({ date: dateStr, time, confidence, predictorVersion: PREDICTOR_VERSION });
    d.setDate(d.getDate()+1);
  }
  predHistory = newHistory;
  save(clePourPlan("lk_pred_history"), predHistory);
  lastRebuildDate = today();
  save(clePourPlan("lk_last_rebuild"), lastRebuildDate);
  isRebuilding = false;
  render();
}

// Reconstruire l\'historique si manquant ou incomplet
if ((stravaActivities.length > 0 || nbSaisiesManuelles() > 0) && (predHistory.length <= 1 || (predHistory[0] && predHistory[0].predictorVersion !== PREDICTOR_VERSION))) {
  rebuildPredHistory();
}

function predict10K() {
  const BASE_TIME = BASE_TIME_REFERENCE; // référence lue depuis le plan chargé
  // Ne prend en compte que les activités depuis le début du plan actuellement
  // affiché — sans ce filtre, la prédiction mélangeait des séances
  // antérieures à ce plan (ex. d'un plan de test précédent), remonté par
  // Laurent le 6 juillet 2026 (docs/v2-methodologie/convergence-v1-v2.md,
  // section 7bis/7quater — même famille de problème : donnée non indexée
  // sur le plan affiché).
  const dateDebutPlan = window.__PLAN_BRUT__?.dateDebut;
  const runs = stravaActivities.filter(a =>
    a.type === "Run" && (!dateDebutPlan || a.start_date_local?.slice(0,10) >= dateDebutPlan)
  );
  const estimates = [];
  const details = [];

  // ── Helper : vitesse moyenne pondérée par durée d\'effort ─────────────────
  // Pour un type de séance, calcule la vitesse moyenne pondérée par la durée
  // totale d\'effort de chaque séance (séances plus longues = plus de poids)
  function weightedAvgByEffortDuration(sessionType, factor) {
    // Une activité "appartient" au type sessionType selon deux méthodes,
    // par ordre de priorité :
    // 1. Si une séance du plan existe à cette date avec structureIntervalles
    //    (structure programmée fidèlement sur la montre, section 2.8 du doc
    //    de convergence) ET que son type correspond à sessionType : source
    //    de vérité fiable, pas besoin de deviner par tolérance de vitesse.
    //    Ajouté le 8 juillet 2026 : Laurent signale qu'une séance VMA ne se
    //    reflétait plus du tout dans l'estimation — la détection par
    //    detecterTypeEffort() recevait les laps de récup mélangés aux
    //    efforts (même défaut que celui déjà corrigé pour l'affichage,
    //    getLapsAffichage), faisant échouer la reconnaissance du type.
    // 2. Sinon (pas de structure pour cette date, ancien plan), repli sur
    //    l'ancienne détection par tolérance de vitesse (detecterTypeEffort),
    //    indépendante de ce que le plan prévoyait ce jour-là — cf.
    //    commentaire dans getEffortLaps. Bug trouvé le 6 juillet 2026 : une
    //    séance SPEC à 4'49/km pouvait passer le test de tolérance VMA, qui
    //    vise 4'10/km, et être comptée deux fois — corrigé en retenant
    //    uniquement le type le plus proche, pas "dans la tolérance".
    // Dates couvertes par une saisie manuelle (docs/source-donnees-seances.md,
    // section 2) : la saisie manuelle prime automatiquement sur Strava pour
    // ces dates-là, sans hiérarchie ni fusion — on exclut donc ici les
    // activités Strava dont la date a une entrée manualPerf, pour éviter
    // tout double comptage dans le poids agrégé.
    const datesManuelles = new Set(
      ALL_SESSIONS.filter(sess => sess.type===sessionType && manualPerf[sess.uid]?.average_speed).map(sess => sess.date)
    );
    const sessionRuns = SESSION_TARGETS[sessionType] ? runs.filter(r => {
      if (!r.laps || r.laps.length < 4) return false;
      const date = r.start_date_local?.slice(0,10);
      if (datesManuelles.has(date)) return false;
      const planSess = date ? ALL_SESSIONS.find(s => s.date === date) : null;
      if (planSess?.structureIntervalles && planSess.type === sessionType) return true;
      if (planSess?.structureIntervalles) return false; // structure connue mais pour un AUTRE type : pas de repli sur la détection par tolérance, qui pourrait se tromper
      const middle = r.laps.slice(1, -2);
      if (!middle.length) return false;
      const detection = detecterTypeEffort(middle);
      return detection && detection.type === sessionType;
    }) : [];

    // Séances du même type validées avec une saisie manuelle (allure
    // renseignée) — injectées comme un "lap virtuel" unique par séance dans
    // le même agrégat pondéré par durée d'effort, à poids strictement égal
    // aux laps Strava (aucune décote, section 2 du doc).
    const manualSessions = ALL_SESSIONS.filter(sess =>
      sess.type===sessionType && manualPerf[sess.uid]?.average_speed &&
      (!dateDebutPlan || sess.date >= dateDebutPlan)
    );

    if (!sessionRuns.length && !manualSessions.length) return null;

    let totalWeight = 0;
    let weightedSpeed = 0;
    let allLaps = [];

    sessionRuns.forEach(r => {
      const date = r.start_date_local?.slice(0,10);
      const planSess = date ? ALL_SESSIONS.find(s => s.date === date) : null;
      const laps = getLapsAffichage(r, planSess?.structureIntervalles);
      if (!laps.length) return;
      const effortDuration = laps.reduce((s,l) => s + l.distance / l.average_speed, 0);
      const avgSpeed = laps.reduce((s,l) => s + l.average_speed, 0) / laps.length;
      weightedSpeed += avgSpeed * effortDuration;
      totalWeight += effortDuration;
      allLaps = allLaps.concat(laps);
    });

    manualSessions.forEach(sess => {
      const mp = manualPerf[sess.uid];
      const distance = mp.distance || distanceEffortStructure(sess.structureIntervalles) || 0;
      if (!distance) return; // pas de distance connue : lap virtuel impossible à pondérer, ignoré plutôt que fausser le calcul
      const effortDuration = distance / mp.average_speed;
      weightedSpeed += mp.average_speed * effortDuration;
      totalWeight += effortDuration;
      allLaps.push({ average_speed: mp.average_speed, distance, average_heartrate: mp.average_heartrate||null });
    });

    if (!totalWeight) return null;
    return { speed: weightedSpeed / totalWeight, laps: allLaps, runs: sessionRuns, manualCount: manualSessions.length };
  }

  // ── 1. SPEC → allure directe ──────────────────────────────────────────────
  const specData = weightedAvgByEffortDuration("SPEC", 1);
  if (specData) {
    const estimate10k = DISTANCE_M_REFERENCE / specData.speed;
    estimates.push({ value: estimate10k, weight: 0.45 });
    const lastSpecDate = specData.runs.map(r=>r.start_date_local?.slice(0,10)).filter(Boolean).sort().pop();
    details.push({ label:`SPEC · ${specData.runs.length} séance${specData.runs.length>1?"s":""} · dernier ${lastSpecDate||"?"}`, value:fmtPace(specData.speed)+"/km → "+fmtTime(Math.round(estimate10k)) });
  }

  // ── 2. SEUIL → contribue uniquement à partir de 3 séances ─────────────────
  const seuilData = weightedAvgByEffortDuration("SEUIL", 1);
  if (seuilData && seuilData.runs.length >= 3) {
    const totalEffortTime = seuilData.laps.reduce((s,l) => s + l.distance/l.average_speed, 0);
    const totalEffortDist = seuilData.laps.reduce((s,l) => s + l.distance, 0);
    const riegelSeuil = totalEffortTime * Math.pow(DISTANCE_M_REFERENCE/totalEffortDist, 1.06);
    estimates.push({ value: riegelSeuil, weight: 0.10 });
    details.push({ label:`SEUIL · ${seuilData.runs.length} séances · ${Math.round(totalEffortDist)}m effort`, value:fmtPace(seuilData.speed)+"/km → "+fmtTime(Math.round(riegelSeuil)) });
  }

  // ── 3. VMA → vitesse × 0.87 ──────────────────────────────────────────────
  const vmaData = weightedAvgByEffortDuration("VMA", 1);
  if (vmaData) {
    const estimate10k = DISTANCE_M_REFERENCE / (vmaData.speed * 0.87);
    estimates.push({ value: estimate10k, weight: 0.35 });
    const lastVmaDate = vmaData.runs.map(r=>r.start_date_local?.slice(0,10)).filter(Boolean).sort().pop();
    details.push({ label:`VMA · ${vmaData.runs.length} séance${vmaData.runs.length>1?"s":""} · dernier ${lastVmaDate||"?"}`, value:fmtPace(vmaData.speed)+"/km → "+fmtTime(Math.round(estimate10k)) });
  }

  // ── Garde-fou : exclure une source manifestement aberrante ────────────────
  // Limite structurelle connue et non résolue à ce stade (cf.
  // docs/v2-methodologie/convergence-v1-v2.md, section 6) : les séances VMA
  // très fractionnées (ex. 2×8×30″-30″) ne se segmentent pas correctement en
  // laps Strava classiques quand la montre ne crée pas un vrai lap par
  // répétition — une activité avec moins de laps que de répétitions
  // attendues mélange phases rapides et lentes dans un même lap, donnant une
  // vitesse moyenne diluée sans rapport avec l'effort réel (observé : VMA à
  // 5'33/km, donnant une projection PIRE que SPEC/SEUIL alors qu'une vraie
  // VMA, plus rapide, devrait donner une MEILLEURE projection).
  //
  // Comparaison à BASE_TIME (référence connue), pas à la médiane des autres
  // estimations : avec seulement 2 sources (le cas réel rencontré), chaque
  // valeur est mécaniquement à égale distance de leur propre moyenne, donc
  // aucune n'est jamais détectée comme aberrante par une comparaison
  // mutuelle — bug trouvé en testant ce garde-fou avant de le déployer.
  // BASE_TIME est une référence stable, indépendante du nombre de sources
  // disponibles.
  //
  // Écart >20% par rapport à BASE_TIME est un signal fort d'erreur de
  // détection plutôt qu'une vraie variance de performance — à résoudre
  // proprement par le chantier v2.0 streams (analyse seconde par seconde),
  // ce garde-fou n'est qu'un filet de sécurité en attendant.
  for (let i = estimates.length - 1; i >= 0; i--) {
    const ecartRelatif = Math.abs(estimates[i].value - BASE_TIME) / BASE_TIME;
    if (ecartRelatif > 0.20) {
      details.push({ label: "⚠️ Source écartée (résultat incohérent)", value: fmtTime(Math.round(estimates[i].value)) + " — écart trop important vs référence connue" });
      // Marque la source correspondante comme écartée (vmaData/specData/
      // seuilData ne sont pas directement liés à estimates[i], donc on
      // retrouve la source par son poids caractéristique : VMA=0.35,
      // SPEC=0.45, SEUIL=0.10 — cf. les 3 estimates.push() ci-dessus).
      if (Math.abs(estimates[i].weight - 0.35) < 0.01) vmaData._exclu = true;
      else if (Math.abs(estimates[i].weight - 0.45) < 0.01) specData._exclu = true;
      else if (Math.abs(estimates[i].weight - 0.10) < 0.01) seuilData._exclu = true;
      estimates.splice(i, 1);
    }
  }

  // ── Pondération Lavandou selon le TEMPS écoulé (pas la quantité de
  // données) ────────────────────────────────────────────────────────────
  // Bug de conception trouvé le 8 juillet 2026 : l'ancien système (paliers
  // selon le nombre de séances intensives disponibles) traitait injustement
  // deux coureurs différemment selon leur FRÉQUENCE d'entraînement — un
  // coureur qui fait une VMA toutes les semaines atteint "5 séances" en
  // 5 semaines, un autre qui en fait une toutes les 2 semaines met 10
  // semaines pour la même confiance, même si son entraînement est
  // parfaitement valide. La pertinence de la référence de base diminue
  // naturellement avec le TEMPS qui passe (la forme évolue avec les
  // semaines d'entraînement), pas avec un comptage brut de séances.
  //
  // Décroissance linéaire de 90% (semaine 1) à 10% (semaine 8+), avec un
  // garde-fou : si aucune séance intensive (VMA/SPEC) dans les 3 dernières
  // semaines, le poids ne descend jamais sous 50% peu importe où on en est
  // dans la décroissance — évite qu'une pause/blessure fasse s'effondrer le
  // poids de la référence sans vraies données récentes pour la remplacer.
  const hasVma   = vmaData !== null && !vmaData._exclu;
  const hasSpec  = specData !== null && !specData._exclu;
  const hasSeuil = seuilData !== null && seuilData.laps.length > 0 && !seuilData._exclu;

  const semainesEcoulees = window.__PLAN_BRUT__?.dateDebut
    ? Math.floor((new Date(today()) - new Date(window.__PLAN_BRUT__.dateDebut)) / (7*86400000)) + 1
    : 1;
  const POIDS_DEPART = 0.90, POIDS_PLANCHER = 0.10, DUREE_DECROISSANCE_SEMAINES = 8;
  const progression = Math.min(Math.max((semainesEcoulees - 1) / (DUREE_DECROISSANCE_SEMAINES - 1), 0), 1);
  let lavendouWeight = POIDS_DEPART - progression * (POIDS_DEPART - POIDS_PLANCHER);

  // Garde-fou : dernière séance VMA ou SPEC dans les 3 dernières semaines ?
  const dateLimiteRecente = new Date(new Date(today()).getTime() - 21*86400000).toISOString().slice(0,10);
  const dateVmaRecente = hasVma ? vmaData.runs.some(r => r.start_date_local?.slice(0,10) >= dateLimiteRecente) : false;
  const dateSpecRecente = hasSpec ? specData.runs.some(r => r.start_date_local?.slice(0,10) >= dateLimiteRecente) : false;
  const donneesRecentes = dateVmaRecente || dateSpecRecente;
  if (!donneesRecentes) lavendouWeight = Math.max(lavendouWeight, 0.50);

  // Repli sur le seuil si ni VMA ni SPEC n'existent du tout (même esprit
  // que l'ancien palier "hasSeuil -> 0.70" — une source plus faible mérite
  // un poids de référence plus élevé, peu importe le temps écoulé)
  if (!hasVma && !hasSpec && hasSeuil) lavendouWeight = Math.max(lavendouWeight, 0.70);
  if (!hasVma && !hasSpec && !hasSeuil) lavendouWeight = 1.00;

  let estimate = BASE_TIME;
  let confidence = 30;
  let method = "Référence (" + fmtTime(BASE_TIME_REFERENCE) + ")";

  if (estimates.length > 0) {
    const totalWeight = estimates.reduce((s,e) => s+e.weight, 0);
    const weighted = estimates.reduce((s,e) => s+e.value*e.weight, 0) / totalWeight;
    estimate = BASE_TIME * lavendouWeight + weighted * (1 - lavendouWeight);
    confidence = Math.min(30 + (vmaData?.laps.length||0)*3 + (specData?.laps.length||0)*5 + (seuilData?.laps.length||0)*2, 95);
    method = estimates.length===1 ? "1 source" : estimates.length+" sources combinées";
    // La référence de base contribue toujours au calcul final (via
    // lavendouWeight), mais n'apparaissait jamais dans la liste des
    // sources affichée au tap — demandé par Laurent le 8 juillet 2026,
    // qui la cherchait sans la trouver. Ajoutée en dernier (après les
    // autres sources réelles, cohérent avec son rôle de repli/stabilisateur
    // plutôt que de source principale).
    details.push({ label: `Référence · poids ${Math.round(lavendouWeight*100)}%`, value: fmtTime(BASE_TIME_REFERENCE) });
  }

  const target = 48.5*60;
  const gap = estimate - target;

  // Enregistrer l\'estimation du jour dans l\'historique
  const todayStr = today();
  const lastEntry = predHistory[predHistory.length-1];
  if (!lastEntry || lastEntry.date !== todayStr) {
    predHistory.push({ date: todayStr, time: Math.round(estimate), confidence, predictorVersion: PREDICTOR_VERSION });
    if (predHistory.length > 80) predHistory.shift();
    save(clePourPlan("lk_pred_history"), predHistory);
  } else if (lastEntry.date === todayStr && lastEntry.time !== Math.round(estimate)) {
    // Mettre à jour l'entrée du jour si l'estimation a changé
    predHistory[predHistory.length-1] = { date: todayStr, time: Math.round(estimate), confidence, predictorVersion: PREDICTOR_VERSION };
    save(clePourPlan("lk_pred_history"), predHistory);
  }

  // Fourchette selon la confiance
  const margin = Math.round((1 - confidence/100) * 90); // ±0-90 sec selon confiance
  const estimateLow = Math.round(estimate) - margin;
  const estimateHigh = Math.round(estimate) + margin;

  return {
    time: Math.round(estimate), timeStr: fmtTime(Math.round(estimate)),
    timeLow: fmtTime(estimateLow), timeHigh: fmtTime(estimateHigh),
    target: fmtTime(target), gap: Math.round(gap),
    gapStr: (gap>0?"+":"")+fmtTime(Math.abs(Math.round(gap))),
    onTrack: gap<=30, confidence, method, details,
  };
}

  const cw=currentWeek(), cd=countdown(), gp=globalPct();
  const done=ALL_SESSIONS.filter(s=>statuses[s.uid]==="✅").length;
  const missed=ALL_SESSIONS.filter(s=>statuses[s.uid]==="❌").length;
  const adapted=ALL_SESSIONS.filter(s=>statuses[s.uid]==="⚠️").length;

  // ── Proposition de progression de palier marche-course (grand débutant,
  // 14/07/2026) ────────────────────────────────────────────────────────────
  // Même pattern que l'adaptation dynamique ci-dessous : détection
  // automatique, application seulement sur confirmation explicite. Pas de
  // "Ignorer" ici (contrairement à l'adaptation) — rester au palier actuel
  // est un choix normal et récurrent, pas un refus ponctuel à mémoriser.
  const progressionMarcheCourseEl = (() => {
    if (!window.__PLAN_BRUT__) return null;
    window.__PLAN_BRUT__.statuses = statuses;
    const progression = analyserProgressionMarcheCourse(window.__PLAN_BRUT__);
    if (!progression) return null; // pas un plan grand-débutant

    const banniereIgnoreeCettePalier = load(clePourPlan("lk_palier_propose_ignore"), null) === progression.palierId;

    // Warning de stagnation (garde-fou 12 semaines) — affiché même si pas
    // encore prêt pour le palier suivant, informatif seulement.
    const warningStagnation = progression.warnings.length > 0
      ? el("div",{style:{background:"rgba(var(--warn-rgb),0.07)",border:"1px solid rgba(var(--warn-rgb),0.2)",borderRadius:"12px",padding:"14px 16px",marginBottom:"16px"}},
          el("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
            el("span",{style:{fontSize:"20px"}},"💛"),
            el("div",{class:"muted",style:{fontSize:"14px",lineHeight:"1.5"}}, progression.warnings[0].message)
          )
        )
      : null;

    // Dernier palier (course continue 30min) déjà atteint ET validé : pas de
    // "palier suivant" possible côté marche-course, on propose la création
    // d'un vrai plan debutant (structure longue/EF/qualité) plutôt qu'une
    // conversion automatique en place (jugée risquée, cf. décision du
    // 14/07/2026 — même logique prudente que la dé-duplication moteur/classic
    // reportée pour la même raison). "Continuer ce palier" reste possible :
    // rien n'oblige à basculer tout de suite.
    if (progression.dernierPalier && progression.pretPourSuivant && !banniereIgnoreeCettePalier) {
      return el("div",{style:{padding:"0"}},
        warningStagnation,
        el("div",{style:{background:"rgba(var(--accent2-rgb),0.07)",border:"1px solid rgba(var(--accent2-rgb),0.2)",borderRadius:"12px",padding:"14px 16px",marginBottom:"16px"}},
          el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}},
            el("span",{style:{fontSize:"20px"}},"🏆"),
            el("span",{style:{color:"var(--accent2)",fontSize:"15px",fontWeight:"700"}},"Tu cours en continu !")
          ),
          el("div",{class:"muted",style:{fontSize:"14px",marginBottom:"12px",lineHeight:"1.5"}},
            progression.seancesValidees+" séances de course continue réussies — la marche-course a fait son travail. Tu peux passer à un vrai plan d'entraînement, avec sortie longue et séances qualité, quand tu es prêt·e."),
          el("div",{style:{display:"flex",gap:"8px"}},
            el("a",{href:"/v2",style:{flex:"1",display:"block",textAlign:"center",background:"var(--accent2)",border:"none",borderRadius:"8px",padding:"9px",color:"#F8FAFC",fontSize:"14px",fontWeight:"700",cursor:"pointer",textDecoration:"none"},
              onClick: async (e)=>{
                // Clôture le plan grand-débutant AVANT de rediriger — sans
                // ça, il reste "actif indéfiniment" (pas de dateCloture) et
                // bloque la création du nouveau plan via le garde-fou
                // anti-chevauchement (assurerPlanExiste). Ajouté le
                // 15/07/2026. e.preventDefault() le temps de l'appel
                // réseau (best-effort, mais on attend quand même pour
                // maximiser les chances que la clôture soit bien
                // enregistrée avant que le nouveau plan tente de se créer).
                e.preventDefault();
                const dateCloture = new Date().toISOString().slice(0,10);
                if (window.__UTILISATEUR__?.id && window.LkSync?.cloturerPlanSupabase && window.__PLAN_BRUT__?.id) {
                  try {
                    await window.LkSync.cloturerPlanSupabase(window.__PLAN_BRUT__.id, dateCloture);
                  } catch (err) {
                    console.warn("Clôture du plan grand-débutant échouée (non bloquant) :", err.message);
                  }
                }
                window.location.href = "/v2";
              }
            },"Configurer mon prochain plan"),
            el("button",{style:{flex:"1",background:"none",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"8px",padding:"9px",color:"var(--text-muted)",fontSize:"14px",fontWeight:"600",cursor:"pointer"},
              feedback:true,
              onClick:()=>{
                save(clePourPlan("lk_palier_propose_ignore"), progression.palierId);
                render();
              }
            },"Pas encore")
          )
        )
      );
    }

    if (!progression.pretPourSuivant || progression.dernierPalier || banniereIgnoreeCettePalier) {
      return warningStagnation;
    }

    const palierActuel = PALIERS_MARCHE_COURSE[progression.palierId];
    const palierSuivant = PALIERS_MARCHE_COURSE[progression.palierId + 1];

    return el("div",{style:{padding:"0"}},
      warningStagnation,
      el("div",{style:{background:"rgba(var(--accent2-rgb),0.07)",border:"1px solid rgba(var(--accent2-rgb),0.2)",borderRadius:"12px",padding:"14px 16px",marginBottom:"16px"}},
        el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}},
          el("span",{style:{fontSize:"20px"}},"🎉"),
          el("span",{style:{color:"var(--accent2)",fontSize:"15px",fontWeight:"700"}},"Prêt·e pour la suite ?")
        ),
        el("div",{class:"muted",style:{fontSize:"14px",marginBottom:"12px",lineHeight:"1.5"}},
          progression.seancesValidees+" séances réussies sur \""+palierActuel.label+"\" — tu peux passer à \""+palierSuivant.label+"\" quand tu veux, ou continuer encore un peu à ce rythme."),
        el("div",{style:{display:"flex",gap:"8px"}},
          el("button",{style:{flex:"1",background:"var(--accent2)",border:"none",borderRadius:"8px",padding:"9px",color:"#F8FAFC",fontSize:"14px",fontWeight:"700",cursor:"pointer"},
            feedback:true,
            onClick:async ()=>{ await changerPalierGrandDebutant(progression.palierId + 1); }
          },"Palier suivant"),
          el("button",{style:{flex:"1",background:"none",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"8px",padding:"9px",color:"var(--text-muted)",fontSize:"14px",fontWeight:"600",cursor:"pointer"},
            feedback:true,
            onClick:()=>{
              save(clePourPlan("lk_palier_propose_ignore"), progression.palierId);
              render();
            }
          },"Continuer ce palier")
        )
      )
    );
  })();

  // Carte permanente "prochain palier" (17.5, 15/07/2026, demande de
  // Laurent) — même esprit que heroPred (objectif/estimation du mode
  // course) mais pour le grand-débutant : toujours visible tant qu'un plan
  // marche-course est actif, pas seulement quand une bannière de transition
  // se déclenche. Affiche le palier courant et le suivant, avec un accès
  // direct au changement de palier si déjà débloqué (progression.pretPourSuivant),
  // sans attendre que la bannière progressionMarcheCourseEl apparaisse.
  const prochainPalierEl = (() => {
    if (!window.__PLAN_BRUT__ || window.__PLAN_BRUT__.sousMode !== 'marche-course') return null;
    const progression = analyserProgressionMarcheCourse(window.__PLAN_BRUT__);
    if (!progression) return null;

    const palierActuel = PALIERS_MARCHE_COURSE[progression.palierId];
    const palierSuivant = progression.dernierPalier ? null : PALIERS_MARCHE_COURSE[progression.palierId + 1];

    return el("div",{style:{background:"linear-gradient(135deg,var(--bg) 0%,var(--border-soft) 100%)",borderRadius:"16px",padding:"16px",marginBottom:"12px",border:"1px solid rgba(var(--accent2-rgb),0.2)",marginTop:"8px"}},
      el("div",{style:{marginBottom:"14px"}},
        el("div",{style:{color:"var(--accent2)",fontSize:"15px",fontWeight:"700",marginBottom:"2px"}},"🏃 Progression marche-course"),
        el("div",{class:"muted",style:{fontSize:"13px"}},progression.totalSeancesSuivies+" séance"+(progression.totalSeancesSuivies>1?"s":"")+" suivie"+(progression.totalSeancesSuivies>1?"s":"")+" sur ce plan")
      ),
      el("div",{style:{display:"grid",gridTemplateColumns:palierSuivant?"1fr 1px 1fr":"1fr",gap:"12px",marginBottom:"4px"}},
        el("div",{style:{textAlign:"center"}},
          el("div",{class:"label",style:{marginBottom:"4px"}},"Palier actuel"),
          el("div",{style:{color:"var(--text)",fontSize:"22px",fontWeight:"900",letterSpacing:"-0.5px",lineHeight:"1.2"}},palierActuel.label),
          el("div",{class:"muted",style:{fontSize:"13px",marginTop:"2px"}},progression.seancesValidees+" validée"+(progression.seancesValidees>1?"s":"")+" à ce palier")
        ),
        palierSuivant ? el("div",{style:{background:"var(--border)"}}) : null,
        palierSuivant ? el("div",{style:{textAlign:"center"}},
          el("div",{class:"label",style:{marginBottom:"4px"}},"Palier suivant"),
          el("div",{style:{color:progression.pretPourSuivant?"var(--accent2)":"var(--text-muted)",fontSize:"22px",fontWeight:"900",letterSpacing:"-0.5px",lineHeight:"1.2"}},palierSuivant.label),
          progression.pretPourSuivant
            ? el("div",{style:{fontSize:"13px",marginTop:"2px",color:"var(--accent2)",fontWeight:"700"}},"🎉 Débloqué")
            : el("div",{class:"muted",style:{fontSize:"13px",marginTop:"2px"}},"Encore un peu de patience")
        ) : el("div",{class:"muted",style:{fontSize:"13px",textAlign:"center"}},"Dernier palier — tu y es !")
      ),
      progression.pretPourSuivant && palierSuivant ? el("button",{style:{width:"100%",marginTop:"12px",background:"var(--accent2)",border:"none",borderRadius:"8px",padding:"9px",color:"#F8FAFC",fontSize:"14px",fontWeight:"700",cursor:"pointer"},
        feedback:true,
        onClick:async ()=>{ await changerPalierGrandDebutant(progression.palierId + 1); }
      },"Passer à \""+palierSuivant.label+"\"") : null
    );
  })();

  // ── Proposition d'adaptation dynamique (étape 4, doc convergence) ────────
  // Décidé avec Laurent le 8 juillet 2026 : détection AUTOMATIQUE (comme le
  // statut lui-même), mais application seulement sur confirmation explicite
  // — pas d'automatisme silencieux sur une vraie modification du plan.
  // "Ignorer" ne mémorise le refus que pour CETTE semaine précise (pas
  // définitif pour tout le plan) — si une nouvelle semaine tombe plus tard
  // dans la même situation, une nouvelle proposition apparaît normalement.
  const adaptationEl = (() => {
    if (!window.__PLAN_BRUT__) return null;
    // synchronise les statuts (variable séparée côté index.html, préfixée
    // par plan) sur l'objet plan brut avant d'appeler analyserAdaptations,
    // qui lit plan.statuses directement
    window.__PLAN_BRUT__.statuses = statuses;
    const { semainesAAdapter } = analyserAdaptations(window.__PLAN_BRUT__);
    const semainesIgnorees = load(clePourPlan("lk_adaptations_ignorees"), []);
    const semaineNumsAProposer = [...semainesAAdapter.keys()].filter(n => !semainesIgnorees.includes(n));
    if (semaineNumsAProposer.length === 0) return null;
    const semaineNum = semaineNumsAProposer[0]; // une seule proposition à la fois, la plus proche

    return el("div",{style:{background:"rgba(var(--accent-rgb),0.07)",border:"1px solid rgba(var(--accent-rgb),0.2)",borderRadius:"12px",padding:"14px 16px",marginBottom:"16px"}},
      el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}},
        el("span",{style:{fontSize:"20px"}},"🔄"),
        el("span",{style:{color:"var(--accent)",fontSize:"15px",fontWeight:"700"}},"Adaptation suggérée")
      ),
      el("div",{class:"muted",style:{fontSize:"14px",marginBottom:"12px",lineHeight:"1.5"}},
        "Plusieurs séances difficiles récemment — la semaine "+semaineNum+" pourrait être allégée pour mieux récupérer."),
      el("div",{style:{display:"flex",gap:"8px"}},
        el("button",{style:{flex:"1",background:"var(--accent)",border:"none",borderRadius:"8px",padding:"9px",color:"#F8FAFC",fontSize:"14px",fontWeight:"700",cursor:"pointer"},
          feedback:true,
          onClick:()=>{
            appliquerAdaptations(window.__PLAN_BRUT__);
            window.__PLAN_GENERE__ = traduirePlanVersFormatV1(window.__PLAN_BRUT__);
            PLAN = window.__PLAN_GENERE__;
            ALL_SESSIONS = recalculerAllSessions();
            if (getGithubToken && getGithubToken() && sauvegarderPlan) {
              sauvegarderPlan(window.__PLAN_BRUT__).catch(e => console.warn("Adaptation appliquée localement, sauvegarde échouée :", e.message));
            }
            render();
          }
        },"Appliquer"),
        el("button",{style:{flex:"1",background:"none",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"8px",padding:"9px",color:"var(--text-muted)",fontSize:"14px",fontWeight:"600",cursor:"pointer"},
          feedback:true,
          onClick:()=>{
            const ignorees = load(clePourPlan("lk_adaptations_ignorees"), []);
            save(clePourPlan("lk_adaptations_ignorees"), [...ignorees, semaineNum]);
            render();
          }
        },"Ignorer")
      )
    );
  })();

  // ── Proposition du moteur de décision (étape 4, doc intégration moteur-decision) ──
  // Cf. §8.2 doc intégration : carte au-dessus du plan de la semaine, même
  // esprit que adaptationEl ci-dessus. Détection AUTOMATIQUE à chaque rendu
  // du dashboard (§5 doc intégration, "fréquence de calcul : à chaque
  // ouverture"), application seulement sur clic explicite "Appliquer" —
  // §7.1 doc intégration : rien n'est automatique en V1, même les décisions
  // de sécurité à haute confiance. "Ignorer" ne mémorise le refus que pour
  // CETTE décision précise (regleId + date du jour) — une nouvelle décision
  // (même règle, jour différent, ou règle différente) sera reproposée
  // normalement, cohérent avec le comportement documenté en §8.1 point 7
  // ("le moteur pourra re-proposer... il ne insiste pas activement, il
  // réévalue simplement à chaque nouveau calcul").
  const moteurDecisionEl = (() => {
    if (!window.__PLAN_BRUT__ || window.__PLAN_BRUT__.estPlanRepli) return null;
    if (typeof DecisionEngineApply === 'undefined') return null; // scripts pas encore chargés, jamais planter le dashboard pour ça

    const etatMoteur = calculerEtatMoteurDecision();
    if (!etatMoteur || !etatMoteur.decision) return null;
    const decision = etatMoteur.decision;

    // Décisions informatives (alerter_*) : affichées mais sans bouton "Appliquer" (rien à appliquer au plan, cf. decision-engine-apply.classic.js)
    const estInformative = decision.type !== 'reduire_charge';

    const cleIgnoree = clePourPlan("lk_decision_moteur_ignoree");
    const ignoree = load(cleIgnoree, null);
    const idDecisionDuJour = decision.id + "_" + today();
    if (ignoree === idDecisionDuJour) return null;

    // Pour une décision reduire_charge, vérifie qu'une cible sûre existe AVANT
    // d'afficher la carte — sinon on proposerait "Appliquer" sur un bouton qui
    // échouerait silencieusement, cf. limite actée le 16/07/2026 (séances de
    // qualité non modifiables automatiquement).
    let cibleInfo = null;
    if (!estInformative) {
      cibleInfo = DecisionEngineApply.trouverProchaineSeanceCible(window.__PLAN_BRUT__, new Date().toISOString());
      if (!cibleInfo) return null; // aucune cible sûre cette semaine — le moteur reste muet plutôt que de proposer une action impossible
    }

    const texteApercu = estInformative
      ? decision.justification
      : decision.justification + ` (${cibleInfo.seance.type}, ${Math.round(cibleInfo.seance.kmEstime * 10) / 10}→${Math.round(cibleInfo.seance.kmEstime * (1 + decision.ampleurPourcent / 100) * 10) / 10}km)`;

    return el("div",{style:{background:"rgba(var(--accent-rgb),0.07)",border:"1px solid rgba(var(--accent-rgb),0.2)",borderRadius:"12px",padding:"14px 16px",marginBottom:"16px"}},
      el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}},
        el("span",{style:{fontSize:"20px"}},"🟠"),
        el("span",{style:{color:"var(--accent)",fontSize:"15px",fontWeight:"700"}},"Yoria te propose un ajustement")
      ),
      el("div",{class:"muted",style:{fontSize:"14px",marginBottom:"12px",lineHeight:"1.5"}}, texteApercu),
      el("div",{style:{display:"flex",gap:"8px"}},
        estInformative ? null : el("button",{style:{flex:"1",background:"var(--accent)",border:"none",borderRadius:"8px",padding:"9px",color:"#F8FAFC",fontSize:"14px",fontWeight:"700",cursor:"pointer"},
          feedback:true,
          onClick:()=>{
            const resultat = DecisionEngineApply.appliquerDecisionAuPlan(window.__PLAN_BRUT__, decision, new Date().toISOString());
            if (!resultat.succes) {
              console.warn("Application de la décision du moteur refusée :", resultat.raison);
              // Garde-fou §10.2 : un refus (ex. plafond de réduction cumulée
              // atteint) doit rester visible au coureur, jamais un clic
              // silencieux sans effet apparent — cf. principe "sécurité
              // avant performance", qui s'applique aussi à la clarté de
              // l'information donnée, pas seulement à la protection physique.
              alert("Cet ajustement n'a pas pu être appliqué : " + resultat.raison);
              return;
            }
            window.__PLAN_GENERE__ = traduirePlanVersFormatV1(window.__PLAN_BRUT__);
            PLAN = window.__PLAN_GENERE__;
            ALL_SESSIONS = recalculerAllSessions();
            if (getGithubToken && getGithubToken() && sauvegarderPlan) {
              sauvegarderPlan(window.__PLAN_BRUT__).catch(e => console.warn("Décision du moteur appliquée localement, sauvegarde échouée :", e.message));
            }
            render();
          }
        },"Appliquer"),
        el("button",{style:{flex:"1",background:"none",boxShadow:"0 1px 3px var(--shadow1), 0 1px 2px var(--shadow2)",borderRadius:"8px",padding:"9px",color:"var(--text-muted)",fontSize:"14px",fontWeight:"600",cursor:"pointer"},
          feedback:true,
          onClick:()=>{
            save(cleIgnoree, idDecisionDuJour);
            render();
          }
        },"Ignorer")
      )
    );
  })();

  // Banniere post-course
  const raceResult = load(clePourPlan("lk_race_result"), null);
  if (!ESTMODEFORME && today() >= DATE_COURSE_REFERENCE && raceResult) {
    const diff = raceResult - raceGoalTime;
    const achieved = diff <= 0;
    const close = diff > 0 && diff <= 60;
    const color = achieved ? "var(--accent2)" : close ? "var(--warn)" : "var(--accent)";
    const emoji = achieved ? "🏅" : close ? "⚡" : "📈";
    const title = achieved ? "Objectif atteint !" : close ? "Tres belle course !" : "Belle progression !";
    const diffVsStart = BASE_TIME_REFERENCE - raceResult;
    const subtitle = achieved
      ? (Math.abs(diff) > 0 ? "-"+fmtTime(Math.abs(diff))+" sous objectif" : "Exactement dans les temps")
      : close ? "+"+fmtTime(Math.abs(diff))+" au-dessus objectif"
      : "-"+fmtTime(Math.abs(diffVsStart))+" par rapport au depart";
    const coachMsg2 = achieved
      ? "Bravo ! " + PLAN.length + " semaines de travail, tu as merite ce resultat. Lea est fiere de toi !"
      : close ? fmtTime(Math.abs(diff))+" ! Si proche. Belle progression en "+PLAN.length+" semaines."
      : "Belle progression de "+fmtTime(Math.abs(diffVsStart))+" en "+PLAN.length+" semaines. On continue !";

    const inp = document.createElement("input");
    inp.type="time"; inp.step="1";
    inp.style.cssText="flex:1;background:var(--border-soft);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:16px;";
    const hh=Math.floor(raceResult/3600), mm=Math.floor((raceResult%3600)/60), ss2=raceResult%60;
    inp.value=hh.toString().padStart(2,"0")+":"+mm.toString().padStart(2,"0")+":"+ss2.toString().padStart(2,"0");
    const saveBtn2=document.createElement("button");
    saveBtn2.textContent="OK";
    saveBtn2.style.cssText="background:"+color+";border:none;border-radius:8px;padding:8px 16px;color:"+(close?"var(--bg)":"#fff")+";font-size:14px;font-weight:700;cursor:pointer;";
    saveBtn2.addEventListener("click",()=>{
      const parts=inp.value.split(":");
      if(parts.length>=2){const secs=parseInt(parts[0])*3600+parseInt(parts[1])*60+(parseInt(parts[2])||0);if(!isNaN(secs)&&secs>0){save(clePourPlan("lk_race_result"),secs);render();}}
    });
    const inputRow=document.createElement("div");
    inputRow.style.cssText="display:flex;gap:8px;";
    inputRow.appendChild(inp); inputRow.appendChild(saveBtn2);
    const inputCard=el("div",{style:{background:"var(--bg)",borderRadius:"10px",padding:"12px",marginTop:"8px"}},
      el("div",{style:{color:"var(--text)",fontSize:"14px",fontWeight:"700",marginBottom:"8px"}},"Corriger mon resultat")
    );
    inputCard.appendChild(inputRow);
    const banner=el("div",{style:{background:"var(--bg)",border:"1px solid "+color+"44",borderRadius:"16px",padding:"20px",marginBottom:"12px",marginTop:"8px",textAlign:"center"}},
      el("div",{style:{fontSize:"48px",marginBottom:"8px"}},emoji),
      el("div",{style:{color:color,fontSize:"22px",fontWeight:"900",marginBottom:"4px"}},title),
      el("div",{style:{color:"var(--text)",fontSize:"15px",marginBottom:"16px"}},RACE_NAME+" - "+new Date(DATE_COURSE_REFERENCE+"T00:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})),
      el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1px 1fr",gap:"12px",marginBottom:"12px"}},
        el("div",{style:{textAlign:"center"}},el("div",{style:{color:"var(--text-muted)",fontSize:"11px",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"4px"}},"Objectif"),el("div",{style:{color:"var(--accent)",fontSize:"24px",fontWeight:"900"}},fmtTime(raceGoalTime))),
        el("div",{style:{background:"var(--border)"}}),
        el("div",{style:{textAlign:"center"}},el("div",{style:{color:"var(--text-muted)",fontSize:"11px",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"4px"}},"Resultat"),el("div",{style:{color:color,fontSize:"24px",fontWeight:"900"}},fmtTime(raceResult)))
      ),
      el("div",{style:{background:color+"22",border:"1px solid "+color+"44",borderRadius:"10px",padding:"12px",marginBottom:"12px"}},el("div",{style:{color:color,fontSize:"14px",fontWeight:"700"}},subtitle)),
      el("div",{style:{background:"var(--border-soft)",borderRadius:"8px",padding:"10px 12px",display:"flex",gap:"8px",textAlign:"left",marginBottom:"8px"}},el("span",{style:{fontSize:"18px",flexShrink:"0"}},"🤖"),el("div",{style:{color:"var(--text2)",fontSize:"13px",lineHeight:"1.5"}},coachMsg2))
    );
    banner.appendChild(inputCard);
    const hdr=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"12px 0 10px",marginBottom:"12px",borderBottom:"1px solid var(--border)"}},
      runByLeaIcon(24,6),
      el("div",{style:{color:"var(--text)",fontSize:"16px",fontWeight:"800"}},"Yoria"),
      el("div",{style:{flex:"1"}}),
      el("div",{style:{background:"var(--border-soft)",borderRadius:"8px",padding:"4px 10px",color:"var(--accent)",fontSize:"14px",fontWeight:"700"}},"J-"+cd)
    );
    const wrapper=document.createElement("div");
    wrapper.style.cssText="padding:0 16px 100px;";
    wrapper.appendChild(hdr); wrapper.appendChild(banner);
    return wrapper;
  }
