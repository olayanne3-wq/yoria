                color: report.avgEfPace < report.prevEfPace ? "#22c55e" : report.avgEfPace > report.prevEfPace+10 ? "#ef4444" : "#e2e8f0"
              }}, report.avgEfPace < report.prevEfPace ? "📈" : report.avgEfPace > report.prevEfPace+10 ? "📉" : "➡️") : null
            ),
            el("div",{class:"muted",style:{fontSize:"13px"}},"allure moy. EF"+(report.prevEfPace?(" · "+(report.avgEfPace<report.prevEfPace?"-":"+")+(Math.abs(Math.round(report.avgEfPace-report.prevEfPace)))+"\" vs S"+(cw2-1)):""))
          ):null,
          report.avgEfHr?el("div",{},
            el("div",{style:{display:"flex",alignItems:"center",gap:"4px"}},
              el("div",{style:{color:"#f97316",fontSize:"15px",fontWeight:"700"}},report.avgEfHr+" bpm"),
              report.prevEfHr ? el("span",{style:{
                fontSize:"13px",
                color: report.avgEfHr < report.prevEfHr ? "#22c55e" : report.avgEfHr > report.prevEfHr+3 ? "#ef4444" : "#e2e8f0"
              }}, report.avgEfHr < report.prevEfHr ? "📈" : report.avgEfHr > report.prevEfHr+3 ? "📉" : "➡️") : null
            ),
            el("div",{class:"muted",style:{fontSize:"13px"}},"FC moy. EF"+(report.prevEfHr?(" · "+(report.avgEfHr<report.prevEfHr?"-":"+")+(Math.abs(report.avgEfHr-report.prevEfHr))+" bpm vs S"+(cw2-1)):""))
          ):null,
          (()=>{
            const efSessions = ALL_SESSIONS.filter(s=>(s.type==="EF"||s.type==="LONGUE")&&s.week===cw2&&historicalWeatherCache[s.date]!=null);
            if (!efSessions.length) return null;
            const avgTemp = Math.round(efSessions.reduce((s,e)=>s+historicalWeatherCache[e.date],0)/efSessions.length);
            return el("div",{},
              el("div",{style:{color:avgTemp>28?"#f97316":"#e2e8f0",fontSize:"15px",fontWeight:"700"}},avgTemp+"°C"),
              el("div",{class:"muted",style:{fontSize:"13px"}},"temp. moy. séances")
            );
          })()
        )
      )
    );
  }

    // ── Barres de progression km + temps ─────────────────────────────────────
  const totalKm = Math.round(stravaActivities.reduce((s,a)=>s+a.distance,0)/100)/10;
  const totalMin = Math.round(stravaActivities.reduce((s,a)=>s+a.moving_time,0)/60);
  const totalH = Math.floor(totalMin/60);
  const totalMmin = totalMin%60;

  // Calculer km et temps prévus total du plan
  let plannedKmTotal = 0, plannedMinTotal = 0;
  ALL_SESSIONS.filter(s=>s.type!=="REPOS"&&s.type!=="RACE").forEach(s=>{
    const m1=s.session.match(/(\d+)(?:[–-](\d+))?\s*min/);
    if(m1) plannedMinTotal += m1[2]?(parseInt(m1[1])+parseInt(m1[2]))/2:parseInt(m1[1]);
    const m2=s.warmup.match(/(\d+)'/); if(m2) plannedMinTotal+=parseInt(m2[1]);
    const m3=s.cooldown.match(/(\d+)'/); if(m3) plannedMinTotal+=parseInt(m3[1]);
  });
  plannedKmTotal = Math.round(plannedMinTotal/6.33*10)/10; // 6:20/km
  const plannedH = Math.floor(plannedMinTotal/60);
  const pctKm = Math.min(100,Math.round(totalKm/plannedKmTotal*100));
  const pctMin = Math.min(100,Math.round(totalMin/plannedMinTotal*100));

  const progressEl = stravaActivities.length>0 ? el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px"}},
    el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}},
      el("div",{style:{display:"flex",alignItems:"center",gap:"6px"}},
        el("span",{style:{fontSize:"15px"}},"🏃"),
        el("span",{class:"muted",style:{fontSize:"14px"}},totalKm+" km / ~"+Math.round(plannedKmTotal)+" km")
      ),
      el("span",{style:{color:"#22c55e",fontSize:"14px",fontWeight:"700"}},pctKm+"%")
    ),
    el("div",{style:{height:"4px",background:"#232738",borderRadius:"2px",marginBottom:"8px"}},
      el("div",{style:{width:pctKm+"%",height:"100%",background:"#22c55e",borderRadius:"2px"}})
    ),
    el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}},
      el("div",{style:{display:"flex",alignItems:"center",gap:"6px"}},
        el("span",{style:{fontSize:"15px"}},"⏱️"),
        el("span",{class:"muted",style:{fontSize:"14px"}},totalH+"h"+(totalMmin).toString().padStart(2,"0")+"' / ~"+plannedH+"h prévues")
      ),
      el("span",{style:{color:"#22c55e",fontSize:"14px",fontWeight:"700"}},pctMin+"%")
    ),
    el("div",{style:{height:"4px",background:"#232738",borderRadius:"2px"}},
      el("div",{style:{width:pctMin+"%",height:"100%",background:"#22c55e",borderRadius:"2px"}})
    )
  ) : null;

  // ── Bilan de phase (tap pour révéler) ────────────────────────────────────
  const phase = phaseOf(cw);
  const phaseWeeks = phase.weeks || [];
  const phaseStart = phaseWeeks[0], phaseEnd = phaseWeeks[phaseWeeks.length-1];
  const phasePos = phaseWeeks.indexOf(cw) + 1;
  const phasePct = Math.round((phasePos / phaseWeeks.length) * 100);

  // Stats de la phase
  // Séances passées uniquement (jusqu'à aujourd\'hui)
  const phaseSessions = ALL_SESSIONS.filter(s => phaseWeeks.includes(s.week) && s.type !== "REPOS" && s.date <= today());
  const phaseValidated = phaseSessions.filter(s => statuses[s.uid]==="✅"||statuses[s.uid]==="⚠️");
  // Total prévu sur toute la phase (pour les barres par type)
  const phaseSessionsTotal = ALL_SESSIONS.filter(s => phaseWeeks.includes(s.week) && s.type !== "REPOS");
  const phaseKm = Math.round(phaseWeeks.reduce((acc, w) => acc + weekKm(w), 0) * 10) / 10;

  // Stats par type de séance dans la phase
  const phaseTypes = ["VMA","SPEC","SEUIL","EF","LONGUE"];
  const phaseTypeStats = phaseTypes.map(type => {
    const total = phaseSessionsTotal.filter(s => s.type===type).length;
    const done = phaseValidated.filter(s => s.type===type).length;
    return { type, total, done };
  }).filter(t => t.total > 0);

  // Allure EF moyenne
  const efRuns = stravaActivities.filter(a => {
    const d = a.start_date_local?.slice(0,10);
    const s = ALL_SESSIONS.find(ss => ss.date===d && ss.type==="EF");
    return s && phaseWeeks.includes(s.week);
  });
  const efAvgPace = efRuns.length > 0
    ? fmtPace(efRuns.reduce((s,a)=>s+a.average_speed,0)/efRuns.length)
    : null;

  // Allure intensive moyenne (VMA/SPEC)
  const intensiveRuns = stravaActivities.filter(a => {
    const d = a.start_date_local?.slice(0,10);
    const s = ALL_SESSIONS.find(ss => ss.date===d && (ss.type==="VMA"||ss.type==="SPEC"));
    return s && phaseWeeks.includes(s.week);
  });
  const intensiveLaps = intensiveRuns.flatMap(r => getEffortLaps(r));
  const intensiveAvgPace = intensiveLaps.length > 0
    ? fmtPace(intensiveLaps.reduce((s,l)=>s+l.average_speed,0)/intensiveLaps.length)
    : null;

  // Verdict
  const validationRate = phaseSessions.length > 0 ? phaseValidated.length / phaseSessions.length : 0;
  const verdictColor = validationRate >= 0.8 ? "#22c55e" : validationRate >= 0.6 ? "#eab308" : "#ef4444";
  const verdictIcon = validationRate >= 0.8 ? "🟢" : validationRate >= 0.6 ? "🟡" : "🔴";
  const verdictText = validationRate >= 0.8 ? "Bonne progression" : validationRate >= 0.6 ? "Progression correcte" : "Attention à la régularité";

  // Contenu détaillé (caché par défaut)
  const phaseDetailEl = el("div",{style:{display:"none",marginTop:"12px",borderTop:"1px solid #2e3347",paddingTop:"12px"}},
    // Stats clés
    el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"12px"}},
      el("div",{style:{background:"#232738",borderRadius:"8px",padding:"10px",textAlign:"center"}},
        el("div",{style:{color:"#f1f5f9",fontSize:"16px",fontWeight:"700"}},phaseKm+" km"),
        el("div",{class:"muted",style:{fontSize:"12px"}},"courus")
      ),
      efAvgPace ? el("div",{style:{background:"#232738",borderRadius:"8px",padding:"10px",textAlign:"center"}},
        el("div",{style:{color:"#60a5fa",fontSize:"16px",fontWeight:"700"}},efAvgPace),
        el("div",{class:"muted",style:{fontSize:"12px"}},"allure EF")
      ) : null,
      intensiveAvgPace ? el("div",{style:{background:"#232738",borderRadius:"8px",padding:"10px",textAlign:"center"}},
        el("div",{style:{color:"#f97316",fontSize:"16px",fontWeight:"700"}},intensiveAvgPace),
        el("div",{class:"muted",style:{fontSize:"12px"}},"allure int.")
      ) : null
    ),
    // Séances par type
    el("div",{style:{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"12px"}},
      ...phaseTypeStats.map(t => {
        const st = STYPES[t.type]||STYPES.EF;
        const pct = t.total > 0 ? Math.round(t.done/t.total*100) : 0;
        return el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
          el("span",{style:{background:st.color+"22",color:st.color,border:"1px solid "+st.color+"44",borderRadius:"4px",padding:"2px 7px",fontSize:"12px",fontWeight:"700",minWidth:"50px",textAlign:"center"}},t.type),
          el("div",{style:{flex:"1",height:"4px",background:"#232738",borderRadius:"2px"}},
            el("div",{style:{width:pct+"%",height:"100%",background:st.color,borderRadius:"2px"}})
          ),
          el("span",{style:{color:"#f1f5f9",fontSize:"13px"}},t.done+" / "+t.total)
        );
      })
    ),
    // Verdict
    el("div",{style:{background:verdictColor+"11",border:"1px solid "+verdictColor+"33",borderRadius:"8px",padding:"10px",display:"flex",alignItems:"center",gap:"8px"}},
      el("span",{style:{fontSize:"16px"}},verdictIcon),
      el("div",{},
        el("div",{style:{color:verdictColor,fontSize:"14px",fontWeight:"700"}},verdictText),
        el("div",{class:"muted",style:{fontSize:"12px"}},phaseValidated.length+" / "+phaseSessions.length+" séances validées")
      )
    )
  );

  // Header cliquable
  let phaseOpen = false;
  const phaseEl = el("div",{style:{background:"#1a1d27",border:"1px solid "+phase.color+"33",borderTop:"3px solid "+phase.color,borderRadius:"12px",padding:"12px 14px",marginBottom:"12px",cursor:"pointer"}},
    el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}},
      el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
        el("span",{style:{color:phase.color,fontSize:"15px",fontWeight:"700"}},phase.label),
        el("span",{class:"muted",style:{fontSize:"13px"}},"S"+phaseStart+"–S"+phaseEnd)
      ),
      el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
        el("span",{style:{color:phase.color,fontSize:"14px",fontWeight:"700"}},"S"+cw+" · "+phasePct+"%"),
        el("span",{class:"muted",style:{fontSize:"14px"}},"›")
      )
    ),
    el("div",{style:{height:"4px",background:"#232738",borderRadius:"2px"}},
      el("div",{style:{width:phasePct+"%",height:"100%",background:phase.color,borderRadius:"2px"}})
    ),
    phaseDetailEl
  );
  phaseEl.addEventListener("click", ()=>{
    phaseOpen = !phaseOpen;
    phaseDetailEl.style.display = phaseOpen ? "block" : "none";
    phaseEl.querySelector("span:last-child").textContent = phaseOpen ? "›" : "›";
    phaseEl.querySelector("span:last-child").style.transform = phaseOpen ? "rotate(90deg)" : "rotate(0deg)";
  });

  const helpBtn = el("button",{style:{
    background:"#232738",border:"1px solid #2e3347",borderRadius:"50%",
    width:"26px",height:"26px",display:"flex",alignItems:"center",justifyContent:"center",
    color:"#94a3b8",fontSize:"15px",fontWeight:"700",cursor:"pointer",flexShrink:"0"
  }}, "?");
  helpBtn.addEventListener("click",()=>{ setView("help"); });

  const dashHeaderEl = el("div",{style:{
    display:"flex",alignItems:"center",gap:"8px",
    padding:"12px 0 10px",marginBottom:"4px",
    borderBottom:"1px solid #2e3347"
  }},
    runByLeaIcon(24, 6),
    el("div",{style:{color:"#f1f5f9",fontSize:"16px",fontWeight:"800"}},"Run by Léa"),
    el("div",{style:{flex:"1"}}),
    el("div",{style:{background:"#232738",borderRadius:"8px",padding:"4px 10px",color:"#f97316",fontSize:"14px",fontWeight:"700"}},"J–"+countdown()),
    helpBtn
  );

  return el("div",{style:{padding:"0 16px 100px"}},dashHeaderEl,heroPred,todayEl||"",phaseEl,stravaSection);
}

// ══════════════════════════════════════════════════════════════════════════════
// SEMAINES
// ══════════════════════════════════════════════════════════════════════════════
function renderWeeks() {
  const cw=currentWeek();
  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{marginTop:"8px",marginBottom:"12px",color:"#e2e8f0",fontSize:"14px"}},"Semaine actuelle : ",el("span",{style:{color:"#f97316",fontWeight:"700"}},"S"+cw)),
    ...PLAN.map(week=>{
      const pct=weekPct(week), isActive=week.week===cw, color=phaseOf(week.week).color;
      const b=el("button",{style:{width:"100%",background:isActive?"#232738":"#1a1d27",border:`1px solid ${isActive?"#f9731655":"#2e3347"}`,borderLeft:`3px solid ${color}`,borderRadius:"10px",padding:"12px 14px",marginBottom:"8px",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:"12px"}},
        el("div",{style:{textAlign:"center",minWidth:"36px"}},
          el("div",{style:{color,fontSize:"18px",fontWeight:"800",lineHeight:"1"}},"S"+week.week),
          isActive?el("div",{style:{color:"#f97316",fontSize:"13px",fontWeight:"700"}},"NOW"):null
        ),
        el("div",{style:{flex:"1"}},
          el("div",{style:{color:"#f1f5f9",fontSize:"15px",fontWeight:"600"}},phaseOf(week.week).label),
          el("div",{class:"muted",style:{fontSize:"13px",marginTop:"2px"}},fmtDate(week.sessions[0].date)+" → "+fmtDate(week.sessions[6].date)),
          el("div",{style:{height:"3px",background:"#232738",borderRadius:"2px",marginTop:"6px",marginBottom:"6px"}},
            el("div",{style:{height:"100%",width:pct+"%",background:color,borderRadius:"2px"}})
          ),
          (()=>{
            const ws=weekStats(week.week);
            if (!ws) return null;
            if (ws.hasReal) return el("div",{},
              el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"2px"}},
                el("span",{class:"muted",style:{fontSize:"12px"}},"Distance"),
                el("span",{style:{fontSize:"12px"}},
                  el("span",{style:{color:"#fc4c02",fontWeight:"700"}},ws.realKm+" km"),
                  el("span",{class:"muted"}," / ~"+ws.plannedKm+" km")
                )
              ),
              el("div",{style:{display:"flex",justifyContent:"space-between"}},
                el("span",{class:"muted",style:{fontSize:"12px"}},"Durée"),
                el("span",{style:{fontSize:"12px"}},
                  el("span",{style:{color:"#fc4c02",fontWeight:"700"}},
                    Math.floor(ws.realMin/60)+"h"+(ws.realMin%60).toString().padStart(2,"0")+"'"
                  ),
                  el("span",{class:"muted"}," / ~"+Math.floor(ws.plannedMin/60)+"h"+(ws.plannedMin%60).toString().padStart(2,"0")+"'")
                )
              )
            );
            return el("div",{class:"muted",style:{fontSize:"12px",fontStyle:"italic"}},
              "~"+ws.plannedKm+" km · ~"+Math.floor(ws.plannedMin/60)+"h"+(ws.plannedMin%60).toString().padStart(2,"0")+"' prévus"
            );
          })()
        ),
        el("div",{class:"muted",style:{fontSize:"14px"}},pct+"%")
      );
      b.addEventListener("click",()=>{ selectedWeek=week.week; setView("weekDetail"); });
      return b;
    })
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// DÉTAIL SEMAINE
// ══════════════════════════════════════════════════════════════════════════════
const SOPTS=["—","✅","❌","⚠️","😴"];
const SCOLORS={"—":"#475569","✅":"#22c55e","❌":"#ef4444","⚠️":"#eab308","😴":"#60a5fa"};

function renderWeekDetail(weekNum) {
  const week=PLAN.find(w=>w.week===weekNum);
  if (!week) return el("div",{},"—");
  const t=today();
  const weekDates=week.sessions.map(s=>s.date);
  const weekRuns=stravaActivities.filter(a=>a.type==="Run"&&weekDates.includes(a.start_date_local?.slice(0,10)));

  const cards=week.sessions.map((s,i)=>{
    const uid=`${weekNum}-${i}`, isToday=s.date===t, isPast=s.date<t;
    const st=STYPES[s.type]||STYPES.REPOS;
    const stravaRun=weekRuns.find(r=>r.start_date_local?.slice(0,10)===s.date);
    const effortLaps=stravaRun?getEffortLaps(stravaRun):[];

    const uidStatus = statuses[uid];
    const isDoneSession = (uidStatus==="✅"||uidStatus==="⚠️") && s.type!=="REPOS";
    let cardExpanded = false;
    const card=el("div",{style:{
      background:isToday?"#232738":"#1a1d27",
      border:`1px solid ${isToday?"#f9731633":st.color+"22"}`,
      borderTop:`3px solid ${st.color}`,
      borderRadius:"12px",
      boxShadow:`0 6px 24px ${st.color}1a, 0 2px 8px rgba(0,0,0,0.4)`,
      padding:"12px 14px",marginBottom:"8px",
      opacity:isDoneSession?"0.7":"1",
      cursor:isDoneSession?"pointer":"default",
      transition:"opacity 0.2s ease"
    }},
      el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}},
        el("div",{style:{color:isPast?"#475569":"#e2e8f0",fontSize:"13px",fontWeight:"700",minWidth:"60px"}},s.day+" "+s.date.slice(8)),
        isToday?el("span",{style:{background:"#f9731633",color:"#f97316",fontSize:"13px",fontWeight:"700",padding:"1px 5px",borderRadius:"3px"}},"AUJOURD\'HUI"):null,
        badge(s.type),
        el("div",{style:{flex:"1"}}),
        isDoneSession?el("span",{style:{
          background:uidStatus==="✅"?"#22c55e":"#eab308",
          color:uidStatus==="✅"?"#fff":"#1a1d27",
          borderRadius:"50%",width:"20px",height:"20px",
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:"14px",fontWeight:"900",flexShrink:"0"
        }}, uidStatus==="✅"?"✓":"!") : null
      ),
      el("div",{style:{color:"#f1f5f9",fontSize:"15px",fontWeight:"600",marginBottom:"4px"}},s.session),
      (s.warmup||s.cooldown)?el("div",{style:{display:"flex",gap:"12px",marginBottom:"6px",flexWrap:"wrap"}},
        s.warmup?el("div",{class:"muted",style:{fontSize:"13px"}},"▶ "+s.warmup):null,
        s.cooldown?el("div",{class:"muted",style:{fontSize:"13px"}},"◀ "+s.cooldown):null
      ):null,
      s.notes?el("div",{style:{color:"#60a5facc",fontSize:"14px",marginBottom:"8px",fontStyle:"italic"}},"💡 "+s.notes):null,
      stravaRun?el("div",{style:{background:"#fc4c0211",border:"1px solid #fc4c0233",borderRadius:"8px",padding:"8px 10px",marginBottom:"8px"}},
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}},
          el("span",{class:"muted",style:{fontSize:"13px"}},
            (stravaRun.start_date_local||"").slice(11,16)+" · départ"
          ),
          el("a",{href:"https://www.strava.com/activities/"+stravaRun.id_str,target:"_blank",style:{color:"#fc4c02",fontSize:"13px",fontWeight:"700",textDecoration:"none"}},"Voir sur Strava 🔗")
        ),
        el("div",{style:{display:"flex",gap:"16px",flexWrap:"wrap",marginBottom:effortLaps.length>0?"8px":"0"}},
          el("div",{},el("div",{style:{color:"#fc4c02",fontSize:"15px",fontWeight:"700"}},(stravaRun.distance/1000).toFixed(2)+"km"),el("div",{class:"muted",style:{fontSize:"14px"}},"distance")),
          el("div",{},el("div",{style:{color:"#fc4c02",fontSize:"15px",fontWeight:"700"}},fmtTime(stravaRun.moving_time)),el("div",{class:"muted",style:{fontSize:"14px"}},"durée")),
          (()=>{
            // Si séance intensive avec laps d\'effort : afficher l\'allure/FC de l\'effort seul (hors échauffement/récup)
            const isIntensive = effortLaps.length > 0;
            const dispPace = isIntensive ? effortLaps.reduce((s,l)=>s+l.average_speed,0)/effortLaps.length : stravaRun.average_speed;
            const dispHr = isIntensive ? (effortLaps.filter(l=>l.average_heartrate).length ? effortLaps.filter(l=>l.average_heartrate).reduce((s,l)=>s+l.average_heartrate,0)/effortLaps.filter(l=>l.average_heartrate).length : null) : stravaRun.average_heartrate;
            const paceLabel = isIntensive ? "allure intervalles" : "allure moy.";
            return el("div",{},el("div",{style:{color:"#fc4c02",fontSize:"15px",fontWeight:"700"}},fmtPace(dispPace)+"/km"),el("div",{class:"muted",style:{fontSize:"14px"}},paceLabel));
          })(),
          (()=>{
            const isIntensive = effortLaps.length > 0;
            const dispHr = isIntensive ? (effortLaps.filter(l=>l.average_heartrate).length ? effortLaps.filter(l=>l.average_heartrate).reduce((s,l)=>s+l.average_heartrate,0)/effortLaps.filter(l=>l.average_heartrate).length : null) : stravaRun.average_heartrate;
            const hrLabel = isIntensive ? "FC intervalles" : "FC moy.";
            return dispHr ? el("div",{},el("div",{style:{color:"#fc4c02",fontSize:"15px",fontWeight:"700"}},Math.round(dispHr)+" bpm"),el("div",{class:"muted",style:{fontSize:"14px"}},hrLabel)) : null;
          })(),
          stravaRun.max_heartrate?el("div",{},el("div",{style:{color:"#ef4444",fontSize:"15px",fontWeight:"700"}},Math.round(stravaRun.max_heartrate)+" bpm"),el("div",{class:"muted",style:{fontSize:"14px"}},"FC max")):null
        ),
        (()=>{
          const isIntensiveFc = effortLaps.length > 0;
          const fcHrVals = isIntensiveFc ? effortLaps.filter(l=>l.average_heartrate) : null;
          const fcDispHr = isIntensiveFc
            ? (fcHrVals.length ? Math.round(fcHrVals.reduce((s,l)=>s+l.average_heartrate,0)/fcHrVals.length) : null)
            : (stravaRun.average_heartrate ? Math.round(stravaRun.average_heartrate) : null);
          const fcLabel = isIntensiveFc ? "FC intervalles " : "FC moy. ";
          if (!FC_ZONES[s.type] || !fcDispHr) return null;
          return el("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"6px 0",borderTop:"1px solid #fc4c0222",marginBottom:effortLaps.length>0?"8px":"0"}},
            el("span",{style:{fontSize:"15px"}},fcStatus(s.type,fcDispHr)||""),
            el("span",{class:"muted",style:{fontSize:"13px"}},fcLabel+fcDispHr+" bpm · cible "+FC_ZONES[s.type].min+"–"+FC_ZONES[s.type].max+" bpm")
          );
        })(),
        stravaRun&&stravaRun.start_latlng?.length===2&&s.date?
          el("div",{style:{fontSize:"13px",color:"#e2e8f0",paddingTop:"4px",paddingBottom:"4px"}},
            historicalWeatherCache[s.date]!=null
              ? "🌡️ "+historicalWeatherCache[s.date]+"°C au départ"+(historicalWeatherCache[s.date]>28?" 🔥":"")
              : el("span",{style:{color:"#475569",fontStyle:"italic"}},"🌡️ Chargement météo...")
          ):null,
        effortLaps.length>0?el("div",{style:{borderTop:"1px solid #fc4c0222",paddingTop:"8px"}},
          el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}},
            el("div",{class:"muted",style:{fontSize:"14px",textTransform:"uppercase",letterSpacing:"0.5px"}},"Répétitions ("+effortLaps.length+")"),
            (()=>{
              const target = SESSION_TARGETS[s.type];
              if (!target) return null;
              const inTarget = effortLaps.filter(l=>(1000/l.average_speed)<=target.okPace).length;
              const color = inTarget===effortLaps.length?"#22c55e":inTarget>0?"#eab308":"#ef4444";
              return el("span",{style:{color,fontSize:"13px",fontWeight:"700"}},inTarget+"/"+effortLaps.length+" dans la cible");
            })()
          ),
          el("div",{class:"muted",style:{fontSize:"12px",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"6px"}},
            SESSION_TARGETS[s.type] ? "cible "+SESSION_TARGETS[s.type].effort+" "+SESSION_TARGETS[s.type].tolerance : ""
          ),
          ...(() => {
            const { driftEl } = computeFcDrift(effortLaps);
            const rows = effortLaps.map((lap,i)=>renderLapRow(lap,i,s.type));
            return driftEl ? [...rows, driftEl] : rows;
          })()
        ):null
      ):null
    );

    if (s.type==="RACE") {
      card.appendChild(el("div",{style:{background:"#f9731622",border:"1px solid #f9731644",borderRadius:"8px",padding:"10px 12px",marginTop:"4px"}},
        el("div",{style:{color:"#f97316",fontWeight:"700",fontSize:"15px"}},"🏁 Jour J — Objectif 48\'30\""),
        el("div",{class:"text2",style:{fontSize:"14px",marginTop:"4px"}},"Km 1-3 : prudent · Km 4-7 : contrôle · Km 8-10 : tout donner !")
      ));
    } else if (s.type!=="REPOS") {
      // Raison du statut ❌ ou ⚠️
      const reason = stravaRun ? validateReason({...s, uid}, stravaRun) : null;
      if (reason) {
        card.appendChild(el("div",{style:{
          background: statuses[uid]==="❌" ? "#ef444411" : "#eab30811",
          border: `1px solid ${statuses[uid]==="❌" ? "#ef444433" : "#eab30833"}`,
          borderRadius:"6px", padding:"6px 10px", marginTop:"4px", marginBottom:"4px",
          color: statuses[uid]==="❌" ? "#ef4444" : "#eab308",
          fontSize:"13px"
        }}, (statuses[uid]==="❌"?"❌ ":"⚠️ ")+reason));
      }
      const statusRow=el("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginTop:"4px"}});
      SOPTS.forEach(opt=>{
        const cur=statuses[uid]||"—";
        const b=el("button",{style:{background:cur===opt?SCOLORS[opt]+"33":"#232738",border:`1px solid ${cur===opt?SCOLORS[opt]:"#2e3347"}`,borderRadius:"6px",padding:"5px 10px",cursor:"pointer",color:cur===opt?SCOLORS[opt]:"#475569",fontSize:"15px",fontWeight:cur===opt?"700":"400"}},opt==="—"?"–":opt);
        b.addEventListener("click",()=>{ statuses[uid]=opt; save("lk_statuses",statuses); gistSave(true); render(); });
        statusRow.appendChild(b);
      });
      card.appendChild(statusRow);
      const noteInput=el("input",{type:"text",placeholder:"💬 Note sur cette séance...",style:{marginTop:"8px",background:"#0f1117",border:"1px solid #2e3347",borderRadius:"8px",padding:"7px 10px",color:"#f1f5f9",fontSize:"14px",outline:"none",width:"100%"}});
      noteInput.value=sessionNotes[uid]||"";
      noteInput.addEventListener("change",()=>{
        if(noteInput.value.trim()){sessionNotes[uid]=noteInput.value.trim();}
        else{delete sessionNotes[uid];}
        save("lk_session_notes",sessionNotes); scheduleSave();
      });
      if(sessionNotes[uid]){card.appendChild(el("div",{style:{color:"#e2e8f0",fontSize:"14px",fontStyle:"italic",marginTop:"4px"}},"💬 "+sessionNotes[uid]));}
      card.appendChild(noteInput);
    }

    // Si séance terminée : afficher un résumé compact + détail repliable au clic
    if (isDoneSession) {
      // children[0] = header, children[1] = titre séance, le reste = détails
      const childrenToHide = Array.from(card.children).slice(2);
      childrenToHide.forEach(c => { c.style.display = "none"; });

      // Mini résumé Strava (distance globale, allure/FC de l\'effort si intensive)
      if (stravaRun) {
        const isIntensiveSummary = effortLaps.length > 0;
        const summaryPace = isIntensiveSummary ? effortLaps.reduce((s,l)=>s+l.average_speed,0)/effortLaps.length : stravaRun.average_speed;
        const summaryHrVals = isIntensiveSummary ? effortLaps.filter(l=>l.average_heartrate) : null;
        const summaryHr = isIntensiveSummary
          ? (summaryHrVals.length ? summaryHrVals.reduce((s,l)=>s+l.average_heartrate,0)/summaryHrVals.length : null)
          : stravaRun.average_heartrate;
        const summaryRow = el("div",{style:{display:"flex",alignItems:"center",gap:"14px",paddingTop:"6px",borderTop:"1px solid #2e334766"}},
          el("span",{style:{color:"#f97316",fontSize:"14px",fontWeight:"700"}},(stravaRun.distance/1000).toFixed(1)+" km"),
          el("span",{style:{color:"#f97316",fontSize:"14px",fontWeight:"700"}},fmtPace(summaryPace)+"/km"),
          summaryHr?el("span",{style:{color:"#f97316",fontSize:"14px",fontWeight:"700"}},Math.round(summaryHr)+" bpm"):null,
          el("div",{style:{flex:"1"}}),
          el("span",{class:"muted",style:{fontSize:"13px"}},"détails ›")
        );
        summaryRow.dataset.summaryRow = "1";
        card.appendChild(summaryRow);
        // Réordonner : le résumé doit être juste après le titre, avant les détails cachés
        card.insertBefore(summaryRow, childrenToHide[0] || null);
      }

      card.addEventListener("click", (e)=>{
        if (e.target.tagName === "BUTTON" || e.target.tagName === "INPUT") return;
        cardExpanded = !cardExpanded;
        card.style.opacity = cardExpanded ? "1" : "0.7";
        childrenToHide.forEach(c => { c.style.display = cardExpanded ? "" : "none"; });
        const summaryEl = card.querySelector('[data-summary-row]');
        if (summaryEl) summaryEl.style.display = cardExpanded ? "none" : "flex";
      });
    }

    return card;
  });

  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{display:"flex",alignItems:"center",gap:"12px",marginTop:"8px",marginBottom:"16px"}},
      el("div",{style:{flex:"1"}},
        el("div",{class:"muted",style:{fontSize:"13px",textTransform:"uppercase",letterSpacing:"1px"}},phaseOf(weekNum).label),
        el("div",{style:{color:"#f1f5f9",fontSize:"20px",fontWeight:"800"}},"Semaine "+weekNum),
        el("div",{class:"muted",style:{fontSize:"14px"}},fmtDate(week.sessions[0].date)+" – "+fmtDate(week.sessions[6].date))
      ),
      weekRuns.length>0?el("div",{style:{background:"#fc4c0111",border:"1px solid #fc4c0133",borderRadius:"8px",padding:"6px 10px",textAlign:"center"}},
        el("div",{style:{color:"#fc4c02",fontSize:"15px",fontWeight:"700"}},weekRuns.length+""),
        el("div",{class:"muted",style:{fontSize:"14px"}},"Strava")
      ):null
    ),
    ...cards
  );
}


// ══════════════════════════════════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════════════════════════════════
function renderStats() {
  const pred = currentPred||predict10K();

  // ── Graphique évolution ───────────────────────────────────────────────
  let graphEl = null;
  if (isRebuilding) {
    graphEl = el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"12px",padding:"16px",marginBottom:"16px",textAlign:"center"}},
      el("div",{class:"muted",style:{fontSize:"14px",fontStyle:"italic"}},"⏳ Recalcul de l\'historique...")
    );
  } else if (predHistory.length >= 2) {
    const TARGET = 48.5*60, BASE = 3021;
    const W = 340, H = 120, PAD = {t:16,r:40,b:28,l:44};
    const iW = W-PAD.l-PAD.r, iH = H-PAD.t-PAD.b;
    const times = predHistory.map(p=>p.time);
    const minT = Math.min(...times,TARGET)-30;
    const maxT = Math.max(...times,BASE)+30;
    const xScale = i => PAD.l+(i/(predHistory.length-1))*iW;
    const yScale = t => PAD.t+iH-((t-minT)/(maxT-minT))*iH;
    const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
    svg.setAttribute("width","100%");
    svg.style.display="block";
    const mk=(tag,attrs)=>{const e=document.createElementNS("http://www.w3.org/2000/svg",tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;};
    svg.appendChild(mk("rect",{x:0,y:0,width:W,height:H,fill:"#1a1d27"}));
    const yTarget=yScale(TARGET);
    svg.appendChild(mk("line",{x1:PAD.l,y1:yTarget,x2:W-PAD.r,y2:yTarget,stroke:"#f9731644",strokeWidth:"1","stroke-dasharray":"4,3"}));
    const tl=document.createElementNS("http://www.w3.org/2000/svg","text");
    tl.setAttribute("x",W-PAD.r+4);tl.setAttribute("y",yTarget+4);tl.setAttribute("fill","#f97316");tl.setAttribute("font-size","9");tl.textContent="48'30\"";svg.appendChild(tl);
    const points=predHistory.map((p,i)=>`${xScale(i)},${yScale(p.time)}`).join(" ");
    const firstX=xScale(0),lastX=xScale(predHistory.length-1);
    svg.appendChild(mk("polygon",{points:`${firstX},${PAD.t+iH} ${points} ${lastX},${PAD.t+iH}`,fill:"#60a5fa11"}));
    svg.appendChild(mk("polyline",{points,fill:"none",stroke:"#60a5fa",strokeWidth:"2","stroke-linejoin":"round","stroke-linecap":"round"}));
    predHistory.forEach((p,i)=>{
      const color=p.time<=TARGET?"#22c55e":p.time<=TARGET+60?"#eab308":"#60a5fa";
      svg.appendChild(mk("circle",{cx:xScale(i),cy:yScale(p.time),r:"3",fill:color}));
    });
    [BASE,TARGET].forEach(t=>{
      const lbl=document.createElementNS("http://www.w3.org/2000/svg","text");
      lbl.setAttribute("x",PAD.l-4);lbl.setAttribute("y",yScale(t)+4);
      lbl.setAttribute("fill","#e2e8f0");lbl.setAttribute("font-size","9");lbl.setAttribute("text-anchor","end");
      lbl.textContent=fmtTime(t);svg.appendChild(lbl);
    });
    const lastVal=predHistory[predHistory.length-1];
    const lvl=document.createElementNS("http://www.w3.org/2000/svg","text");
    lvl.setAttribute("x",xScale(predHistory.length-1));lvl.setAttribute("y",yScale(lastVal.time)-6);
    lvl.setAttribute("fill","#f1f5f9");lvl.setAttribute("font-size","10");lvl.setAttribute("text-anchor","middle");lvl.setAttribute("font-weight","700");
    lvl.textContent=fmtTime(lastVal.time);svg.appendChild(lvl);
    // Labels semaines sur l'axe X
    // Positionner selon la date dans predHistory
    PLAN.forEach((week, wi) => {
      const weekDateStr = week.sessions[0].date;
      // Trouver l'index de cette date dans predHistory
      const idx = predHistory.findIndex(p => p.date >= weekDateStr);
      if (idx < 0) return;
      const xPos = xScale(idx);
      // Petite marque verticale pour toutes les semaines
      const tick = mk("line",{x1:xPos,y1:PAD.t+iH,x2:xPos,y2:PAD.t+iH+4,stroke:"#2e3347",strokeWidth:"1"});
      svg.appendChild(tick);
      // Label uniquement pour les semaines impaires
      if ((wi+1) % 2 === 1) {
        const lbl = document.createElementNS("http://www.w3.org/2000/svg","text");
        lbl.setAttribute("x", xPos);
        lbl.setAttribute("y", PAD.t+iH+14);
        lbl.setAttribute("fill","#e2e8f0");
        lbl.setAttribute("font-size","9");
        lbl.setAttribute("text-anchor","middle");
        lbl.textContent = "S"+(wi+1);
        svg.appendChild(lbl);
      }
    });

    // Tooltip au tap
    const tooltip = document.createElementNS("http://www.w3.org/2000/svg","g");
    tooltip.style.display = "none";
    const tooltipBg = mk("rect",{x:0,y:0,width:80,height:32,rx:"4",fill:"#232738",stroke:"#2e3347",strokeWidth:"1"});
    const tooltipDate = document.createElementNS("http://www.w3.org/2000/svg","text");
    tooltipDate.setAttribute("font-size","9"); tooltipDate.setAttribute("fill","#e2e8f0");
    const tooltipVal = document.createElementNS("http://www.w3.org/2000/svg","text");
    tooltipVal.setAttribute("font-size","11"); tooltipVal.setAttribute("fill","#f1f5f9"); tooltipVal.setAttribute("font-weight","700");
    tooltip.appendChild(tooltipBg); tooltip.appendChild(tooltipDate); tooltip.appendChild(tooltipVal);
    svg.appendChild(tooltip);

    // Zone de tap sur chaque point
    predHistory.forEach((p,i) => {
      const cx = xScale(i), cy = yScale(p.time);
      const hitArea = mk("circle",{cx,cy,r:"12",fill:"transparent",cursor:"pointer"});
      hitArea.addEventListener("click", () => {
        const d = new Date(p.date);
        const dateStr = d.toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
        const tx = Math.min(cx, W-PAD.r-84);
        const ty = cy > PAD.t+30 ? cy-40 : cy+10;
        tooltipBg.setAttribute("x", tx); tooltipBg.setAttribute("y", ty);
        tooltipDate.setAttribute("x", tx+6); tooltipDate.setAttribute("y", ty+12);
        tooltipDate.textContent = dateStr;
        tooltipVal.setAttribute("x", tx+6); tooltipVal.setAttribute("y", ty+26);
        tooltipVal.textContent = fmtTime(p.time);
        tooltip.style.display = "block";
      });
      svg.appendChild(hitArea);
    });

    svg.addEventListener("click", e => {
      if (e.target.tagName !== "circle" || e.target.getAttribute("r") !== "12") {
        tooltip.style.display = "none";
      }
    });

    const wrap=el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"Évolution de l\'estimation"),
      el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"12px",padding:"12px",overflow:"hidden"}})
    );
    wrap.lastChild.appendChild(svg);
    graphEl=wrap;
  }

  // ── Projections Riegel ────────────────────────────────────────────────
  const projEl=el("div",{style:{marginBottom:"16px"}},
    el("div",{class:"label"},"Projections Riegel"),
    el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"12px",padding:"14px"}},
      el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}},
        ...riegelProjections(pred.time).map(p=>
          el("div",{style:{background:p.target?"#f9731622":"#232738",border:p.target?"1px solid #f9731644":"none",borderRadius:"8px",padding:"10px 12px"}},
            el("div",{style:{color:p.target?"#f97316":"#e2e8f0",fontSize:"13px",marginBottom:"4px"}},p.label+(p.target?" 🎯":"")),
            el("div",{style:{color:"#f1f5f9",fontSize:"15px",fontWeight:"700"}},p.timeStr),
            el("div",{class:"muted",style:{fontSize:"13px"}},p.paceStr)
          )
        )
      ),
      el("div",{class:"muted",style:{fontSize:"12px",marginTop:"10px",fontStyle:"italic"}},"📊 "+pred.method)
    )
  );

  // ── Référentiel allures ───────────────────────────────────────────────
  const paceRows = [
    {type:"EF",      label:"Endurance fondamentale", pace:"6:20", heat:"6:40", fc:"118–136", pct:"65–75%", color:"#60a5fa"},
    {type:"LONGUE",  label:"Sortie longue",           pace:"6:20", heat:"6:40", fc:"118–136", pct:"65–75%", color:"#06b6d4"},
    {type:"SEUIL",   label:"Seuil",                   pace:SESSION_TARGETS.SEUIL.effort, heat:null, fc:"163–172", pct:"90–95%", color:"#22c55e"},
    {type:"SPEC",    label:"Spécifique 10K",           pace:SESSION_TARGETS.SPEC.effort,  heat:null, fc:"154–163", pct:"85–90%", color:"#a855f7"},
    {type:"VMA",     label:"VMA",                     pace:SESSION_TARGETS.VMA.effort,   heat:null, fc:"163–181", pct:"90–100%", color:"#f97316"},
  ];
  // ── Courbes IE + Cadence ─────────────────────────────────────────────────
  const intensiveTypes = ["VMA","SPEC","SEUIL"];
  const ieData = {}, cadData = {};
  intensiveTypes.forEach(type => {
    const sessions = ALL_SESSIONS.filter(s=>s.type===type&&s.date<=today());
    const points = sessions.map(s => {
      const run = stravaActivities.find(a=>a.start_date_local?.slice(0,10)===s.date);
      if (!run) return null;
      const laps = getEffortLaps(run);
      if (!laps.length) return null;
      const ieVals = laps.map(l=>economyScore(l,type)).filter(v=>v!==null);
      const cadVals = laps.map(l=>l.average_cadence?Math.round(l.average_cadence*2):null).filter(v=>v!==null);
      const hrVals = laps.filter(l=>l.average_heartrate).map(l=>l.average_heartrate);
      return {
        week: s.week,
        date: s.date,
        ie: ieVals.length ? Math.round(ieVals.reduce((a,b)=>a+b,0)/ieVals.length) : null,
        cad: cadVals.length ? Math.round(cadVals.reduce((a,b)=>a+b,0)/cadVals.length) : null,
        fc: hrVals.length ? Math.round(hrVals.reduce((a,b)=>a+b,0)/hrVals.length) : null
      };
    }).filter(Boolean);
    if (points.length) { ieData[type]=points; cadData[type]=points; }
  });

  const typeColors2 = { VMA:"#f97316", SPEC:"#a855f7", SEUIL:"#22c55e" };

  function drawCurve(data, label, yKey, yLabel, refLine) {
    if (!Object.keys(data).length) return null;
    const allVals = Object.values(data).flatMap(pts=>pts.map(p=>p[yKey]).filter(Boolean));
    if (!allVals.length) return null;
    const W=320, H=90, PL=30, PT=12, PB=22;
    const minY=Math.min(...allVals)-5, maxY=Math.max(...allVals)+5;
    const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("viewBox",`0 0 ${W} ${H+PT+PB+14}`);
    svg.style.width="100%";

    if (refLine) {
      const ry = PT+(1-(refLine-minY)/(maxY-minY))*H;
      const l = document.createElementNS("http://www.w3.org/2000/svg","line");
      l.setAttribute("x1",PL); l.setAttribute("x2",W); l.setAttribute("y1",ry); l.setAttribute("y2",ry);
      l.setAttribute("stroke","#475569"); l.setAttribute("stroke-width","1"); l.setAttribute("stroke-dasharray","4,3");
      svg.appendChild(l);
      const t = document.createElementNS("http://www.w3.org/2000/svg","text");
      t.setAttribute("x",PL-2); t.setAttribute("y",ry+3); t.setAttribute("fill","#475569"); t.setAttribute("font-size","8"); t.setAttribute("text-anchor","end");
      t.textContent=refLine; svg.appendChild(t);
    }

    // Labels semaines sur l'axe X (S1, S3, S5, S7, S9, S11)
    [1,3,5,7,9,11].forEach(w => {
      const x = PL+(w-1)/10*(W-PL);
      const tick = document.createElementNS("http://www.w3.org/2000/svg","line");
      tick.setAttribute("x1",x); tick.setAttribute("x2",x);
      tick.setAttribute("y1",PT+H); tick.setAttribute("y2",PT+H+4);
      tick.setAttribute("stroke","#2e3347"); tick.setAttribute("stroke-width","1");
      svg.appendChild(tick);
      const lbl = document.createElementNS("http://www.w3.org/2000/svg","text");
      lbl.setAttribute("x",x); lbl.setAttribute("y",PT+H+12);
      lbl.setAttribute("fill","#475569"); lbl.setAttribute("font-size","8"); lbl.setAttribute("text-anchor","middle");
      lbl.textContent="S"+w; svg.appendChild(lbl);
    });

    let legendX = PL;
    Object.entries(data).forEach(([type,pts]) => {
      const color=typeColors2[type]||"#e2e8f0";
      const vp=pts.filter(p=>p[yKey]!==null);
      if (!vp.length) return;
      if (vp.length>=2) {
        const poly=document.createElementNS("http://www.w3.org/2000/svg","polyline");
        poly.setAttribute("points",vp.map(p=>{
          const x=PL+(p.week-1)/10*(W-PL);
          const y=PT+(1-(p[yKey]-minY)/(maxY-minY))*H;
          return x+","+y;
        }).join(" "));
        poly.setAttribute("stroke",color); poly.setAttribute("stroke-width","2"); poly.setAttribute("fill","none"); poly.setAttribute("stroke-linecap","round");
        svg.appendChild(poly);
      }
      vp.forEach(p=>{
        const x=PL+(p.week-1)/10*(W-PL);
        const y=PT+(1-(p[yKey]-minY)/(maxY-minY))*H;
        // Zone cliquable invisible plus grande
        const hitArea=document.createElementNS("http://www.w3.org/2000/svg","circle");
        hitArea.setAttribute("cx",x); hitArea.setAttribute("cy",y); hitArea.setAttribute("r","12");
        hitArea.setAttribute("fill","transparent"); hitArea.style.cursor="pointer";
        hitArea.addEventListener("click",()=>{
          const existing = svg.parentNode.querySelector(".ie-tooltip");
          if (existing) existing.remove();
          const tip = document.createElement("div");
          tip.className = "ie-tooltip";
          tip.style.cssText = "position:absolute;background:#232738;border:1px solid #2e3347;border-radius:8px;padding:8px 10px;font-size:11px;color:#f1f5f9;pointer-events:none;z-index:10;white-space:nowrap;";
          tip.innerHTML = `<span style="color:${color};font-weight:700">${type} · S${p.week}</span><br>${yKey==="ie"?"IE":"Cadence"} : <b>${p[yKey]}</b>${yKey==="cad"?" spm":""}`;
          const svgRect = svg.getBoundingClientRect();
          const parentRect = svg.parentNode.getBoundingClientRect();
          tip.style.left = (svgRect.left - parentRect.left + x * svgRect.width/W - 50)+"px";
          tip.style.top = (svgRect.top - parentRect.top + y * svgRect.height/(H+PT+PB+14) - 60)+"px";
          svg.parentNode.style.position="relative";
          svg.parentNode.appendChild(tip);
          setTimeout(()=>tip.remove(), 3000);
        });
        svg.appendChild(hitArea);
        const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
        c.setAttribute("cx",x); c.setAttribute("cy",y); c.setAttribute("r","4"); c.setAttribute("fill",color);
        svg.appendChild(c);
        const t=document.createElementNS("http://www.w3.org/2000/svg","text");
        t.setAttribute("x",x); t.setAttribute("y",y-6); t.setAttribute("fill",color); t.setAttribute("font-size","9"); t.setAttribute("text-anchor","middle");
        t.textContent=p[yKey]; svg.appendChild(t);
      });
      const dot=document.createElementNS("http://www.w3.org/2000/svg","circle");
      dot.setAttribute("cx",legendX); dot.setAttribute("cy",H+PT+26); dot.setAttribute("r","4"); dot.setAttribute("fill",color);
      svg.appendChild(dot);
      const lt=document.createElementNS("http://www.w3.org/2000/svg","text");
      lt.setAttribute("x",legendX+7); lt.setAttribute("y",H+PT+29); lt.setAttribute("fill",color); lt.setAttribute("font-size","9");
      lt.textContent=type; svg.appendChild(lt);
      legendX+=55;
    });
    return el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},label),
      el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"12px",padding:"12px"}},svg)
    );
  }

  const ieCurveEl = drawCurve(ieData,"📊 Indice d\'Économie (IE) par séance","ie","IE",100);
  const cadCurveEl = drawCurve(cadData,"🦶 Cadence par séance","cad","spm",null);

  // ── Courbes FC par type de séance ──────────────────────────────────────────
  const fcCurveEl = (()=>{
    const types = ["VMA","SPEC","SEUIL"].filter(t => ieData[t] && ieData[t].some(p=>p.fc));
    if (!types.length) return null;

    const FC_ZONES_CURVE = { VMA:{min:163,max:181}, SPEC:{min:154,max:163}, SEUIL:{min:145,max:163} };

    const cards = types.map(type => {
      const pts = ieData[type].filter(p=>p.fc);
      const color = typeColors2[type];
      const zone = FC_ZONES_CURVE[type];

      // Tendance
      let trendEl = null;
      if (pts.length >= 2) {
        const diff = pts[pts.length-1].fc - pts[0].fc;
        const trendColor = diff <= 0 ? "#22c55e" : diff <= 5 ? "#eab308" : "#ef4444";
        const trendText = (diff > 0 ? "↑ +" : "↓ ") + Math.abs(diff) + " bpm";
        trendEl = el("span",{style:{color:trendColor,fontSize:"14px",fontWeight:"700"}},trendText);
      } else {
        trendEl = el("span",{class:"muted",style:{fontSize:"13px"}},"1 séance");
      }

      // SVG courbe
      const W=320, H=70, PL=28, PT=10, PB=22, PR=30;
      const allWeeks = PLAN.flatMap(w=>w.sessions).filter(s=>s.type===type).map(s=>s.week);
      const uniqueWeeks = [...new Set(allWeeks)].sort((a,b)=>a-b);
      const nW = uniqueWeeks.length;
      const xOf = w => PL + ((uniqueWeeks.indexOf(w)) / Math.max(nW-1,1)) * (W-PL-PR);

      const fcVals = pts.map(p=>p.fc);
      const allFc = zone ? [zone.min-5, zone.max+5, ...fcVals] : fcVals;
      const minV = Math.min(...allFc), maxV = Math.max(...allFc);
      const yOf = v => PT + (1-(v-minV)/(maxV-minV||1)) * (H-PT-PB);

      const zonePts = zone
        ? `0,${yOf(zone.max)} ${W},${yOf(zone.max)} ${W},${yOf(zone.min)} 0,${yOf(zone.min)}`
        : null;

      const linePts = pts.map(p => `${xOf(p.week)},${yOf(p.fc)}`).join(" ");

      const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
      svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
      svg.style.width = "100%";
      svg.style.display = "block";

      // Zone cible
      if (zonePts) {
        const poly = document.createElementNS("http://www.w3.org/2000/svg","polygon");
        poly.setAttribute("points", zonePts);
        poly.setAttribute("fill","#22c55e");
        poly.setAttribute("opacity","0.07");
        svg.appendChild(poly);
        // Labels zone
        const t1 = document.createElementNS("http://www.w3.org/2000/svg","text");
        t1.setAttribute("x", W-2); t1.setAttribute("y", yOf(zone.max)+3);
        t1.setAttribute("text-anchor","end"); t1.setAttribute("fill","#22c55e");
        t1.setAttribute("font-size","8"); t1.setAttribute("opacity","0.7");
        t1.textContent = zone.max;
        svg.appendChild(t1);
        const t2 = document.createElementNS("http://www.w3.org/2000/svg","text");
        t2.setAttribute("x", W-2); t2.setAttribute("y", yOf(zone.min)+3);
        t2.setAttribute("text-anchor","end"); t2.setAttribute("fill","#22c55e");
        t2.setAttribute("font-size","8"); t2.setAttribute("opacity","0.7");
        t2.textContent = zone.min;
        svg.appendChild(t2);
      }

      // Points futurs
      uniqueWeeks.forEach(w => {
        if (!pts.find(p=>p.week===w)) {
          const cx = xOf(w);
          const cy = H/2;
          const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
          c.setAttribute("cx",cx); c.setAttribute("cy",cy);
          c.setAttribute("r","4"); c.setAttribute("fill","none");
          c.setAttribute("stroke","#2e3347"); c.setAttribute("stroke-width","1.5");
          c.setAttribute("stroke-dasharray","2,2");
          svg.appendChild(c);
          const t = document.createElementNS("http://www.w3.org/2000/svg","text");
          t.setAttribute("x",cx); t.setAttribute("y",H-4);
          t.setAttribute("text-anchor","middle"); t.setAttribute("fill","#475569");
          t.setAttribute("font-size","9"); t.textContent = "S"+w;
          svg.appendChild(t);
        }
      });

      // Ligne + points réels
      if (pts.length >= 2) {
        const poly2 = document.createElementNS("http://www.w3.org/2000/svg","polyline");
        poly2.setAttribute("points", linePts);
        poly2.setAttribute("fill","none");
        poly2.setAttribute("stroke",color);
        poly2.setAttribute("stroke-width","2.5");
        poly2.setAttribute("stroke-linecap","round");
        svg.appendChild(poly2);
      }
      pts.forEach(p => {
        const cx = xOf(p.week), cy = yOf(p.fc);
        const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
        c.setAttribute("cx",cx); c.setAttribute("cy",cy);
        c.setAttribute("r","5"); c.setAttribute("fill",color);
        svg.appendChild(c);
        const t = document.createElementNS("http://www.w3.org/2000/svg","text");
        t.setAttribute("x",cx); t.setAttribute("y",cy-8);
        t.setAttribute("text-anchor","middle"); t.setAttribute("fill","#f1f5f9");
        t.setAttribute("font-size","9"); t.textContent = p.fc;
        svg.appendChild(t);
        const tw = document.createElementNS("http://www.w3.org/2000/svg","text");
        tw.setAttribute("x",cx); tw.setAttribute("y",H-4);
        tw.setAttribute("text-anchor","middle"); tw.setAttribute("fill","#94a3b8");
        tw.setAttribute("font-size","9"); tw.textContent = "S"+p.week;
        svg.appendChild(tw);
      });

      const card = el("div",{style:{background:"#1a1d27",border:`1px solid ${color}33`,borderTop:`3px solid ${color}`,borderRadius:"12px",padding:"14px",marginBottom:"10px"}},
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},
          el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
            el("span",{style:{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:"4px",padding:"2px 8px",fontSize:"12px",fontWeight:"700"}},type),
            el("span",{class:"muted",style:{fontSize:"13px"}},"FC intervalles")
          ),
          trendEl
        )
      );
      card.appendChild(svg);
      if (pts.length < 2) {
        const msg = el("div",{class:"muted",style:{fontSize:"12px",marginTop:"6px",fontStyle:"italic"}},
          "Courbe disponible à partir de 2 séances"
        );
        card.appendChild(msg);
      }
      return card;
    });

    return el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"❤️ FC intervalles par type de séance"),
      ...cards
    );
  })();

  const paceEl=el("div",{style:{marginBottom:"16px"}},
    el("div",{class:"label"},"Référentiel allures & FC"),
    el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"12px",overflow:"hidden"}},
      ...paceRows.map((r,i)=>el("div",{style:{padding:"10px 14px",borderBottom:i<paceRows.length-1?"1px solid #2e3347":"none",display:"flex",alignItems:"center",gap:"12px"}},
        el("div",{style:{width:"4px",height:"32px",borderRadius:"2px",background:r.color,flexShrink:"0"}}),
        el("div",{style:{flex:"1"}},
          el("div",{style:{color:"#f1f5f9",fontSize:"14px",fontWeight:"600",marginBottom:"2px"}},r.label),
          el("div",{class:"muted",style:{fontSize:"13px"}},r.heat?"Chaud : "+r.heat:SESSION_TARGETS[r.type]?"Tolérance "+SESSION_TARGETS[r.type].tolerance:"—")
        ),
        el("div",{style:{textAlign:"right"}},
          el("div",{style:{color:r.color,fontSize:"15px",fontWeight:"700"}},r.pace+"/km"),
          el("div",{class:"muted",style:{fontSize:"13px"}},r.fc+" bpm")
        )
      ))
    )
  );

  // ── Prédiction de progression ────────────────────────────────────────────
  let progressionEl = null;
  // Prédiction de progression — modèle logarithmique avec fourchette
  const projOldest = predHistory[0]?.date;
  const projNewest = predHistory[predHistory.length-1]?.date;
  const projDaySpan = projOldest && projNewest
    ? Math.round((new Date(projNewest) - new Date(projOldest)) / 86400000) : 0;

  if (predHistory.length >= 3 && projDaySpan >= 21) {
    const currentTime = pred.time;
    const BASE_TIME_START = 3021; // 50'21" Lavandou
    const gainMax = BASE_TIME_START - raceGoalTime; // gain théorique max
    const gainRealist = Math.round(gainMax * 0.85); // 85% du gain max
    const gainSoFar = BASE_TIME_START - currentTime;

    // Coefficient k calibré sur le gain réalisé à ce stade
    const weeksElapsed = Math.max(1, (predHistory.length - 1) / 7);
    const k = gainSoFar > 0 ? -Math.log(1 - Math.min(gainSoFar / gainRealist, 0.99)) / weeksElapsed : 0.1;
    const weeksTotal = 11;
    const projectedGain = Math.round(gainRealist * (1 - Math.exp(-k * weeksTotal)));
    const projectedTime = BASE_TIME_START - projectedGain;

    // Fourchette selon la quantité de données
    const oldestEntry = predHistory[0]?.date;
    const newestEntry = predHistory[predHistory.length-1]?.date;
    const daySpan = oldestEntry && newestEntry
      ? Math.round((new Date(newestEntry) - new Date(oldestEntry)) / 86400000)
      : 0;
    const toleranceSec = daySpan >= 21 ? 30 : daySpan >= 14 ? 60 : 120;
    const projLow = fmtTime(projectedTime - toleranceSec);
    const projHigh = fmtTime(projectedTime + toleranceSec);
    const hasVerdict = daySpan >= 21;

    progressionEl = el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"🎯 Trajectoire au 6 septembre"),
      el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"12px",padding:"14px"}},
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},
          el("div",{},
            el("div",{class:"muted",style:{fontSize:"13px",marginBottom:"2px"}},"Projection"),
            el("div",{style:{color:"#f1f5f9",fontSize:"22px",fontWeight:"800",letterSpacing:"-0.5px"}},projLow+" – "+projHigh)
          ),
          el("div",{style:{textAlign:"right"}},
            el("div",{class:"muted",style:{fontSize:"12px",marginBottom:"4px"}},"Fiabilité"),
            el("div",{style:{
              color:daySpan>=21?"#22c55e":daySpan>=14?"#eab308":"#e2e8f0",
              fontSize:"14px",fontWeight:"700"
            }},daySpan>=21?"Bonne":"Faible — peu de données")
          )
        ),
        hasVerdict ? el("div",{style:{display:"flex",justifyContent:"space-between",paddingTop:"8px",borderTop:"1px solid #2e3347"}},
          el("span",{class:"muted",style:{fontSize:"13px"}},"vs objectif "+fmtTime(raceGoalTime)),
          el("span",{style:{
            color:projectedTime<=raceGoalTime?"#22c55e":projectedTime<=raceGoalTime+30?"#eab308":"#ef4444",
            fontSize:"14px",fontWeight:"700"
          }},projectedTime<=raceGoalTime?"✅ Atteignable !":projectedTime<=raceGoalTime+30?"⚠️ Serré":"❌ À risque")
        ) : el("div",{style:{paddingTop:"8px",borderTop:"1px solid #2e3347"}},
          el("span",{class:"muted",style:{fontSize:"13px",fontStyle:"italic"}},"Verdict disponible à partir de 3 semaines de données")
        )
      )
    );
  } else if (predHistory.length >= 3) {
    // Moins de 21 jours de données — afficher la date de disponibilité
    const availDate = new Date(new Date(projOldest).getTime() + 21*86400000);
    const availStr = availDate.toLocaleDateString("fr-FR",{day:"numeric",month:"long"});
    progressionEl = el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"🎯 Trajectoire au 6 septembre"),
      el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"12px",padding:"14px",textAlign:"center"}},
        el("div",{style:{fontSize:"24px",marginBottom:"8px"}},"📊"),
        el("div",{style:{color:"#f1f5f9",fontSize:"14px",fontWeight:"600",marginBottom:"4px"}},"Données insuffisantes"),
        el("div",{class:"muted",style:{fontSize:"13px"}},"Projection disponible à partir du "+availStr)
      )
    );
  }

  // ── Infos du plan ─────────────────────────────────────────────────────
  const infoEl=el("div",{},
    el("div",{class:"label"},"Informations"),
    el("div",{class:"card"},
      ...[
        ["Course",RACE_NAME,"#f97316"],
        ["Date","6 septembre 2026 · "+RACE_LOCATION,"#f1f5f9"],
        ["Objectif",fmtTime(raceGoalTime)+" · "+fmtPace(10000/raceGoalTime)+"/km","#f97316"],
        ["Référence","50'21\" (Lavandou)","#f1f5f9"],
        ["Allure EF","6:20/km · 6:40/km si chaud","#60a5fa"],
        ["FC max",runnerFcMax+" bpm","#f1f5f9"],
        ["Km courus",Math.round(stravaActivities.reduce((s,a)=>s+a.distance,0)/100)/10+" km","#22c55e"],
      ].map(([label,val,color])=>el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"6px"}},
        el("span",{class:"muted",style:{fontSize:"14px"}},label),
        el("span",{style:{color,fontSize:"14px",fontWeight:color==="#f1f5f9"?"400":"700"}},val)
      ))
    )
  );

  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{marginTop:"8px"}}),
    graphEl||el("div",{class:"muted",style:{textAlign:"center",padding:"24px 0",fontSize:"14px",fontStyle:"italic"}},"📊 Le graphique apparaîtra après quelques jours de données"),
    progressionEl,
    fcCurveEl,
    ieCurveEl,
    cadCurveEl,
    projEl,
    paceEl,
    infoEl
  );
}

        (()=>{

        })()
      ),
      el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
        el("span",{class:"muted",style:{fontSize:"15px"}},"Départ course"),
        (()=>{
          const inp = document.createElement("input");
          inp.type = "time"; inp.id = "horaire-depart-input";
          inp.style.cssText = "width:110px;background:#232738;border:1px solid #2e3347;border-radius:6px;padding:4px 8px;color:#f1f5f9;font-size:13px;text-align:right;box-sizing:border-box;";

  const CHECKLIST = [

  const checklistCard = el("div",{style:{marginBottom:"16px"}},
    el("div",{class:"label"},"🎽 Checklist équipement"),

      ...CHECKLIST.map(item=>{

          el("div",{style:{
            width:"18px",height:"18px",borderRadius:"4px",flexShrink:"0",
            background:checked?"#f97316":"#232738",

          }}, checked?el("span",{style:{color:"#fff",fontSize:"14px",fontWeight:"700"}},"✓"):null),

      ),
      el("div",{style:{display:"flex",gap:"12px",alignItems:"center"}},
        el("div",{style:{background:"#22c55e22",border:"1px solid #22c55e44",borderRadius:"6px",padding:"4px 8px",color:"#22c55e",fontSize:"13px",fontWeight:"700",whiteSpace:"nowrap"}},"Km 8–10"),
        el("span",{class:"muted",style:{fontSize:"14px"}},"Tout donner · accélération finale")
      )
    )

  const parcoursCard = el("div",{style:{marginBottom:"16px"}},
    el("div",{class:"label"},"🗺️ Parcours"),
    card(
      (()=>{
        const inp = document.createElement("input");
        inp.type = "text"; inp.placeholder = "Lien GPX ou carte du parcours...";
        inp.style.cssText = "width:100%;background:#232738;border:1px solid #2e3347;border-radius:6px;padding:8px 12px;color:#f1f5f9;font-size:13px;box-sizing:border-box;";
        inp.value = raceParcoursUrl || "";
        inp.addEventListener("input", (e)=>{ raceParcoursUrl=e.target.value; save("lk_race_parcours",raceParcoursUrl); scheduleSave(); });
        return inp;
      })(),
      raceParcoursUrl?el("a",{href:raceParcoursUrl,target:"_blank",style:{display:"block",marginTop:"8px",color:"#60a5fa",fontSize:"14px"}},"→ Voir le parcours"):null
    )
  );

  // ── Météo prévue le jour de la course ───────────────────────────────────
  let meteoRaceEl = null;
  // Fetch météo si on est à moins de 16 jours (Open-Meteo limite à 16 jours)
  const daysToRace = Math.max(0, parseInt(countdown())||0);
  if (daysToRace <= 16) {
    // La météo sera fetchée et affichée
    meteoRaceEl = el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"🌡️ Météo prévue le 6 septembre"),
      el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"10px",padding:"14px",textAlign:"center"}},
        el("div",{class:"muted",style:{fontSize:"14px",fontStyle:"italic"}},"Disponible dans les 16 jours avant la course")
      )
    );
  } else {
    meteoRaceEl = el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"🌡️ Météo prévue le 6 septembre"),
      el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"10px",padding:"14px",textAlign:"center"}},
        el("div",{class:"muted",style:{fontSize:"14px",fontStyle:"italic"}},"Disponible à partir du 21 août · J–"+daysToRace+" actuellement")
      )
    );
  }

  // ── Allures de passage aux km clés ───────────────────────────────────────
  const paceSecKm = raceGoalTime / 10; // secondes par km
  // Calculer l\'allure compensée sur les 3 derniers km pour arriver exactement à l\'objectif
  const cumulKm7 = 1*(paceSecKm+10) + 2*(paceSecKm+5) + 2*paceSecKm + 2*paceSecKm;
  const paceFinal = (raceGoalTime - cumulKm7) / 3;
  // Segments : de→à, allure sur ce segment, note
  const splits = [
    { from:0,  to:1,  note:"Départ prudent",  pace: paceSecKm + 10 },
    { from:1,  to:3,  note:"S\'installer",    pace: paceSecKm + 5  },
    { from:3,  to:5,  note:"Mi-course",       pace: paceSecKm      },
    { from:5,  to:7,  note:"Allure cible",    pace: paceSecKm      },
    { from:7,  to:10, note:"Finir fort",      pace: paceFinal      },
  ];

  // Calculer les temps de passage cumulés
  const passageTimes = [];
  let cumul = 0;
  splits.forEach(s => {
    const dist = s.to - s.from;
    cumul += dist * s.pace;
    passageTimes.push(Math.round(cumul));
  });

  const splitsCard = el("div",{style:{marginBottom:"16px"}},
    el("div",{class:"label"},"🏃 Allures de passage"),
    el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"10px",overflow:"hidden"}},
      el("div",{style:{display:"grid",gridTemplateColumns:"60px 1fr 70px 70px",gap:"0",padding:"8px 12px",borderBottom:"1px solid #2e3347"}},
        el("span",{class:"muted",style:{fontSize:"12px",fontWeight:"700"}},"SEGMENT"),
        el("span",{class:"muted",style:{fontSize:"12px",fontWeight:"700"}},"STRATÉGIE"),
        el("span",{class:"muted",style:{fontSize:"12px",fontWeight:"700",textAlign:"right"}},"ALLURE"),
        el("span",{class:"muted",style:{fontSize:"12px",fontWeight:"700",textAlign:"right"}},"PASSAGE")
      ),
      ...splits.map((s,i)=>{
        const paceStr = Math.floor(s.pace/60)+":"+(Math.round(s.pace%60)).toString().padStart(2,"0")+"/km";
        const passageStr = fmtTime(passageTimes[i]) || "--";
        const segLabel = s.from+"→"+s.to+" km";
        const color = i===0||i===1?"#60a5fa":i===2||i===3?"#f97316":"#22c55e";
        return el("div",{style:{display:"grid",gridTemplateColumns:"60px 1fr 70px 70px",gap:"0",padding:"10px 12px",borderBottom:i<splits.length-1?"1px solid #2e3347":"none",alignItems:"center"}},
          el("span",{style:{color,fontSize:"13px",fontWeight:"700"}},segLabel),
          el("span",{class:"muted",style:{fontSize:"13px"}},s.note),
          el("span",{style:{color:"#f1f5f9",fontSize:"14px",fontWeight:"600",textAlign:"right"}},paceStr),
          el("span",{style:{color,fontSize:"14px",fontWeight:"700",textAlign:"right"}},passageStr)
        );
      })
    )
  );

  // ── Résumé de préparation ─────────────────────────────────────────────────
  const pred = currentPred || predict10K();
  const totalDone = ALL_SESSIONS.filter(s=>s.type!=="REPOS"&&s.type!=="RACE"&&statuses[s.uid]==="✅").length;
  const totalAdapted = ALL_SESSIONS.filter(s=>s.type!=="REPOS"&&s.type!=="RACE"&&statuses[s.uid]==="⚠️").length;
  const totalMissed = ALL_SESSIONS.filter(s=>s.type!=="REPOS"&&s.type!=="RACE"&&statuses[s.uid]==="❌").length;
  const totalSess = ALL_SESSIONS.filter(s=>s.type!=="REPOS"&&s.type!=="RACE").length;
  const totalKmRace = Math.round(stravaActivities.reduce((s,a)=>s+a.distance,0)/100)/10;
  const completionRate = totalSess > 0 ? Math.round((totalDone+totalAdapted)/totalSess*100) : 0;
  const verdictRaceColor = completionRate >= 80 ? "#22c55e" : completionRate >= 60 ? "#eab308" : "#ef4444";

  const prepCard = el("div",{style:{marginBottom:"12px"}},
    el("div",{class:"label"},"📋 Résumé de préparation"),
    el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"10px",padding:"14px"}},
      el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"12px"}},
        el("div",{style:{background:"#232738",borderRadius:"8px",padding:"10px",textAlign:"center"}},
          el("div",{style:{color:"#22c55e",fontSize:"20px",fontWeight:"800"}},totalDone+""),
          el("div",{class:"muted",style:{fontSize:"12px"}},"✅ validées")
        ),
        el("div",{style:{background:"#232738",borderRadius:"8px",padding:"10px",textAlign:"center"}},
          el("div",{style:{color:"#f1f5f9",fontSize:"20px",fontWeight:"800"}},totalKmRace+" km"),
          el("div",{class:"muted",style:{fontSize:"12px"}},"courus")
        ),
        el("div",{style:{background:"#232738",borderRadius:"8px",padding:"10px",textAlign:"center"}},
          el("div",{style:{color:pred.time?verdictRaceColor:"#94a3b8",fontSize:"20px",fontWeight:"800"}},pred.time?fmtTime(pred.time):"—"),
          el("div",{class:"muted",style:{fontSize:"12px"}},"estimation")
        )
      ),
      el("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"8px 10px",background:verdictRaceColor+"11",border:"1px solid "+verdictRaceColor+"33",borderRadius:"8px"}},
        el("span",{style:{fontSize:"16px"}},completionRate>=80?"🟢":completionRate>=60?"🟡":"🔴"),
        el("div",{},
          el("div",{style:{color:verdictRaceColor,fontSize:"14px",fontWeight:"700"}},completionRate+"% de complétion"),
          el("div",{class:"muted",style:{fontSize:"12px"}},(totalDone+totalAdapted)+" / "+totalSess+" séances réalisées · "+totalMissed+" ratée"+(totalMissed>1?"s":""))
        )
      )
    )
  );

  // ── Conseil Coach spécifique course ───────────────────────────────────────
  const coachRaceEl = el("div",{style:{marginBottom:"12px"}},
    el("div",{class:"label"},"🤖 Conseil de Léa pour la course"),
    el("div",{style:{background:"#232738",borderRadius:"10px",padding:"14px",display:"flex",gap:"10px"}},
      el("span",{style:{fontSize:"20px",flexShrink:"0"}},"🤖"),
      el("div",{style:{color:"#e2e8f0",fontSize:"14px",lineHeight:"1.6"}},
        "Pars prudemment sur le 1er km — vise "+Math.floor((raceGoalTime/10+10)/60)+":"+(Math.round((raceGoalTime/10+10)%60)).toString().padStart(2,"0")+"/km. "+
        "Installe ton allure cible à partir du km 2. La course se joue entre le km 7 et 10 — garde une réserve pour finir fort. "+
        "Objectif mi-course : "+fmtTime(Math.round(raceGoalTime/2))+"."
      )
    )
  );

  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{marginTop:"8px"}}),
    infoCard, prepCard, meteoRaceEl, horairesCard, splitsCard, coachRaceEl, checklistCard, parcoursCard
  );
}

function compressActivities(activities) {
  return activities.filter(a => a.type === "Run").map(a => {
    const effortLaps = (() => {
      if (!a.laps?.length) return undefined;
      const speeds = a.laps.map(l => l.average_speed).sort((x,y) => x-y);
      const p70 = speeds[Math.floor(speeds.length * 0.70)];
      return a.laps.filter(l => l.average_speed >= p70 && l.average_speed > 0 && (1000/l.average_speed) < 360)
        .map(l => ({ average_speed: l.average_speed, distance: l.distance, average_heartrate: l.average_heartrate }));
    })();
    return {
      id_str: a.id_str,
      type: a.type,
      start_date_local: a.start_date_local,
      distance: a.distance,
      moving_time: a.moving_time,
      average_speed: a.average_speed,
      average_heartrate: a.average_heartrate,
      max_heartrate: a.max_heartrate,
      start_latlng: a.start_latlng,
      laps: effortLaps,
    };
  });
}

function getBackupData() {
  return JSON.stringify({
    statuses,
    notesList,
    sessionNotes,
    stravaActivities: compressActivities(stravaActivities),
    predHistory,
    raceGoalTime,
    runnerWeight,
    runnerHeight,
    runnerFcMax,
    runnerPps,
    raceHoraires,
    raceParcoursUrl,
    checklistItems,
    version: 3,
    savedAt: new Date().toISOString()
  });
}

let gistSaveTimer = null;

async function gistSave(silent=false) {
  if (!githubToken) return;
  try {
    const body = {description:"Plan 10K Laurent — backup", public:false,
      files:{"plan10k_backup.json":{content:getBackupData()}}};
    let url="https://api.github.com/gists", method="POST";
    if (gistId) { url+="/"+gistId; method="PATCH"; }
    const resp = await fetch(url,{method,headers:{"Authorization":"token "+githubToken,"Content-Type":"application/json"},body:JSON.stringify(body)});
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    gistId = data.id; save("lk_gist_id",gistId);
    if (!silent) { gistMsg="☁️ Sauvegardé "+new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}); render(); setTimeout(()=>{gistMsg="";render();},3000); }
  } catch(e) {
    if (!silent) { gistMsg="❌ Erreur sync"; render(); setTimeout(()=>{gistMsg="";render();},3000); }
  }
}

function scheduleSave() {
  if (!githubToken) return;
  if (gistSaveTimer) clearTimeout(gistSaveTimer);
  gistSaveTimer = setTimeout(()=>gistSave(true),2000);
}

async function gistLoad() {
  if (!githubToken||!gistId) return;
  try {
    const resp = await fetch("https://api.github.com/gists/"+gistId,{headers:{"Authorization":"token "+githubToken}});
    if (!resp.ok) throw new Error();
    const data = await resp.json();
    const raw = data.files["plan10k_backup.json"]?.content;
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (Object.keys(statuses).length===0&&notesList.length===0) {
      statuses=parsed.statuses||{}; notesList=parsed.notesList||[];
      if (parsed.stravaActivities?.length) { stravaActivities=parsed.stravaActivities; save("lk_strava_activities",stravaActivities); }
      if (parsed.predHistory?.length) { predHistory=parsed.predHistory; save("lk_pred_history",predHistory); }
      if (parsed.sessionNotes) { sessionNotes=parsed.sessionNotes; save("lk_session_notes",sessionNotes); }
      save("lk_statuses",statuses); save("lk_notes",notesList);
      gistMsg="☁️ Données restaurées"; render(); setTimeout(()=>{gistMsg="";render();},4000);
    }
  } catch(e) {
    console.warn("gistLoad échoué:", e.message);
  }
}
