<!-- ============================================================
     Écran d'authentification Supabase — ajouté le 13 juillet 2026.
     Le HTML/CSS/logique réel est dans engine-classic-scripts/auth.classic.js

============================================================ -->
<div id="ecran-auth-hote"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/engine-classic-scripts/auth.classic.js"></script>

<script>
  // Démarre le montage de l'écran d'auth dès que possible ; la promesse
  // se résout avec l'utilisateur dès qu'une session est active (existante
  // au chargement, ou obtenue via le formulaire).
  //
  // Une fois connecté, précharge toutes les données Supabase de
  // l'utilisateur dans localStorage AVANT de résoudre window.__AUTH_PRET__
  // — ainsi, quand le script principal plus bas exécute ses ~22 lignes
  // `let x = load(clePourPlan("lk_..."), défaut)`, les données viennent
  // déjà de Supabase plutôt que d'un éventuel ancien état local. Le plan
  // actif n'étant pas encore connu à ce stade (window.__PLAN_BRUT__ se
  // prépare en parallèle, cf. script suivant), on précharge d'abord sans
  // planId — les données préfixées par plan seront chargées séparément
  // une fois le plan connu (cf. bloc juste avant render(), fin de fichier).
  // Chantier v2.5 migration, 13 juillet 2026 — voir inventaire §8bis.
  window.__AUTH_PRET__ = LkAuth.monterEcranAuth('ecran-auth-hote').then(async function (user) {
    window.__UTILISATEUR__ = user;
    // Migration rétroactive (one-shot par appareil) AVANT le préchargement :
    // pousse vers Supabase les données déjà présentes en localStorage
    // depuis avant la mise en place de cette synchronisation, pour ne
    // pas les perdre silencieusement au premier login. Cf. bug de
    // production du 13 juillet 2026, inventaire §8bis.
    await LkSync.migrerDonneesExistantes(user.id, null);
    await LkSync.precharger(user.id, null);

    // Onboarding profil (v2.8, §17.7) — affiché une seule fois si le
    // niveau n'a jamais été renseigné (nouveau compte, ou compte existant
    // migré avant l'ajout de ce champ). Utilise directement localStorage
    // ici : profilCoureur/migrerVersProfilCoureur() ne sont définis que
    // plus loin dans ce fichier (après ce script), donc on ne peut pas
    // encore s'appuyer dessus à ce stade du chargement.
    const profilBrut = JSON.parse(localStorage.getItem('lk_profil_coureur') || 'null');
    if (!profilBrut || !profilBrut.niveau) {
      const complement = await LkAuth.monterEcranOnboarding('ecran-auth-hote', profilBrut || {});
      const profilMisAJour = Object.assign(
        { prenom: "", nom: "", poids: null, taille: null, fcMax: 181, pps: "", records: { "5K": null, "10K": null, "Semi": null, "Marathon": null } },
        profilBrut || {},
        complement
      );
      localStorage.setItem('lk_profil_coureur', JSON.stringify(profilMisAJour));
      // save() n'est pas encore défini à ce stade du chargement (plus loin
      // dans ce fichier) — on reproduit ici le même geste de sync que
      // save() fait pour toute autre clé (cf. définition de save(), plus
      // bas), pour que l'onboarding ne reste pas local à cet appareil.
      try {
        LkSync.synchroniserVersSupabase(user.id, null, 'lk_profil_coureur', profilMisAJour);
      } catch (e) {
        console.warn('Synchronisation profil onboarding non déclenchée :', e.message);
      }

      // Grand débutant (v2.8, §17.9) : redirection directe vers l'écran
      // dédié du wizard (jours + Strava, cf. v2/index.html), sans passer
      // par le dashboard ni l'écran de choix course/forme. On ne fait ça
      // qu'à la sortie immédiate de l'onboarding — un grand débutant qui
      // revient plus tard sur /v2 (ex. pour changer de plan) retombe sur
      // le comportement normal du wizard, pas cette redirection forcée.
      if (profilMisAJour.niveau === 'grand-debutant') {
        window.location.href = '/v2?onboarding=grand-debutant';
        return new Promise(() => {}); // ne résout jamais : on quitte la page
      }
    }

    return user;
  });
</script>

<script src="/engine-classic-scripts/changelog.classic.js"></script>
<script>
  // Charge (ou génère par défaut) le plan à afficher — chantier convergence
  // v1/v2, section 7 (sélection de plan depuis v1). Async car chargerPlans()
  // fait un appel réseau (fetch vers l'API GitHub Gist). Ce script ne fait
  // que PRÉPARER les données dans window.__PLAN_BRUT__/__PLAN_GENERE__ ; le
  // script principal (plus bas, qui définit render()/PLAN/ALL_SESSIONS)
  // attend la promesse window.__PLAN_PRET__ avant de s'initialiser — cf. le
  // bloc juste avant l'appel final à render() en fin de fichier.
  //
  // Le plan BRUT (avant traduction v1) est conservé sous __PLAN_BRUT__ :
  // contient les métadonnées (paramsOrigine.raceName/raceLocation/raceUrl,
  // zoneFC.fcMax, paramsOrigine.tempsReference) qui n'existent pas dans le
  // format traduit PLAN/ALL_SESSIONS — nécessaires pour ne plus coder ces
  // valeurs en dur (docs/v2-methodologie/convergence-v1-v2.md, section 7bis).
  window.__PLAN_PRET__ = (async () => {
    // Attend que le préchargement Supabase (window.__AUTH_PRET__) ait
    // restauré lk_github_token/lk_gist_id en localStorage AVANT d'appeler
    // chargerPlans() — sinon celle-ci part sans token (pas encore rentré
    // depuis Supabase) et échoue silencieusement, avec repli sur le plan
    // par défaut. Bug découvert le 13 juillet 2026 en test de production :
    // les deux promesses démarraient en parallèle sans dépendance, donc
    // chargerPlans() pouvait gagner la course et échouer avant que le
    // préchargement n'ait eu lieu. Chantier v2.5 migration, cf. inventaire
    // §8bis. Coût : le premier rendu attend maintenant la connexion réseau
    // à Supabase avant de tenter le Gist, légèrement plus lent qu'avant,
    // mais correct plutôt que rapide-et-faux.
    await window.__AUTH_PRET__;

    // Cache des modules gist-sync.js et plan-generator.js (19/07/2026,
    // étape 2 du chantier de conversion module — cf. mémoire de session).
    // Même pattern que _fitParserModule plus bas dans ce fichier :
    // import() dynamique, chargé une seule fois puis réutilisé, plutôt
    // qu'un <script src> statique (gist-sync.classic.js/
    // plan-generator.classic.js retirés). Les fonctions/constantes des
    // modules sont exposées en global via Object.assign(window, ...) pour
    // rester compatibles avec tout le code existant qui les appelle
    // directement (chargerPlans(), generatePlan(), KM_BY_DISTANCE, etc.
    // sans préfixe, à de nombreux endroits de ce fichier) — pas de
    // réécriture de chaque point d'appel, seul le tout premier chargement
    // change. Les deux modules sont chargés ici, tôt dans ce bloc, car
    // KM_BY_DISTANCE (plan-generator.js) et generatePlan() sont utilisés
    // de façon synchrone plus loin dans ce même IIFE async (ligne
    // ~291/~850) — doivent donc être garantis disponibles AVANT.
    window._gistSyncModule = await import("/v2/engine/gist-sync.js");
    Object.assign(window, window._gistSyncModule);
    window._planGeneratorModule = await import("/v2/engine/plan-generator.js");
    Object.assign(window, window._planGeneratorModule);
    // plan-forme.js importe déjà plan-generator.js via de vrais import ES
    // (formatPace, riegelPredict, computeFcMaxTanaka, etc.) — doit donc
    // être chargé APRÈS plan-generator.js ci-dessus, jamais avant.
    window._planFormeModule = await import("/v2/engine/plan-forme.js");
    Object.assign(window, window._planFormeModule);
    // v1-bridge.js — module autonome, aucune dépendance vers un autre
    // module. construireAllSessions() n'est jamais appelée (index.html a
    // sa propre fonction locale recalculerAllSessions() qui fait la même
    // chose, dupliquée en dur — dette technique mineure, non traitée ici).
    window._v1BridgeModule = await import("/v2/engine/v1-bridge.js");
    Object.assign(window, window._v1BridgeModule);

    const idPlanChoisi = localStorage.getItem('v2_preview_plan_id');
    let planBrut = null;
    let plansDisponibles = [];

    // Supabase d'abord (v2.8, 15/07/2026) — Gist n'est plus le système
    // principal depuis que Laurent a retiré le token GitHub ; chargerPlans()
    // (Gist) sans token retourne toujours [] silencieusement, laissant tout
    // nouveau plan introuvable au retour sur le dashboard, quel que soit le
    // wizard utilisé pour le créer. Gist reste tenté en repli SEULEMENT si
    // un token est encore configuré (compatibilité ascendante, au cas où
    // Laurent le rétablirait plus tard) et que Supabase n'a rien retourné.
    try {
      if (window.__UTILISATEUR__?.id) {
        plansDisponibles = await LkSync.chargerPlansSupabase(window.__UTILISATEUR__.id);
      }
    } catch (e) {
      console.warn('Chargement des plans depuis Supabase échoué :', e.message);
    }

    if (plansDisponibles.length === 0) {
      try {
        plansDisponibles = await chargerPlans();
      } catch (e) {
        console.warn('Chargement des plans depuis le Gist échoué, génération par défaut :', e.message);
      }
    }

    if (plansDisponibles.length > 0) {
      planBrut = idPlanChoisi ? plansDisponibles.find(p => p.id === idPlanChoisi) : null;
      if (!planBrut) {
        // Repli : plusieurs plans actifs possibles (ex: deux courses dont
        // les dates ne se chevauchent pas) — on ne peut plus se fier à
        // l'ordre de création (chargerPlansSupabase() trie par created_at
        // DESC), qui ne correspond pas forcément au plan le plus pertinent
        // du moment. On choisit la course dont la date est la plus proche
        // dans le futur (aujourd'hui inclus) ; un plan Forme (pas de
        // dateCourse, cycle glissant) n'a pas cette notion et n'est retenu
        // ici que s'il n'y a aucun plan course à venir. Bug découvert le
        // 15 juillet 2026 : avec deux plans course légitimes en parallèle
        // (dates non chevauchantes), l'app chargeait systématiquement le
        // plus récemment créé au lieu du plus pertinent, provoquant une
        // redirection vers le profil quand ce plan n'était pas celui
        // attendu par Laurent.
        const aujourdhui = new Date().toISOString().slice(0, 10);
        const plansCourseAVenir = plansDisponibles
          .filter(p => p.mode !== 'forme' && p.dateCourse && p.dateCourse >= aujourdhui)
          .sort((a, b) => a.dateCourse < b.dateCourse ? -1 : 1);
        planBrut = plansCourseAVenir[0] || plansDisponibles[0];
      }
    }

    if (!planBrut) {
      // Repli : aucun plan trouvé (Supabase ET Gist vides — compte neuf,
      // tous les plans supprimés, ou pas encore de token configuré). Un
      // plan minimal est quand même généré pour que PLAN/ALL_SESSIONS et
      // les nombreuses lectures directes de window.__PLAN_BRUT__.* dans ce
      // fichier (paramsOrigine, semaines, etc.) restent toutes valides sans
      // vérification de nullité partout — mais il est marqué
      // estPlanRepli:true, lu par renderDashboard() pour afficher un vrai
      // état "Aucun plan en cours" plutôt que ce contenu factice.
      //
      // BUG CORRIGÉ (15/07/2026, signalé par Laurent) : avant ce correctif,
      // ce plan par défaut (paramètres historiques de Laurent, "10 km
      // Gem'Aubagne") s'affichait tel quel comme un vrai plan actif dès que
      // la liste de plans était vide — trompeur, en particulier après une
      // purge de compte légitime (cf. correctif sécurité déconnexion) où
      // "aucun plan" est un état parfaitement normal à afficher clairement,
      // pas à masquer derrière un plan qui n'a jamais existé pour ce compte.
      planBrut = generatePlan(
        { niveau: 'intermediaire', joursDisponiblesHabituels: [1,2,3,4,5,6], renforcementMusculaire: true, fcMaxConnue: 181 },
        { distance: '10K', refDistance: '10K', tempsReference: '50:21', objectif: '48:30', dateDebut: '2026-06-22', dateCourse: '2026-09-06', volumeActuel: 30, contraintesPonctuelles: [], raceName: "10 km Gem'Aubagne", raceLocation: 'Aubagne', raceUrl: 'https://new.sportsnconnect.com/client/events/4qa4QCJ1DtZYPSzSCbjJJK-5-and-10-km-gemaubagne' }
      );
      // Bug trouvé le 7 juillet 2026 : generatePlan() (le moteur pur)
      // n'assigne jamais d'id — seul le wizard v2 le fait
      // (crypto.randomUUID()) après génération. Sans id ici, clePourPlan()
      // retombe sur la clé lk_statuses NON préfixée (ancien résidu global,
      // cf. section 7quater), invisible tant qu'un vrai plan avec id est
      // utilisé mais qui refait surface dès qu'on retombe sur ce repli
      // (ex: sauvegarde échouée silencieusement à cause d'un chevauchement
      // de dates, section 7ter — le plan n'atteint jamais le Gist, l'id
      // écrit dans localStorage devient introuvable, repli sur ce plan par
      // défaut SANS id). Un id stable et déterministe (pas aléatoire, pour
      // que ce plan de repli garde toujours la même clé d'une session à
      // l'autre) évite ce retour silencieux vers l'ancienne clé globale.
      planBrut.id = 'plan-repli-defaut';
      planBrut.estPlanRepli = true;
    }

    window.__PLAN_BRUT__ = planBrut;
    window.__PLAN_GENERE__ = traduirePlanVersFormatV1(planBrut);
    window.__PLANS_DISPONIBLES__ = plansDisponibles;
  })();
</script>

<script>
(async () => {
await window.__PLAN_PRET__; // attend que le premier script ait chargé/généré le plan
await window.__AUTH_PRET__; // attend la session ET le premier préchargement (sans planId)

// Deuxième passe de préchargement, cette fois avec le planId maintenant
// connu (window.__PLAN_BRUT__.id) — remplit localStorage avec les
// données préfixées par plan (lk_statuses_xxx, lk_notes_xxx, etc.) AVANT
// que les lignes `let x = load(clePourPlan("lk_..."), défaut)` plus bas
// dans ce même script ne s'exécutent. Chantier v2.5, 13 juillet 2026.
// migrerDonneesExistantes() est idempotente (marqueur localStorage) —
// l'appeler ici aussi permet de rattraper les données préfixées par
// plan qui n'avaient pas encore de planId connu lors du premier appel
// (juste après connexion, avant que le plan soit chargé).
// assurerPlanExiste() DOIT être appelée en premier, avant tout appel
// touchant plan_donnees (migrerDonneesExistantes, precharger, et
// chaque save() plus tard) — plan_donnees.plan_id a une contrainte de
// clé étrangère vers plans.id, donc toute écriture échoue en 409 tant
// qu'aucune ligne n'existe côté plans. Bug découvert en test de
// production le 13 juillet 2026, cf. inventaire §8bis.
if (window.__UTILISATEUR__ && window.__PLAN_BRUT__?.id) {
  await LkSync.assurerPlanExiste(window.__UTILISATEUR__.id, window.__PLAN_BRUT__.id, window.__PLAN_BRUT__);
  await LkSync.migrerDonneesExistantes(window.__UTILISATEUR__.id, window.__PLAN_BRUT__.id);
  await LkSync.precharger(window.__UTILISATEUR__.id, window.__PLAN_BRUT__.id);

  // Realtime — ajouté le 13 juillet 2026. Un changement fait sur un autre
  // appareil (même compte) déclenche ce callback : on relit les données
  // fraîches depuis Supabase (precharger, qui écrase localStorage), puis
  // on ré-exécute les mêmes lectures que celles faites au chargement
  // (statuses, notes, etc.) avant de redemander un rendu. Pas de retry
  // ni de gestion d'erreur poussée ici — un échec silencieux n'est pas
  // grave, le prochain rechargement de page rattrapera de toute façon.
  await LkSync.activerRealtime(window.__PLAN_BRUT__.id, async () => {
    await LkSync.precharger(window.__UTILISATEUR__.id, window.__PLAN_BRUT__.id);
    statuses = load(clePourPlan("lk_statuses"), {});
    hiddenSessions = load(clePourPlan("lk_hidden_sessions"), {});
    swappedSessions = load(clePourPlan("lk_swapped_sessions"), {});
    notesList = load(clePourPlan("lk_notes"), []);
    sessionNotes = load(clePourPlan("lk_session_notes"), {});
    render();
  });
}

const STRAVA_CLIENT_ID = "260339";

// ── Infos course ──────────────────────────────────────────────────────────

// ── Adaptateur avec RPE — 17/07/2026 (chantier "RPE unifié") ──────────────
// DecisionEngineAdapter.adapterHistoriqueComplet() ne peuple jamais
// ressentiRPE, volontairement (commentaire du module : "mieux vaut ne rien
// inventer qu'associer un RPE à la mauvaise séance" — cette fonction ne
// reçoit que des activités Strava brutes, sans notion de séance du plan/
// uid, donc pas de correspondance possible en interne). Recommandation
// suivie le 17/07/2026 : faire cette correspondance ici, côté appelant
// (index.html connaît à la fois stravaActivities ET ALL_SESSIONS/
// sessionRpe/manualPerf), plutôt que de modifier la signature du module —
// respecte le principe du module tout en le rendant réellement exploitable.
// Remplace adapterHistoriqueComplet(stravaActivities, {}, ...) dans les 3
// appelants qui en avaient besoin (ACWR consigne coach, ACWR graphique,
// calculerEtatMoteurDecision) — la correspondance ressentiRPE est
// désormais présente pour toute activité dont la date correspond à une
// séance du plan avec un RPE renseigné (sessionRpe en priorité, repli sur
// manualPerf pour compat ascendante, cf. déclaration de sessionRpe plus
// haut dans ce fichier).
function adapterHistoriqueAvecRpe(stravaActivitiesListe, provenanceDeclaree) {
  if (typeof DecisionEngineAdapter === 'undefined') return [];
  const activites = stravaActivitiesListe || [];
  // Index date -> uid (une seule séance par jour dans ce plan, cohérent
  // avec le reste de l'app qui indexe déjà les activités par date sans
  // gérer plusieurs séances le même jour)
  const uidParDate = {};
  (typeof ALL_SESSIONS !== 'undefined' ? ALL_SESSIONS : []).forEach(s => {
    if (s.date) uidParDate[s.date] = s.uid;
  });
  const samplesStrava = activites
    .filter(a => a.type === 'Run')
    .filter(a => {
      // Exclusion Strava si saisie manuelle (17/07/2026, décision explicite :
      // une saisie manuelle signale souvent une donnée Strava corrompue ou
      // absente ce jour-là, elle ne doit jamais coexister avec Strava dans
      // le moteur — cohérent avec getStravaRunSiPasManuel() côté UI).
      const dateActivite = a.start_date_local ? a.start_date_local.slice(0, 10) : null;
      const uid = dateActivite ? uidParDate[dateActivite] : null;
      return !(uid && manualPerf[uid]);
    })
    .map(a => {
      const dateActivite = a.start_date_local ? a.start_date_local.slice(0, 10) : null;
      const uid = dateActivite ? uidParDate[dateActivite] : null;
      const rpeSaisi = uid
        ? (sessionRpe[uid] || (manualPerf[uid] && manualPerf[uid].rpe) || null)
        : null;
      return DecisionEngineAdapter.adapterActiviteStrava(a, provenanceDeclaree, rpeSaisi);
    })
    .filter(sample => sample.date !== null);

  // Séances à saisie manuelle (17/07/2026) : Strava exclu ci-dessus, mais la
  // séance ne doit pas disparaître du moteur pour autant — reconstruction
  // d'un objet Strava-like synthétique à partir de manualPerf, passé par le
  // même adaptateur pour ne jamais dupliquer la logique de conversion.
  const uidsAvecSaisieManuelle = Object.keys(manualPerf).filter(uid => manualPerf[uid]);
  const samplesManuels = (typeof ALL_SESSIONS !== 'undefined' ? ALL_SESSIONS : [])
    .filter(s => uidsAvecSaisieManuelle.includes(s.uid))
    .map(s => {
      const mp = manualPerf[s.uid];
      if (!mp.average_speed) return null;
      const dureeSec = mp.dureeSaisieMin ? mp.dureeSaisieMin * 60
        : (mp.distance && mp.average_speed ? mp.distance / mp.average_speed : null);
      if (!dureeSec) return null;
      const rpeSaisi = sessionRpe[s.uid] || mp.rpe || null;
      const activiteSynthetique = {
        id: s.uid,
        start_date_local: s.date + "T12:00:00",
        distance: mp.distance || (mp.average_speed * dureeSec),
        moving_time: dureeSec,
        average_speed: mp.average_speed,
        average_heartrate: mp.average_heartrate || undefined,
        type: 'Run',
      };
      return DecisionEngineAdapter.adapterActiviteStrava(activiteSynthetique, 'manuel', rpeSaisi);
    })
    .filter(sample => sample && sample.date !== null);

  return [...samplesStrava, ...samplesManuels];
}

function obtenirRatioACWRActuel() {
  if (typeof DecisionEngineAdapter === 'undefined' || typeof DecisionEngineRunnerState === 'undefined') return null;
  if (!stravaActivities || !stravaActivities.length) return null;

    const samples = adapterHistoriqueAvecRpe(stravaActivities, "strava_gratuit");
    const runnerState = DecisionEngineRunnerState.calculerRunnerState(samples, optionsRunnerStateActuel());
    return runnerState.charge.ratio;
  } catch (err) {
    console.warn("ACWR (consigne coach) : erreur de calcul.", err.message);
    return null;
  }
}

  if (!stravaActivities || !stravaActivities.length) return null;

// ── Séances planifiées ratées consécutives, pour R-070 du RuleEngine ───────
// (17/07/2026). Contrairement à DecisionEngineEngagement.regulariteRecente
// (qui compare l'historique Strava réalisé à une fréquence habituelle sans
// connaître le plan), cette fonction lit directement le PLAN et les statuts
// ✅/⚠️/❌ (ALL_SESSIONS/statuses, déjà existants dans index.html) pour
// détecter un enchaînement précis de séances PRÉVUES et RATÉES — un signal
// que le RuleEngine ne peut pas calculer lui-même car il ne connaît que
// runnerState/engagementState/activitySamples, jamais __PLAN_BRUT__/statuses
// (isolation volontaire du moteur vis-à-vis du plan, cf. decision-engine-rules
// §"Ce module ne modifie AUCUNE donnée"). Le résultat est calculé ici et
// simplement transmis en input à evaluerRegles(), sans que le module R-070
// lui-même ait besoin d'accéder au plan.
function obtenirSeancesPlanifieesManquees() {
  const aujourdhui = new Date().toISOString().slice(0, 10);
  // Séances passées (date <= aujourd'hui), triées chronologiquement, avec un
  // statut déjà renseigné (les séances futures n'ont jamais de statut) —
  // ignore les séances non encore échues pour ne jamais compter un "à venir"
  // comme une séance manquée.
  const seancesPassees = ALL_SESSIONS
    .filter(s => s.date && s.date <= aujourdhui)
    .sort((a, b) => a.date.localeCompare(b.date));

  if (seancesPassees.length < 2) {
    return { nbConsecutivesRatees: 0, dernieresSeances: [] };
  }

  // Les 2 dernières séances passées, dans l'ordre chronologique
  const deuxDernieres = seancesPassees.slice(-2);
  const statutsRecents = deuxDernieres.map(s => ({ date: s.date, type: s.type, statut: statuses[s.uid] || '—' }));

  const toutesRatees = statutsRecents.every(s => s.statut === '❌');

  return {
    nbConsecutivesRatees: toutesRatees ? 2 : 0,
    dernieresSeances: statutsRecents,
  };
}

// ── État complet du moteur de décision, calcul unique partagé (§9.1 doc ────
// intégration : "le coach IA devient un habillage du moteur, jamais un
// second décideur") — utilisé à la fois par moteurDecisionEl (carte de
// proposition, ligne ~2275) et fetchCoachMsg (prompt du coach IA). Un seul
// calcul, jamais deux exécutions séparées qui pourraient diverger.
// Retourne { runnerState, engagementState, decision } ou null si les scripts
// du moteur ne sont pas chargés, pas d'activités, ou erreur de calcul —
// jamais d'exception qui remonterait au dashboard.
//
// weekAnalysis/trendAnalysis (Modules 3/4) branchés dans l'input du 17/07/2026
// (session ultérieure) — décision explicite de Laurent : ajouter ces données
// à l'input, sans qu'aucune règle ne les consomme dans un premier temps
// (cf. inventaire §32). Complété plus tard dans la même session ultérieure :
// R-062 (cf. decision-engine-rules.classic.js) consomme désormais
// trendAnalysis.signauxDetectes (signal FATIGUE_CROISSANTE) — weekAnalysis
// reste inconsommé pour l'instant. evaluerRegles() ignore silencieusement
// tout champ qu'aucune règle ne lit — aucun risque de régression sur les
// décisions déjà produites par les règles existantes.
// analyserSemaineActuelle()/analyserTendance() (déclarées plus bas dans ce
// fichier, hoisting JS standard donc accessibles ici sans souci d'ordre)
// peuvent retourner null (pas assez de semaines, script non chargé) — dans
// ce cas weekAnalysis/trendAnalysis restent simplement null dans l'input,
// comme sessionAnalysis l'est déjà pour EngineInput (cf. doc archi, champ
// optionnel "absent si pas de séance récente à évaluer").
//
// RPE unifié (17/07/2026, même chantier) : adapterHistoriqueAvecRpe()
// remplace adapterHistoriqueComplet() ici — le Module 1 (fatigue/ACWR)
// bénéficie désormais du RPE saisi via renderStatusRow(), plus seulement
// TRIMP sur FC. Cohérent avec la même correction appliquée à
// obtenirRatioACWRActuel()/obtenirHistoriqueACWR() juste au-dessus.
function calculerEtatMoteurDecision() {
  if (typeof DecisionEngineAdapter === 'undefined' || typeof DecisionEngineRunnerState === 'undefined'
      || typeof DecisionEngineEngagement === 'undefined' || typeof DecisionEngineRules === 'undefined') return null;
  try {
    const samples = adapterHistoriqueAvecRpe(window.stravaActivities || [], "strava_gratuit");
    const runnerState = DecisionEngineRunnerState.calculerRunnerState(samples, optionsRunnerStateActuel());
    const engagementState = DecisionEngineEngagement.calculerEngagementState(samples, {});
    const weekAnalysis = typeof analyserSemaineActuelle === 'function' ? analyserSemaineActuelle(currentWeek()) : null;

async function fetchHistoricalWeather(date, lat, lon) {
  try {
    const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${date}&end_date=${date}&hourly=temperature_2m&timezone=Europe%2FParis`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (!data.hourly?.temperature_2m) return null;
    // Prendre la température de l'heure de début de séance (approximation : 18h)
    const temps = data.hourly.temperature_2m;
    return Math.round(temps[18] ?? temps[12] ?? temps[0]);
  } catch(e) { return null; }
}

// Coordonnées pour la météo actuelle — dynamiques depuis la dernière
// activité Strava connue avec GPS (13 juillet 2026, demandé par Laurent :
// les coordonnées fixes ne reflètent pas où le coureur court vraiment,
// notamment en voyage). Repli sur Toulon (43.12, 5.93 — position
// historique de Laurent) si aucune activité Strava n'a de GPS, ou si
// stravaActivities est vide (avant toute synchro).
function coordonneesMeteoActuelles() {
  const REPLI = { lat: 43.12, lon: 5.93 };
  if (!stravaActivities?.length) return REPLI;
  // La plus récente activité AVEC GPS — pas juste la plus récente tout
  // court, une activité sans start_latlng (tapis de course, montre sans
  // GPS) ne doit pas faire retomber sur le repli si une activité GPS plus
  // ancienne existe.
  const derniereAvecGps = [...stravaActivities]
    .filter(a => a.start_latlng?.length === 2)
    .sort((a, b) => (b.start_date_local || '').localeCompare(a.start_date_local || ''))[0];
  if (!derniereAvecGps) return REPLI;
  return { lat: derniereAvecGps.start_latlng[0], lon: derniereAvecGps.start_latlng[1] };
}

async function fetchWeather() {
  try {
    const { lat, lon } = coordonneesMeteoActuelles();
    const resp = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&timezone=Europe%2FParis`

    const data = await resp.json();
    weatherTemp = Math.round(data.current.temperature_2m);
    const code = data.current.weathercode;
    if (code === 0) weatherDesc = "☀️";
    else if (code <= 3) weatherDesc = "⛅";

// PRÉVISION FUTURE (demain), avec géolocalisation dynamique du navigateur —
// vérifie si une séance est prévue demain, et si oui déclenche la
// prévision météo pour l'enrichir d'une note de chaleur si besoin.
async function verifierMeteoSeanceDemain() {
  const plan = window.__PLAN_BRUT__;
  if (!plan?.dateDebut) return;
  const debut = new Date(plan.dateDebut + 'T00:00:00Z');
  // Calcul de "demain" en UTC, cohérent avec le calcul de dateSeance
  // ci-dessous — mélanger un Date en fuseau local avec un calcul en UTC pur
  // créait un décalage possible d'un jour selon l'heure et le fuseau de
  // l'utilisateur (bug déjà trouvé et corrigé côté wizard, cf. commit
  // cc03fc4, reproduit ici pour la même raison).
  const aujourdhui = new Date();
  const demain = new Date(Date.UTC(aujourdhui.getFullYear(), aujourdhui.getMonth(), aujourdhui.getDate() + 1));
  const demainStr = demain.toISOString().slice(0, 10);

  for (const semaine of plan.semaines) {
    for (const [jourIndex, seance] of Object.entries(semaine.assignment)) {
      const dateSeance = new Date(debut);
      dateSeance.setUTCDate(debut.getUTCDate() + (semaine.semaineNum - 1) * 7 + Number(jourIndex));
      const dateSeanceStr = dateSeance.toISOString().slice(0, 10);

      if (dateSeanceStr === demainStr && seance.contenu) {
        // Import dynamique du module ES (19/07/2026, étape 1 du chantier
        // de conversion module — cf. mémoire de session). weather.js
        // n'est plus dupliqué en weather.classic.js : c'est le seul
        // fichier source désormais. import() est asynchrone et peut être
        // appelé n'importe où dans un script classique (contrairement à
        // `import { x } from "..."` en haut de fichier, réservé aux vrais
        // modules) — le `await` garantit que verifierMeteoPourSeance est
        // bien chargée avant d'être appelée.
        const { verifierMeteoPourSeance } = await import("/v2/engine/weather.js");
        await verifierMeteoPourSeance(seance, demainStr);
        // Re-traduit le plan brut (potentiellement enrichi d'une note) vers
        // le format v1 affiché, et rafraîchit l'affichage immédiatement
        window.__PLAN_GENERE__ = traduirePlanVersFormatV1(plan);
        PLAN = window.__PLAN_GENERE__;
        ALL_SESSIONS = recalculerAllSessions();
        render();
        return; // une seule séance concernée par jour dans l'immense
        // majorité des cas — pas la peine de continuer à parcourir
      }
    }
  }
}

// UTILS

function today() { return new Date().toISOString().slice(0,10); }

// ── Catégorie d'âge FFA (ajouté le 19/07/2026, cf. mémoire dateNaissance) ──
// Règles officielles (athle.fr, "les catégories d'âge en 2026") : la
// catégorie dépend de l'ANNÉE de naissance (pas du jour exact), et la
// saison FFA bascule chaque 1er septembre — les catégories valables du
// 01/09/N au 31/08/(N+1) sont calculées sur l'année de fin de saison
// (ex. saison 2025-2026, valable jusqu'au 31/08/2026, catégorie calculée
// avec 2026 comme année de référence). Grille figée au 19/07/2026,
// valable jusqu'au 31/08/2026 (à réviser chaque rentrée de septembre) :
// Masters (MA) 1991 et avant, Seniors (SE) 1992-2003, Espoirs (ES)
// 2004-2006, Juniors (JU) 2007-2008, Cadets (CA) 2009-2010, Minimes (MI)
// 2011-2012, Benjamins (BE) 2013-2014, Poussins (PO) 2015-2016, Éveil
// Athlétique (EA) 2017-2019, Baby Athlé (BB) 2020 et après. Masters
// subdivisés en tranches de 5 ans (M0 = 1987-1991, M1 = 1982-1986, etc.).
function calculerAnneeReferenceSaisonFFA(dateReference) {
  const d = dateReference ? new Date(dateReference+"T00:00:00") : new Date();
  // Bascule le 1er septembre : avant cette date, on est encore dans la
  // saison de l'année en cours (référence = année en cours) ; à partir du
  // 1er septembre, on bascule sur la saison suivante (référence = année
  // en cours + 1).
  return d.getMonth() >= 8 ? d.getFullYear() + 1 : d.getFullYear();
}

function calculerCategorieAgeFFA(anneeNaissance, dateReference) {
  if (!anneeNaissance) return null;
  const anneeRef = calculerAnneeReferenceSaisonFFA(dateReference);
  const age = anneeRef - anneeNaissance;
  if (age >= 35) {
    const indexMaster = Math.min(10, Math.floor((age - 35) / 5));
    return { code: "M"+indexMaster, label: "Master "+indexMaster };
  }
  if (age >= 23) return { code: "SE", label: "Senior" };
  if (age >= 20) return { code: "ES", label: "Espoir" };
  if (age >= 18) return { code: "JU", label: "Junior" };
  if (age >= 16) return { code: "CA", label: "Cadet" };
  if (age >= 14) return { code: "MI", label: "Minime" };
  if (age >= 12) return { code: "BE", label: "Benjamin" };
  if (age >= 10) return { code: "PO", label: "Poussin" };
  return { code: "EA", label: "Éveil athlétique" };
}

// Vrai anniversaire du jour (mois+jour identiques à dateNaissance), pour
// afficher un message dédié — indépendant de calculerCategorieAgeFFA qui
// ne regarde que l'année.
function estAnniversaireAujourdhui(dateNaissance) {
  if (!dateNaissance) return false;
  const t = today();
  return dateNaissance.slice(5) === t.slice(5); // compare "MM-DD"
}

// du plan actuellement affiché — fonction utilitaire centralisée, créée le
// 7 juillet 2026 après avoir trouvé le même défaut (aucun filtre de date)

// PDF) : sur un plan Semi démarrant le 14 septembre, une activité de la

// famille de bug que celui déjà corrigé pour predict10K()/

// mais jamais centralisé, donc oublié à plusieurs endroits distincts.
function activitesDuPlan() {
  const dateDebutPlan = window.__PLAN_BRUT__?.dateDebut;
  return stravaActivities.filter(a => !dateDebutPlan || a.start_date_local?.slice(0,10) >= dateDebutPlan);

// ESTMODEFORME sert de discriminant pour masquer tout ce qui suppose une
// course (compte à rebours, phases, jour J) — le reste (ACWR, Stats,
// séance du jour, statuts) reste identique, déjà générique.

// dateCourse directement sur l'objet plan, cf. section 7bis du doc de
// convergence) plutôt que codée en dur — repli sur la date historique de
// Laurent si absente. En mode Forme, DATE_COURSE_REFERENCE reste null
// (pas de repli sur l'ancienne date en dur) : countdown() doit refléter

const DATE_COURSE_REFERENCE = ESTMODEFORME ? null : (window.__PLAN_BRUT__?.dateCourse || "2026-09-06");
function countdown() { return DATE_COURSE_REFERENCE ? Math.ceil((new Date(DATE_COURSE_REFERENCE) - new Date()) / 86400000) : null; }
function currentWeek() {
  const t = today();
  for (const w of PLAN) {
    if (t >= w.sessions[0].date && t <= w.sessions[6].date) return w.week;
  }
  return t < PLAN[0].sessions[0].date ? 1 : 11;
}
function fmtDate(d) { return new Date(d+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}); }
function fmtPace(speedMs) {
  if (!speedMs || speedMs <= 0) return "--:--";
  const secPerKm = 1000 / speedMs;
  const min = Math.floor(secPerKm / 60);
  const sec = Math.round(secPerKm % 60).toString().padStart(2,"0");
  return `${min}:${sec}`;
}
// Inverse de fmtPace : "4:15" (mm:ss/km) → vitesse en m/s, ou null si
// saisie invalide/vide. Utilisé par le formulaire de saisie manuelle
// (docs/source-donnees-seances.md, section 4).
function parsePace(str) {
  if (!str) return null;
  const m = String(str).trim().match(/^(\d{1,2}):([0-5]?\d)$/);
  if (!m) return null;
  const secPerKm = parseInt(m[1],10)*60 + parseInt(m[2],10);
  if (secPerKm <= 0) return null;
  return 1000 / secPerKm;
}
function fmtTime(seconds) {
  // Format heures/minutes/secondes au-delà de 60 minutes (pertinent pour un
  // Semi/Marathon, où l'objectif dépasse facilement l'heure — avant cette
  // correction, un temps de 117min s'affichait "117'XX"" plutôt que
  // "1h57'XX"", remonté par Laurent le 7 juillet 2026 en testant un plan
  // Semi). Format court (m'ss") conservé sous 60 minutes, comme avant.
  const totalMin = Math.floor(seconds / 60);
  const s = Math.round(seconds % 60).toString().padStart(2,"0");
  if (totalMin >= 60) {
    const h = Math.floor(totalMin / 60);
    const m = (totalMin % 60).toString().padStart(2,"0");
    return `${h}h${m}'${s}"`;
  }
  return `${totalMin}'${s}"`;
}
function weekPct(week) {
  const sess = week.sessions.filter(s=>s.type!=="REPOS"&&s.type!=="RACE");
  const done = sess.filter(s=>statuses[`${week.week}-${week.sessions.indexOf(s)}`]==="✅").length;
  return sess.length ? Math.round(done/sess.length*100) : 0;
}
function globalPct() {
  const total = ALL_SESSIONS.filter(s=>s.type!=="REPOS"&&s.type!=="RACE").length;
  const done = ALL_SESSIONS.filter(s=>statuses[s.uid]==="✅").length;
  return Math.round(done/total*100);
}
function phaseOf(weekNum) { return PHASES.find(p=>p.weeks.includes(weekNum))||{color:"var(--text2)",label:""}; }
// Convertit une couleur var(--x) en rgba(var(--x-rgb), N) pour une opacité
// personnalisée — évite le bug de suffixe hex collé directement sur une
// variable CSS (var(--x)+"22" est invalide, cf. inventaire section 14.3).
function colorAvecOpacite(varColor, opacite) {
  const nom = varColor.replace("var(--", "").replace(")", "");
  return "rgba(var(--" + nom + "-rgb)," + opacite + ")";
}

// Identifie si une semaine est une semaine de décharge — champ produit par
// le moteur v2 (estDechargeSemaine, cf. v2/engine/plan-generator.js) et
// présent dans le plan brut mais PAS dans PLAN/ALL_SESSIONS (format traduit
// v1, qui ne connaît que volumeCibleKm/allures/statuts par séance). Repli
// silencieux à false si absent (plan généré avant l'introduction du champ,
// ou __PLAN_BRUT__ pas encore chargé) — ne doit jamais faire planter le
// rendu de l'onglet Semaines.
function estSemaineDecharge(weekNum) {
  const semaines = window.__PLAN_BRUT__?.semaines;
  if (!semaines) return false;
  const semaine = semaines.find(s => s.semaineNum === weekNum);
  return !!semaine?.estDechargeSemaine;
}

// ── Projections Riegel multi-distances ────────────────────────────────────
function riegelProjections(timeSurDistanceActuelle) {
  // La distance mise en avant (target: true) doit correspondre à la vraie
  // distance du plan actuellement affiché, pas toujours 10K — bug trouvé
  // le 7 juillet 2026, même famille que les allures fausses sur un plan
  // Semi (cf. DISTANCE_M_REFERENCE).
  const distancePlanActuel = window.__PLAN_BRUT__?.distance;
  const DISTANCES = [
    { label:"5K",    dist:5000,   target: distancePlanActuel === "5K" },
    { label:"10K",   dist:10000,  target: !distancePlanActuel || distancePlanActuel === "10K" },
    { label:"Semi",  dist:21097,  target: distancePlanActuel === "Semi" },
    { label:"Marathon", dist:42195, target: distancePlanActuel === "Marathon" },
  ];

  // predict10K() calcule maintenant une estimation sur DISTANCE_M_REFERENCE
  // (la vraie distance du plan actuel), pas toujours 10000m fixe — corrigé
  // le 7 juillet 2026 en même temps que ce fichier, pour rester cohérent
  // avec SESSION_TARGETS (rendu dynamique le même jour, basé sur les
  // allures du plan actuel). Le paramètre reçu ici est donc bien un temps
  // sur DISTANCE_M_REFERENCE, pas toujours 10K — la formule Riegel doit
  // projeter DEPUIS cette distance de référence, pas depuis 10000m fixe
  // (sinon toutes les projections sont décalées dans le même sens sur un
  // plan non-10K, symptôme remonté par Laurent).
  return DISTANCES.map(d => {
    const t = timeSurDistanceActuelle * Math.pow(d.dist / DISTANCE_M_REFERENCE, 1.06);
    const pace = t / (d.dist / 1000);
    const h = Math.floor(t / 3600);
    const m = Math.floor((t % 3600) / 60);
    const s = Math.round(t % 60);
    const timeStr = h > 0
      ? h+"h"+m.toString().padStart(2,"0")+"'"
      : m+"'"+s.toString().padStart(2,"0")+"\"";
    const paceStr = Math.floor(pace/60)+":"+(Math.round(pace%60)).toString().padStart(2,"0")+"/km";
    return { ...d, timeStr, paceStr };
  });
}

// ── Stats semaine pour la vue Semaines ───────────────────────────────────
// ── Km parcourus sur une semaine du plan ────────────────────────────────────
function weekKm(weekNum) {
  return Math.round(stravaActivities.filter(a=>{
    const w = PLAN.find(w=>w.week===weekNum);
    return w && w.sessions.map(s=>s.date).includes(a.start_date_local?.slice(0,10));
  }).reduce((s,a)=>s+a.distance,0)/100)/10;
}

function weekStats(weekNum) {
  const week = PLAN.find(w=>w.week===weekNum);
  if (!week) return null;

  // Distance et durée prévues : utilisent kmEstime (par séance) et
  // volumeCibleKm (par semaine), propagés depuis le moteur v2 via
  // v1-bridge.js — plus la peine de reparser le texte des séances.
  // Bug corrigé le 7 juillet 2026 : l'ancien parsing par regex
  // (/(\d+)(?:[–\-](\d+))?\s*min/) ne gérait pas les formats "N×Xmin"
  // (ex. "3×6min" comptait comme 6min réels, pas 18min), sous-comptant
  // fortement les séances qualité — 27km affichés au lieu de 40km réels
  // pour un volume saisi de 40km. kmEstime est calculé précisément par le
  // moteur (y compris échauffement/retour au calme), pas à reconstruire
  // depuis un texte libre destiné à l'affichage, pas au calcul.
  const sessions = week.sessions.filter(s=>s.type!=="REPOS"&&s.type!=="RACE");
  const EF_PACE = 6.33; // min/km (6:20/km) — sert uniquement de repli si kmEstime est absent (ancien plan v1 sans cette donnée)
  let plannedKm = week.volumeCibleKm;
  if (plannedKm == null) {
    // Repli pour compatibilité avec un plan qui n'aurait pas volumeCibleKm
    // (ex. ancien plan v1 codé en dur, sans passer par v1-bridge.js) :
    // ancien calcul par texte, conservé tel quel pour ce cas seulement
    let plannedMin = 0;
    sessions.forEach(s => {
      const m1 = s.session.match(/(\d+)(?:[–\-](\d+))?\s*min/);
      if (m1) plannedMin += m1[2] ? (parseInt(m1[1])+parseInt(m1[2]))/2 : parseInt(m1[1]);
      const m2 = s.warmup.match(/(\d+)'/);
      if (m2) plannedMin += parseInt(m2[1]);
      const m3 = s.cooldown.match(/(\d+)'/);
      if (m3) plannedMin += parseInt(m3[1]);
    });
    plannedKm = Math.round(plannedMin / EF_PACE * 10) / 10;
  }
  const plannedMinTotal = sessions.reduce((s,ses) => s + (ses.kmEstime || 0), 0) * EF_PACE;
  const plannedMin = Math.round(week.volumeCibleKm != null ? plannedMinTotal : plannedKm * EF_PACE);

  // Réel depuis Strava
  const weekDates = week.sessions.map(s=>s.date);
  const weekRuns = stravaActivities.filter(a=>weekDates.includes(a.start_date_local?.slice(0,10)));
  const realMin = Math.round(weekRuns.reduce((s,r)=>s+r.moving_time,0)/60);
  const realKm = Math.round(weekRuns.reduce((s,r)=>s+r.distance,0)/100)/10;

  return { plannedMin:Math.round(plannedMin), plannedKm, realMin, realKm, hasReal:weekRuns.length>0 };
}

// ── Bilan hebdomadaire ────────────────────────────────────────────────────
function weeklyReport(weekNum) {
  const week = PLAN.find(w=>w.week===weekNum);
  if (!week) return null;
  const sessions = week.sessions.filter(s=>s.type!=="REPOS"&&s.type!=="RACE");
  const done    = sessions.filter(s=>statuses[`${weekNum}-${week.sessions.indexOf(s)}`]==="✅").length;
  const adapted = sessions.filter(s=>statuses[`${weekNum}-${week.sessions.indexOf(s)}`]==="⚠️").length;
  const missed  = sessions.filter(s=>statuses[`${weekNum}-${week.sessions.indexOf(s)}`]==="❌").length;
  // plannedMin via kmEstime x allure EF de référence — même calcul que
  // weekStats() (déjà corrigé le 7 juillet 2026, cf. inventaire §7bis/
  // 7quater). Avant ce correctif (17/07/2026), plannedMin reparsait le
  // texte libre de chaque séance par regex (/\d+\s*min/, warmup, cooldown)
  // — ne matchait RIEN sur les formats en secondes des séances de qualité
  // (ex. "5×30s-30s" pour une VMA), sous-comptant fortement ces séances
  // dans le Bilan semaine (0 minute comptée sur une VMA de 30 min réelles).
  // Remonté par Laurent le 17/07/2026 en observant un total hebdomadaire
  // anormalement bas (192min) sur une semaine avec 2 séances de qualité.
  const EF_PACE = 6.33; // min/km (6:20/km), même constante que weekStats()
  const plannedMin = Math.round(sessions.reduce((s,ses) => s + (ses.kmEstime || 0), 0) * EF_PACE);
  const weekDates = week.sessions.map(s=>s.date);
  const weekRuns = stravaActivities.filter(a=>a.type==="Run"&&weekDates.includes(a.start_date_local?.slice(0,10)));
  const realMin = Math.round(weekRuns.reduce((s,r)=>s+r.moving_time,0)/60);
  const efDates = week.sessions.filter(s=>s.type==="EF"||s.type==="LONGUE").map(s=>s.date);
  const efRuns = stravaActivities.filter(a=>a.type==="Run"&&efDates.includes(a.start_date_local?.slice(0,10)));
  let avgEfPace = null, avgEfHr = null;
  if (efRuns.length>0) {
    const avgSpeed = efRuns.reduce((s,r)=>s+r.average_speed,0)/efRuns.length;
    if (avgSpeed>0) avgEfPace = 1000/avgSpeed;
    const hrRuns = efRuns.filter(r=>r.average_heartrate>0);
    if (hrRuns.length>0) avgEfHr = Math.round(hrRuns.reduce((s,r)=>s+r.average_heartrate,0)/hrRuns.length);
  }

  // Tendance vs semaine précédente
  let prevEfPace = null, prevEfHr = null;
  if (weekNum > 1) {
    const prevWeek = PLAN.find(w=>w.week===weekNum-1);
    if (prevWeek) {
      const prevEfDates = prevWeek.sessions.filter(s=>s.type==="EF"||s.type==="LONGUE").map(s=>s.date);
      const prevEfRuns = stravaActivities.filter(a=>a.type==="Run"&&prevEfDates.includes(a.start_date_local?.slice(0,10)));
      if (prevEfRuns.length>0) {
        const ps = prevEfRuns.reduce((s,r)=>s+r.average_speed,0)/prevEfRuns.length;
        if (ps>0) prevEfPace = 1000/ps;
        const phr = prevEfRuns.filter(r=>r.average_heartrate>0);
        if (phr.length>0) prevEfHr = Math.round(phr.reduce((s,r)=>s+r.average_heartrate,0)/phr.length);
      }
    }
  }

  return { done, adapted, missed, total:sessions.length, plannedMin, realMin, avgEfPace, avgEfHr, prevEfPace, prevEfHr };
}

// ── Branchement Module 3 (WeekAnalyzer) — 17/07/2026 ───────────────────────
// Adapte les données déjà disponibles (week.sessions, statuses,
// stravaActivities) vers le format attendu par DecisionEngineWeekAnalysis
// (SeanceRealisee[]/SeancePrevue[]) — décision actée avec Laurent le
// 17/07/2026 : ce module ne connaît jamais assignment/statuses bruts, la
// transformation est la responsabilité de l'appelant (cf. §29.8 inventaire).
//
// Ne recalcule rien que weeklyReport()/weekStats() ne fassent déjà pour
// l'affichage classique — ce wrapper existe uniquement pour nourrir le
// Module 3, qui a besoin d'objets structurés (SeanceRealisee/SeancePrevue),
// pas des agrégats déjà réduits (plannedMin, realKm...).
//
// Retourne null si le module n'est pas chargé ou si la semaine n'existe pas.
function analyserSemaineActuelle(weekNum, semainePrecedenteAnalyse) {
  if (typeof DecisionEngineWeekAnalysis === 'undefined') return null;
  const week = PLAN.find(w => w.week === weekNum);
  if (!week) return null;

  // Ne compte que les séances dont la date est déjà passée (ou aujourd'hui)
  // dans seancesPrevues — une séance future n'est ni "manquée" ni "réussie",
  // elle n'a simplement pas encore eu lieu. Bug trouvé le 17/07/2026 en
  // testant avec Laurent : sans ce filtre, les séances de demain/après-
  // demain de la semaine en cours étaient comptées comme manquées.
  const jourReference = today();
  const seancesPrevues = week.sessions
    .filter(s => s.date <= jourReference)
    .map(s => ({
      id: s.uid,
      date: s.date, // ajouté 18/07/2026 pour la monotonie (calculerMonotonie a besoin de la date de chaque séance prévue, cf. decision-engine-week-analysis.classic.js) — absent avant, sans impact sur les autres champs déjà consommés (volumePrevuKm/ecartVolumePourcent n'en avaient pas besoin)
      type: s.type === "REPOS" ? "repos" : (s.type === "RACE" ? "endurance" : s.type.toLowerCase()),
      volumePrevuKm: s.kmEstime || 0,
    }));

  const seancesRealisees = week.sessions
    .filter(s => s.type !== "REPOS" && s.type !== "RACE")
    .map(s => {
      const activite = (stravaActivities || []).find(a => a.type === "Run" && a.start_date_local?.slice(0, 10) === s.date);
      if (!activite) return null;
      return {
        seanceId: s.uid,
        date: s.date,
        distanceKm: Math.round(activite.distance / 100) / 10,
        dureeMin: Math.round(activite.moving_time / 60),
        allureMoyenneMinKm: fmtPace(activite.average_speed),
        fcMoyenne: activite.average_heartrate || undefined,
        // Corrigé le 17/07/2026 : sessionNotes[uid+'_rpe'] n'a jamais existé
        // nulle part dans le code (clé inventée par erreur lors du codage
        // initial de ce wrapper) — sessionRpe[uid] est la vraie source
        // depuis le chantier "RPE unifié" du même jour (cf. déclaration plus
        // haut). Repli sur manualPerf[uid].rpe pour les saisies manuelles
        // antérieures à ce chantier.
        ressentiRPE: sessionRpe[s.uid] || (manualPerf[s.uid] && manualPerf[s.uid].rpe) || undefined,
      };
    })
    .filter(Boolean);

  const planContext = {
    semaine: weekNum,
    phase: phaseOf(weekNum).label || 'developpement',
    volumeHebdoPrevu: week.volumeCibleKm != null ? week.volumeCibleKm : seancesPrevues.reduce((s, p) => s + p.volumePrevuKm, 0),
    // chargePrevue non fournie ici : DecisionEngineWeekAnalysis.analyser()
    // la calcule désormais lui-même depuis seancesPrevues (chantier du
    // 17/07/2026, cf. en-tête decision-engine-week-analysis.classic.js).
    // dateDebutSemaine ajouté 18/07/2026 pour la monotonie — week.sessions[0]
    // est toujours le lundi (index ISO 0, cf. v1-bridge.classic.js
    // JOUR_NOMS.map sur 7 jours), jamais absent même si repos.
    // POINT DE VIGILANCE : pour la semaine EN COURS, seancesPrevues ne
    // contient que les jours déjà passés (filtre s.date<=jourReference
    // ci-dessus, même filtre que pour ecartVolumePourcent/seancesManquees)
    // — monotoniePrevue calculée sur la semaine en cours sera donc partielle
    // (écart-type sur moins de 7 jours), jamais sur la semaine complète tant
    // qu'elle n'est pas terminée. Pas un bug, juste une limite à garder en
    // tête si affichée avant la fin de semaine.
    dateDebutSemaine: week.sessions && week.sessions[0] ? week.sessions[0].date : null,
  };

  // fcMax/fcRepos/sexe lus depuis optionsRunnerStateActuel(), même source que
  // le reste du moteur (ACWR, RunnerState) — corrigé le 17/07/2026 : ce
  // wrapper utilisait encore fcRepos=55 en dur (valeur d'exemple), alors que
  // profilCoureur.fcRepos existe réellement depuis l'ajout du champ
  // Paramètres le même jour (§11.7 point 4). Erreur de ma part, basée sur
  // une mémoire de session qui ne reflétait plus l'état réel du code.
  const optsRunnerState = optionsRunnerStateActuel();
  const fcMax = optsRunnerState.fcMaxReference || null;
  const fcRepos = optsRunnerState.fcReposReference || null;
  const sexe = optsRunnerState.sexe;

  return DecisionEngineWeekAnalysis.analyser(weekNum, seancesRealisees, seancesPrevues, planContext, semainePrecedenteAnalyse || null, fcMax, fcRepos, sexe);
}

// ── Branchement Module 4 (TrendAnalyzer) — 17/07/2026 ──────────────────────
// Boucle sur les fenetreSemaines dernières semaines DÉJÀ COMMENCÉES du plan
// (semaine courante incluse, semaines futures exclues — pas de sens
// d'analyser une tendance sur des semaines qui n'ont pas encore eu lieu) :
// - historiqueSemaines[] : via analyserSemaineActuelle() (Module 3),
//   chaînées pour que chaque WeekAnalysis reçoive la précédente
//   (progressionVsPrecedente correct sur toute la fenêtre, pas seulement la
//   dernière semaine).
// - historiqueRunnerStates[] : via DecisionEngineRunnerState.calculerRunnerState(),
//   avec dateReference calée sur le DERNIER jour de chaque semaine (dimanche,
//   ou aujourd'hui si la semaine est en cours) — samples Strava complets à
//   chaque appel (adapterHistoriqueComplet ne filtre rien, c'est
//   calculerRunnerState() qui ne regarde que les 7j/28j avant dateReference).
//
// Les deux tableaux sont construits dans le même ordre (plus ancien en
// premier) et donc alignés par index — condition nécessaire pour
// DecisionEngineTrendAnalysis.analyserAvecEtatCoureur(), cf. en-tête de
// decision-engine-trend-analysis.classic.js.
//
// Retourne null si le module n'est pas chargé, ou si moins de 3 semaines
// exploitables (les détecteurs de signaux ont tous un minimum de 3 semaines,
// cf. decision-engine-trend-analysis.classic.js).
function analyserTendance(fenetreSemaines) {
  if (typeof DecisionEngineTrendAnalysis === 'undefined') return null;
  const semaineActuelleNum = currentWeek();
  const premiereSemaineNum = Math.max(1, semaineActuelleNum - fenetreSemaines + 1);

  const historiqueSemaines = [];
  let precedente = null;
  for (let w = premiereSemaineNum; w <= semaineActuelleNum; w++) {
    const analyse = analyserSemaineActuelle(w, precedente);
    if (!analyse) continue;
    historiqueSemaines.push(analyse);
    precedente = analyse;
  }
  if (historiqueSemaines.length < 3) return null; // pas assez de semaines pour un signal, cf. détecteurs

  const historiqueRunnerStates = [];
  if (typeof DecisionEngineAdapter !== 'undefined' && typeof DecisionEngineRunnerState !== 'undefined' && stravaActivities && stravaActivities.length) {
    const samples = DecisionEngineAdapter.adapterHistoriqueComplet(stravaActivities, {}, "strava_gratuit");
    const opts = optionsRunnerStateActuel();
    historiqueSemaines.forEach(analyse => {
      const week = PLAN.find(w => w.week === analyse.semaine);
      if (!week) { historiqueRunnerStates.push(null); return; }
      // Dernier jour de la semaine (dimanche, indice 6) ; si la semaine est
      // en cours, ce jour est dans le futur — calculerRunnerState() avec une
      // dateReference future reste valide (regarde juste les 7j/28j avant
      // cette date, qui peuvent inclure des jours pas encore écoulés sans
      // erreur, simplement moins de séances trouvées).
      const dernierJour = week.sessions[week.sessions.length - 1];
      const dateReference = dernierJour ? dernierJour.date : today();
      try {
        const runnerState = DecisionEngineRunnerState.calculerRunnerState(samples, { ...opts, dateReference });
        historiqueRunnerStates.push(runnerState);
      } catch (err) {
        console.warn("analyserTendance : calcul RunnerState échoué pour semaine " + analyse.semaine, err.message);
        historiqueRunnerStates.push(null);
      }
    });
  }

  return DecisionEngineTrendAnalysis.analyserAvecEtatCoureur(historiqueSemaines, historiqueRunnerStates, fenetreSemaines);
}

// ── Historique de monotonie pour l'affichage Stats (18/07/2026) ────────────
// Réutilise la même boucle que analyserTendance() ci-dessus (chaque semaine
// via analyserSemaineActuelle(), qui calcule déjà monotonieRealisee/
// monotoniePrevue depuis le chantier §35) plutôt que d'écrire une deuxième
// boucle sur PLAN — évite la duplication, cohérent avec le principe "un seul
// calcul partagé" déjà appliqué à calculerEtatMoteurDecision(). N'appelle
// jamais TrendAnalysis (pas besoin ici, juste les WeekAnalysis bruts).
// Retourne un tableau de { semaine, monotonieRealisee, monotoniePrevue },
// plus ancien en premier, ou [] si moins de 2 semaines exploitables.
function obtenirHistoriqueMonotonie(fenetreSemaines) {
  if (typeof DecisionEngineWeekAnalysis === 'undefined') return [];
  const semaineActuelleNum = currentWeek();
  const premiereSemaineNum = Math.max(1, semaineActuelleNum - fenetreSemaines + 1);
  const historique = [];
  let precedente = null;
  for (let w = premiereSemaineNum; w <= semaineActuelleNum; w++) {
    const analyse = analyserSemaineActuelle(w, precedente);
    if (!analyse) continue;
    historique.push({ semaine: analyse.semaine, monotonieRealisee: analyse.monotonieRealisee, monotoniePrevue: analyse.monotoniePrevue });
    precedente = analyse;
  }
  return historique;
}



// ── Prochaine séance clé ─────────────────────────────────────────────────
function nextKeySession() {
  const KEY_TYPES = ["VMA","SPEC","SEUIL","TEST","RACE"];

  return ALL_SESSIONS.find(s => s.date > t && KEY_TYPES.includes(s.type));
}

}

// Conseil de Yoria dédié à l'onglet Course — distinct du coach quotidien
// ci-dessus. Remplace le 11 juillet 2026 un texte codé en dur qui ne
// faisait que reformuler mécaniquement les mêmes segments déjà affichés
// dans splitsCard (aucun vrai appel IA, aucune valeur ajoutée par rapport

// segments) — le message généré référençait l'ancienne stratégie,

let coachRaceMsg = load(clePourPlan("lk_coach_race_msg"), null);
let coachRaceStratSig = load(clePourPlan("lk_coach_race_strat_sig"), null);

// Compteur global de requêtes coach — corrige une race condition découverte
// le 18/07/2026 (Laurent : message affiché contredit le vrai statut malgré
// un prompt et une réponse API prouvés corrects dans les deux cas). Cause :
// deux appels fetchCoachMsg() peuvent partir en parallèle (ex. clic manuel
// sur 🔄 PUIS action de saisie/statut qui relance aussi un fetch) — sans
// protection, si le PREMIER appel (avec un contexte périmé) répond APRÈS le
// second (plus récent, contexte à jour), sa réponse écrase la bonne en
// dernier. Chaque appel prend un ticket ; seule la réponse du ticket le plus
// récent est appliquée, les autres sont silencieusement ignorées.
let coachRequestId = 0;

async function fetchCoachMsg() {
  const t = today();
  if (coachDate === t && coachMsg) return; // déjà fetché aujourd'hui
  const monTicket = ++coachRequestId;
  const cd = countdown();
  const todaySess = ALL_SESSIONS.filter(s=>s.date===t);
  const sessType = todaySess.length ? todaySess[0].type : "REPOS";
  const sessDesc = todaySess.length ? todaySess[0].session : "Repos";
  const lastVma = stravaActivities.filter(a=>a.laps?.length>0).slice(-1)[0];
  const vmaInfo = lastVma ? `Dernière VMA : ${fmtPace(lastVma.laps.filter(l=>l.average_speed>0&&1000/l.average_speed<330).reduce((s,l,_,a)=>s+l.average_speed/a.length,0))}/km` : "";
  const isLastTwoWeeks = cd !== null && cd <= 14;

  const predNow = currentPred || predict10K();
  const gapStr = predNow.gap <= 0 ? '-'+fmtTime(Math.abs(predNow.gap))+" de l\'objectif" : '+'+fmtTime(predNow.gap)+" de l\'objectif";
  const todaySessObj = ALL_SESSIONS.find(s=>s.date===t&&s.type!=="REPOS");
  const todaySessionStatus = statuses[todaySessObj?.uid];
  const sessionDone = todaySessionStatus==="✅"||todaySessionStatus==="⚠️"||todaySessionStatus==="❌";
  // 18/07/2026 : bug identifié par Laurent — statut 😴 (repos/séance sautée
  // délibérément) tombait dans la branche "pas encore fait" du prompt (ni
  // dans sessionDone), ce qui n'informait jamais explicitement le LLM que la
  // séance avait été volontairement sautée. Sans instruction contraire, le
  // LLM a tendance à encourager comme pour une séance simplement à venir,
  // ce qui pouvait ressembler à tort à un commentaire de réussite. Ajout
  // d'une branche dédiée dans le prompt ci-dessous, distincte de sessionDone
  // ET de "pas encore fait" — jamais mélangée avec le RPE (cohérent avec la
  // décision déjà actée que 😴 n'a pas de RPE, cf. ligne ~3870).
  const sessionSkipped = todaySessionStatus==="😴";
  const tomorrowKeyStr = new Date(new Date().getTime()+86400000).toISOString().slice(0,10);
  const tomorrowKeySess = ALL_SESSIONS.find(s=>s.date===tomorrowKeyStr&&["VMA","SPEC","SEUIL","TEST"].includes(s.type));
  const isEveOfKeySession = !!tomorrowKeySess;

  // Données Strava de la séance du jour si terminée
  const todayStravaRun = sessionDone ? getStravaRunSiPasManuel(t, todaySessObj?.uid) : null;
  const todayEffortLaps = todayStravaRun ? getLapsAffichage(todayStravaRun, todaySessObj?.structureIntervalles) : [];
  const todayAvgPace = todayEffortLaps.length > 0
    ? fmtPace(todayEffortLaps.reduce((s,l)=>s+l.average_speed,0)/todayEffortLaps.length)+"/km"
    : todayStravaRun ? fmtPace(todayStravaRun.average_speed)+"/km" : null;
  const todayInTarget = todayEffortLaps.length > 0 && SESSION_TARGETS[sessType]
    ? todayEffortLaps.filter(l=>(1000/l.average_speed)<=SESSION_TARGETS[sessType].okPace).length+"/"+todayEffortLaps.length+" reps dans la cible"
    : null;
  // IE moyen et cadence moyenne de la séance terminée (si assez de données — min 3 séances du même type)
  const todayNSameType = stravaActivities.filter(a=>{
    const d = a.start_date_local?.slice(0,10);
    return ALL_SESSIONS.find(ss=>ss.date===d&&ss.type===sessType);
  }).length;
  const todayIEVals = todayEffortLaps.length > 0 ? todayEffortLaps.map(l=>economyScore(l,sessType)).filter(v=>v!==null) : [];
  const todayAvgIE = (todayIEVals.length > 0 && todayNSameType >= 3)
    ? Math.round(todayIEVals.reduce((a,b)=>a+b,0)/todayIEVals.length)
    : null;
  const todayCadVals = todayEffortLaps.length > 0 ? todayEffortLaps.map(l=>l.average_cadence?Math.round(l.average_cadence*2):null).filter(v=>v!==null) : [];
  const todayAvgCad = todayCadVals.length > 0 ? Math.round(todayCadVals.reduce((a,b)=>a+b,0)/todayCadVals.length) : null;

  // Charge d'entraînement — utilisée pour NUANCER le ton du coach (prudence
  // si charge élevée, encouragement si charge basse/stable), jamais
  // mentionnée explicitement (terme trop technique pour un message de
  // coaching quotidien) — demandé par Laurent le 14 juillet 2026.
  // §9.1 doc intégration (17/07/2026) : "le coach IA devient un habillage
  // du moteur, jamais un second décideur" — le calcul ACWR informel
  // (calculerACWR) est remplacé par une lecture directe de RunnerState
  // (fatigue/risque) et de la dernière EngineDecision du jour, plutôt que
  // de recalculer un ratio séparément. Si une décision reduire_charge existe
  // pour la séance du jour, le coach en est informé pour ne jamais
  // contredire la carte de proposition (§8.2) affichée au même moment.
  const etatMoteurCoach = calculerEtatMoteurDecision();
  let consigneChargeInterne = '';
  if (etatMoteurCoach && etatMoteurCoach.runnerState) {
    const { fatigue, risque } = etatMoteurCoach.runnerState;
    if (fatigue !== null) {
      if (risque === 'critique' || risque === 'eleve') consigneChargeInterne = "Charge d'entraînement récente élevée par rapport aux dernières semaines — ton ton doit être prudent, valorise la récupération, n'encourage pas à en faire plus.";
      else if (fatigue > 55) consigneChargeInterne = "Charge d'entraînement en légère hausse — reste positif mais pas non plus insistant sur l'intensité.";
      else if (risque === 'modere') consigneChargeInterne = "Charge d'entraînement plutôt basse récemment — tu peux être plus encourageant sur la reprise d'un bon rythme, sans culpabiliser.";
    }
    const decisionDuJour = etatMoteurCoach.decision;
    if (decisionDuJour && decisionDuJour.type === 'reduire_charge') {
      consigneChargeInterne += " Le moteur a détecté une fatigue élevée et a proposé d'alléger une séance à venir cette semaine — tu peux évoquer que l'entraînement s'adapte en ce moment, sans donner de chiffre ni de pourcentage.";
    } else if (decisionDuJour && decisionDuJour.type === 'alerter_blessure_potentielle') {
      consigneChargeInterne += " Un pic d'effort récent a été détecté par rapport à tes sorties habituelles — reste attentif dans ton message aux signaux de fatigue ou de gêne, sans dramatiser.";
    } else if (decisionDuJour && decisionDuJour.type === 'alerter_risque_decrochage') {
      consigneChargeInterne += " La régularité récente a baissé — un message encourageant sur la reprise d'une routine, sans culpabiliser, est bienvenu.";
    }
  }

  // Variables lundi matin
  const isMonday = new Date().getDay() === 1;
  const prevWeekNum = currentWeek() > 1 ? currentWeek() - 1 : null;
  const prevWeekReport = prevWeekNum ? weeklyReport(prevWeekNum) : null;
  const prevWeekKm = prevWeekNum ? weekKm(prevWeekNum) : 0;
  const nextWeekSessions = ALL_SESSIONS.filter(s=>{
    const w = PLAN.find(w=>w.week===currentWeek());
    return w && w.sessions.map(s=>s.date).includes(s.date) && s.type!=="REPOS";
  }).slice(0,3).map(s=>s.type+' '+s.session).join(', ');

  // Prénom du coureur (13 juillet 2026) — sans lui, l'IA a tendance à
  // confondre le prénom du coach (Yoria, personnage du produit) avec
  // celui de l'utilisateur, ex. "Bravo Yoria !" adressé à Laurent. Fourni
  // seulement s'il est renseigné dans le profil (Paramètres) ; sinon
  // instruction explicite de ne jamais utiliser "Yoria" pour s'adresser au
  // coureur, seulement pour se présenter elle-même.
  const prenomCoureur = profilCoureur.prenom?.trim();

  const prompt = `Tu es Yoria, coach running.${prenomCoureur ? ` Le coureur à qui tu t'adresses s'appelle ${prenomCoureur} — utilise son prénom pour t'adresser à lui, jamais "Yoria" (qui est TON propre prénom, pas le sien).` : ' Ne t\'adresse jamais au coureur par "Yoria" — c\'est ton propre prénom, pas le sien ; utilise "tu" sans prénom si tu ne connais pas le sien.'}${ESTMODEFORME ? ' Ton coureur suit un plan de maintien en forme (pas de course visée actuellement).' : ` Tu prépares le ${RACE_NAME} le ${new Date(DATE_COURSE_REFERENCE+"T00:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})} à ${RACE_LOCATION} (objectif ${fmtTime(raceGoalTime)}).`}
${ESTMODEFORME ? '' : `Estimation actuelle : ${predNow.timeStr} (${gapStr}).`}
${isMonday && prevWeekReport ? `Semaine ${prevWeekNum} terminée : ${prevWeekReport.done}/${prevWeekReport.total} séances validées, ${prevWeekKm} km courus.` : ''}
${sessionDone ? `Séance ${sessType} terminée aujourd'hui — ${todaySessionStatus==="✅" ? "RÉUSSIE (statut ✅), tu peux féliciter et être positif." : todaySessionStatus==="⚠️" ? "PARTIELLEMENT réussie ou difficile (statut ⚠️), reste nuancé — ni fausse félicitation ni dramatisation, valorise ce qui a été fait sans minimiser la difficulté." : "RATÉE ou interrompue (statut ❌), NE FÉLICITE JAMAIS et NE PARLE PAS de réussite ou de bonne performance — sois compréhensif et bienveillant sur la cause possible (fatigue, contrainte de temps, etc.), sans culpabiliser."}${todayAvgPace ? ' Allure intervalles : '+todayAvgPace+'.' : ''}${todayInTarget ? ' '+todayInTarget+'.' : ''}${todayAvgIE ? ' Indice d\'économie (IE) : '+todayAvgIE+' (100=normal, >100=meilleur qu\'attendu).' : ''}${todayAvgCad ? ' Cadence moy. : '+todayAvgCad+' spm.' : ''}` : sessionSkipped ? `Séance ${sessType} du jour volontairement SAUTÉE par le coureur (statut 😴 repos) — ne la félicite JAMAIS comme si elle avait été faite ou réussie, ne mentionne ni allure ni performance. Un mot bienveillant sur le repos ou la reprise est possible, sans culpabiliser.` : `Aujourd'hui (PAS ENCORE FAIT) : ${sessType} — ${sessDesc}.`}
${isEveOfKeySession ? `Demain séance clé : ${tomorrowKeySess.type} — ${tomorrowKeySess.session}.` : ''}
${weatherTemp ? 'Température : '+weatherTemp+'°C.' : ''}
${!ESTMODEFORME && isLastTwoWeeks ? `J–${cd} avant la course.` : ""}
${consigneChargeInterne}
${vmaInfo}
${isMonday
  ? `Fais un bilan motivant de la semaine ${prevWeekNum} (séances, km, progression) et donne un aperçu positif de la semaine ${currentWeek()} qui commence. 3-4 phrases max.`
  : sessionDone
    ? (sessType==='EF'||sessType==='LONGUE')
      ? 'La séance ci-dessus est DÉJÀ TERMINÉE. Commente brièvement la sortie EF (sensations, récupération). Pas de conseil technique intensif. 2-3 phrases max.'
      : 'La séance ci-dessus est DÉJÀ TERMINÉE. Fais une analyse de la séance terminée (qualité, points positifs, axes d\'amélioration). Mentionne l\'IE ou la cadence si disponibles dans le contexte. 3-4 phrases max.'
    : sessionSkipped
      // Bug corrigé le 18/07/2026 (signalé par Laurent, message coach
      // félicitant une séance en réalité SAUTÉE 😴) : cette instruction ne
      // testait à l'origine QUE sessionDone, jamais sessionSkipped — pour
      // une séance sautée elle tombait dans le else "PAS ENCORE EU LIEU"
      // (ligne plus bas), ce qui poussait le LLM à générer un message
      // tourné vers une séance à venir, qu'il a ensuite complété/halluciné
      // comme si elle avait déjà été faite (cohérent avec météo/contexte
      // disponibles par ailleurs dans le prompt). Distinct du premier fix
      // du même jour (§35/§36 inventaire) qui ne corrigeait que la
      // description factuelle du statut plus haut dans le prompt, pas
      // cette deuxième instruction de ton qui pilote le contenu réel
      // généré.
      ? 'La séance du jour a été volontairement SAUTÉE (statut 😴 repos) — ne la commente JAMAIS comme si elle avait eu lieu ou avait été réussie, ne mentionne aucune performance ni allure. Message court et bienveillant sur le repos ou la reprise, sans culpabiliser. 2-3 phrases max.'
      : isEveOfKeySession
        ? 'La séance du jour N\'A PAS ENCORE EU LIEU. Donne un conseil pour bien préparer la séance clé de DEMAIN (récupération, sommeil, hydratation) — ne commente pas la séance du jour comme si elle était terminée. 2-3 phrases max.'
        : (sessType==='EF'||sessType==='LONGUE'||sessType==='REPOS')
          ? 'La séance du jour N\'A PAS ENCORE EU LIEU (ou c\'est un jour de repos) — ne la commente jamais au passé ni comme si elle était déjà faite. Message court, tourné vers l\'AVANT (préparation, régularité, état d\'esprit pour aujourd\'hui). 2-3 phrases max.'
          : 'La séance du jour N\'A PAS ENCORE EU LIEU — ne la commente jamais au passé ni comme si elle était déjà faite. Génère UN message de coaching court et motivant, tourné vers l\'AVANT, sur la séance à venir. 2-3 phrases max.'}
${!ESTMODEFORME && isLastTwoWeeks ? "Mentionne le compte à rebours." : "Ne mentionne pas le nombre de jours restants."}
Ne mentionne jamais le terme "ACWR" ou "charge aiguë/chronique" — reste dans un langage naturel de coach, pas technique.
Tu ne connais jamais l'heure ni le moment de la journée (matin, midi, soir) où une séance a eu lieu ou aura lieu — ne l'invente jamais ("ce soir", "demain matin", "avant de dormir"...) et ne donne aucun conseil qui suppose un horaire précis (petit-déjeuner avant la séance, hydratation la veille au soir...). Reste sur des repères de jour uniquement (aujourd'hui, demain).
Réponds uniquement avec le message, sans guillemets.`;

  try {
    const resp = await fetch("/api/coach", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ prompt })
    });
    const data = await resp.json();
    const msg = data.text || null;
    if (monTicket !== coachRequestId) return; // réponse obsolète (un appel plus récent a déjà répondu ou est en cours) — ignorée silencieusement, cf. déclaration de coachRequestId plus haut
    if (msg) {
      coachMsg = msg;
      coachDate = t;
      save(clePourPlan("lk_coach_msg"), coachMsg);
      save(clePourPlan("lk_coach_date"), coachDate);
      render();
    }
  } catch(e) {
    console.warn("Coach indisponible:", e.message);
    if (monTicket !== coachRequestId) return; // idem en cas d'erreur : ne pas écraser un message plus récent avec le message de secours
    if (!coachMsg) {
      // Message de secours si jamais aucun message n\'a pu être chargé
      coachMsg = "🤖 Yoria fait une pause — réessaie dans quelques instants.";
      coachDate = t;
      render();
    }
  }
}

// Fetcher le message coach au démarrage
if (!coachMsg || coachDate !== today()) {
  setTimeout(fetchCoachMsg, 2000);
}

// Conseil de Yoria dédié à la course — vraie valeur ajoutée par rapport aux
// segments déjà affichés dans splitsCard (pas juste reformuler les mêmes
