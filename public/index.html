async function fetchHistoricalWeather(date, lat, lon) {
  try {
    const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${date}&end_date=${date}&hourly=temperature_2m&timezone=Europe%2FParis`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (!data.hourly?.temperature_2m) return null;
    // Prendre la température de l'heure de début de séance (approximation : 18h)
    const temps = data.hourly.temperature_2m;
    return Math.round(temps[18] ?? temps[12] ?? temps[0]);
  } catch(e) { return null; }
}

async function fetchWeather() {

function today() { return new Date().toISOString().slice(0,10); }
function countdown() { return Math.ceil((new Date("2026-09-06") - new Date()) / 86400000); }
function currentWeek() {
  const t = today();
  for (const w of PLAN) {
    if (t >= w.sessions[0].date && t <= w.sessions[6].date) return w.week;
  }
  return t < PLAN[0].sessions[0].date ? 1 : 11;
}
function fmtDate(d) { return new Date(d+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}); }
function fmtPace(speedMs) {
  if (!speedMs || speedMs <= 0) return "--:--";
  const secPerKm = 1000 / speedMs;
  const min = Math.floor(secPerKm / 60);
  const sec = Math.round(secPerKm % 60).toString().padStart(2,"0");
  return `${min}:${sec}`;
}
function fmtTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.round(seconds % 60).toString().padStart(2,"0");
  return `${m}'${s}"`;
}
function weekPct(week) {
  const sess = week.sessions.filter(s=>s.type!=="REPOS"&&s.type!=="RACE");
  const done = sess.filter(s=>statuses[`${week.week}-${week.sessions.indexOf(s)}`]==="✅").length;
  return sess.length ? Math.round(done/sess.length*100) : 0;
}
function globalPct() {
  const total = ALL_SESSIONS.filter(s=>s.type!=="REPOS"&&s.type!=="RACE").length;
  const done = ALL_SESSIONS.filter(s=>statuses[s.uid]==="✅").length;
  return Math.round(done/total*100);
}
function phaseOf(weekNum) { return PHASES.find(p=>p.weeks.includes(weekNum))||{color:"#94a3b8",label:""}; }

// ── Projections Riegel multi-distances ────────────────────────────────────
function riegelProjections(time10k) {
  const DISTANCES = [
    { label:"5K",    dist:5000,   target:false },
    { label:"10K",   dist:10000,  target:true  },
    { label:"Semi",  dist:21097,  target:false },
    { label:"Marathon", dist:42195, target:false },
  ];
  return DISTANCES.map(d => {
    const t = time10k * Math.pow(d.dist / 10000, 1.06);
    const pace = t / (d.dist / 1000);
    const h = Math.floor(t / 3600);
    const m = Math.floor((t % 3600) / 60);
    const s = Math.round(t % 60);
    const timeStr = h > 0
      ? h+"h"+m.toString().padStart(2,"0")+"'"
      : m+"'"+s.toString().padStart(2,"0")+"\"";
    const paceStr = Math.floor(pace/60)+":"+(Math.round(pace%60)).toString().padStart(2,"0")+"/km";
    return { ...d, timeStr, paceStr };
  });
}

// ── Stats semaine pour la vue Semaines ───────────────────────────────────
function weekStats(weekNum) {
  const week = PLAN.find(w=>w.week===weekNum);
  if (!week) return null;

  // Durée prévue
  const sessions = week.sessions.filter(s=>s.type!=="REPOS"&&s.type!=="RACE");
  let plannedMin = 0;
  sessions.forEach(s => {
    const m1 = s.session.match(/(\d+)(?:[–\-](\d+))?\s*min/);
    if (m1) plannedMin += m1[2] ? (parseInt(m1[1])+parseInt(m1[2]))/2 : parseInt(m1[1]);
    const m2 = s.warmup.match(/(\d+)'/);
    if (m2) plannedMin += parseInt(m2[1]);
    const m3 = s.cooldown.match(/(\d+)'/);
    if (m3) plannedMin += parseInt(m3[1]);
  });

  // Distance prévue estimée (durée × allure EF ref)
  const EF_PACE = 6.33; // min/km (6:20/km)
  const plannedKm = Math.round(plannedMin / EF_PACE * 10) / 10;

  // Réel depuis Strava
  const weekDates = week.sessions.map(s=>s.date);
  const weekRuns = stravaActivities.filter(a=>weekDates.includes(a.start_date_local?.slice(0,10)));
  const realMin = Math.round(weekRuns.reduce((s,r)=>s+r.moving_time,0)/60);
  const realKm = Math.round(weekRuns.reduce((s,r)=>s+r.distance,0)/100)/10;

  return { plannedMin:Math.round(plannedMin), plannedKm, realMin, realKm, hasReal:weekRuns.length>0 };
}

// ── Bilan hebdomadaire ────────────────────────────────────────────────────
function weeklyReport(weekNum) {
  const week = PLAN.find(w=>w.week===weekNum);
  if (!week) return null;
  const sessions = week.sessions.filter(s=>s.type!=="REPOS"&&s.type!=="RACE");
  const done    = sessions.filter(s=>statuses[`${weekNum}-${week.sessions.indexOf(s)}`]==="✅").length;
  const adapted = sessions.filter(s=>statuses[`${weekNum}-${week.sessions.indexOf(s)}`]==="⚠️").length;
  const missed  = sessions.filter(s=>statuses[`${weekNum}-${week.sessions.indexOf(s)}`]==="❌").length;
  let plannedMin = 0;
  sessions.forEach(s => {
    const m1 = s.session.match(/(\d+)(?:[\u2013-](\d+))?\s*min/);
    if (m1) plannedMin += m1[2] ? (parseInt(m1[1])+parseInt(m1[2]))/2 : parseInt(m1[1]);
    const m2 = s.warmup.match(/(\d+)'/);
    if (m2) plannedMin += parseInt(m2[1]);
    const m3 = s.cooldown.match(/(\d+)'/);
    if (m3) plannedMin += parseInt(m3[1]);
  });
  const weekDates = week.sessions.map(s=>s.date);
  const weekRuns = stravaActivities.filter(a=>a.type==="Run"&&weekDates.includes(a.start_date_local?.slice(0,10)));
  const realMin = Math.round(weekRuns.reduce((s,r)=>s+r.moving_time,0)/60);
  const efDates = week.sessions.filter(s=>s.type==="EF"||s.type==="LONGUE").map(s=>s.date);
  const efRuns = stravaActivities.filter(a=>a.type==="Run"&&efDates.includes(a.start_date_local?.slice(0,10)));
  let avgEfPace = null;
  if (efRuns.length>0) {
    const avgSpeed = efRuns.reduce((s,r)=>s+r.average_speed,0)/efRuns.length;
    if (avgSpeed>0) avgEfPace = 1000/avgSpeed;
  }
  return { done, adapted, missed, total:sessions.length, plannedMin:Math.round(plannedMin), realMin, avgEfPace };
}

// ── Alerte de fatigue ─────────────────────────────────────────────────────
function fatigueAlert() {
  const cw = currentWeek();
  const week = PLAN.find(w=>w.week===cw);
  if (!week) return null;
  const sessions = week.sessions.filter(s=>s.type!=="REPOS"&&s.type!=="RACE"&&s.date<=today());
  const recentSt = sessions.map(s=>statuses[`${cw}-${week.sessions.indexOf(s)}`]||"—");
  let consec = 0;
  for (const st of recentSt) {
    if (st==="❌"||st==="⚠️") consec++;
    else consec=0;
    if (consec>=2) return "consecutive";
  }
  if (cw>1) {
    const getAvgPace = (w) => {
      const dates = w.sessions.filter(s=>s.type==="EF"||s.type==="LONGUE").map(s=>s.date);
      const runs = stravaActivities.filter(a=>a.type==="Run"&&dates.includes(a.start_date_local?.slice(0,10)));
      if (!runs.length) return null;
      const avgSpeed = runs.reduce((s,r)=>s+r.average_speed,0)/runs.length;
      return avgSpeed>0 ? 1000/avgSpeed : null;
    };
    const prevWeek = PLAN.find(w=>w.week===cw-1);
    const curPace = getAvgPace(week);
    const prevPace = prevWeek ? getAvgPace(prevWeek) : null;
    if (curPace&&prevPace&&curPace-prevPace>15) return "pace";
  }
  return null;
}

// PRÉDICTION 10K — v2
// ══════════════════════════════════════════════════════════════════════════════
const EFFORT_PACE_THRESHOLD = 5.5 * 60;

function getEffortLaps(activity) {
  if (!activity.laps || activity.laps.length === 0) return [];
  return activity.laps.filter(lap => {
    if (!lap.average_speed || lap.average_speed <= 0) return false;
    const secPerKm = 1000 / lap.average_speed;
    return secPerKm < EFFORT_PACE_THRESHOLD && lap.distance >= 50;
  });
}

function predict10K() {
  const BASE_TIME = 3021;
  const BASE_DATE = new Date("2026-06-07");
  const RACE_DATE = new Date("2026-09-06");
  const TOTAL_DAYS = (RACE_DATE - BASE_DATE) / 86400000;

  const runs = stravaActivities.filter(a => a.type === "Run" && a.distance >= 1000);
  let estimates = [];
  let details = [];

  // 1. Riegel sur sorties longues EF ≥ 8 km
  // Riegel uniquement sur sorties ≥ 12km à allure ≤ 6:00/km
  // (exclure les EF lentes qui faussent la projection)
  const longRuns = runs.filter(r => {
    const dateLocal = r.start_date_local?.slice(0,10);
    const paceSecKm = r.average_speed > 0 ? 1000/r.average_speed : 999;
    return r.distance >= 12000
      && !INTERVAL_SESSION_DATES.has(dateLocal)
      && paceSecKm <= 360; // ≤ 6:00/km
  });
  if (longRuns.length > 0) {
    const bestLong = longRuns.reduce((best,r) =>
      (r.moving_time/r.distance) < (best.moving_time/best.distance) ? r : best, longRuns[0]);
    const riegelLong = bestLong.moving_time * Math.pow(10000/bestLong.distance, 1.06);
    estimates.push({ value: riegelLong, weight: 0.25 });
    details.push({ label:"Riegel longue "+(bestLong.distance/1000).toFixed(1)+"km", value:fmtTime(Math.round(riegelLong)) });
  }

  // 2. Riegel sur laps d'effort SPEC
  const specRuns = runs.filter(r => {
    const dateLocal = r.start_date_local?.slice(0,10);
    return ALL_SESSIONS.find(s => s.date===dateLocal && s.type==="SPEC");
  });
  const specLaps = specRuns.flatMap(r => getEffortLaps(r));
  if (specLaps.length > 0) {
    const avgSpecSpeed = specLaps.reduce((s,l)=>s+l.average_speed,0)/specLaps.length;
    const avgLapDist = specLaps.reduce((s,l)=>s+l.distance,0)/specLaps.length;
    const avgLapTime = avgLapDist/avgSpecSpeed;
    const riegelSpec = avgLapTime * Math.pow(10000/avgLapDist, 1.06);
    estimates.push({ value: riegelSpec, weight: 0.45 });
    details.push({ label:`Allure moy. SPEC (${specLaps.length} intervalles)`, value:fmtPace(avgSpecSpeed)+"/km" });
    details.push({ label:"→ Riegel SPEC", value:fmtTime(Math.round(riegelSpec)) });
  }

  // 3. VMA → 10K via laps d'effort
  const vmaRuns = runs.filter(r => {
    const dateLocal = r.start_date_local?.slice(0,10);
    return ALL_SESSIONS.find(s => s.date===dateLocal && s.type==="VMA");
  });
  const vmaLaps = vmaRuns.flatMap(r => getEffortLaps(r));
  if (vmaLaps.length > 0) {
    const avgVmaSpeed = vmaLaps.reduce((s,l)=>s+l.average_speed,0)/vmaLaps.length;
    const pace10kFromVma = avgVmaSpeed * 0.87;
    const time10kFromVma = 10000/pace10kFromVma;
    estimates.push({ value: time10kFromVma, weight: 0.30 });
    details.push({ label:`VMA moy. (${vmaLaps.length} intervalles)`, value:fmtPace(avgVmaSpeed)+"/km" });
    details.push({ label:"→ 10K estimé (×0.87)", value:fmtTime(Math.round(time10kFromVma)) });
  }

  let estimate = BASE_TIME;
  let confidence = 30;
  let method = "Base Lavandou 50'21\"";

  if (estimates.length > 0) {
    const totalWeight = estimates.reduce((s,e)=>s+e.weight,0);
    const weighted = estimates.reduce((s,e)=>s+e.value*e.weight,0)/totalWeight;

    // Poids du Lavandou selon la qualité des données disponibles
    // Plus on a de données fiables, moins le Lavandou compte
    const hasVma   = vmaLaps.length > 0;
    const hasSpec  = specLaps.length > 0;
    const hasLong  = longRuns.length > 0;

    let lavendouWeight;
    if (hasVma && hasSpec) {
      lavendouWeight = 0.10; // VMA + SPEC → très fiable
    } else if (hasVma || hasSpec) {
      lavendouWeight = 0.30; // une source intensive → fiable
    } else if (hasLong) {
      lavendouWeight = 0.70; // uniquement EF → peu fiable
    } else {
      lavendouWeight = 1.00; // aucune donnée → 100% Lavandou
    }

    estimate = BASE_TIME * lavendouWeight + weighted * (1 - lavendouWeight);
    confidence = Math.min(30 + runs.length*4 + specLaps.length*8 + vmaLaps.length*5, 95);
    method = estimates.length===1 ? "1 source" : estimates.length+" sources combinées";
  }

  const target = 48.5*60;
  const gap = estimate-target;

  // Enregistrer l'estimation du jour dans l'historique
  const todayStr = today();
  const lastEntry = predHistory[predHistory.length-1];
  if (!lastEntry || lastEntry.date !== todayStr) {
    predHistory.push({ date: todayStr, time: Math.round(estimate), confidence });
    if (predHistory.length > 80) predHistory.shift();
    save("lk_pred_history", predHistory);
  }

  return {
    time: Math.round(estimate), timeStr: fmtTime(Math.round(estimate)),
    target: fmtTime(target), gap: Math.round(gap),
    gapStr: (gap>0?"+":"")+fmtTime(Math.abs(Math.round(gap))),
    onTrack: gap<=30, confidence, method, details,
  };
}

// Compresser les activités Strava pour le Gist (garder uniquement l'essentiel)
function compressActivities(activities) {
  return activities.filter(a => a.type === "Run").map(a => {
    const effortLaps = a.laps ? a.laps.filter(l =>
      l.average_speed > 0 && (1000/l.average_speed) < EFFORT_PACE_THRESHOLD && l.distance >= 50
    ).map(l => ({
      average_speed: l.average_speed,
      distance: l.distance,
      average_heartrate: l.average_heartrate,
    })) : undefined;
    return {
      id_str: a.id_str,
      type: a.type,
      start_date_local: a.start_date_local,
      distance: a.distance,
      moving_time: a.moving_time,
      average_speed: a.average_speed,
      average_heartrate: a.average_heartrate,
      max_heartrate: a.max_heartrate,
      laps: effortLaps,
    };
  });
}

function getBackupData() {
  return JSON.stringify({

    notesList,
    sessionNotes,
    stravaActivities: compressActivities(stravaActivities),
    predHistory,
    version: 2,
    savedAt: new Date().toISOString()
  });
}
let gistSaveTimer = null;

async function gistSave(silent=false) {
  if (!githubToken) return;
  try {
    const body = {description:"Plan 10K Laurent — backup", public:false,
      files:{"plan10k_backup.json":{content:getBackupData()}}};
    let url="https://api.github.com/gists", method="POST";
    if (gistId) { url+="/"+gistId; method="PATCH"; }
    const resp = await fetch(url,{method,headers:{"Authorization":"token "+githubToken,"Content-Type":"application/json"},body:JSON.stringify(body)});
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    gistId = data.id; save("lk_gist_id",gistId);
    if (!silent) { gistMsg="☁️ Sauvegardé "+new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}); render(); setTimeout(()=>{gistMsg="";render();},3000); }
  } catch(e) {
    if (!silent) { gistMsg="❌ Erreur sync"; render(); setTimeout(()=>{gistMsg="";render();},3000); }
  }
}

function scheduleSave() {
  if (!githubToken) return;
  if (gistSaveTimer) clearTimeout(gistSaveTimer);
  gistSaveTimer = setTimeout(()=>gistSave(true),2000);
}

async function gistLoad() {
  if (!githubToken||!gistId) return;
  try {
    const resp = await fetch("https://api.github.com/gists/"+gistId,{headers:{"Authorization":"token "+githubToken}});
    if (!resp.ok) throw new Error();
    const data = await resp.json();
    const raw = data.files["plan10k_backup.json"]?.content;
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (Object.keys(statuses).length===0&&notesList.length===0) {
      statuses=parsed.statuses||{}; notesList=parsed.notesList||[];
      if (parsed.stravaActivities?.length) {
        stravaActivities=parsed.stravaActivities;
        save("lk_strava_activities",stravaActivities);
      }
      if (parsed.predHistory?.length) {
        predHistory=parsed.predHistory;
        save("lk_pred_history",predHistory);
      }

async function ensureFreshToken() {
  if (!stravaToken) return false;
  if (Date.now()/1000 < stravaExpires-60) return true;
  try {
    const resp = await fetch("/api/strava/refresh",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({refresh_token:stravaRefresh})});
    const data = await resp.json();
    stravaToken=data.access_token; stravaRefresh=data.refresh_token; stravaExpires=data.expires_at;
    save("lk_strava_token",stravaToken); save("lk_strava_refresh",stravaRefresh); save("lk_strava_expires",stravaExpires);
    return true;
  } catch { return false; }
}

async function syncStrava() {
  syncing=true; syncMsg="Connexion à Strava..."; render();
  const ok = await ensureFreshToken();
  if (!ok) { syncing=false; syncMsg="Erreur de token"; render(); return; }
  try {
    syncMsg="Récupération des activités..."; render();
    const resp = await fetch(`/api/strava/activities?token=${stravaToken}`);
    const activities = await resp.json();
    if (Array.isArray(activities)) {
      // Filtrer uniquement les courses à pied
      const runs = activities.filter(a => a.type === "Run" || a.sport_type === "Run");
      stravaActivities=runs; save("lk_strava_activities",runs);
      matchActivitiesToPlan(activities);
      lastSyncTime = Date.now();
      save("lk_last_sync", lastSyncTime);
      syncMsg=`✅ ${activities.length} activité${activities.length>1?"s":""} synchronisée${activities.length>1?"s":""}`;
      scheduleSave(); // Sauvegarder les activités dans le Gist
    } else { syncMsg="❌ Erreur Strava"; }
  } catch(e) { syncMsg="❌ Erreur réseau"; }
  syncing=false; render();
  setTimeout(()=>{ syncMsg=""; render(); },3000);
}

// Extraire la durée cible en minutes depuis le champ session
function parseTargetMinutes(session) {
  const m = session.match(/(\d+)(?:–|-)(\d+)\s*min|^(\d+)\s*min/);
  if (!m) return null;
  return m[3] ? parseInt(m[3]) : (parseInt(m[1]) + parseInt(m[2])) / 2;
}

// Extraire le nombre de répétitions prévu depuis le champ session
function parseTargetReps(session) {
  const m = session.match(/^(\d+)×/);
  return m ? parseInt(m[1]) : null;
}

function autoValidate(session, stravaRun) {
  if (!stravaRun) return null;
  const type = session.type;
  const effortLaps = getEffortLaps(stravaRun);

  if (type === "EF" || type === "LONGUE") {
    const targetMin = parseTargetMinutes(session.session);
    if (!targetMin) return "✅";
    const actualMin = stravaRun.moving_time / 60;
    const ratio = actualMin / targetMin;
    // Allure réelle en sec/km
    const actualPace = stravaRun.average_speed > 0 ? 1000 / stravaRun.average_speed : 999;
    const inPace = actualPace >= 340 && actualPace <= 420; // 5:40–7:00/km
    if (ratio >= 0.90 && inPace) return "✅";
    if (ratio >= 0.70) return "⚠️";
    return "❌";
  }

  if (type === "SPEC" || type === "TEST") {
    if (effortLaps.length === 0) {
      // Pas de laps → valider sur durée totale approximative
      return stravaRun.moving_time > 1200 ? "✅" : "⚠️";
    }
    const avgPace = effortLaps.reduce((s,l)=>s+1000/l.average_speed,0)/effortLaps.length;
    const targetReps = parseTargetReps(session.session);
    const repRatio = targetReps ? effortLaps.length / targetReps : 1;
    if (avgPace <= 301 && repRatio >= 0.80) return "✅";  // ≤ 5:01/km
    if (avgPace <= 310 && repRatio >= 0.60) return "⚠️";  // ≤ 5:10/km
    return "❌";
  }

  if (type === "VMA") {
    if (effortLaps.length === 0) return "⚠️";
    const avgPace = effortLaps.reduce((s,l)=>s+1000/l.average_speed,0)/effortLaps.length;
    const targetReps = parseTargetReps(session.session);
    const repRatio = targetReps ? effortLaps.length / targetReps : 1;
    if (avgPace <= 270 && repRatio >= 0.80) return "✅";  // ≤ 4:30/km
    if (avgPace <= 290 && repRatio >= 0.60) return "⚠️";  // ≤ 4:50/km
    return "❌";
  }

  if (type === "SEUIL") {
    if (effortLaps.length === 0) {
      // Pas de laps → allure moyenne totale
      const pace = stravaRun.average_speed > 0 ? 1000/stravaRun.average_speed : 999;
      if (pace <= 310) return "✅";
      if (pace <= 330) return "⚠️";
      return "❌";
    }
    const avgPace = effortLaps.reduce((s,l)=>s+1000/l.average_speed,0)/effortLaps.length;
    if (avgPace <= 305) return "✅";   // ≤ 5:05/km
    if (avgPace <= 320) return "⚠️";  // ≤ 5:20/km
    return "❌";
  }

  return "✅";
}

function matchActivitiesToPlan(activities) {
  const runs = activities.filter(a=>a.type==="Run");
  ALL_SESSIONS.forEach(s => {
    if (s.type==="REPOS"||s.type==="RACE") return;
    const match = runs.find(r=>r.start_date_local?.slice(0,10)===s.date);
    if (match) {
      if (!statuses[s.uid] || statuses[s.uid]==="—") {
        // Auto-validation uniquement si pas de statut manuel
        const auto = autoValidate(s, match);
        if (auto) statuses[s.uid] = auto;
      }
    }
  });
  save("lk_statuses",statuses);
}

// DOM HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function el(tag,attrs,...children) {
  const e=document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v])=>{
    if (k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if (k==="class") e.className=v;
    else e.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if (c==null||c===false) return;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return e;
}

function svgCircle(pct,size,stroke,color,inner) {
  const r2=(size-stroke)/2, circ=2*Math.PI*r2;
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width",size); svg.setAttribute("height",size);
  svg.style.transform="rotate(-90deg)";
  const mk=(clr,dash,off)=>{
    const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx",size/2);c.setAttribute("cy",size/2);c.setAttribute("r",r2);
    c.setAttribute("fill","none");c.setAttribute("stroke",clr);c.setAttribute("stroke-width",stroke);
    if(dash){c.setAttribute("stroke-dasharray",circ);c.setAttribute("stroke-dashoffset",off);c.setAttribute("stroke-linecap","round");}
    return c;
  };
  svg.appendChild(mk("#232738",false));
  svg.appendChild(mk(color,true,circ-(pct/100)*circ));
  const wrap=el("div",{style:{position:"relative",width:size+"px",height:size+"px",flexShrink:"0"}});
  wrap.appendChild(svg);
  const center=el("div",{style:{position:"absolute",inset:"0",display:"flex",alignItems:"center",justifyContent:"center"}},inner);
  wrap.appendChild(center);
  return wrap;
}

function badge(type) {
  const st=STYPES[type]||{color:"#94a3b8",short:type};
  return el("span",{class:"pill",style:{background:st.color+"22",color:st.color,border:`1px solid ${st.color}44`}},st.short);
}

    const minT = Math.min(...times, TARGET) - 30;
    const maxT = Math.max(...times, BASE) + 30;

    const xScale = i => PAD.l + (i / (predHistory.length - 1)) * iW;
    const yScale = t => PAD.t + iH - ((t - minT) / (maxT - minT)) * iH;

    const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
    svg.setAttribute("width","100%");
    svg.style.display="block";

    const mk = (tag, attrs) => {
      const e = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
      return e;
    };

    // Fond
    svg.appendChild(mk("rect",{x:0,y:0,width:W,height:H,fill:"#1a1d27"}));

    // Ligne objectif
    const yTarget = yScale(TARGET);
    svg.appendChild(mk("line",{x1:PAD.l,y1:yTarget,x2:W-PAD.r,y2:yTarget,stroke:"#f9731644",strokeWidth:"1","stroke-dasharray":"4,3"}));
    const tLabel = document.createElementNS("http://www.w3.org/2000/svg","text");
    tLabel.setAttribute("x", W-PAD.r+2); tLabel.setAttribute("y", yTarget+4);
    tLabel.setAttribute("fill","#f97316"); tLabel.setAttribute("font-size","9");
    tLabel.textContent="48'30\""; svg.appendChild(tLabel);

    // Ligne base Lavandou
    const yBase = yScale(BASE);
    svg.appendChild(mk("line",{x1:PAD.l,y1:yBase,x2:W-PAD.r,y2:yBase,stroke:"#60a5fa22",strokeWidth:"1","stroke-dasharray":"4,3"}));

    // Courbe
    const points = predHistory.map((p,i) => `${xScale(i)},${yScale(p.time)}`).join(" ");
    const firstX=xScale(0), firstY=yScale(predHistory[0].time);
    const lastX=xScale(predHistory.length-1), lastY=yScale(predHistory[predHistory.length-1].time);
    svg.appendChild(mk("polyline",{points,fill:"none",stroke:"#60a5fa",strokeWidth:"2","stroke-linejoin":"round","stroke-linecap":"round"}));

    // Zone sous la courbe
    const area = `${firstX},${PAD.t+iH} ${points} ${lastX},${PAD.t+iH}`;
    svg.appendChild(mk("polygon",{points:area,fill:"#60a5fa11"}));

    // Points
    predHistory.forEach((p,i)=>{
      const cx=xScale(i), cy=yScale(p.time);
      const color = p.time <= TARGET ? "#22c55e" : p.time <= TARGET+60 ? "#eab308" : "#60a5fa";
      svg.appendChild(mk("circle",{cx,cy,r:"3",fill:color}));
    });

    // Axes labels Y
    [BASE, TARGET].forEach(t => {
      const lbl = document.createElementNS("http://www.w3.org/2000/svg","text");
      lbl.setAttribute("x", PAD.l-4); lbl.setAttribute("y", yScale(t)+4);
      lbl.setAttribute("fill","#94a3b8"); lbl.setAttribute("font-size","9");
      lbl.setAttribute("text-anchor","end");
      lbl.textContent = fmtTime(t); svg.appendChild(lbl);
    });

    // Label dernière valeur
    const lastVal = predHistory[predHistory.length-1];
    const lvLabel = document.createElementNS("http://www.w3.org/2000/svg","text");
    lvLabel.setAttribute("x", lastX); lvLabel.setAttribute("y", yScale(lastVal.time)-6);
    lvLabel.setAttribute("fill","#f1f5f9"); lvLabel.setAttribute("font-size","10");
    lvLabel.setAttribute("text-anchor","middle"); lvLabel.setAttribute("font-weight","700");
    lvLabel.textContent = fmtTime(lastVal.time); svg.appendChild(lvLabel);

    const wrap = el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"Évolution de l'estimation"),
      el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"12px",padding:"12px",overflow:"hidden"}}),
    );
    wrap.lastChild.appendChild(svg);
    graphEl = wrap;
  }

  const remaining = total-done-missed-adapted;
  const donePct = total>0 ? (done/total*100).toFixed(0) : 0;
  const adaptedPct = total>0 ? (adapted/total*100) : 0;
  const missedPct = total>0 ? (missed/total*100) : 0;
  const stats=el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"10px",padding:"12px 14px",marginBottom:"16px"}},
    el("div",{class:"label"},"Progression globale"),
    el("div",{style:{display:"flex",alignItems:"center",gap:"6px",fontSize:"13px",marginBottom:"8px"}},
      el("span",{style:{color:"#22c55e",fontWeight:"700"}},"✅ "+done),
      el("span",{class:"muted"},"·"),
      el("span",{style:{color:"#eab308",fontWeight:"700"}},"⚠️ "+adapted),
      el("span",{class:"muted"},"·"),
      el("span",{style:{color:"#ef4444",fontWeight:"700"}},"❌ "+missed),
      el("span",{class:"muted"},"·"),
      el("span",{class:"muted"},remaining+" restantes")
    ),
    el("div",{style:{height:"5px",background:"#232738",borderRadius:"3px",overflow:"hidden",display:"flex",gap:"2px"}},
      done>0?el("div",{style:{width:donePct+"%",background:"#22c55e",borderRadius:"2px"}}):null,
      adapted>0?el("div",{style:{width:adaptedPct+"%",background:"#eab308",borderRadius:"2px"}}):null,
      missed>0?el("div",{style:{width:missedPct+"%",background:"#ef4444",borderRadius:"2px"}}):null
    ),
    el("div",{class:"muted",style:{fontSize:"11px",marginTop:"6px"}},done+" / "+total+" séances · "+donePct+"%")
  );

  // ── Bilan semaine courante ──────────────────────────────────────────────
  const cw2 = currentWeek();
  const report = weeklyReport(cw2);
  let bilanEl = null;
  if (report && (report.done+report.adapted+report.missed) > 0) {
    const pct = Math.round((report.done+report.adapted)/report.total*100);
    const pctColor = pct>=80?"#22c55e":pct>=50?"#eab308":"#ef4444";
    bilanEl = el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"Bilan semaine "+cw2),
      el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"12px",padding:"14px"}},
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},
          el("div",{style:{display:"flex",gap:"16px"}},
            el("div",{},el("div",{style:{color:"#22c55e",fontSize:"20px",fontWeight:"800"}},report.done+""),el("div",{class:"muted",style:{fontSize:"11px"}},"✅ faites")),
            el("div",{},el("div",{style:{color:"#eab308",fontSize:"20px",fontWeight:"800"}},report.adapted+""),el("div",{class:"muted",style:{fontSize:"11px"}},"⚠️ adaptées")),
            el("div",{},el("div",{style:{color:"#ef4444",fontSize:"20px",fontWeight:"800"}},report.missed+""),el("div",{class:"muted",style:{fontSize:"11px"}},"❌ manquées"))
          ),
          el("div",{style:{textAlign:"right"}},
            el("div",{style:{color:pctColor,fontSize:"22px",fontWeight:"800"}},pct+"%"),
            el("div",{class:"muted",style:{fontSize:"11px"}},"complétées")
          )
        ),
        el("div",{style:{display:"flex",gap:"16px",flexWrap:"wrap",paddingTop:"10px",borderTop:"1px solid #2e3347"}},
          report.plannedMin>0?el("div",{},
            el("div",{style:{color:"#f1f5f9",fontSize:"13px",fontWeight:"700"}},
              (report.realMin>0?report.realMin+"'":"-")+" / "+report.plannedMin+"'"
            ),
            el("div",{class:"muted",style:{fontSize:"11px"}},"min réelles / prévues")
          ):null,
          report.avgEfPace?el("div",{},
            el("div",{style:{color:"#60a5fa",fontSize:"13px",fontWeight:"700"}},fmtPace(1000/report.avgEfPace)+"/km"),
            el("div",{class:"muted",style:{fontSize:"11px"}},"allure moy. EF")
          ):null,
          (()=>{
            const efSessions = ALL_SESSIONS.filter(s=>(s.type==="EF"||s.type==="LONGUE")&&s.week===cw2&&historicalWeatherCache[s.date]!=null);
            if (!efSessions.length) return null;
            const avgTemp = Math.round(efSessions.reduce((s,e)=>s+historicalWeatherCache[e.date],0)/efSessions.length);
            return el("div",{},
              el("div",{style:{color:avgTemp>28?"#f97316":"#94a3b8",fontSize:"13px",fontWeight:"700"}},avgTemp+"°C"),
              el("div",{class:"muted",style:{fontSize:"11px"}},"temp. moy. séances")
            );
          })()
        )
      )
    );
  }

  // ── Alerte fatigue ───────────────────────────────────────────────────────
  const fatigue = fatigueAlert();
  const fatigueEl = fatigue ? el("div",{style:{
    background:"#ef444411",border:"1px solid #ef444433",
    borderRadius:"10px",padding:"12px 14px",marginBottom:"16px",
    display:"flex",alignItems:"center",gap:"10px"
  }},
    el("span",{style:{fontSize:"22px"}},"😴"),
    el("div",{},
      el("div",{style:{color:"#ef4444",fontSize:"13px",fontWeight:"700"}},"Signes de fatigue détectés"),
      el("div",{class:"muted",style:{fontSize:"12px"}},
        fatigue==="consecutive"
          ? "2 séances difficiles consécutives — pense à réduire l'intensité"
          : "Allure EF en baisse vs semaine précédente — récupère bien"
      )
    )
  ) : null;

  return el("div",{style:{padding:"0 16px 100px"}},weatherEl,coachEl,fatigueEl,heroPred,nextKeyEl,todayEl||"",bilanEl,stravaSection);
}

function renderWeeks() {
  const cw=currentWeek();
  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{marginTop:"8px",marginBottom:"12px",color:"#94a3b8",fontSize:"12px"}},"Semaine actuelle : ",el("span",{style:{color:"#f97316",fontWeight:"700"}},"S"+cw)),
    ...PLAN.map(week=>{
      const pct=weekPct(week), isActive=week.week===cw, color=phaseOf(week.week).color;
      const b=el("button",{style:{width:"100%",background:isActive?"#232738":"#1a1d27",border:`1px solid ${isActive?"#f9731655":"#2e3347"}`,borderLeft:`3px solid ${color}`,borderRadius:"10px",padding:"12px 14px",marginBottom:"8px",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:"12px"}},
        el("div",{style:{textAlign:"center",minWidth:"36px"}},
          el("div",{style:{color,fontSize:"18px",fontWeight:"800",lineHeight:"1"}},"S"+week.week),
          isActive?el("div",{style:{color:"#f97316",fontSize:"11px",fontWeight:"700"}},"NOW"):null
        ),
        el("div",{style:{flex:"1"}},
          el("div",{style:{color:"#f1f5f9",fontSize:"13px",fontWeight:"600"}},phaseOf(week.week).label),
          el("div",{class:"muted",style:{fontSize:"11px",marginTop:"2px"}},fmtDate(week.sessions[0].date)+" → "+fmtDate(week.sessions[6].date)),
          el("div",{style:{height:"3px",background:"#232738",borderRadius:"2px",marginTop:"6px",marginBottom:"6px"}},
            el("div",{style:{height:"100%",width:pct+"%",background:color,borderRadius:"2px"}})
          ),
          (()=>{
            const ws=weekStats(week.week);
            if (!ws) return null;
            if (ws.hasReal) return el("div",{},
              el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"2px"}},
                el("span",{class:"muted",style:{fontSize:"10px"}},"Distance"),
                el("span",{style:{fontSize:"10px"}},
                  el("span",{style:{color:"#fc4c02",fontWeight:"700"}},ws.realKm+" km"),
                  el("span",{class:"muted"}," / ~"+ws.plannedKm+" km")
                )
              ),
              el("div",{style:{display:"flex",justifyContent:"space-between"}},
                el("span",{class:"muted",style:{fontSize:"10px"}},"Durée"),
                el("span",{style:{fontSize:"10px"}},
                  el("span",{style:{color:"#fc4c02",fontWeight:"700"}},
                    Math.floor(ws.realMin/60)+"h"+(ws.realMin%60).toString().padStart(2,"0")+"'"
                  ),
                  el("span",{class:"muted"}," / ~"+Math.floor(ws.plannedMin/60)+"h"+(ws.plannedMin%60).toString().padStart(2,"0")+"'")
                )
              )
            );
            return el("div",{class:"muted",style:{fontSize:"10px",fontStyle:"italic"}},
              "~"+ws.plannedKm+" km · ~"+Math.floor(ws.plannedMin/60)+"h"+(ws.plannedMin%60).toString().padStart(2,"0")+"' prévus"
            );
          })()
        ),
        el("div",{class:"muted",style:{fontSize:"12px"}},pct+"%")
      );
      b.addEventListener("click",()=>{ selectedWeek=week.week; setView("weekDetail"); });
      return b;
    })
  );
}

// DÉTAIL SEMAINE
// ══════════════════════════════════════════════════════════════════════════════
const SOPTS=["—","✅","❌","⚠️","😴"];
const SCOLORS={"—":"#475569","✅":"#22c55e","❌":"#ef4444","⚠️":"#eab308","😴":"#60a5fa"};

function renderWeekDetail(weekNum) {
  const week=PLAN.find(w=>w.week===weekNum);
  if (!week) return el("div",{},"—");
  const t=today();
  const weekDates=week.sessions.map(s=>s.date);
  const weekRuns=stravaActivities.filter(a=>a.type==="Run"&&weekDates.includes(a.start_date_local?.slice(0,10)));

  const cards=week.sessions.map((s,i)=>{
    const uid=`${weekNum}-${i}`, isToday=s.date===t, isPast=s.date<t;
    const st=STYPES[s.type]||STYPES.REPOS;
    const stravaRun=weekRuns.find(r=>r.start_date_local?.slice(0,10)===s.date);
    const effortLaps=stravaRun?getEffortLaps(stravaRun):[];

    const card=el("div",{style:{background:isToday?"#232738":"#1a1d27",border:`1px solid ${isToday?"#f9731644":"#2e3347"}`,borderLeft:`3px solid ${st.color}`,borderRadius:"10px",padding:"12px 14px",marginBottom:"8px"}},
      el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}},
        el("div",{style:{color:isPast?"#475569":"#94a3b8",fontSize:"11px",fontWeight:"700",minWidth:"60px"}},s.day+" "+s.date.slice(8)),
        isToday?el("span",{style:{background:"#f9731633",color:"#f97316",fontSize:"11px",fontWeight:"700",padding:"1px 5px",borderRadius:"3px"}},"AUJOURD'HUI"):null,
        badge(s.type)
      ),
      el("div",{style:{color:"#f1f5f9",fontSize:"14px",fontWeight:"600",marginBottom:"4px"}},s.session),
      (s.warmup||s.cooldown)?el("div",{style:{display:"flex",gap:"12px",marginBottom:"6px",flexWrap:"wrap"}},
        s.warmup?el("div",{class:"muted",style:{fontSize:"11px"}},"▶ "+s.warmup):null,
        s.cooldown?el("div",{class:"muted",style:{fontSize:"11px"}},"◀ "+s.cooldown):null
      ):null,
      s.notes?el("div",{style:{color:"#60a5facc",fontSize:"12px",marginBottom:"8px",fontStyle:"italic"}},"💡 "+s.notes):null,
      stravaRun?el("div",{style:{background:"#fc4c0211",border:"1px solid #fc4c0233",borderRadius:"8px",padding:"8px 10px",marginBottom:"8px"}},
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}},
          el("span",{class:"muted",style:{fontSize:"11px"}},
            (stravaRun.start_date_local||"").slice(11,16)+" · départ"
          ),
          el("a",{href:"https://www.strava.com/activities/"+stravaRun.id_str,target:"_blank",style:{color:"#fc4c02",fontSize:"11px",fontWeight:"700",textDecoration:"none"}},"Voir sur Strava 🔗")
        ),
        el("div",{style:{display:"flex",gap:"16px",flexWrap:"wrap",marginBottom:effortLaps.length>0?"8px":"0"}},
          el("div",{},el("div",{style:{color:"#fc4c02",fontSize:"13px",fontWeight:"700"}},(stravaRun.distance/1000).toFixed(2)+"km"),el("div",{class:"muted",style:{fontSize:"12px"}},"distance")),
          el("div",{},el("div",{style:{color:"#fc4c02",fontSize:"13px",fontWeight:"700"}},fmtTime(stravaRun.moving_time)),el("div",{class:"muted",style:{fontSize:"12px"}},"durée")),
          el("div",{},el("div",{style:{color:"#fc4c02",fontSize:"13px",fontWeight:"700"}},fmtPace(stravaRun.average_speed)+"/km"),el("div",{class:"muted",style:{fontSize:"12px"}},"allure moy.")),
          stravaRun.average_heartrate?el("div",{},el("div",{style:{color:"#fc4c02",fontSize:"13px",fontWeight:"700"}},Math.round(stravaRun.average_heartrate)+" bpm"),el("div",{class:"muted",style:{fontSize:"12px"}},"FC moy.")):null,
          stravaRun.max_heartrate?el("div",{},el("div",{style:{color:"#ef4444",fontSize:"13px",fontWeight:"700"}},Math.round(stravaRun.max_heartrate)+" bpm"),el("div",{class:"muted",style:{fontSize:"12px"}},"FC max")):null
        ),
        FC_ZONES[s.type]&&stravaRun.average_heartrate?el("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"6px 0",borderTop:"1px solid #fc4c0222",marginBottom:effortLaps.length>0?"8px":"0"}},
          el("span",{style:{fontSize:"14px"}},fcStatus(s.type,Math.round(stravaRun.average_heartrate))||""),
          el("span",{class:"muted",style:{fontSize:"11px"}},"FC moy. "+Math.round(stravaRun.average_heartrate)+" bpm · cible "+FC_ZONES[s.type].min+"–"+FC_ZONES[s.type].max+" bpm")
        ):null,
        stravaRun&&stravaRun.start_latlng?.length===2&&s.date?
          el("div",{style:{fontSize:"11px",color:"#94a3b8",paddingTop:"4px",paddingBottom:"4px"}},
            historicalWeatherCache[s.date]!=null
              ? "🌡️ "+historicalWeatherCache[s.date]+"°C au départ"+(historicalWeatherCache[s.date]>28?" 🔥":"")
              : el("span",{style:{color:"#475569",fontStyle:"italic"}},"🌡️ Chargement météo...")
          ):null,
        effortLaps.length>0?el("div",{style:{borderTop:"1px solid #fc4c0222",paddingTop:"8px"}},
          el("div",{class:"muted",style:{fontSize:"12px",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.5px"}},"Intervalles d'effort ("+effortLaps.length+")"),
          ...effortLaps.map((lap,i)=>el("div",{style:{display:"flex",gap:"12px",marginBottom:"4px",alignItems:"center"}},
            el("span",{style:{color:"#94a3b8",fontSize:"12px",minWidth:"16px"}},""+(i+1)),
            el("span",{style:{color:"#f1f5f9",fontSize:"12px",fontWeight:"600"}},fmtPace(lap.average_speed)+"/km"),
            el("span",{class:"muted",style:{fontSize:"11px"}},(lap.distance/1000).toFixed(2)+"km"),
            lap.average_heartrate?el("span",{class:"muted",style:{fontSize:"11px"}},Math.round(lap.average_heartrate)+" bpm"):null
          ))
        ):null
      ):null
    );

    if (s.type==="RACE") {
      card.appendChild(el("div",{style:{background:"#f9731622",border:"1px solid #f9731644",borderRadius:"8px",padding:"10px 12px",marginTop:"4px"}},
        el("div",{style:{color:"#f97316",fontWeight:"700",fontSize:"14px"}},"🏁 Jour J — Objectif 48'30\""),
        el("div",{class:"text2",style:{fontSize:"12px",marginTop:"4px"}},"Km 1-3 : prudent · Km 4-7 : contrôle · Km 8-10 : tout donner !")
      ));
    } else if (s.type!=="REPOS") {
      const statusRow=el("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginTop:"4px"}});
      SOPTS.forEach(opt=>{
        const cur=statuses[uid]||"—";
        const b=el("button",{style:{background:cur===opt?SCOLORS[opt]+"33":"#232738",border:`1px solid ${cur===opt?SCOLORS[opt]:"#2e3347"}`,borderRadius:"6px",padding:"5px 10px",cursor:"pointer",color:cur===opt?SCOLORS[opt]:"#475569",fontSize:"13px",fontWeight:cur===opt?"700":"400"}},opt==="—"?"–":opt);
        b.addEventListener("click",()=>{ statuses[uid]=opt; save("lk_statuses",statuses); scheduleSave(); render(); });
        statusRow.appendChild(b);
      });
      card.appendChild(statusRow);
      const noteInput=el("input",{type:"text",placeholder:"💬 Note sur cette séance...",style:{marginTop:"8px",background:"#0f1117",border:"1px solid #2e3347",borderRadius:"8px",padding:"7px 10px",color:"#f1f5f9",fontSize:"12px",outline:"none",width:"100%"}});
      noteInput.value=sessionNotes[uid]||"";
      noteInput.addEventListener("change",()=>{
        if(noteInput.value.trim()){sessionNotes[uid]=noteInput.value.trim();}
        else{delete sessionNotes[uid];}
        save("lk_session_notes",sessionNotes); scheduleSave();
      });
      if(sessionNotes[uid]){card.appendChild(el("div",{style:{color:"#94a3b8",fontSize:"12px",fontStyle:"italic",marginTop:"4px"}},"💬 "+sessionNotes[uid]));}
      card.appendChild(noteInput);
    }
    return card;
  });

  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{display:"flex",alignItems:"center",gap:"12px",marginTop:"8px",marginBottom:"16px"}},
      el("div",{style:{flex:"1"}},
        el("div",{class:"muted",style:{fontSize:"11px",textTransform:"uppercase",letterSpacing:"1px"}},phaseOf(weekNum).label),
        el("div",{style:{color:"#f1f5f9",fontSize:"20px",fontWeight:"800"}},"Semaine "+weekNum),
        el("div",{class:"muted",style:{fontSize:"12px"}},fmtDate(week.sessions[0].date)+" – "+fmtDate(week.sessions[6].date))
      ),
      weekRuns.length>0?el("div",{style:{background:"#fc4c0111",border:"1px solid #fc4c0133",borderRadius:"8px",padding:"6px 10px",textAlign:"center"}},
        el("div",{style:{color:"#fc4c02",fontSize:"14px",fontWeight:"700"}},weekRuns.length+""),
        el("div",{class:"muted",style:{fontSize:"12px"}},"Strava")
      ):null
    ),
    ...cards
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// NOTES
// ══════════════════════════════════════════════════════════════════════════════
function renderNotes() {
  const input=el("input",{type:"text",placeholder:"Ressentis, douleurs, météo..."});
  const addBtn=el("button",{style:{background:"#f97316",border:"none",borderRadius:"10px",color:"#fff",padding:"0 18px",fontSize:"20px",cursor:"pointer",fontWeight:"700",height:"44px",flexShrink:"0"}},"＋");
  addBtn.addEventListener("click",()=>{
    const txt=input.value.trim(); if(!txt) return;
    notesList.unshift({text:txt,date:today(),id:Date.now()});
    save("lk_notes",notesList); scheduleSave(); input.value=""; render();
  });
  input.addEventListener("keydown",e=>{ if(e.key==="Enter") addBtn.click(); });
  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{marginTop:"8px",marginBottom:"16px"}},
      el("div",{class:"label"},"Carnet de bord"),
      el("div",{style:{display:"flex",gap:"8px"}},input,addBtn)
    ),
    notesList.length===0
      ?el("div",{class:"muted",style:{textAlign:"center",padding:"40px 0",fontSize:"14px"}},"Aucune note pour l'instant.",el("span",{style:{fontSize:"28px",display:"block",marginTop:"8px"}},"📝"))
      :el("div",{},...notesList.map(note=>{
          const del=el("button",{style:{background:"none",border:"none",color:"#94a3b8",fontSize:"18px",cursor:"pointer",padding:"0 4px",alignSelf:"flex-start"}},"×");
          del.addEventListener("click",()=>{ notesList=notesList.filter(n=>n.id!==note.id); save("lk_notes",notesList); scheduleSave(); render(); });
          return el("div",{class:"card",style:{display:"flex",gap:"10px"}},
            el("div",{style:{flex:"1"}},el("div",{class:"muted",style:{fontSize:"11px",marginBottom:"4px"}},note.date),el("div",{style:{color:"#f1f5f9",fontSize:"14px"}},note.text)),

          );
        }))
  );
}

// STATS
// ══════════════════════════════════════════════════════════════════════════════
function renderStats() {
  const pred = predict10K();

  // ── Graphique évolution ───────────────────────────────────────────────
  let graphEl = null;
  if (predHistory.length >= 2) {
    const TARGET = 48.5*60, BASE = 3021;
    const W = 340, H = 120, PAD = {t:16,r:40,b:28,l:44};
    const iW = W-PAD.l-PAD.r, iH = H-PAD.t-PAD.b;
    const times = predHistory.map(p=>p.time);
    const minT = Math.min(...times,TARGET)-30;
    const maxT = Math.max(...times,BASE)+30;
    const xScale = i => PAD.l+(i/(predHistory.length-1))*iW;
    const yScale = t => PAD.t+iH-((t-minT)/(maxT-minT))*iH;
    const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
    svg.setAttribute("width","100%");
    svg.style.display="block";
    const mk=(tag,attrs)=>{const e=document.createElementNS("http://www.w3.org/2000/svg",tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;};
    svg.appendChild(mk("rect",{x:0,y:0,width:W,height:H,fill:"#1a1d27"}));
    const yTarget=yScale(TARGET);
    svg.appendChild(mk("line",{x1:PAD.l,y1:yTarget,x2:W-PAD.r,y2:yTarget,stroke:"#f9731644",strokeWidth:"1","stroke-dasharray":"4,3"}));
    const tl=document.createElementNS("http://www.w3.org/2000/svg","text");
    tl.setAttribute("x",W-PAD.r+4);tl.setAttribute("y",yTarget+4);tl.setAttribute("fill","#f97316");tl.setAttribute("font-size","9");tl.textContent="48'30\"";svg.appendChild(tl);
    const points=predHistory.map((p,i)=>`${xScale(i)},${yScale(p.time)}`).join(" ");
    const firstX=xScale(0),lastX=xScale(predHistory.length-1);
    svg.appendChild(mk("polygon",{points:`${firstX},${PAD.t+iH} ${points} ${lastX},${PAD.t+iH}`,fill:"#60a5fa11"}));
    svg.appendChild(mk("polyline",{points,fill:"none",stroke:"#60a5fa",strokeWidth:"2","stroke-linejoin":"round","stroke-linecap":"round"}));
    predHistory.forEach((p,i)=>{
      const color=p.time<=TARGET?"#22c55e":p.time<=TARGET+60?"#eab308":"#60a5fa";
      svg.appendChild(mk("circle",{cx:xScale(i),cy:yScale(p.time),r:"3",fill:color}));
    });
    [BASE,TARGET].forEach(t=>{
      const lbl=document.createElementNS("http://www.w3.org/2000/svg","text");
      lbl.setAttribute("x",PAD.l-4);lbl.setAttribute("y",yScale(t)+4);
      lbl.setAttribute("fill","#94a3b8");lbl.setAttribute("font-size","9");lbl.setAttribute("text-anchor","end");
      lbl.textContent=fmtTime(t);svg.appendChild(lbl);
    });
    const lastVal=predHistory[predHistory.length-1];
    const lvl=document.createElementNS("http://www.w3.org/2000/svg","text");
    lvl.setAttribute("x",xScale(predHistory.length-1));lvl.setAttribute("y",yScale(lastVal.time)-6);
    lvl.setAttribute("fill","#f1f5f9");lvl.setAttribute("font-size","10");lvl.setAttribute("text-anchor","middle");lvl.setAttribute("font-weight","700");
    lvl.textContent=fmtTime(lastVal.time);svg.appendChild(lvl);
    // Labels semaines sur l'axe X
    // On mappe les dates du plan aux positions X
    PLAN.forEach((week, wi) => {
      const weekDate = new Date(week.sessions[0].date);
      // Trouver si on a un point predHistory proche de cette semaine
      const weekDateStr = week.sessions[0].date;
      // Position X basée sur l'index de la semaine dans le plan (0-10)
      const xPos = PAD.l + (wi / (PLAN.length - 1)) * iW;
      // Petite marque verticale pour toutes les semaines
      const tick = mk("line",{x1:xPos,y1:PAD.t+iH,x2:xPos,y2:PAD.t+iH+4,stroke:"#2e3347",strokeWidth:"1"});
      svg.appendChild(tick);
      // Label uniquement pour les semaines impaires
      if ((wi+1) % 2 === 1) {
        const lbl = document.createElementNS("http://www.w3.org/2000/svg","text");
        lbl.setAttribute("x", xPos);
        lbl.setAttribute("y", PAD.t+iH+14);
        lbl.setAttribute("fill","#64748b");
        lbl.setAttribute("font-size","9");
        lbl.setAttribute("text-anchor","middle");
        lbl.textContent = "S"+(wi+1);
        svg.appendChild(lbl);
      }
    });

    // Tooltip au tap
    const tooltip = document.createElementNS("http://www.w3.org/2000/svg","g");
    tooltip.style.display = "none";
    const tooltipBg = mk("rect",{x:0,y:0,width:80,height:32,rx:"4",fill:"#232738",stroke:"#2e3347",strokeWidth:"1"});
    const tooltipDate = document.createElementNS("http://www.w3.org/2000/svg","text");
    tooltipDate.setAttribute("font-size","9"); tooltipDate.setAttribute("fill","#94a3b8");
    const tooltipVal = document.createElementNS("http://www.w3.org/2000/svg","text");
    tooltipVal.setAttribute("font-size","11"); tooltipVal.setAttribute("fill","#f1f5f9"); tooltipVal.setAttribute("font-weight","700");
    tooltip.appendChild(tooltipBg); tooltip.appendChild(tooltipDate); tooltip.appendChild(tooltipVal);
    svg.appendChild(tooltip);

    // Zone de tap sur chaque point
    predHistory.forEach((p,i) => {
      const cx = xScale(i), cy = yScale(p.time);
      const hitArea = mk("circle",{cx,cy,r:"12",fill:"transparent",cursor:"pointer"});
      hitArea.addEventListener("click", () => {
        const d = new Date(p.date);
        const dateStr = d.toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
        const tx = Math.min(cx, W-PAD.r-84);
        const ty = cy > PAD.t+30 ? cy-40 : cy+10;
        tooltipBg.setAttribute("x", tx); tooltipBg.setAttribute("y", ty);
        tooltipDate.setAttribute("x", tx+6); tooltipDate.setAttribute("y", ty+12);
        tooltipDate.textContent = dateStr;
        tooltipVal.setAttribute("x", tx+6); tooltipVal.setAttribute("y", ty+26);
        tooltipVal.textContent = fmtTime(p.time);
        tooltip.style.display = "block";
      });
      svg.appendChild(hitArea);
    });

    svg.addEventListener("click", e => {
      if (e.target.tagName !== "circle" || e.target.getAttribute("r") !== "12") {
        tooltip.style.display = "none";
      }
    });

    const wrap=el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"Évolution de l\'estimation"),
      el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"12px",padding:"12px",overflow:"hidden"}})
    );
    wrap.lastChild.appendChild(svg);
    graphEl=wrap;
  }

  // ── Projections Riegel ────────────────────────────────────────────────
  const projEl=el("div",{style:{marginBottom:"16px"}},
    el("div",{class:"label"},"Projections Riegel"),
    el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"12px",padding:"14px"}},
      el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}},
        ...riegelProjections(pred.time).map(p=>
          el("div",{style:{background:p.target?"#f9731622":"#232738",border:p.target?"1px solid #f9731644":"none",borderRadius:"8px",padding:"10px 12px"}},
            el("div",{style:{color:p.target?"#f97316":"#94a3b8",fontSize:"11px",marginBottom:"4px"}},p.label+(p.target?" 🎯":"")),
            el("div",{style:{color:"#f1f5f9",fontSize:"15px",fontWeight:"700"}},p.timeStr),
            el("div",{class:"muted",style:{fontSize:"11px"}},p.paceStr)
          )
        )
      ),
      el("div",{class:"muted",style:{fontSize:"10px",marginTop:"10px",fontStyle:"italic"}},"📊 "+pred.method)
    )
  );

  // ── Référentiel allures ───────────────────────────────────────────────
  const paceRows = [
    {type:"EF",      label:"Endurance fondamentale", pace:"6:20", heat:"6:40", fc:"118–136", pct:"65–75%", color:"#60a5fa"},
    {type:"LONGUE",  label:"Sortie longue",           pace:"6:20", heat:"6:40", fc:"118–136", pct:"65–75%", color:"#22c55e"},
    {type:"SEUIL",   label:"Seuil",                   pace:"4:55", heat:null,   fc:"163–172", pct:"90–95%", color:"#eab308"},
    {type:"SPEC",    label:"Spécifique 10K",           pace:"4:51", heat:null,   fc:"154–163", pct:"85–90%", color:"#a855f7"},
    {type:"VMA",     label:"VMA",                     pace:"4:10–4:25", heat:null, fc:"163–181", pct:"90–100%", color:"#f97316"},
  ];
  const paceEl=el("div",{style:{marginBottom:"16px"}},
    el("div",{class:"label"},"Référentiel allures & FC"),
    el("div",{style:{background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"12px",overflow:"hidden"}},
      ...paceRows.map((r,i)=>el("div",{style:{padding:"10px 14px",borderBottom:i<paceRows.length-1?"1px solid #2e3347":"none",display:"flex",alignItems:"center",gap:"12px"}},
        el("div",{style:{width:"4px",height:"32px",borderRadius:"2px",background:r.color,flexShrink:"0"}}),
        el("div",{style:{flex:"1"}},
          el("div",{style:{color:"#f1f5f9",fontSize:"12px",fontWeight:"600",marginBottom:"2px"}},r.label),
          el("div",{class:"muted",style:{fontSize:"11px"}},r.heat?"Chaud : "+r.heat:"Tolérance ±10\"")
        ),
        el("div",{style:{textAlign:"right"}},
          el("div",{style:{color:r.color,fontSize:"13px",fontWeight:"700"}},r.pace+"/km"),
          el("div",{class:"muted",style:{fontSize:"11px"}},r.fc+" bpm")
        )
      ))
    )
  );

  // ── Infos du plan ─────────────────────────────────────────────────────
  const infoEl=el("div",{},
    el("div",{class:"label"},"Informations"),
    el("div",{class:"card"},
      ...[
        ["Objectif","48'30\" · 4:51/km","#f97316"],
        ["Course","6 septembre 2026","#f1f5f9"],
        ["Référence","50'21\" (Lavandou)","#f1f5f9"],
        ["Allure EF","6:20/km · 6:40/km si chaud","#60a5fa"],
        ["FC max","181 bpm","#f1f5f9"],
        ["Prédicteur","Riegel + laps Strava v2","#f1f5f9"],
      ].map(([label,val,color])=>el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"6px"}},
        el("span",{class:"muted",style:{fontSize:"12px"}},label),
        el("span",{style:{color,fontSize:"12px",fontWeight:color==="#f1f5f9"?"400":"700"}},val)
      ))
    )
  );

  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{marginTop:"8px"}}),
    graphEl||el("div",{class:"muted",style:{textAlign:"center",padding:"24px 0",fontSize:"12px",fontStyle:"italic"}},"📊 Le graphique apparaîtra après quelques jours de données"),
    projEl,
    paceEl,
    infoEl
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════════
function setView(v) {
  view=v; render(); window.scrollTo(0,0);
  // Fetcher les météos historiques manquantes pour les séances avec Strava
  if (v==="weekDetail") {
    const week = PLAN.find(w=>w.week===selectedWeek);
    if (!week) return;
    const weekDates = week.sessions.map(s=>s.date);
    const weekRuns = stravaActivities.filter(a=>a.type==="Run"&&weekDates.includes(a.start_date_local?.slice(0,10)));
    weekRuns.forEach(async r => {
      const date = r.start_date_local?.slice(0,10);
      if (date && historicalWeatherCache[date]===undefined && r.start_latlng?.length===2) {
        historicalWeatherCache[date] = null; // marqué comme en cours
        const temp = await fetchHistoricalWeather(date, r.start_latlng[0], r.start_latlng[1]);
        if (temp !== null) {
          historicalWeatherCache[date] = temp;
          save("lk_weather_cache", historicalWeatherCache);
          render();
        }
      }
    });
  }
}

function render() {
  const app=document.getElementById("app");
  app.innerHTML="";

  const backBtn=view==="weekDetail"
    ?el("button",{style:{background:"none",border:"none",color:"#f97316",fontSize:"22px",cursor:"pointer",padding:"0",lineHeight:"1",marginRight:"4px"},onClick:()=>setView("weeks")},"‹")
    :null;

  const titles={dashboard:"Plan 10K",weeks:"Semaines",weekDetail:"Semaine "+selectedWeek,stats:"Stats",settings:"Paramètres"};
  const hdr=el("div",{style:{position:"sticky",top:"0",zIndex:"10",background:"rgba(15,17,23,0.95)",backdropFilter:"blur(12px)",borderBottom:"1px solid #2e3347",padding:"12px 16px 10px",display:"flex",alignItems:"center",gap:"6px"}},
    backBtn||"",
    el("div",{style:{flex:"1"}},
      el("div",{style:{color:"#f1f5f9",fontSize:"17px",fontWeight:"700",lineHeight:"1"}},titles[view]||""),
      view==="weekDetail"?el("div",{class:"muted",style:{fontSize:"11px",marginTop:"1px"}},phaseOf(selectedWeek).label):null
    ),
    el("div",{style:{background:"#232738",borderRadius:"8px",padding:"4px 10px",color:"#f97316",fontSize:"13px",fontWeight:"700"}},"J–"+countdown())
  );

  let content;
  if (view==="dashboard") content=renderDashboard();
  else if (view==="weeks") content=renderWeeks();
  else if (view==="weekDetail") content=renderWeekDetail(selectedWeek);
  else if (view==="stats") content=renderStats();
  else content=renderSettings();

  const NAV=[
    {id:"dashboard",icon:"⚡",label:"Dashboard"},
    {id:"weeks",    icon:"📅",label:"Semaines"},
    {id:"stats",    icon:"📊",label:"Stats"},
    {id:"settings", icon:"⚙️",label:"Paramètres"},
  ];
  const activeNav=["dashboard","stats","settings"].includes(view)?view:"weeks";
  const nav=el("div",{style:{position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",background:"rgba(26,29,39,0.97)",backdropFilter:"blur(16px)",borderTop:"1px solid #2e3347",display:"flex",zIndex:"20"}},
    ...NAV.map(n=>{
      const hasBadge = n.id==="dashboard" && (() => {
        if (new Date().getHours() < 18) return false;
        return ALL_SESSIONS.filter(s=>s.date===today()&&s.type!=="REPOS"&&s.type!=="RACE")
          .some(s=>!statuses[s.uid]||statuses[s.uid]==="—");
      })();
      const iconWrap=el("div",{style:{position:"relative",display:"inline-block"}},
        el("span",{style:{fontSize:"20px"}},n.icon),
        hasBadge?el("div",{style:{position:"absolute",top:"-2px",right:"-4px",width:"8px",height:"8px",borderRadius:"50%",background:"#ef4444",border:"2px solid rgba(26,29,39,0.97)"}}):null
      );
      const b=el("button",{style:{flex:"1",background:"none",border:"none",cursor:"pointer",padding:"10px 0 14px",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",opacity:activeNav===n.id?"1":"0.45"}},
        iconWrap,
        el("span",{style:{fontSize:"12px",fontWeight:"700",letterSpacing:"0.3px",color:activeNav===n.id?"#f97316":"#94a3b8"}},n.label)
      );
      b.addEventListener("click",()=>{ if(n.id==="weeks") selectedWeek=currentWeek(); setView(n.id); });
      return b;
    })
  );

  app.appendChild(hdr);
  app.appendChild(content);
  app.appendChild(nav);
}

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('/sw.js').catch(()=>{}); });
}
