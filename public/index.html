async function fetchHistoricalWeather(date, lat, lon) {
  try {
    const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${date}&end_date=${date}&hourly=temperature_2m&timezone=Europe%2FParis`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (!data.hourly?.temperature_2m) return null;
    // Prendre la température de l'heure de début de séance (approximation : 18h)
    const temps = data.hourly.temperature_2m;
    return Math.round(temps[18] ?? temps[12] ?? temps[0]);
  } catch(e) { return null; }
}

async function fetchWeather() {
  try {
    const resp = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=43.12&longitude=5.93&current=temperature_2m,weathercode&timezone=Europe%2FParis"
    );
    const data = await resp.json();
    weatherTemp = Math.round(data.current.temperature_2m);
    const code = data.current.weathercode;
    if (code === 0) weatherDesc = "☀️";
    else if (code <= 3) weatherDesc = "⛅";
    else if (code <= 67) weatherDesc = "🌧️";
    else weatherDesc = "🌡️";
    render();
  } catch(e) {
    console.warn("Météo indisponible:", e.message);
  }
}

function today() { return new Date().toISOString().slice(0,10); }
function countdown() { return Math.ceil((new Date("2026-09-06") - new Date()) / 86400000); }
function currentWeek() {
  const t = today();
  for (const w of PLAN) {
    if (t >= w.sessions[0].date && t <= w.sessions[6].date) return w.week;
  }
  return t < PLAN[0].sessions[0].date ? 1 : 11;
}
function fmtDate(d) { return new Date(d+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}); }
function fmtPace(speedMs) {
  if (!speedMs || speedMs <= 0) return "--:--";
  const secPerKm = 1000 / speedMs;
  const min = Math.floor(secPerKm / 60);
  const sec = Math.round(secPerKm % 60).toString().padStart(2,"0");
  return `${min}:${sec}`;
}
function fmtTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.round(seconds % 60).toString().padStart(2,"0");
  return `${m}'${s}"`;
}
function weekPct(week) {
  const sess = week.sessions.filter(s=>s.type!=="REPOS"&&s.type!=="RACE");
  const done = sess.filter(s=>statuses[`${week.week}-${week.sessions.indexOf(s)}`]==="✅").length;
  return sess.length ? Math.round(done/sess.length*100) : 0;
}
function globalPct() {
  const total = ALL_SESSIONS.filter(s=>s.type!=="REPOS"&&s.type!=="RACE").length;
  const done = ALL_SESSIONS.filter(s=>statuses[s.uid]==="✅").length;
  return Math.round(done/total*100);
}
function phaseOf(weekNum) { return PHASES.find(p=>p.weeks.includes(weekNum))||{color:"#e2e8f0",label:""}; }

// ── Projections Riegel multi-distances ────────────────────────────────────
function riegelProjections(time10k) {
  const DISTANCES = [
    { label:"5K",    dist:5000,   target:false },
    { label:"10K",   dist:10000,  target:true  },
    { label:"Semi",  dist:21097,  target:false },
    { label:"Marathon", dist:42195, target:false },
  ];
  return DISTANCES.map(d => {
    const t = time10k * Math.pow(d.dist / 10000, 1.06);
    const pace = t / (d.dist / 1000);
    const h = Math.floor(t / 3600);
    const m = Math.floor((t % 3600) / 60);
    const s = Math.round(t % 60);
    const timeStr = h > 0
      ? h+"h"+m.toString().padStart(2,"0")+"'"
      : m+"'"+s.toString().padStart(2,"0")+"\"";
    const paceStr = Math.floor(pace/60)+":"+(Math.round(pace%60)).toString().padStart(2,"0")+"/km";
    return { ...d, timeStr, paceStr };
  });
}

// ── Km parcourus sur une semaine du plan ────────────────────────────────────
function weekKm(weekNum) {
  return Math.round(stravaActivities.filter(a=>{
    const w = PLAN.find(w=>w.week===weekNum);
    return w && w.sessions.map(s=>s.date).includes(a.start_date_local?.slice(0,10));
  }).reduce((s,a)=>s+a.distance,0)/100)/10;
}

function weekStats(weekNum) {
  const week = PLAN.find(w=>w.week===weekNum);
  if (!week) return null;

  // Durée prévue
  const sessions = week.sessions.filter(s=>s.type!=="REPOS"&&s.type!=="RACE");
  let plannedMin = 0;
  sessions.forEach(s => {
    const m1 = s.session.match(/(\d+)(?:[–\-](\d+))?\s*min/);
    if (m1) plannedMin += m1[2] ? (parseInt(m1[1])+parseInt(m1[2]))/2 : parseInt(m1[1]);
    const m2 = s.warmup.match(/(\d+)'/);
    if (m2) plannedMin += parseInt(m2[1]);
    const m3 = s.cooldown.match(/(\d+)'/);
    if (m3) plannedMin += parseInt(m3[1]);
  });

  // Distance prévue estimée (durée × allure EF ref)
  const EF_PACE = 6.33; // min/km (6:20/km)
  const plannedKm = Math.round(plannedMin / EF_PACE * 10) / 10;

  // Réel depuis Strava
  const weekDates = week.sessions.map(s=>s.date);
  const weekRuns = stravaActivities.filter(a=>weekDates.includes(a.start_date_local?.slice(0,10)));
  const realMin = Math.round(weekRuns.reduce((s,r)=>s+r.moving_time,0)/60);
  const realKm = Math.round(weekRuns.reduce((s,r)=>s+r.distance,0)/100)/10;

  return { plannedMin:Math.round(plannedMin), plannedKm, realMin, realKm, hasReal:weekRuns.length>0 };
}

// ── Bilan hebdomadaire ────────────────────────────────────────────────────
function weeklyReport(weekNum) {
  const week = PLAN.find(w=>w.week===weekNum);
  if (!week) return null;
  const sessions = week.sessions.filter(s=>s.type!=="REPOS"&&s.type!=="RACE");
  const done    = sessions.filter(s=>statuses[`${weekNum}-${week.sessions.indexOf(s)}`]==="✅").length;
  const adapted = sessions.filter(s=>statuses[`${weekNum}-${week.sessions.indexOf(s)}`]==="⚠️").length;
  const missed  = sessions.filter(s=>statuses[`${weekNum}-${week.sessions.indexOf(s)}`]==="❌").length;
  let plannedMin = 0;
  sessions.forEach(s => {
    const m1 = s.session.match(/(\d+)(?:[\u2013-](\d+))?\s*min/);
    if (m1) plannedMin += m1[2] ? (parseInt(m1[1])+parseInt(m1[2]))/2 : parseInt(m1[1]);
    const m2 = s.warmup.match(/(\d+)'/);
    if (m2) plannedMin += parseInt(m2[1]);
    const m3 = s.cooldown.match(/(\d+)'/);
    if (m3) plannedMin += parseInt(m3[1]);
  });
  const weekDates = week.sessions.map(s=>s.date);
  const weekRuns = stravaActivities.filter(a=>a.type==="Run"&&weekDates.includes(a.start_date_local?.slice(0,10)));
  const realMin = Math.round(weekRuns.reduce((s,r)=>s+r.moving_time,0)/60);
  const efDates = week.sessions.filter(s=>s.type==="EF"||s.type==="LONGUE").map(s=>s.date);
  const efRuns = stravaActivities.filter(a=>a.type==="Run"&&efDates.includes(a.start_date_local?.slice(0,10)));
  let avgEfPace = null, avgEfHr = null;
  if (efRuns.length>0) {
    const avgSpeed = efRuns.reduce((s,r)=>s+r.average_speed,0)/efRuns.length;
    if (avgSpeed>0) avgEfPace = 1000/avgSpeed;
    const hrRuns = efRuns.filter(r=>r.average_heartrate>0);
    if (hrRuns.length>0) avgEfHr = Math.round(hrRuns.reduce((s,r)=>s+r.average_heartrate,0)/hrRuns.length);
  }

  // Tendance vs semaine précédente
  let prevEfPace = null, prevEfHr = null;
  if (weekNum > 1) {
    const prevWeek = PLAN.find(w=>w.week===weekNum-1);
    if (prevWeek) {
      const prevEfDates = prevWeek.sessions.filter(s=>s.type==="EF"||s.type==="LONGUE").map(s=>s.date);
      const prevEfRuns = stravaActivities.filter(a=>a.type==="Run"&&prevEfDates.includes(a.start_date_local?.slice(0,10)));
      if (prevEfRuns.length>0) {
        const ps = prevEfRuns.reduce((s,r)=>s+r.average_speed,0)/prevEfRuns.length;
        if (ps>0) prevEfPace = 1000/ps;
        const phr = prevEfRuns.filter(r=>r.average_heartrate>0);
        if (phr.length>0) prevEfHr = Math.round(phr.reduce((s,r)=>s+r.average_heartrate,0)/phr.length);
      }
    }
  }

  return { done, adapted, missed, total:sessions.length, plannedMin:Math.round(plannedMin), realMin, avgEfPace, avgEfHr, prevEfPace, prevEfHr };
}

// ── Score d'Économie normalisé ──────────────────────────────────────────────
function economyScore(lap, sessionType) {
  if (!lap.average_heartrate || !lap.average_speed || !runnerFcMax) return null;
  const target = SESSION_TARGETS[sessionType];
  if (!target) return null;
  const fcPct = sessionType==="VMA" ? 0.95 : sessionType==="SPEC" ? 0.875 : sessionType==="SEUIL" ? 0.875 : null;
  if (!fcPct) return null;
  const fcTheo = runnerFcMax * fcPct;
  const vTheo = 1000 / target.targetMin;
  const iecTheo = fcTheo / vTheo;
  const iecReal = lap.average_heartrate / lap.average_speed;
  return Math.round(iecTheo / iecReal * 100);
}
function economyColor(score, n) {
  if (!score || n < 3) return "#e2e8f0";
  if (score > 110) return "#22c55e";
  if (score >= 90) return "#eab308";
  return "#ef4444";
}
function economyLabel(score, n) {
  if (!score || n < 3) return "";
  if (score > 110) return "💚";
  if (score >= 90) return "💛";
  return "❤️";
}

function getEffortLaps(activity) {
  if (!activity.laps || !activity.laps.length) return [];
  const laps = activity.laps.filter(l => l.average_speed > 0);
  if (!laps.length) return [];
  // Percentile 70 : sépare automatiquement effort vs récup/transition
  const speeds = laps.map(l => l.average_speed).sort((a,b) => a-b);
  const p70 = speeds[Math.floor(speeds.length * 0.70)];
  // Garder laps au-dessus du P70 ET allure < 6:00/km
  return laps.filter(l => l.average_speed >= p70 && (1000/l.average_speed) < 360);
}

// ── Calcul dérive FC sur les répétitions ─────────────────────────────────
function computeFcDrift(laps) {
  const hrLaps = laps.filter(l => l.average_heartrate);
  if (hrLaps.length < 2) return { driftBpm: null, driftEl: null };
  const firstHr = hrLaps[0].average_heartrate;
  const lastHr = hrLaps[hrLaps.length-1].average_heartrate;
  const drift = Math.round(lastHr - firstHr);
  const avgHr = hrLaps.reduce((s,l)=>s+l.average_heartrate,0)/hrLaps.length;
  const firstHrVal = hrLaps[0].average_heartrate;
  laps.forEach(l => {
    l._fcAlert = l.average_heartrate && l.average_heartrate > avgHr + 8;
    l._fcBase = firstHrVal;
  });
  const driftColor = drift <= 5 ? "#22c55e" : drift <= 12 ? "#eab308" : "#ef4444";
  const driftIcon = drift <= 5 ? "✅" : drift <= 12 ? "⚠️" : "🔴";
  const driftEl = el("div",{style:{background:"#232738",borderRadius:"8px",padding:"8px 12px",marginTop:"6px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
    el("span",{class:"muted",style:{fontSize:"13px"}},"Dérive FC"),
    el("span",{style:{color:driftColor,fontSize:"14px",fontWeight:"700"}},(drift>0?"+":"")+drift+" bpm "+driftIcon)
  );
  return { driftBpm: drift, driftEl };
}

// ── Affichage commun d\'une répétition (dashboard + weekDetail) ────────────
function renderLapRow(lap, i, sessionType) {
  const tgt = SESSION_TARGETS[sessionType];
  const pace = 1000/lap.average_speed;
  let bc = "#e2e8f0", em = "";
  if (tgt) {
    if (pace <= tgt.okPace) { bc="#22c55e"; em="🟢"; }
    else if (pace <= tgt.warnPace) { bc="#eab308"; em="🟡"; }
    else { bc="#ef4444"; em="🔴"; }
  }
  const maxP = tgt ? tgt.warnPace+30 : 400, minP = tgt ? tgt.targetMin-20 : 240;
  const bw = Math.max(0, Math.min(100, (1-(pace-minP)/(maxP-minP))*100));
  const nSameType = stravaActivities.filter(a=>{
    const d = a.start_date_local?.slice(0,10);
    return ALL_SESSIONS.find(ss=>ss.date===d&&ss.type===sessionType);
  }).length;
  const se = economyScore(lap, sessionType);
  const seColor = economyColor(se, nSameType);
  const seLabel = economyLabel(se, nSameType);
  const cadence = lap.average_cadence ? Math.round(lap.average_cadence*2)+" spm" : "";

  // ── Raison du verdict ────────────────────────────────────────────────────
  let reasonParts = [];
  if (tgt) {
    if (pace <= tgt.okPace) reasonParts.push("Dans la cible");
    else if (pace <= tgt.warnPace) reasonParts.push("Un peu lente");
    else reasonParts.push("Trop lente");
  }
  if (lap.average_heartrate && lap._fcAlert) {
    const fcDiff = Math.round(lap.average_heartrate - (lap._fcBase||lap.average_heartrate));
    reasonParts.push("FC élevée"+(fcDiff>0?" (+"+fcDiff+" bpm)":""));
  } else if (lap.average_heartrate && i > 0) {
    const fcDiff = Math.round(lap.average_heartrate - (lap._fcBase||0));
    if (fcDiff > 3) reasonParts.push("FC +"+fcDiff+" bpm");
  }
  const reasonText = reasonParts.join(" · ");
  const reasonColor = bc === "#22c55e" ? "#22c55e" : bc === "#eab308" ? "#eab308" : "#ef4444";
  return el("div",{style:{marginBottom:"6px"}},
    el("div",{style:{display:"grid",gridTemplateColumns:"28px 1fr 64px 56px 20px",gap:"4px",alignItems:"center",marginBottom:"2px"}},
      el("span",{style:{color:"#e2e8f0",fontSize:"13px"}},"R"+(i+1)),
      el("div",{style:{height:"4px",background:"#232738",borderRadius:"2px"}},el("div",{style:{width:bw+"%",height:"100%",background:bc,borderRadius:"2px"}})),
      el("span",{style:{color:"#f1f5f9",fontSize:"14px",fontWeight:"500",textAlign:"right"}},fmtPace(lap.average_speed)+"/km"),
      lap.average_heartrate?el("span",{style:{fontSize:"13px",textAlign:"right",color:lap._fcAlert?"#ef4444":"#94a3b8",fontWeight:lap._fcAlert?"700":"400"}},Math.round(lap.average_heartrate)+" bpm"+(lap._fcAlert?" ↑":"")):el("span",{},""),
      el("span",{style:{fontSize:"14px",textAlign:"center"}},em)
    ),
    reasonText?el("div",{style:{paddingLeft:"32px",marginBottom:"2px"}},
      el("span",{style:{color:reasonColor,fontSize:"12px"}},reasonText)
    ):null,
    (cadence||se)?el("div",{style:{display:"flex",gap:"8px",paddingLeft:"32px"}},
      cadence?el("span",{class:"muted",style:{fontSize:"12px"}},cadence):null,
      se?el("span",{style:{color:seColor,fontSize:"12px",fontWeight:"600"}},"IE "+se+(seLabel?" "+seLabel:"")):null
    ):null
  );
}


function predict10KAtDate(dateStr) {
  // Calcule l\'estimation 10K en ne prenant que les activités antérieures à dateStr
  const BASE_TIME = 3021;
  const runs = stravaActivities.filter(a => a.type === "Run" && a.start_date_local?.slice(0,10) <= dateStr);
  const estimates = [];

  // SPEC → allure directe
  const specRuns = runs.filter(r => { const s = ALL_SESSIONS.find(s => s.date===r.start_date_local?.slice(0,10) && s.type==="SPEC"); return s && statuses[s.uid]!=="❌"; });
  const specLaps = specRuns.flatMap(r => getEffortLaps(r));
  if (specLaps.length > 0) {
    const avgSpeed = specLaps.reduce((s,l)=>s+l.average_speed,0)/specLaps.length;
    estimates.push({ value: 10000/avgSpeed, weight: 0.45 });
  }

  // VMA → vitesse × 0.87
  const vmaRuns = runs.filter(r => { const s = ALL_SESSIONS.find(s => s.date===r.start_date_local?.slice(0,10) && s.type==="VMA"); return s && statuses[s.uid]!=="❌"; });
  const vmaLaps = vmaRuns.flatMap(r => getEffortLaps(r));
  if (vmaLaps.length > 0) {
    const avgSpeed = vmaLaps.reduce((s,l)=>s+l.average_speed,0)/vmaLaps.length;
    estimates.push({ value: 10000/(avgSpeed*0.87), weight: 0.35 });
  }

  if (estimates.length === 0) return BASE_TIME;

  const totalWeight = estimates.reduce((s,e)=>s+e.weight,0);
  const weighted = estimates.reduce((s,e)=>s+e.value*e.weight,0)/totalWeight;
  const hasVma = vmaLaps.length > 0;
  const hasSpec = specLaps.length > 0;
  const lavWeight = (hasVma && hasSpec) ? 0.10 : (hasVma || hasSpec) ? 0.30 : 1.00;
  return Math.round(BASE_TIME * lavWeight + weighted * (1 - lavWeight));
}

function rebuildPredHistory() {
  if (!stravaActivities.length || isRebuilding) return;
  isRebuilding = true; render();
  // Générer une entrée par jour depuis le début du plan jusqu\'à aujourd\'hui
  const startDate = PLAN[0].sessions[0].date;
  const endDate = today();
  const newHistory = [];
  let d = new Date(startDate + "T00:00:00");
  const end = new Date(endDate + "T00:00:00");
  while (d <= end) {
    const dateStr = d.toISOString().slice(0,10);
    const time = predict10KAtDate(dateStr);
    const confidence = stravaActivities.filter(a=>a.start_date_local?.slice(0,10)<=dateStr).length > 0 ? 45 : 30;
    newHistory.push({ date: dateStr, time, confidence, predictorVersion: PREDICTOR_VERSION });
    d.setDate(d.getDate()+1);
  }
  predHistory = newHistory;
  save("lk_pred_history", predHistory);
  lastRebuildDate = today();
  save("lk_last_rebuild", lastRebuildDate);
  isRebuilding = false;
  render();
}

// Reconstruire l\'historique si manquant ou incomplet
if (stravaActivities.length > 0 && (predHistory.length <= 1 || (predHistory[0] && predHistory[0].predictorVersion !== PREDICTOR_VERSION))) {
  rebuildPredHistory();
}

function predict10K() {
  const BASE_TIME = 3021; // 50'21" Lavandou
  const runs = stravaActivities.filter(a => a.type === "Run");
  const estimates = [];
  const details = [];

  // ── Helper : vitesse moyenne pondérée par durée d\'effort ─────────────────
  // Pour un type de séance, calcule la vitesse moyenne pondérée par la durée
  // totale d\'effort de chaque séance (séances plus longues = plus de poids)
  function weightedAvgByEffortDuration(sessionType, factor) {
    const sessionRuns = runs.filter(r => {
      const dateLocal = r.start_date_local?.slice(0,10);
      return ALL_SESSIONS.find(s => s.date===dateLocal && s.type===sessionType);
    });
    if (!sessionRuns.length) return null;

    let totalWeight = 0;
    let weightedSpeed = 0;
    let allLaps = [];

    sessionRuns.forEach(r => {
      const laps = getEffortLaps(r);
      if (!laps.length) return;
      const effortDuration = laps.reduce((s,l) => s + l.distance / l.average_speed, 0);
      const avgSpeed = laps.reduce((s,l) => s + l.average_speed, 0) / laps.length;
      weightedSpeed += avgSpeed * effortDuration;
      totalWeight += effortDuration;
      allLaps = allLaps.concat(laps);
    });

    if (!totalWeight) return null;
    return { speed: weightedSpeed / totalWeight, laps: allLaps, runs: sessionRuns };
  }

  // ── 1. SPEC → allure directe ──────────────────────────────────────────────
  const specData = weightedAvgByEffortDuration("SPEC", 1);
  if (specData) {
    const estimate10k = 10000 / specData.speed;
    estimates.push({ value: estimate10k, weight: 0.45 });
    const lastSpecDate = specData.runs.map(r=>r.start_date_local?.slice(0,10)).filter(Boolean).sort().pop();
    details.push({ label:`SPEC · ${specData.runs.length} séance${specData.runs.length>1?"s":""} · dernier ${lastSpecDate||"?"}`, value:fmtPace(specData.speed)+"/km → "+fmtTime(Math.round(estimate10k)) });
  }

  // ── 2. SEUIL → contribue uniquement à partir de 3 séances ─────────────────
  const seuilData = weightedAvgByEffortDuration("SEUIL", 1);
  if (seuilData && seuilData.runs.length >= 3) {
    const totalEffortTime = seuilData.laps.reduce((s,l) => s + l.distance/l.average_speed, 0);
    const totalEffortDist = seuilData.laps.reduce((s,l) => s + l.distance, 0);
    const riegelSeuil = totalEffortTime * Math.pow(10000/totalEffortDist, 1.06);
    estimates.push({ value: riegelSeuil, weight: 0.10 });
    details.push({ label:`SEUIL · ${seuilData.runs.length} séances · ${Math.round(totalEffortDist)}m effort`, value:fmtPace(seuilData.speed)+"/km → "+fmtTime(Math.round(riegelSeuil)) });
  }

  // ── 3. VMA → vitesse × 0.87 ──────────────────────────────────────────────
  const vmaData = weightedAvgByEffortDuration("VMA", 1);
  if (vmaData) {
    const estimate10k = 10000 / (vmaData.speed * 0.87);
    estimates.push({ value: estimate10k, weight: 0.35 });
    const lastVmaDate = vmaData.runs.map(r=>r.start_date_local?.slice(0,10)).filter(Boolean).sort().pop();
    details.push({ label:`VMA · ${vmaData.runs.length} séance${vmaData.runs.length>1?"s":""} · dernier ${lastVmaDate||"?"}`, value:fmtPace(vmaData.speed)+"/km → "+fmtTime(Math.round(estimate10k)) });
  }

  // ── Pondération Lavandou selon qualité des données ────────────────────────
  const hasVma   = vmaData !== null;
  const hasSpec  = specData !== null;
  const hasSeuil = seuilData !== null && seuilData.laps.length > 0;

  // Compter le total de séances intensives disponibles
  const nVmaSessions = vmaData ? vmaData.runs.length : 0;
  const nSpecSessions = specData ? specData.runs.length : 0;
  const nIntensive = nVmaSessions + nSpecSessions;

  let lavendouWeight;
  if (hasVma && hasSpec && nIntensive >= 5) {
    lavendouWeight = 0.10; // Beaucoup de données → peu de Lavandou
  } else if (hasVma && hasSpec && nIntensive >= 3) {
    lavendouWeight = 0.20; // Données suffisantes
  } else if (hasVma && hasSpec) {
    lavendouWeight = 0.30; // VMA + SPEC mais peu de séances
  } else if (hasVma || hasSpec) {
    lavendouWeight = 0.50; // Une seule source intensive
  } else if (hasSeuil) {
    lavendouWeight = 0.70;
  } else {
    lavendouWeight = 1.00;
  }

  let estimate = BASE_TIME;
  let confidence = 30;
  let method = "Base Lavandou 50\'21\"";

  if (estimates.length > 0) {
    const totalWeight = estimates.reduce((s,e) => s+e.weight, 0);
    const weighted = estimates.reduce((s,e) => s+e.value*e.weight, 0) / totalWeight;
    estimate = BASE_TIME * lavendouWeight + weighted * (1 - lavendouWeight);
    confidence = Math.min(30 + (vmaData?.laps.length||0)*3 + (specData?.laps.length||0)*5 + (seuilData?.laps.length||0)*2, 95);
    method = estimates.length===1 ? "1 source" : estimates.length+" sources combinées";
  }

  const target = 48.5*60;
  const gap = estimate - target;

  // Enregistrer l\'estimation du jour dans l\'historique
  const todayStr = today();
  const lastEntry = predHistory[predHistory.length-1];
  if (!lastEntry || lastEntry.date !== todayStr) {
    predHistory.push({ date: todayStr, time: Math.round(estimate), confidence, predictorVersion: PREDICTOR_VERSION });
    if (predHistory.length > 80) predHistory.shift();
    save("lk_pred_history", predHistory);
  } else if (lastEntry.date === todayStr && lastEntry.time !== Math.round(estimate)) {
    // Mettre à jour l'entrée du jour si l'estimation a changé
    predHistory[predHistory.length-1] = { date: todayStr, time: Math.round(estimate), confidence, predictorVersion: PREDICTOR_VERSION };
    save("lk_pred_history", predHistory);
  }

  // Fourchette selon la confiance
  const margin = Math.round((1 - confidence/100) * 90); // ±0-90 sec selon confiance
  const estimateLow = Math.round(estimate) - margin;
  const estimateHigh = Math.round(estimate) + margin;

  return {
    time: Math.round(estimate), timeStr: fmtTime(Math.round(estimate)),
    timeLow: fmtTime(estimateLow), timeHigh: fmtTime(estimateHigh),
    target: fmtTime(target), gap: Math.round(gap),
    gapStr: (gap>0?"+":"")+fmtTime(Math.abs(Math.round(gap))),
    onTrack: gap<=30, confidence, method, details,
  };
}
