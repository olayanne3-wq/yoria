<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test vibration</title>
</head>
<body style="background:#0f1117;color:#fff;font-family:sans-serif;padding:20px;">
<h1>Test isolé de navigator.vibrate()</h1>
<p id="support">Support détecté : <span id="supportVal">...</span></p>
<button id="btn1" style="font-size:20px;padding:20px;width:100%;margin-bottom:10px;">Vibrer 200ms</button>
<button id="btn2" style="font-size:20px;padding:20px;width:100%;margin-bottom:10px;">Vibrer motif [100,50,100,50,300]</button>
<p id="result" style="font-size:18px;"></p>
<script>
document.getElementById('supportVal').textContent = ('vibrate' in navigator) ? 'OUI' : 'NON';
document.getElementById('btn1').addEventListener('click', () => {
  const ok = navigator.vibrate(200);
  document.getElementById('result').textContent = 'Résultat appel : ' + ok;
});
document.getElementById('btn2').addEventListener('click', () => {
  const ok = navigator.vibrate([100,50,100,50,300]);
  document.getElementById('result').textContent = 'Résultat appel : ' + ok;
});
</script>
</body>
</html>
