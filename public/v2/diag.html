<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diagnostic modules Engine</title>
<style>
  body { font-family: monospace; background: #0f1117; color: #eee; padding: 20px; font-size: 16px; }
  .ok { color: #4ade80; }
  .err { color: #f87171; white-space: pre-wrap; word-break: break-all; }
  .step { margin-bottom: 16px; padding: 12px; border: 1px solid #333; border-radius: 8px; }
</style>
</head>
<body>
<h1>Diagnostic Engine</h1>
<div id="output">Chargement...</div>

<script type="module">
  const out = document.getElementById('output');
  out.innerHTML = '';

  function log(label, ok, detail) {
    const div = document.createElement('div');
    div.className = 'step';
    div.innerHTML = `<strong>${label}</strong> : <span class="${ok ? 'ok' : 'err'}">${ok ? 'OK' : 'ÉCHEC'}</span>` + (detail ? `<div class="err">${detail}</div>` : '');
    out.appendChild(div);
  }

  let PlanGenerator, Strava, GistSync;

  try {
    PlanGenerator = await import('/v2/engine/plan-generator.js');
    log('Import plan-generator.js', true, `Exports: ${Object.keys(PlanGenerator).join(', ')}`);
  } catch (e) {
    log('Import plan-generator.js', false, e.stack || e.message);
  }

  try {
    Strava = await import('/v2/engine/strava.js');
    log('Import strava.js', true, `Exports: ${Object.keys(Strava).join(', ')}`);
  } catch (e) {
    log('Import strava.js', false, e.stack || e.message);
  }

  try {
    GistSync = await import('/v2/engine/gist-sync.js');
    log('Import gist-sync.js', true, `Exports: ${Object.keys(GistSync).join(', ')}`);
  } catch (e) {
    log('Import gist-sync.js', false, e.stack || e.message);
  }

  try {
    const merged = { ...PlanGenerator, ...Strava, ...GistSync };
    window.Engine = merged;
    log('Fusion window.Engine', true, `${Object.keys(merged).length} exports au total`);
  } catch (e) {
    log('Fusion window.Engine', false, e.stack || e.message);
  }

  try {
    const plan = window.Engine.generatePlan(
      { niveau: 'intermediaire', joursDisponiblesHabituels: [1,2,3,4,5,6], renforcementMusculaire: true },
      { distance: '10K', refDistance: '10K', tempsReference: '50:21', objectif: '48:30', dateDebut: '2026-06-22', dateCourse: '2026-09-06', volumeActuel: 30, contraintesPonctuelles: [] }
    );
    log('Appel Engine.generatePlan(...)', true, `Allures: ${JSON.stringify(plan.allures)}`);
  } catch (e) {
    log('Appel Engine.generatePlan(...)', false, e.stack || e.message);
  }
</script>
</body>
</html>
